<style>

:root { --cat-01:#FF6EC7; --c-cyan:#3FE0DC; --c-navy:#1a2b4a; --c-gray-text:#6E6E6E; --c-white:#FFF; --c-bg:#E7E7E7; --cat-color:var(--cat-01); }
body { font-family:'Paperlogy', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif; background:var(--c-bg); color:var(--c-navy); min-height:100vh; overflow-x:hidden; font-weight:400; padding:1.5rem 1rem 3rem; }

.modal-tags { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.7rem; }
.modal-tags .tags-left { display:flex; gap:0.4rem; }

.modal-close-x { background:transparent; border:none; color:var(--c-white); font-size:1.4rem; cursor:pointer; line-height:1; }
.detail-modal-hint { font-size:0.85rem; opacity:0.97; line-height:1.5; }

<div style="font-size:0.95rem; line-height:1.75; color:#1a2b4a; word-break:keep-all;">

  <div style="font-weight:600; font-size:1.2rem; text-align:center; padding:0.6rem 0.9rem; background:#F0F0F0; border-radius:6px; margin-bottom:1.1rem; line-height:1.4;">
    판문점에서 쌍방 서명 완료
  </div>

  <p>유엔군대표단 측 수석대표 미육군대장 해리슨 2세와 조선인민군 및 중국인민지원군대표단 수석대표 조선인민군대장 남일이 대표로 참석해 27일 오전 10시에 <span class="dmz-blank" data-blank="B" style="display:inline-block; padding:0 0.5em; background:#3FE0DC; border-radius:4px; color:#1a2b4a; font-weight:600;">[B]</span>에 서명했다. 양측은 일체의 발언 없이 서명만을 교환하였다.</p>

  <p style="margin-top:0.9rem;">협정에 따라 발효 후 72시간 이내에 쌍방 군사력은 군사분계선으로부터 각 2킬로미터씩 후퇴하여야 한다. 이로써 서해 강화도에서 강원 고성까지 약 248킬로미터에 걸친 비무장지대가 설치된다.</p>
