<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>자료선택 레이아웃 — DMZ v5 pickone (정적)</title>
<style>

/* ===== 폰트 ===== */
@font-face {
  font-family: 'Paperlogy';
  src: url('assets/fonts/Paperlogy-4Regular.ttf') format('truetype');
  font-weight: 400; font-display: swap;
}
@font-face {
  font-family: 'Paperlogy';
  src: url('assets/fonts/Paperlogy-7Bold.ttf') format('truetype');
  font-weight: 600; font-display: swap;
}
@font-face {
  font-family: 'Paperlogy';
  src: url('assets/fonts/Paperlogy-9Black.ttf') format('truetype');
  font-weight: 900; font-display: swap;
}

/* ===== 리셋 + 베이스 ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  /* 메인 컬러 */
  --c-pink-primary: #FF1493;
  --c-pink-soft: #FFB6D9;
  --c-pink-pale: #FFE4F0;
  --c-cyan: #3FE0DC;
  --c-cyan-soft: #B8F0EE;
  --c-navy: #1a2b4a;
  --c-gray-locked: #B8B8B8;
  --c-gray-card: #E8E8E8;          /* 자료 1·3 (위치 홀수) — 5/16 세션361 */
  --c-gray-card-alt: #D8D8D8;      /* 자료 2·4 (위치 짝수) — 5/16 세션361 */
  --c-gray-text: #6E6E6E;
  --c-white: #FFFFFF;
  --c-bg: #E7E7E7;

  /* 카테고리 컬러 (디자인 225.png) */
  --cat-01: #FF6EC7;
  --cat-02: #D8E82D;
  --cat-03: #A9D4FF;
  --cat-04: #FF9D48;
  --cat-05: #C77DFF;
  --cat-06: #FFD556;

  /* 레거시 토큰 (기존 코드 호환) */
  --bg: var(--c-white);
  --fg: var(--c-navy);
  --gray: var(--c-gray-text);
  --light-gray: var(--c-gray-card);
  --border: var(--c-navy);
  --green: #27ae60;
  --red: var(--c-pink-primary);

  /* 이 화면 고정: cat-01 */
  --cat-color: var(--cat-01);
}

body {
  font-family: 'Paperlogy', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
  background: var(--c-bg); color: var(--c-navy);
  min-height: 100vh; overflow-x: hidden;
  font-weight: 400;
}

/* ===== 화면 컨테이너 — game-screen ===== */
#game-screen {
  min-height: 100vh;
  background: var(--cat-color);
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ===== APP HEADER ===== */
.app-header {
  display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
  padding: 0.7rem 1rem; background: transparent;
  width: 100%; max-width: 500px;
  position: sticky; top: 0; z-index: 90;
}
.app-header .timer-placeholder { justify-self: start; }
.app-header .app-logo { justify-self: center; }
.app-header .app-profile { justify-self: end; }
.app-header .timer-placeholder {
  background: var(--c-pink-soft); color: var(--c-navy);
  font-weight: 600; font-size: 0.9rem;
  padding: 0.35rem 1rem 0.32rem; border-radius: 999px;
  letter-spacing: 0.08em;
}
.app-header .app-logo {
  display: inline-flex; align-items: center;
}
.app-header .app-logo img {
  height: 44px; width: auto; display: block;
}
.app-header .app-profile {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--c-navy);
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.app-header .app-profile::before {
  content: '';
  width: 22px; height: 22px;
  background-color: var(--c-white);
  -webkit-mask: url('assets/icons/profile.png') no-repeat center / contain;
          mask: url('assets/icons/profile.png') no-repeat center / contain;
}

/* ===== GAME CONTENT 컨테이너 ===== */
.game-content {
  flex: 1; padding: 0 1rem 2rem;
  display: flex; flex-direction: column; gap: 0.4rem;
  max-width: 500px; width: 100%; margin: 0 auto;
}

/* ===== PHASE BANNER (헤더: 주제 띠 + 스토리 제목 탭) ===== */
.phase-banner {
  position: relative;
  height: 64px;
  margin-bottom: 0;
}

/* 주제 띠 — 전체 폭 회색 띠, 클릭 시 스토리선택으로 */
.phase-banner .phase-cat-tab {
  display: flex;
  width: 100%;
  height: 100%;
  box-sizing: border-box;
  background: var(--c-gray-card);
  color: var(--c-navy);
  padding: 0.7rem 1rem;
  align-items: center;
  border-radius: 14px 0 0 0;
  clip-path: polygon(0 0, 82% 0, 100% 100%, 0 100%);
  font-size: 0.78rem;
  font-weight: 600;
  position: relative; z-index: 1;
  cursor: pointer;
  transition: background 0.12s;
}
.phase-banner .phase-cat-tab:hover { background: #c8c8c8; }

/* 스토리 제목 탭 — 우측 60%, 흰색 배경, 텍스트 컬러 = cat-color */
.phase-banner .phase-story-tab {
  position: absolute;
  top: 0;
  right: 0;
  width: 60%;
  height: 64px;
  box-sizing: border-box;
  background: var(--c-white);
  color: var(--cat-color);
  padding: 0 1.4rem 0 2.4rem;
  display: flex; align-items: center; justify-content: center;
  border-radius: 0 16px 0 0;
  clip-path: polygon(18% 0, 100% 0, 100% 100%, 0 100%);
  font-size: 1.25rem;
  font-weight: 600;
  z-index: 1;
  text-align: center;
  letter-spacing: 0.3px;
}

/* ===== PHASE SHEET (흰 시트) ===== */
.phase-sheet {
  background: var(--c-white);
  border-radius: 18px 0 18px 18px;
  padding: 30px 0.8rem 1.4rem;
  margin-top: -15px;
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
}

/* ===== SOURCE CARD (자료 카드) ===== */
.source-card {
  cursor: pointer; transition: all 0.18s;
  background: var(--cat-color);
  border: none;
  border-radius: 18px;
  position: relative;
  overflow: hidden;
  margin-top: -40px;
}
.source-card:first-of-type { margin-top: 0; }

.source-card .card-header {
  padding: 1.3rem 1.2rem 3.8rem;
  display: flex; align-items: center; gap: 0.6rem;
  position: relative; min-height: 160px;
}
.source-card .card-info { flex: 1; z-index: 1; }

/* 아이콘 이미지 — 우하단 */
.card-icon-img {
  position: absolute; right: 1.6rem; bottom: -2px; width: 150px; height: auto;
  opacity: 0.95;
}

/* 텍스트 */
.card-title { font-size: 1.08rem; font-weight: 600; color: var(--c-navy); }
.card-sub   { font-size: 0.75rem; color: var(--c-navy); opacity: 0.7; margin-top: 0.3rem; }

/* 상태 badge */
.card-status {
  display: inline-flex; align-items: center; gap: 0.25rem;
  font-size: 0.7rem; font-weight: 600;
  padding: 0.3rem 0.75rem 0.28rem;
  border-radius: 999px; border: none;
  background: var(--c-cyan); color: var(--c-navy);
  margin-bottom: 0.5rem;
}
.card-status::before {
  content: '';
  display: inline-block;
  width: 1.4em; height: 1.4em;
  background-color: var(--c-white);
  -webkit-mask: url('assets/icons/status_partial.png') no-repeat center / contain;
          mask: url('assets/icons/status_partial.png') no-repeat center / contain;
  vertical-align: -0.32em;
  margin-right: 0.18em;
}

/* 완료 상태 badge */
.card-status.solved {
  background: var(--c-white); color: var(--cat-color);
}
.card-status.solved::before {
  -webkit-mask-image: url('assets/icons/status_solved.png');
          mask-image: url('assets/icons/status_solved.png');
  background-color: var(--cat-color);
}

/* 잠금 상태 — 홀수(1·3): --c-gray-card / 짝수(2·4): --c-gray-card-alt */
.source-card.locked {
  background: var(--c-gray-card) !important;
  cursor: not-allowed;
}
.source-card.locked.card-shade-alt {
  background: var(--c-gray-card-alt) !important;
}
.source-card.locked .card-title,
.source-card.locked .card-sub { color: var(--c-gray-text); }
.source-card.locked .card-icon-img { opacity: 0.35; filter: grayscale(0.85); }
.source-card.locked .card-status::before {
  -webkit-mask-image: url('assets/icons/status_locked.png');
          mask-image: url('assets/icons/status_locked.png');
  background-color: var(--c-navy);
}
.source-card.locked .card-status {
  background: var(--c-gray-locked) !important;
  color: var(--c-white) !important;
}

/* 호버 */
.source-card:hover { transform: translateY(-3px); }
.source-card.locked:hover { transform: none; }

</style>
</head>

<body>
<div id="game-screen">

  <!-- 상단바 -->
  <header class="app-header">
    <span class="timer-placeholder">30:00</span>
    <span class="app-logo">
      <img src="assets/images/title_logo_cat01.png" alt="DMZ Archive">
    </span>
    <span class="app-profile"></span>
  </header>

  <!-- 게임 컨텐츠 -->
  <div class="game-content">

    <!-- 헤더: 주제 띠 + 스토리 제목 탭 -->
    <div class="phase-banner">
      <div class="phase-cat-tab">DMZ 기본정보</div>
      <div class="phase-story-tab">DMZ의 탄생</div>
    </div>

    <!-- 흰 시트 + 자료 카드 4장 -->
    <div class="phase-sheet">

      <!-- 자료 1번 (A 편지) — 완료(solved). z=1, margin-top 없음(첫 카드) -->
      <div class="source-card" style="z-index:1">
        <div class="card-header">
          <div class="card-info">
            <span class="card-status solved">복원 완료</span>
            <div class="card-title">북으로 보낸 편지</div>
            <div class="card-sub">개인 서한 · 1953</div>
          </div>
          <img class="card-icon-img" src="assets/icons/personal_tab.png" alt="">
        </div>
      </div>

      <!-- 자료 2번 (B 신문) — 활성(unlocked). z=2, margin-top -40px -->
      <div class="source-card" style="z-index:2; margin-top:-40px">
        <div class="card-header">
          <div class="card-info">
            <span class="card-status">복구 필요</span>
            <div class="card-title">정전협정 보도</div>
            <div class="card-sub">조선일보 · 1953.07.27</div>
          </div>
          <img class="card-icon-img" src="assets/icons/news_tab.png" alt="">
        </div>
      </div>

      <!-- 자료 3번 (C 사진) — 잠김(locked, 홀수: --c-gray-card). z=3, margin-top -40px -->
      <div class="source-card locked" style="z-index:3; margin-top:-40px">
        <div class="card-header">
          <div class="card-info">
            <span class="card-status">잠김</span>
            <div class="card-title">철책선 설치 현장</div>
            <div class="card-sub">기록 사진 · 1954</div>
          </div>
          <img class="card-icon-img" src="assets/icons/photo_tab.png" alt="">
        </div>
      </div>

      <!-- 자료 4번 (D 구술) — 잠김(locked, 짝수: card-shade-alt). z=4, margin-top -40px -->
      <div class="source-card locked card-shade-alt" style="z-index:4; margin-top:-40px">
        <div class="card-header">
          <div class="card-info">
            <span class="card-status">잠김</span>
            <div class="card-title">실향민 증언</div>
            <div class="card-sub">구술 기록 · 출처 불명</div>
          </div>
          <img class="card-icon-img" src="assets/icons/oral_tab.png" alt="">
        </div>
      </div>

    </div><!-- /.phase-sheet -->
  </div><!-- /.game-content -->
</div><!-- /#game-screen -->
</body>
</html>
