<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mermaid Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #fff;
    color: #111;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 12px 24px;
    border-bottom: 1px solid #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .toolbar {
    display: flex;
    gap: 8px;
  }

  .toolbar button {
    background: #fff;
    border: 1px solid #ccc;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    border-radius: 4px;
    color: #111;
    transition: border-color 0.15s;
  }

  .toolbar button:hover {
    border-color: #111;
  }

  .main {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  .editor-pane, .preview-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
  }

  .editor-pane {
    border-right: 1px solid #e0e0e0;
  }

  .pane-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #999;
    padding: 8px 16px;
    border-bottom: 1px solid #e0e0e0;
    flex-shrink: 0;
  }

  #editor {
    flex: 1;
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    padding: 16px;
    font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
    font-size: 14px;
    line-height: 1.6;
    color: #111;
    background: #fff;
    tab-size: 2;
  }

  #preview {
    flex: 1;
    overflow: auto;
    padding: 24px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  #preview svg {
    max-width: 100%;
    height: auto;
  }

  .error {
    color: #d00;
    font-size: 13px;
    font-family: monospace;
    padding: 16px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  @media (max-width: 768px) {
    .main {
      flex-direction: column;
    }

    .editor-pane {
      border-right: none;
      border-bottom: 1px solid #e0e0e0;
      flex: 1;
    }

    .preview-pane {
      flex: 1;
    }
  }
</style>
</head>
<body>

<header>
  <h1>Mermaid Viewer</h1>
  <div class="toolbar">
    <button id="btn-svg">SVG</button>
    <button id="btn-png">PNG</button>
  </div>
</header>

<div class="main">
  <div class="editor-pane">
    <div class="pane-label">Editor</div>
    <textarea id="editor" spellcheck="false">graph TD
    A[Start] --> B{Decision}
    B -->|Yes| C[Do something]
    B -->|No| D[Do something else]
    C --> E[End]
    D --> E</textarea>
  </div>
  <div class="preview-pane">
    <div class="pane-label">Preview</div>
    <div id="preview"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: false,
    theme: 'default',
    securityLevel: 'loose',
    fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif'
  });

  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');
  let debounceTimer = null;
  let renderCount = 0;

  async function renderDiagram() {
    const code = editor.value.trim();
    if (!code) {
      preview.innerHTML = '';
      return;
    }

    try {
      renderCount++;
      const id = 'mermaid-' + renderCount;
      const { svg } = await mermaid.render(id, code);
      preview.innerHTML = svg;
    } catch (err) {
      // mermaid.render may inject an element on error; clean up
      const errEl = document.getElementById('d' + 'mermaid-' + renderCount);
      if (errEl) errEl.remove();

      preview.innerHTML = '<div class="error">' + escapeHtml(err.message || String(err)) + '</div>';
    }
  }

  function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }

  editor.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(renderDiagram, 300);
  });

  // Tab key support
  editor.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
      editor.selectionStart = editor.selectionEnd = start + 2;
    }
  });

  function getSvgContent() {
    const svg = preview.querySelector('svg');
    if (!svg) return null;
    const clone = svg.cloneNode(true);
    clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    return new XMLSerializer().serializeToString(clone);
  }

  document.getElementById('btn-svg').addEventListener('click', () => {
    const svgStr = getSvgContent();
    if (!svgStr) return;
    const blob = new Blob([svgStr], { type: 'image/svg+xml' });
    downloadBlob(blob, 'mermaid-diagram.svg');
  });

  document.getElementById('btn-png').addEventListener('click', () => {
    const svgStr = getSvgContent();
    if (!svgStr) return;

    const svg = preview.querySelector('svg');
    const w = svg.viewBox.baseVal.width || svg.getBoundingClientRect().width;
    const h = svg.viewBox.baseVal.height || svg.getBoundingClientRect().height;
    const scale = 2;

    const canvas = document.createElement('canvas');
    canvas.width = w * scale;
    canvas.height = h * scale;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const img = new Image();
    const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);

    img.onload = () => {
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      canvas.toBlob((pngBlob) => {
        downloadBlob(pngBlob, 'mermaid-diagram.png');
      }, 'image/png');
    };
    img.src = url;
  });

  function downloadBlob(blob, filename) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  // Initial render
  renderDiagram();
</script>
</body>
</html>
