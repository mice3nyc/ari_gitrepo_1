<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>MOMAK · Market Channel</title>
<style>
  :root { color-scheme: dark; --bg:#2b2b33; --panel:#33333c; --line:#4a4a55; }
  * { box-sizing: border-box; margin: 0; touch-action: manipulation; }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--bg); color: #fff; font-family: "Helvetica Neue", Arial, "Apple SD Gothic Neo", system-ui, sans-serif; display: flex; flex-direction: column; -webkit-user-select: none; user-select: none; }
  /* 상단 바 */
  header { flex: 0 0 auto; height: 11vh; min-height: 56px; background: var(--panel); display: flex; align-items: center; justify-content: space-between; padding: 0 4vw; border-bottom: 1px solid var(--line); }
  .brand { display: flex; align-items: baseline; gap: 2vw; }
  .brand .m { font-size: clamp(22px, 3.6vw, 52px); font-weight: 800; letter-spacing: .04em; }
  .brand .u { width: 13vw; height: 3px; background: #7a7a88; }
  .hstat { display: flex; align-items: center; gap: 2vw; }
  .hstat .s { font-size: clamp(12px, 1.5vw, 22px); font-weight: 800; color: #9a9aa8; font-variant-numeric: tabular-nums; }
  .gear { font-size: clamp(13px, 1.6vw, 22px); font-weight: 800; color: #fff; background: #4a4a58; border: none; border-radius: 8px; padding: 9px 18px; cursor: pointer; }
  .gear:active { background: #5a5a6a; }
  /* 컬럼 라벨 */
  .labels { flex: 0 0 auto; display: grid; grid-template-columns: 1fr 1.4fr; padding: 2vh 4vw 0; }
  .labels span { font-size: clamp(12px, 1.6vw, 22px); font-weight: 800; color: #9a9aa8; letter-spacing: .12em; }
  /* 스테이지 = 목업 스타일 (NAME 왼쪽 / PRICE 박스 오른쪽) */
  main { flex: 1 1 auto; display: flex; flex-direction: column; padding: 2vh 4vw 4vh; gap: 3vh; min-height: 0; }
  .row { flex: 1 1 0; display: grid; grid-template-columns: 1fr 1.4fr; align-items: center; gap: 4vw; min-height: 0; }
  .row .name { font-size: clamp(30px, 6vw, 120px); font-weight: 800; color: var(--c); line-height: 1; }
  .row .name small { display: block; font-size: clamp(10px, 1.3vw, 20px); font-weight: 700; color: #ffffff35; letter-spacing: .08em; margin-top: .5vh; }
  .row .box { height: 100%; background: var(--c); border-radius: 10px; display: flex; align-items: center; justify-content: flex-end; padding: 0 4vw; box-shadow: 0 6px 20px #00000030; position: relative; }
  .row .price { font-size: clamp(40px, 9vw, 170px); font-weight: 800; color: #fff; font-variant-numeric: tabular-nums; text-shadow: 0 2px 4px #00000030; }
  .row .chg { position: absolute; left: 4vw; bottom: 2vh; font-size: clamp(12px, 1.6vw, 26px); font-weight: 800; color: #ffffffcc; }
  .row.drop .box { animation: df .6s ease-out; } @keyframes df { 0%{filter:brightness(2.2);} 100%{filter:brightness(1);} }
  .empty { flex: 1 1 auto; display: flex; align-items: center; justify-content: center; color: #6b6b78; font-size: clamp(16px, 2.4vw, 34px); font-weight: 700; }
  .overlay { position: fixed; top: 11vh; left: 0; right: 0; bottom: 0; background: #000b; display: none; align-items: center; justify-content: center; font-size: 6vw; font-weight: 800; letter-spacing: .1em; z-index: 5; }
  .overlay.show { display: flex; }
  /* 아이템 선택기 */
  .picker { position: fixed; inset: 0; background: #14141ae0; backdrop-filter: blur(4px); display: none; flex-direction: column; z-index: 20; padding: 4vh 4vw; }
  .picker.show { display: flex; }
  .picker h2 { font-size: clamp(18px, 2.4vw, 32px); font-weight: 800; margin-bottom: .4em; }
  .picker .hint { color: #9a9aa8; font-size: clamp(12px, 1.5vw, 18px); margin-bottom: 3vh; }
  .grid { flex: 1 1 auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; align-content: start; overflow-y: auto; }
  .chip { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-radius: 10px; background: #2b2b33; border: 2px solid transparent; cursor: pointer; font-size: clamp(13px, 1.5vw, 20px); font-weight: 700; }
  .chip .dot { width: 16px; height: 16px; border-radius: 50%; flex: 0 0 auto; }
  .chip.on { border-color: #fff; background: #3a3a46; }
  .chip .num { margin-left: auto; font-weight: 800; color: #ffd23f; }
  .picker .foot { display: flex; justify-content: space-between; align-items: center; margin-top: 3vh; }
  .picker .foot .cnt { color: #9a9aa8; font-size: clamp(13px,1.6vw,20px); font-weight:700; }
  .picker .done { font-size: clamp(15px,1.8vw,24px); font-weight: 800; background: #ffd23f; color: #201900; border: none; border-radius: 10px; padding: 14px 32px; cursor: pointer; }
</style>
</head>
<body>
  <header>
    <div class="brand"><span class="m">Market</span><span class="u"></span></div>
    <div class="hstat"><span class="s" id="hstat">–</span><button class="gear" id="gear">＋ 아이템 선택</button></div>
  </header>
  <div class="labels"><span>NAME</span><span>PRICE</span></div>
  <main id="stage"><div class="empty">＋ 아이템 선택 을 눌러 1~2개 고르세요</div></main>
  <div class="overlay" id="overlay"></div>

  <div class="picker" id="picker">
    <h2>표시할 아이템 선택</h2>
    <div class="hint">전체 마켓 중 최대 2개까지 고릅니다. 태블릿 한 대 = 채널 하나.</div>
    <div class="grid" id="chips"></div>
    <div class="foot"><span class="cnt" id="cnt">0 / 2 선택</span><button class="done" id="done">확인</button></div>
  </div>

<script>
  const params = new URLSearchParams(location.search);
  const room = (params.get('room') || 'DEMO').toUpperCase();
  let selected = (params.get('items') || '').split(',').map(s=>s.trim()).filter(Boolean).slice(0,2);
  let allItems = [];
  const stage = document.getElementById('stage');
  const rows = new Map();
  const fmt = (n) => Number(n).toLocaleString('en-US');
  const mmss = (s) => `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;

  // ── 선택기 ──
  function openPicker() {
    const box = document.getElementById('chips'); box.innerHTML = '';
    for (const it of allItems) {
      const chip = document.createElement('div');
      chip.className = 'chip' + (selected.includes(it.code) ? ' on' : '');
      const idx = selected.indexOf(it.code);
      chip.innerHTML = `<span class="dot" style="background:${it.color}"></span>${it.ko}<span class="num">${idx>=0?(idx+1):''}</span>`;
      chip.addEventListener('click', () => toggleSelect(it.code));
      box.appendChild(chip);
    }
    document.getElementById('cnt').textContent = `${selected.length} / 2 선택`;
    document.getElementById('picker').classList.add('show');
  }
  function toggleSelect(code) {
    const i = selected.indexOf(code);
    if (i >= 0) selected.splice(i, 1);
    else { if (selected.length >= 2) selected.shift(); selected.push(code); }
    openPicker();
  }
  document.getElementById('gear').addEventListener('click', openPicker);
  document.getElementById('done').addEventListener('click', () => {
    document.getElementById('picker').classList.remove('show');
    const u = new URL(location.href); u.searchParams.set('items', selected.join(',')); history.replaceState(null,'',u);
    stage.dataset.key = ''; renderStage();
  });

  // ── 스테이지 (목업: NAME 왼쪽 / PRICE 박스 오른쪽) ──
  function selectedItems() { return selected.map(c => allItems.find(i=>i.code===c)).filter(Boolean).slice(0,2); }
  function renderStage() {
    const items = selectedItems();
    const key = items.map(i=>i.code).join(',');
    if (stage.dataset.key !== key) {
      stage.dataset.key = key; stage.innerHTML = ''; rows.clear();
      if (!items.length) { stage.innerHTML = '<div class="empty">＋ 아이템 선택 을 눌러 1~2개 고르세요</div>'; return; }
      for (const it of items) {
        const row = document.createElement('div'); row.className = 'row'; row.style.setProperty('--c', it.color);
        row.innerHTML = `<div class="name">${it.ko}<small>${it.en}</small></div>
          <div class="box"><span class="price">–</span><span class="chg"></span></div>`;
        stage.appendChild(row); rows.set(it.code, row);
      }
    }
    for (const it of items) {
      const row = rows.get(it.code); if (!row) continue;
      row.querySelector('.price').textContent = fmt(it.price);
      const diff = it.price - it.prevPrice; const chg = row.querySelector('.chg');
      if (diff > 0) chg.textContent = '▲ ' + fmt(diff);
      else if (diff < 0) { chg.textContent = '▼ 저점'; row.classList.remove('drop'); void row.offsetWidth; row.classList.add('drop'); }
      else chg.textContent = '';
    }
  }

  function onSnapshot(m) {
    allItems = m.items;
    document.getElementById('hstat').textContent = `TURN ${m.turn}/${m.totalTurns} · ${mmss(m.secondsLeft)}`;
    renderStage();
    const ov = document.getElementById('overlay');
    if (m.marketState !== 'OPEN' && selected.length) { ov.textContent = m.marketState === 'PAUSED' ? 'PAUSED' : 'MARKET CLOSED'; ov.classList.add('show'); }
    else ov.classList.remove('show');
  }
  let ws;
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/?room=${room}&role=display`);
    ws.onmessage = (e) => { const m = JSON.parse(e.data); if (m.type === 'snapshot') onSnapshot(m); };
    ws.onclose = () => { const ov=document.getElementById('overlay'); ov.textContent='연결 끊김'; ov.classList.add('show'); setTimeout(connect, 1000); };
    ws.onerror = () => ws.close();
  }
  connect();
</script>
</body>
</html>
