<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MOMAK · GM 콘솔</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: #0a0e14; color: #e8edf4;
    font-family: -apple-system, "Pretendard", "Apple SD Gothic Neo", system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; gap: 1.5rem;
  }
  h1 { font-size: 1.2rem; letter-spacing: .05em; margin: 0; }
  .panel {
    width: min(560px, 100%); border: 1px solid #232b3a; border-radius: 14px;
    background: #10151f; padding: 1.4rem;
  }
  .status { display: grid; grid-template-columns: repeat(4, 1fr); gap: .8rem; margin-bottom: 1.3rem; }
  .status .box { background: #0a0e16; border: 1px solid #1c2536; border-radius: 10px; padding: .7rem; text-align: center; }
  .status .k { color: #6b7688; font-size: .65rem; text-transform: uppercase; letter-spacing: .08em; }
  .status .v { font-size: 1.3rem; font-weight: 800; font-variant-numeric: tabular-nums; margin-top: .2rem; }
  .state-pill { display: inline-block; padding: .15rem .6rem; border-radius: 999px; font-size: .95rem; font-weight: 700; }
  .state-pill.OPEN { background: #10331d; color: #4ade80; }
  .state-pill.PAUSED { background: #3a2f0d; color: #facc15; }
  .state-pill.CLOSED { background: #2a1414; color: #f87171; }
  .controls { display: grid; grid-template-columns: repeat(2, 1fr); gap: .7rem; }
  button {
    font: inherit; font-weight: 700; padding: .85rem; border-radius: 10px; cursor: pointer;
    border: 1px solid #2a3446; background: #161d2b; color: #e8edf4; transition: filter .12s, border-color .12s;
  }
  button:hover:not(:disabled) { filter: brightness(1.25); }
  button:disabled { opacity: .35; cursor: not-allowed; }
  button.primary { background: #ffd23f; color: #1a1200; border-color: #ffd23f; }
  button.wide { grid-column: 1 / -1; }
  .hint { color: #5b6577; font-size: .75rem; text-align: center; line-height: 1.6; }
  a.back { color: #6b7688; font-size: .8rem; text-decoration: none; }
  .sec { border-top: 1px solid #232b3a; margin-top: 1.2rem; padding-top: 1.1rem; }
  .sec h2 { font-size: .8rem; color: #8b95a8; letter-spacing: .06em; margin: 0 0 .7rem; text-transform: uppercase; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: .7rem; }
  .evgrid { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: .6rem; margin-bottom: .7rem; }
  .evgrid label { font-size: .6rem; color: #6b7688; text-transform: uppercase; letter-spacing: .06em; display:block; margin-bottom: .25rem; }
  select, .sec input {
    width: 100%; font: inherit; font-size: .95rem; padding: .6rem .5rem; border-radius: 8px;
    background: #0a0e16; border: 1px solid #2a3446; color: #e8edf4; font-variant-numeric: tabular-nums;
  }
  button.spike { background: #1f8a4c; border-color: #1f8a4c; color: #fff; }
  button.crash { background: #b23b3b; border-color: #b23b3b; color: #fff; }
  button.ghost { background: #161d2b; }
</style>
</head>
<body>
  <h1>MOMAK · GM 콘솔 <span id="room" style="color:#6b7688;font-weight:400"></span></h1>
  <div class="panel">
    <div class="status">
      <div class="box"><div class="k">턴</div><div class="v" id="turn">–</div></div>
      <div class="box"><div class="k">남은시간</div><div class="v" id="timer">–</div></div>
      <div class="box"><div class="k">접속</div><div class="v" id="players">–</div></div>
      <div class="box"><div class="k">마켓</div><div class="v"><span class="state-pill CLOSED" id="state">–</span></div></div>
    </div>
    <div class="controls">
      <button class="primary" id="open">▶ OPEN</button>
      <button id="pause">⏸ PAUSE</button>
      <button id="resume">⏵ RESUME</button>
      <button id="close">■ CLOSE</button>
      <button class="wide" id="nextTurn">⏭ 다음 턴 (NEXT TURN)</button>
    </div>

    <!-- 셔플 (SPEC §10.1) -->
    <div class="sec">
      <h2>화면 셔플</h2>
      <div class="row2">
        <button class="ghost" id="shuffleItems">🔀 중앙 위치 셔플</button>
        <button class="ghost" id="shuffleChannels">🔀 채널 화면 섞기</button>
      </div>
    </div>

    <!-- 이벤트 (SPEC §4.2) -->
    <div class="sec">
      <h2>아이템 이벤트</h2>
      <div class="evgrid">
        <div><label>아이템</label><select id="evItem"></select></div>
        <div><label>폭 (빈칸=랜덤)</label><input type="number" id="evMag" placeholder="랜덤" min="1"></div>
        <div><label>지속 초</label><input type="number" id="evDur" value="8" min="1"></div>
      </div>
      <div class="row2">
        <button class="spike" id="evSpike">▲ 폭등</button>
        <button class="crash" id="evCrash">▼ 폭락</button>
      </div>
    </div>
  </div>
  <div class="hint">이 콘솔이 방 <b id="roomh"></b>의 마켓을 제어한다.<br>OPEN 하면 모든 중앙 디스플레이가 같은 가격으로 움직인다.<br>이벤트·셔플은 OPEN 상태에서 즉시 반영된다.</div>
  <a class="back" href="/">← 홈</a>

<script>
  const params = new URLSearchParams(location.search);
  const room = (params.get('room') || 'DEMO').toUpperCase();
  document.getElementById('room').textContent = '· ' + room;
  document.getElementById('roomh').textContent = room;
  const mmss = (s) => `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  let state = 'CLOSED';

  function render(snap) {
    document.getElementById('turn').textContent = `${snap.turn} / ${snap.totalTurns}`;
    document.getElementById('timer').textContent = mmss(snap.secondsLeft);
    document.getElementById('players').textContent = snap.playerCount ?? '–';
    const st = document.getElementById('state');
    st.textContent = snap.marketState; st.className = 'state-pill ' + snap.marketState;
    state = snap.marketState;
    populateItems(snap.items);
    // 상태기계에 맞춰 버튼 활성/비활성 (SPEC §5)
    open.disabled = state === 'OPEN' || state === 'PAUSED';
    pause.disabled = state !== 'OPEN';
    resume.disabled = state !== 'PAUSED';
    close.disabled = state === 'CLOSED';
    nextTurn.disabled = snap.turn >= snap.totalTurns;
  }

  let ws;
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/?room=${room}&role=gm`);
    ws.onmessage = (e) => { const m = JSON.parse(e.data); if (m.type === 'snapshot') render(m); };
    ws.onclose = () => setTimeout(connect, 1000);
    ws.onerror = () => ws.close();
  }
  const cmd = (c) => ws && ws.readyState === 1 && ws.send(JSON.stringify({ cmd: c }));
  const sendObj = (o) => ws && ws.readyState === 1 && ws.send(JSON.stringify(o));
  for (const id of ['open','pause','resume','close','nextTurn','shuffleItems','shuffleChannels'])
    document.getElementById(id).addEventListener('click', () => cmd(id));

  // 이벤트 아이템 셀렉트 채우기 (코드값, 이름 표시) — 개수 바뀔 때만
  let itemsFilled = false;
  function populateItems(items) {
    if (itemsFilled) return;
    const sel = document.getElementById('evItem');
    const sorted = [...items].sort((a,b) => a.ko.localeCompare(b.ko, 'ko'));
    sel.innerHTML = sorted.map(it => `<option value="${it.code}">${it.ko}</option>`).join('');
    itemsFilled = true;
  }
  function sendEvent(kind) {
    const itemId = document.getElementById('evItem').value; if (!itemId) return;
    const mag = parseInt(document.getElementById('evMag').value, 10);
    const dur = parseInt(document.getElementById('evDur').value, 10) || 8;
    sendObj({ cmd: 'itemEvent', itemId, kind, magnitude: Number.isFinite(mag) ? mag : 0, durationSec: dur });
  }
  document.getElementById('evSpike').addEventListener('click', () => sendEvent('spike'));
  document.getElementById('evCrash').addEventListener('click', () => sendEvent('crash'));
  connect();
</script>
</body>
</html>
