<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MOMAK · Market</title>
<style>
  :root { color-scheme: dark; --bg:#2b2b33; --panel:#33333c; --line:#4a4a55; }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg); color: #fff;
    font-family: "Helvetica Neue", Arial, -apple-system, "Apple SD Gothic Neo", system-ui, sans-serif;
    display: flex; flex-direction: column;
  }
  /* ── 상단 바 (얇게, 아이템 공간 최대화) ── */
  header {
    flex: 0 0 auto; height: 52px; background: var(--panel);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; border-bottom: 1px solid var(--line);
  }
  .brand { display: flex; align-items: baseline; gap: 14px; }
  .brand .m { font-size: 22px; font-weight: 800; letter-spacing: .06em; }
  .brand .u { width: 130px; height: 2px; background: #7a7a88; }
  .meta { display: flex; gap: 22px; align-items: center; font-variant-numeric: tabular-nums; }
  .meta .k { color: #9a9aa8; font-size: 11px; text-transform: uppercase; letter-spacing: .1em; }
  .meta .v { font-size: 18px; font-weight: 800; margin-left: 6px; }
  .pill { padding: 3px 12px; border-radius: 999px; font-size: 13px; font-weight: 800; letter-spacing: .06em; }
  .pill.OPEN { background: #1f8a4c; color: #fff; } .pill.PAUSED { background: #c99a1e; color: #201700; } .pill.CLOSED { background: #b23b3b; color: #fff; }
  .logo-mark { display: flex; gap: 3px; align-items: center; }
  .logo-mark i { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  /* ── 전 화면 분할 그리드 (16 아이템 = 4×4, 스크롤 없음) ── */
  main {
    flex: 1 1 auto; display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: 1fr; gap: 2px; background: var(--line); /* gap이 선처럼 */
    min-height: 0;
  }
  .cell {
    background: var(--bg); position: relative; overflow: hidden;
    display: grid; grid-template-rows: 1fr 1.5fr; padding: clamp(10px, 1.1vw, 20px);
    gap: 4px;
  }
  .cell .name {
    font-size: clamp(20px, 3vw, 52px); font-weight: 800; line-height: 1.02;
    color: var(--c); letter-spacing: .01em; align-self: center;
  }
  .cell .en { font-size: clamp(8px, .8vw, 13px); font-weight: 700; color: #ffffff35; letter-spacing: .06em; }
  .cell .pricebox {
    background: var(--c); border-radius: 8px; align-self: stretch;
    display: flex; align-items: center; justify-content: flex-end;
    padding: 0 clamp(12px, 1.6vw, 30px); box-shadow: 0 4px 14px #00000030;
    position: relative;
  }
  .cell .price {
    font-size: clamp(32px, 5.4vw, 108px); font-weight: 800; color: #fff;
    font-variant-numeric: tabular-nums; letter-spacing: .01em;
    text-shadow: 0 1px 2px #00000030;
  }
  .cell .chg {
    position: absolute; left: clamp(10px, 1.4vw, 26px); bottom: 8px;
    font-size: clamp(11px, 1.1vw, 18px); font-weight: 800; font-variant-numeric: tabular-nums;
    color: #ffffffcc;
  }
  .cell.drop .pricebox { animation: dropflash .6s ease-out; }
  @keyframes dropflash { 0% { filter: brightness(2.2); } 100% { filter: brightness(1); } }
  /* 디버그: 현재 세팅값 (작게, 우상단) */
  .cell .dbg {
    position: absolute; top: clamp(6px, .8vw, 14px); right: clamp(8px, 1vw, 18px);
    font-size: clamp(8px, .78vw, 12px); font-weight: 700; line-height: 1.35;
    color: #ffffff40; font-variant-numeric: tabular-nums; text-align: right;
    letter-spacing: .02em; pointer-events: none;
  }
  .cell .dbg b { color: #ffffff66; font-weight: 800; }
  .disc { position: fixed; inset: 0; background: #000a; display: none; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; color: #ff6b6b; }
</style>
</head>
<body>
  <header>
    <div class="brand"><span class="m">Market</span><span class="u"></span><span id="room" style="color:#9a9aa8;font-size:13px"></span></div>
    <div class="meta">
      <div><span class="k">Turn</span><span class="v" id="turn">–</span></div>
      <div><span class="k">Time</span><span class="v" id="timer">–</span></div>
      <div><span class="pill CLOSED" id="state">–</span></div>
      <div class="logo-mark"><i style="background:#e8524a"></i><i style="background:#4aa3e8"></i><i style="background:#e8524a"></i></div>
    </div>
  </header>
  <main id="grid"></main>
  <div class="disc" id="disc">연결 끊김</div>

<script>
  const params = new URLSearchParams(location.search);
  const room = (params.get('room') || 'DEMO').toUpperCase();
  document.getElementById('room').textContent = '· ' + room;
  const grid = document.getElementById('grid');
  const cells = new Map();
  const fmt = (n) => n.toLocaleString('en-US');
  const mmss = (s) => `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;

  function ensureCells(items) {
    if (cells.size === items.length) return;
    grid.innerHTML = ''; cells.clear();
    // 아이템 수에 맞춰 열 개수 조정 (16→4열, 그 외엔 정사각에 가깝게)
    const cols = Math.ceil(Math.sqrt(items.length));
    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    for (const it of items) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.style.setProperty('--c', it.color);
      cell.innerHTML = `<div><div class="name">${it.ko}</div><div class="en">${it.en}</div></div>
        <div class="dbg"></div>
        <div class="pricebox"><span class="price">–</span><span class="chg"></span></div>`;
      grid.appendChild(cell);
      cells.set(it.code, cell);
    }
  }

  function render(snap) {
    document.getElementById('turn').textContent = `${snap.turn} / ${snap.totalTurns}`;
    document.getElementById('timer').textContent = mmss(snap.secondsLeft);
    const st = document.getElementById('state');
    st.textContent = snap.marketState; st.className = 'pill ' + snap.marketState;
    ensureCells(snap.items);
    for (const it of snap.items) {
      const cell = cells.get(it.code); if (!cell) continue;
      cell.querySelector('.price').textContent = fmt(it.price);
      cell.querySelector('.dbg').innerHTML =
        `저 <b>${fmt(it.low)}</b> · 고 <b>${fmt(it.high)}</b><br>폭 <b>${it.step}</b>/스텝 · 주기 <b>${it.cycleSec}s</b>`;
      const diff = it.price - it.prevPrice;
      const chg = cell.querySelector('.chg');
      if (diff > 0) { chg.textContent = '▲ ' + fmt(diff); chg.style.color = '#ffffffcc'; }
      else if (diff < 0) { chg.textContent = '▼ 저점'; chg.style.color = '#fff'; flashDrop(cell); }
      else { chg.textContent = ''; }
    }
  }
  function flashDrop(cell) { cell.classList.remove('drop'); void cell.offsetWidth; cell.classList.add('drop'); }

  let ws;
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/?room=${room}&role=overview`);
    ws.onmessage = (e) => { const m = JSON.parse(e.data); if (m.type === 'snapshot') { document.getElementById('disc').style.display='none'; render(m); } };
    ws.onclose = () => { document.getElementById('disc').style.display='flex'; setTimeout(connect, 1000); };
    ws.onerror = () => ws.close();
  }
  connect();
</script>
</body>
</html>
