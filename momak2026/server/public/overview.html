<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MOMAK · Market</title>
<style>
  :root { color-scheme: dark; --bg:#2b2b33; --panel:#33333c; --line:#4a4a55; }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg); color: #fff;
    font-family: "Helvetica Neue", Arial, -apple-system, "Apple SD Gothic Neo", system-ui, sans-serif;
    display: flex; flex-direction: column;
  }
  /* ── 상단 바 (얇게, 아이템 공간 최대화) ── */
  header {
    flex: 0 0 auto; height: 52px; background: var(--panel);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; border-bottom: 1px solid var(--line);
  }
  .brand { display: flex; align-items: baseline; gap: 14px; }
  .brand .m { font-size: 22px; font-weight: 800; letter-spacing: .06em; }
  .brand .u { width: 130px; height: 2px; background: #7a7a88; }
  .meta { display: flex; gap: 22px; align-items: center; font-variant-numeric: tabular-nums; }
  .meta .k { color: #9a9aa8; font-size: 11px; text-transform: uppercase; letter-spacing: .1em; }
  .meta .v { font-size: 18px; font-weight: 800; margin-left: 6px; }
  .pill { padding: 3px 12px; border-radius: 999px; font-size: 13px; font-weight: 800; letter-spacing: .06em; }
  .pill.OPEN { background: #1f8a4c; color: #fff; } .pill.PAUSED { background: #c99a1e; color: #201700; } .pill.CLOSED { background: #b23b3b; color: #fff; }
  .logo-mark { display: flex; gap: 3px; align-items: center; }
  .logo-mark i { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  /* ── 전 화면 분할 그리드 (16 아이템 = 4×4, 스크롤 없음) ── */
  main {
    flex: 1 1 auto; display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: 1fr; gap: 2px; background: var(--line); /* gap이 선처럼 */
    min-height: 0;
  }
  .cell {
    background: var(--bg); position: relative; overflow: hidden;
    display: grid; grid-template-rows: 1fr 1.5fr; padding: clamp(10px, 1.1vw, 20px);
    gap: 4px;
  }
  .cell .name {
    font-size: clamp(20px, 3vw, 52px); font-weight: 800; line-height: 1.02;
    color: var(--c); letter-spacing: .01em; align-self: center;
  }
  .cell .en { font-size: clamp(8px, .8vw, 13px); font-weight: 700; color: #ffffff35; letter-spacing: .06em; }
  .cell .pricebox {
    background: var(--c); border-radius: 8px; align-self: stretch;
    display: flex; align-items: center; justify-content: flex-end;
    padding: 0 clamp(12px, 1.6vw, 30px); box-shadow: 0 4px 14px #00000030;
    position: relative;
  }
  .cell .price {
    font-size: clamp(32px, 5.4vw, 108px); font-weight: 800; color: #fff;
    font-variant-numeric: tabular-nums; letter-spacing: .01em;
    text-shadow: 0 1px 2px #00000030;
  }
  .cell .chg {
    position: absolute; left: clamp(10px, 1.4vw, 26px); bottom: 8px;
    font-size: clamp(11px, 1.1vw, 18px); font-weight: 800; font-variant-numeric: tabular-nums;
    color: #ffffffcc;
  }
  .cell.drop .pricebox { animation: dropflash .6s ease-out; }
  @keyframes dropflash { 0% { filter: brightness(2.2); } 100% { filter: brightness(1); } }
  /* 이벤트 강조 (SPEC §4.2) */
  .cell.ev-spike { box-shadow: inset 0 0 0 3px #35d07f; }
  .cell.ev-crash { box-shadow: inset 0 0 0 3px #ff5a5a; }
  .cell .evbadge {
    position: absolute; top: clamp(6px,.8vw,14px); left: clamp(8px,1vw,18px);
    font-size: clamp(11px,1.2vw,20px); font-weight: 900; letter-spacing: .04em;
    padding: 2px 9px; border-radius: 6px; display: none; z-index: 2;
  }
  .cell.ev-spike .evbadge { display: block; background: #35d07f; color: #06210f; }
  .cell.ev-crash .evbadge { display: block; background: #ff5a5a; color: #2a0606; }
  .cell.ev-crash .pricebox { animation: crashpulse .5s ease-in-out infinite alternate; }
  @keyframes crashpulse { from { filter: brightness(1); } to { filter: brightness(.72); } }
  /* 디버그: 현재 세팅값 (작게, 우상단) */
  .cell .dbg {
    position: absolute; top: clamp(6px, .8vw, 14px); right: clamp(8px, 1vw, 18px);
    font-size: clamp(8px, .78vw, 12px); font-weight: 700; line-height: 1.35;
    color: #ffffff40; font-variant-numeric: tabular-nums; text-align: right;
    letter-spacing: .02em; pointer-events: none;
  }
  .cell .dbg b { color: #ffffff66; font-weight: 800; }
  .disc { position: fixed; inset: 0; background: #000a; display: none; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; color: #ff6b6b; }

  /* ── 라이브 세팅 편집 오버레이 (SPEC §4.1, ?edit=1) ── */
  .editbtn {
    position: fixed; top: 10px; right: 14px; z-index: 30;
    background: #10151f; color: #cdd6e4; border: 1px solid #3a445a;
    border-radius: 8px; padding: 6px 12px; font: inherit; font-size: 13px; font-weight: 700;
    cursor: pointer; opacity: .8;
  }
  .editbtn:hover { opacity: 1; }
  .editpanel {
    position: fixed; top: 0; right: 0; height: 100%; width: 440px; z-index: 40;
    background: #0d1119; border-left: 1px solid #2a3446; box-shadow: -8px 0 30px #0008;
    transform: translateX(100%); transition: transform .22s ease; overflow-y: auto;
    display: flex; flex-direction: column; color: #e8edf4;
  }
  .editpanel.open { transform: translateX(0); }
  .ep-head {
    position: sticky; top: 0; background: #0d1119; border-bottom: 1px solid #232b3a;
    padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .ep-head h2 { font-size: 14px; margin: 0; letter-spacing: .04em; font-weight: 800; }
  .ep-head .x { background: none; border: none; color: #7a8598; font-size: 20px; cursor: pointer; line-height: 1; }
  .ep-global {
    padding: 12px 16px; border-bottom: 1px solid #232b3a; display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: #9aa4b6;
  }
  .ep-global input { width: 64px; }
  .ep-list { padding: 6px 10px 24px; }
  .ep-row { border-bottom: 1px solid #171d29; padding: 9px 6px; }
  .ep-row .nm { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
  .ep-row .sw { width: 12px; height: 12px; border-radius: 3px; flex: 0 0 auto; }
  .ep-fields { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .ep-fields label { font-size: 10px; color: #6b7688; text-transform: uppercase; letter-spacing: .06em; display: block; margin-bottom: 3px; }
  .editpanel input {
    width: 100%; background: #060a11; border: 1px solid #2a3446; border-radius: 6px;
    color: #e8edf4; font: inherit; font-size: 13px; padding: 5px 7px;
    font-variant-numeric: tabular-nums; text-align: right;
  }
  .editpanel input:focus { outline: none; border-color: #4d8cff; }
  .editpanel input:disabled { opacity: .55; border-style: dashed; color: #8b95a8; cursor: default; }
  .ep-hint { padding: 0 16px 16px; font-size: 11px; color: #5b6577; line-height: 1.5; }
</style>
</head>
<body>
  <header>
    <div class="brand"><span class="m">Market</span><span class="u"></span><span id="room" style="color:#9a9aa8;font-size:13px"></span></div>
    <div class="meta">
      <div><span class="k">Turn</span><span class="v" id="turn">–</span></div>
      <div><span class="k">Time</span><span class="v" id="timer">–</span></div>
      <div><span class="pill CLOSED" id="state">–</span></div>
      <div class="logo-mark"><i style="background:#e8524a"></i><i style="background:#4aa3e8"></i><i style="background:#e8524a"></i></div>
    </div>
  </header>
  <main id="grid"></main>
  <div class="disc" id="disc">연결 끊김</div>

  <!-- 라이브 세팅 편집 (SPEC §4.1, ?edit=1일 때만) -->
  <button class="editbtn" id="editbtn" hidden>⚙ 편집</button>
  <aside class="editpanel" id="editpanel" hidden>
    <div class="ep-head">
      <h2>세팅 편집 · 이번 턴</h2>
      <button class="x" id="epclose" title="닫기">×</button>
    </div>
    <div class="ep-global">
      변동시간 일괄
      <input type="number" id="epstep" min="0.5" max="15" step="0.5"> 초 (전 아이템 한 번에)
    </div>
    <div class="ep-list" id="eplist"></div>
    <div class="ep-hint">입력은 넷 — 저점·고점·변동시간(몇 초마다 한 스텝)·총주기(한 사이클 저→고→저 총 시간).<br><b>변동폭은 자동</b>: 폭 = (고−저) ÷ (총주기÷변동시간). 넷을 바꾸면 폭이 다시 계산돼 표시된다.<br>밴드(저/고)는 이번 턴 한정(다음 턴 초기화), 변동시간·총주기는 계속 유지.</div>
  </aside>

<script>
  const params = new URLSearchParams(location.search);
  const room = (params.get('room') || 'DEMO').toUpperCase();
  document.getElementById('room').textContent = '· ' + room;
  const grid = document.getElementById('grid');
  const cells = new Map();
  const fmt = (n) => n.toLocaleString('en-US');
  const mmss = (s) => `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;

  let gridOrderSig = '';
  function ensureCells(items) {
    const sig = items.map(i => i.code).join(',');
    if (cells.size === items.length && sig === gridOrderSig) return; // 개수·순서 동일 → 유지
    gridOrderSig = sig;                                             // 셔플로 순서 바뀌면 재배치 (SPEC §10.1)
    grid.innerHTML = ''; cells.clear();
    // 아이템 수에 맞춰 열 개수 조정 (16→4열, 그 외엔 정사각에 가깝게)
    const cols = Math.ceil(Math.sqrt(items.length));
    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    for (const it of items) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.style.setProperty('--c', it.color);
      cell.innerHTML = `<div><div class="name">${it.ko}</div><div class="en">${it.en}</div></div>
        <div class="dbg"></div>
        <div class="evbadge"></div>
        <div class="pricebox"><span class="price">–</span><span class="chg"></span></div>`;
      grid.appendChild(cell);
      cells.set(it.code, cell);
    }
  }

  function render(snap) {
    document.getElementById('turn').textContent = `${snap.turn} / ${snap.totalTurns}`;
    document.getElementById('timer').textContent = mmss(snap.secondsLeft);
    const st = document.getElementById('state');
    st.textContent = snap.marketState; st.className = 'pill ' + snap.marketState;
    ensureCells(snap.items);
    for (const it of snap.items) {
      const cell = cells.get(it.code); if (!cell) continue;
      cell.querySelector('.price').textContent = fmt(it.price);
      cell.querySelector('.dbg').innerHTML =
        `저 <b>${fmt(it.low)}</b> · 고 <b>${fmt(it.high)}</b><br>폭 <b>${it.step}</b>/스텝 · 주기 <b>${it.cycleSec}s</b>`;
      // 이벤트 배지·강조 (SPEC §4.2)
      cell.classList.toggle('ev-spike', it.event === 'spike');
      cell.classList.toggle('ev-crash', it.event === 'crash');
      cell.querySelector('.evbadge').textContent = it.event === 'spike' ? '▲ 폭등' : it.event === 'crash' ? '▼ 폭락' : '';
      const diff = it.price - it.prevPrice;
      const chg = cell.querySelector('.chg');
      if (it.event === 'spike') { chg.textContent = '▲ ' + fmt(Math.abs(diff)); chg.style.color = '#fff'; }
      else if (it.event === 'crash') { chg.textContent = '▼ ' + fmt(Math.abs(diff)); chg.style.color = '#fff'; }
      else if (diff > 0) { chg.textContent = '▲ ' + fmt(diff); chg.style.color = '#ffffffcc'; }
      else if (diff < 0) { chg.textContent = '▼ 저점'; chg.style.color = '#fff'; flashDrop(cell); }
      else { chg.textContent = ''; }
    }
    syncEdit(snap);
  }
  function flashDrop(cell) { cell.classList.remove('drop'); void cell.offsetWidth; cell.classList.add('drop'); }

  // ── 라이브 세팅 편집 (SPEC §4.1) ──
  const editMode = params.get('edit') === '1';
  const editRows = new Map(); // code → { low, high, step } input 엘리먼트
  const sendCmd = (o) => { if (ws && ws.readyState === 1) ws.send(JSON.stringify(o)); };

  function setupEdit() {
    if (!editMode) return;
    const btn = document.getElementById('editbtn');
    const panel = document.getElementById('editpanel');
    btn.hidden = false;
    btn.addEventListener('click', () => { panel.hidden = false; requestAnimationFrame(() => panel.classList.add('open')); });
    document.getElementById('epclose').addEventListener('click', () => panel.classList.remove('open'));
    const epstep = document.getElementById('epstep');
    epstep.addEventListener('change', () => {
      const v = parseInt(epstep.value, 10);
      if (Number.isFinite(v)) sendCmd({ cmd: 'setPriceStepSec', value: v });
    });
  }

  function buildEditRows(items) {
    if (!editMode || editRows.size === items.length) return;
    const list = document.getElementById('eplist');
    list.innerHTML = ''; editRows.clear();
    for (const it of items) {
      const row = document.createElement('div');
      row.className = 'ep-row';
      row.innerHTML = `<div class="nm"><span class="sw" style="background:${it.color}"></span>${it.ko}</div>
        <div class="ep-fields">
          <div><label>저점</label><input type="number" data-k="low" min="1" step="1"></div>
          <div><label>고점</label><input type="number" data-k="high" min="2" step="1"></div>
          <div><label>변동시간 s</label><input type="number" data-k="stepSec" min="0.5" max="15" step="0.5"></div>
          <div><label>총주기 s</label><input type="number" data-k="durationSec" min="1" step="1"></div>
          <div><label>변동폭 자동</label><input type="number" data-k="step" class="ro" disabled></div>
        </div>`;
      const inputs = {};
      for (const inp of row.querySelectorAll('input')) {
        inputs[inp.dataset.k] = inp;
        if (inp.disabled) continue; // 변동폭은 읽기전용 파생값
        // 변경된 필드 하나만 전송 (SPEC §4.1 — 입력은 저/고/변동시간/총주기, 폭은 서버 파생)
        inp.addEventListener('change', () => sendField(it.code, inp.dataset.k, inp.value));
        inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') inp.blur(); });
      }
      editRows.set(it.code, inputs);
      list.appendChild(row);
    }
  }

  function sendField(code, key, raw) {
    const v = parseFloat(raw); // 변동시간 1.5 등 소수 허용
    if (!Number.isFinite(v)) return;
    sendCmd({ cmd: 'setPlan', itemId: code, [key]: v });
  }

  // 스냅샷의 값으로 편집 필드 갱신 — 단, 지금 편집 중인(포커스된) 필드는 건드리지 않는다
  function syncEdit(snap) {
    if (!editMode) return;
    buildEditRows(snap.items);
    const epstep = document.getElementById('epstep');
    if (document.activeElement !== epstep && typeof snap.priceStepSec === 'number') {
      epstep.value = snap.priceStepSec;
    }
    for (const it of snap.items) {
      const f = editRows.get(it.code); if (!f) continue;
      const set = (el, val) => { if (document.activeElement !== el) el.value = val; };
      set(f.low, it.low); set(f.high, it.high); set(f.step, it.step);
      set(f.stepSec, it.stepSec); set(f.durationSec, it.cycleSec);
    }
  }

  let ws;
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/?room=${room}&role=overview`);
    ws.onmessage = (e) => { const m = JSON.parse(e.data); if (m.type === 'snapshot') { document.getElementById('disc').style.display='none'; render(m); } };
    ws.onclose = () => { document.getElementById('disc').style.display='flex'; setTimeout(connect, 1000); };
    ws.onerror = () => ws.close();
  }
  setupEdit();
  connect();
</script>
</body>
</html>
