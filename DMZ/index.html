<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DMZ 다이어리</title>
<style>
/* TODO: Paperlogy 폰트 적용 검토
 * - CDN: https://cdn.jsdelivr.net/gh/projectnoonnu/[email protected]/
 *   @font-face { font-family: 'Paperlogy'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/[email protected]/Paperlogy-4Regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
 *   (100~900 웨이트 지원, 파일명: Paperlogy-1Thin ~ Paperlogy-9Black)
 * - Self-hosting: media/fonts/ 에 woff2 파일 추가 후 @font-face 선언
 * - 적용 대상: 전체 body 또는 특정 요소
 * - 라이선스: OFL (상업적 사용 가능, 개별 폰트 판매 금지)
 * - GitHub: https://github.com/fonts-archive/Paperlogy
 */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Helvetica Neue', 'Apple SD Gothic Neo', sans-serif;
  background: #fff; color: #000; min-height: 100vh;
}
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; }
@keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
@keyframes slideUp { from { opacity: 0; transform: translateY(12px) } to { opacity: 1; transform: translateY(0) } }
@keyframes blink { 0%,100% { opacity: .3 } 50% { opacity: 1 } }
@keyframes fly { 0% { transform: translate(0,0) scale(1); opacity: 1 } 60% { opacity: 1 } 100% { transform: translate(120px,-300px) scale(0.3); opacity: 0 } }
@keyframes pixelFadeIn { 0% { opacity: 0 } 100% { opacity: 1 } }
@keyframes typewriter { from { width: 0 } to { width: 100% } }
@keyframes blinkCaret { 0%,100% { border-color: #fff } 50% { border-color: transparent } }

/* === WINDOW === */
.win { border: 2px solid #000; max-width: 720px; width: 95%; background: #fff }
.win-bar {
  height: 20px; border-bottom: 2px solid #000;
  background: repeating-linear-gradient(180deg, transparent 0px, transparent 2px, #000 2px, #000 3px);
  display: flex; align-items: center; justify-content: center;
}
.win-bar span { background: #fff; padding: 0 8px; font-size: 1.2rem; font-weight: 800; letter-spacing: .05em }
.win-body { padding: 1.5rem }

/* === BUTTON / INPUT === */
.btn { display: inline-block; background: #fff; border: 2px solid #000; padding: 7px 20px; font: 800 1.2rem/1.2 inherit; cursor: pointer }
.btn:hover { background: #000; color: #fff }
.btn:disabled { opacity: .2; cursor: not-allowed }
.btn:disabled:hover { background: #fff; color: #000 }
.btn-blk { display: block; width: 100%; background: #000; color: #fff; border: 2px solid #000; padding: 8px; font: 800 1.2rem/1.2 inherit; cursor: pointer; text-align: center; margin-top: .8rem }
.btn-blk:hover { background: #333 }
.btn-blk:disabled { opacity: .2; cursor: not-allowed }
.btn-login { display: block; width: 100%; background: #000; color: #fff; border: 2px solid #000; padding: 8px; font: 800 1.2rem/1.2 inherit; cursor: pointer; text-align: center }
.btn-login:hover { background: #fff; color: #000 }
input[type="text"] { border: 2px solid #000; padding: 7px 8px; font: 1.2rem inherit; width: 100%; outline: none; background: #fff }
input[type="text"]:focus { box-shadow: 3px 3px 0 #000 }
input::placeholder { color: #999 }

/* === LOGIN === */
#login-screen { flex-direction: column; align-items: center; justify-content: center; animation: fadeIn .4s }
.login-title { font-size: 2.2rem; font-weight: 900; letter-spacing: .12em; margin-bottom: .2rem }
.login-sub { font-size: 1.2rem; color: #666; margin-bottom: 2rem; letter-spacing: .05em }
.login-field { margin-bottom: 1rem; text-align: left }
.login-field label { display: block; font-size: 1.25rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 3px }
.login-error { color: #d00; font-size: 1.2rem; height: 2.8rem; margin-bottom: .2rem; font-weight: 700 }
.login-hint { font-size: 1.2rem; color: #666; margin-top: 1.5rem }
.version-tag { font-size: 0.7rem; color: #ccc; margin-top: 1.2rem; letter-spacing: .05em }

/* === SELECT === */
#select-screen { flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1rem; animation: fadeIn .4s }
.select-header { text-align: center; margin-bottom: 1rem }
.select-header h2 { font-size: 1.4rem; font-weight: 800 }
.select-header .player-name { font-size: 1.2rem; color: #666; margin-top: .2rem }
.select-prompt { font-size: 1.2rem; text-align: center; margin-bottom: 1.5rem; line-height: 1.1; color: #666 }
.character-cards { display: flex; flex-direction: column; gap: .6rem; width: 100%; max-width: 380px }
.char-card {
  border: 2px solid #000; padding: .8rem 1rem; cursor: pointer; background: #fff;
  display: flex; align-items: center; gap: .8rem; transition: all .08s;
}
.char-card:hover { background: #000; color: #fff }
.char-card:hover .char-desc { color: #999 }
.char-card:hover .char-era { color: #999 }
.char-card.completed { opacity: .3; cursor: default; border-style: dashed }
.char-card.completed::after { content: ' ✓'; font-weight: 800 }
.char-card.completed:hover { background: #fff; color: #000 }
.char-icon { flex-shrink: 0 }
.char-card h3 { font-size: 1.25rem; font-weight: 800; margin-bottom: .15rem }
.char-card .char-desc { font-size: 1.2rem; line-height: 1.0; color: #666 }
.char-card .char-era { font-size: 1.2rem; color: #666; margin-top: .2rem }

/* === GAME === */
#game-screen { flex-direction: column; min-height: 100vh }
.game-header {
  border-bottom: 2px solid #000; padding: 6px 12px;
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; background: #fff; z-index: 100;
}
.game-header .location { font-size: 1.2rem; font-weight: 700 }
.game-header .progress { font-size: 1.2rem; font-weight: 800 }
.game-content { flex: 1; padding: 1rem; display: flex; flex-direction: column; gap: .6rem; max-width: 780px; margin: 0 auto; width: 100% }
.source-card { border: 2px solid #000; cursor: pointer; background: #fff; animation: slideUp .3s ease backwards; transition: all .08s }
.source-card:nth-child(2) { animation-delay: .04s }
.source-card:nth-child(3) { animation-delay: .08s }
.source-card:nth-child(4) { animation-delay: .12s }
.source-card:hover { box-shadow: 4px 4px 0 #000; transform: translate(-2px,-2px) }
.source-letter,.source-newspaper,.source-photo,.source-oral {}
.card-header { padding: .7rem .8rem; display: flex; align-items: center; gap: .6rem }
.card-icon { flex-shrink: 0 }
.card-title { font-size: 1.2rem; font-weight: 800 }
.card-sub { font-size: 1.2rem; color: #666; margin-top: .1rem }
.card-status { margin-left: auto; font-size: 1rem; font-weight: 700; padding: 2px 6px; border: 1px solid #000; white-space: nowrap }
.card-status.solved { background: #000; color: #fff }

/* Source detail */
.source-detail { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 200; background: #fff; overflow-y: auto; animation: fadeIn .2s }
.source-detail.active { display: block }
.detail-inner { max-width: 780px; margin: 0 auto; padding: 1rem; min-height: 100vh }
.detail-close { position: sticky; top: 0; text-align: right; padding: .3rem 0; z-index: 10; background: #fff }
.detail-close button { background: #fff; border: 2px solid #000; padding: 3px 10px; cursor: pointer; font: 800 1.2rem inherit }
.detail-close button:hover { background: #000; color: #fff }

/* === PAPERS === */
.letter-paper { border: 2px solid #000; padding: 1.2rem; line-height: 1.2; font-size: 1.2rem; font-family: Georgia, 'Noto Serif KR', serif }
.letter-paper .letter-meta { font-family: -apple-system, sans-serif; font-size: 1.2rem; color: #666; margin-bottom: .8rem; padding-bottom: .6rem; border-bottom: 1px dashed #000 }
.letter-paper .letter-sign { text-align: right; margin-top: 1.2rem; font-style: italic }
.diary-paper { border: 2px solid #000; padding: 1.2rem; line-height: 1.35; font-size: 1.25rem; font-style: italic; background: repeating-linear-gradient(transparent, transparent 54px, #ddd 54px, #ddd 55px) }
.diary-paper .diary-meta { font-style: normal; font-size: 1.2rem; color: #666; margin-bottom: .8rem }
.scholar-paper { border: 2px solid #000; border-left: 6px solid #000; padding: 1.2rem; line-height: 1.2; font-size: 1.2rem; font-family: Georgia, 'Noto Serif KR', serif }
.newspaper-paper { border: 2px solid #000; padding: 1rem }
.newspaper-paper .news-header { text-align: center; border-bottom: 3px double #000; padding-bottom: .5rem; margin-bottom: .6rem }
.newspaper-paper .news-name { font-size: 1.7rem; font-weight: 900; letter-spacing: .5em }
.newspaper-paper .news-date { font-size: 1.2rem; margin-top: .15rem; color: #666 }
.newspaper-paper .news-title { font-size: 1.3rem; font-weight: 900; margin-bottom: .6rem; line-height: 1.0 }
.newspaper-paper .news-body { font-size: 1.2rem; line-height: 1.2; text-align: justify }
.photo-frame { border: 2px solid #000; padding: .6rem }
.photo-frame img { width: 100%; display: block; }
.photo-placeholder {
  width: 100%; height: 140px; display: flex; align-items: center; justify-content: center; gap: .3rem;
  font-size: 1.2rem; color: #666;
  background: repeating-conic-gradient(#eee 0% 25%, #fff 0% 50%) 0 0 / 8px 8px;
  border: 1px solid #ddd;
}
.photo-frame .photo-caption { font-size: 1.2rem; color: #666; margin-top: .5rem; line-height: 1.0; text-align: left }
.photo-frame .photo-source { font-size: 1.2rem; color: #666; margin-top: .2rem; text-align: left }
.oral-player { border: 2px solid #000; padding: 1rem }
.oral-player .cassette { text-align: center; margin-bottom: .6rem; display: flex; align-items: center; justify-content: center; animation: blink 2.5s infinite }
.oral-player .oral-meta { font-size: 1.2rem; color: #666; margin-bottom: .6rem; padding-bottom: .4rem; border-bottom: 1px solid #eee }
.oral-player .oral-text { font-size: 1.2rem; line-height: 1.2; font-style: italic }
.oral-player .oral-text p { margin-bottom: .6rem }

/* Blanks */
.blank-slot { display: inline-block; min-width: 60px; border-bottom: 2px solid #000; padding: 1px 3px; margin: 0 2px; cursor: pointer; font-weight: 800 }
.blank-slot.empty { animation: blink 2s infinite; background: #f5f5f5 }
.blank-slot.filled { background: #000; color: #fff; animation: none }
.sound-note { font-size: 1.2rem; color: #666; margin-top: .4rem; font-style: italic; display: flex; align-items: center; gap: .2rem }
.sound-note svg { flex-shrink: 0 }

/* === MODAL === */
.modal-backdrop { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.15); z-index: 250 }
.modal-backdrop.active { display: block }
.answer-modal { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 2px solid #000; padding: 1.2rem; z-index: 300; animation: slideUp .2s; max-width: 780px; margin: 0 auto }
.answer-modal.active { display: block }
.answer-modal .modal-label { font-size: 1.2rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; margin-bottom: .3rem }
.answer-modal .modal-hint { font-size: 1.2rem; color: #666; margin-bottom: .8rem; line-height: 1.0 }
.answer-modal input { margin-bottom: .6rem }
.answer-modal .modal-btns { display: flex; gap: .4rem }
.answer-modal .modal-btns button { flex: 1 }
.btn-submit { background: #000; color: #fff; border: 2px solid #000; padding: 7px; font: 800 1.2rem/1.2 inherit; cursor: pointer }
.btn-cancel { background: #fff; border: 2px solid #000; padding: 7px; font: 800 1.2rem/1.2 inherit; cursor: pointer }
.btn-cancel:hover { background: #eee }

/* Phase */
.phase-banner { text-align: center; padding: 1.2rem .8rem; border: 2px solid #000 }
.phase-banner .phase-num { font-size: 1.2rem; color: #666; letter-spacing: .1em; margin-bottom: .2rem }
.phase-banner h2 { font-size: 1.4rem; font-weight: 900 }
.phase-banner .phase-desc { font-size: 1.2rem; color: #666; margin-top: .3rem; line-height: 1.0 }

/* Archive */
.archive-selection { padding: .3rem 0 }
.archive-prompt { border: 2px solid #000; padding: 1rem; text-align: center; margin-bottom: .8rem }
.archive-prompt h3 { font-size: 1.2rem; font-weight: 800; margin-bottom: .2rem }
.archive-prompt p { font-size: 1.2rem; color: #666 }
.archive-option { border: 2px solid #000; padding: .7rem .8rem; margin-bottom: -2px; cursor: pointer; display: flex; align-items: center; gap: .6rem; transition: all .08s }
.archive-option:hover { box-shadow: 3px 3px 0 #000 }
.archive-option.selected { background: #000; color: #fff }
.archive-option.selected .opt-meaning { color: #999 }
.archive-option .opt-icon { flex-shrink: 0 }
.archive-option .opt-title { font-size: 1.2rem; font-weight: 700 }
.archive-option .opt-meaning { font-size: 1.2rem; color: #666; margin-top: .1rem }

/* === DELIVERY (90s Mac pixel) === */
#delivery-screen { flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; background: #000; animation: fadeIn .4s; cursor: pointer }
#delivery-screen * { color: #fff }
.pixel-crane-wrap { position: relative; width: 100%; display: flex; justify-content: center; margin-bottom: 2rem }
.pixel-crane { position: relative; width: 60px; height: 75px; opacity: 0; animation: pixelFadeIn 1.2s ease 0.3s forwards }
.pixel-crane-pixel { position: absolute; background: #fff }
.pixel-crane.flying { animation: fly 2.5s ease-in forwards !important; opacity: 1 }
.delivery-typed { font-family: 'Courier New', 'Menlo', monospace; font-size: 1.5rem; font-weight: 700; color: #fff; overflow: hidden; white-space: nowrap; border-right: 2px solid #fff; animation: typewriter 1.2s steps(12) 1.5s both, blinkCaret .7s step-end infinite; max-width: max-content; margin: 0 auto 1rem }
.delivery-dest { font-family: 'Courier New', 'Menlo', monospace; font-size: 1.1rem; color: #999; margin-bottom: .5rem; opacity: 0; animation: pixelFadeIn .6s ease 2.8s forwards }
.delivery-selected { font-family: 'Courier New', 'Menlo', monospace; font-size: 1rem; color: #666; margin-bottom: 1.5rem; opacity: 0; animation: pixelFadeIn .6s ease 3.2s forwards; line-height: 1.4 }
.crane-count { font-family: 'Courier New', 'Menlo', monospace; font-size: 1rem; color: #fff; margin-top: 1rem; opacity: 0; animation: pixelFadeIn .6s ease 3.6s forwards; letter-spacing: .1em }
#delivery-screen .btn { background: transparent; border-color: #fff; color: #fff; opacity: 0; animation: pixelFadeIn .6s ease 4s forwards }
#delivery-screen .btn:hover { background: #fff; color: #000 }

/* === RESULT === */
#result-screen { flex-direction: column; align-items: center; justify-content: center; padding: 2rem; animation: fadeIn .4s }
.result-box { max-width: 380px; width: 100% }
.result-box h2 { font-size: 1.55rem; font-weight: 900; margin-bottom: .2rem }
.result-box .result-sub { font-size: 1.2rem; color: #666; margin-bottom: 1.2rem }
.result-stat { border: 2px solid #000; padding: .6rem .8rem; margin-bottom: -2px; display: flex; justify-content: space-between }
.result-stat .stat-label { font-size: 1.2rem }
.result-stat .stat-value { font-weight: 900 }
.result-summary { font-size: 1.2rem; line-height: 1.2; margin-top: 1.2rem; padding: .8rem; border: 2px solid #000; border-left: 6px solid #000 }

/* Source Nav */
.source-nav {
  display: none; position: fixed; top: 0; bottom: 0; width: 44px;
  z-index: 210; cursor: pointer; align-items: center; justify-content: center;
  background: transparent; transition: background .15s;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.source-nav.active { display: flex }
.source-nav:hover { background: rgba(0,0,0,.04) }
.source-nav-prev { left: 0 }
.source-nav-next { right: 0 }
.source-nav svg { opacity: 0; transition: opacity .15s }
.source-nav:hover svg { opacity: .5 }

/* Toast */
.toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #fff; border: 2px solid #000; padding: 1rem 1.2rem; z-index: 400; text-align: center; animation: fadeIn .15s; box-shadow: 6px 6px 0 #000; max-width: 260px }
.toast .toast-icon { font-size: 1.8rem; margin-bottom: .2rem; font-weight: 900 }
.toast .toast-text { font-size: 1.2rem; line-height: 1.0 }

/* All Clear Popup */
.all-clear-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.5); z-index: 500; display: flex; align-items: center; justify-content: center; animation: fadeIn .2s }
.all-clear-inner { background: #fff; border: 2px solid #000; padding: 2rem 1.5rem; text-align: center; max-width: 300px; box-shadow: 8px 8px 0 #000 }
.all-clear-inner .all-clear-icon { margin-bottom: .5rem }
.all-clear-inner h3 { font-size: 1.4rem; font-weight: 900; margin-bottom: .4rem }
.all-clear-inner p { font-size: 1.2rem; line-height: 1.4 }
.all-clear-inner .btn-blk { margin-top: 1.2rem; width: 100% }

/* Catchword highlight */
.catchword-highlight {
  background: #ccff00;
  border-radius: 2px;
  padding: 0 1px;
  cursor: pointer;
}

@media (min-width: 600px) {
  .login-title { font-size: 3rem }
  .character-cards { flex-direction: row; max-width: 660px }
  .char-card { flex: 1; flex-direction: column; text-align: center; gap: .3rem }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="screen active">
  <div class="win">
    <div class="win-bar"><span>DMZ 다이어리</span></div>
    <div class="win-body" style="text-align:center">
      <h1 class="login-title">DMZ<br>다이어리</h1>
      <p class="login-sub">안녕하세요! 아키비스트가 DMZ를 기록하는 방법</p>
      <div class="login-field">
        <label>이름</label>
        <input type="text" id="input-name" placeholder="이름" autocomplete="off">
      </div>
      <div class="login-field">
        <label>코드</label>
        <input type="text" id="input-code" placeholder="코드를 입력하세요" autocomplete="off">
      </div>
      <div class="login-error" id="login-error"></div>
      <button class="btn-login" onclick="handleLogin()">입장</button>
      <p class="login-hint">우편사서함에 도착한 기록을 탐색합니다</p>
    </div>
  </div>
  <p class="version-tag">v0.2.0</p>
</div>

<!-- SELECT -->
<div id="select-screen" class="screen">
  <div class="select-header">
    <h2>DMZ 우편사서함</h2>
    <p class="player-name" id="display-name"></p>
  </div>
  <p class="select-prompt">기록을 선택하세요.<br>누구의 시선으로 DMZ를 바라보시겠습니까?</p>
  <div class="character-cards" id="character-cards"></div>
</div>

<!-- GAME -->
<div id="game-screen" class="screen">
  <div class="game-header">
    <span class="location" id="game-location"></span>
    <span class="progress" id="game-progress"></span>
  </div>
  <div class="game-content" id="game-content"></div>
</div>

<!-- DELIVERY -->
<div id="delivery-screen" class="screen" onclick="deliveryClick()">
  <div class="pixel-crane-wrap">
    <div class="pixel-crane" id="pixel-crane"></div>
  </div>
  <p class="delivery-typed" id="delivery-typed"></p>
  <p class="delivery-dest" id="delivery-dest"></p>
  <p class="delivery-selected" id="delivery-selected"></p>
  <p class="crane-count" id="crane-count"></p>
  <button class="btn" onclick="event.stopPropagation(); backToSelect()" style="margin-top:1.5rem">다른 기록 탐색하기</button>
</div>

<!-- RESULT -->
<div id="result-screen" class="screen">
  <div class="result-box" id="result-box"></div>
</div>

<!-- MODALS -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeAnswerModal()"></div>
<div class="answer-modal" id="answer-modal">
  <div class="modal-label" id="modal-label"></div>
  <div class="modal-hint" id="modal-hint"></div>
  <input type="text" id="modal-input" placeholder="정답을 입력하세요" autocomplete="off">
  <div class="modal-btns">
    <button class="btn-cancel" onclick="closeAnswerModal()">취소</button>
    <button class="btn-submit" onclick="submitAnswer()">확인</button>
  </div>
</div>
<div class="source-detail" id="source-detail">
  <div class="detail-inner" id="detail-inner"></div>
</div>

<!-- Source Navigation -->
<div class="source-nav source-nav-prev" id="source-nav-prev" onclick="navigateSource(-1)">
  <svg width="20" height="32" viewBox="0 0 5 8" shape-rendering="crispEdges" fill="#000"><rect x="3" y="0" width="1" height="1"/><rect x="2" y="1" width="1" height="1"/><rect x="1" y="2" width="1" height="1"/><rect x="0" y="3" width="1" height="2"/><rect x="1" y="5" width="1" height="1"/><rect x="2" y="6" width="1" height="1"/><rect x="3" y="7" width="1" height="1"/></svg>
</div>
<div class="source-nav source-nav-next" id="source-nav-next" onclick="navigateSource(1)">
  <svg width="20" height="32" viewBox="0 0 5 8" shape-rendering="crispEdges" fill="#000"><rect x="1" y="0" width="1" height="1"/><rect x="2" y="1" width="1" height="1"/><rect x="3" y="2" width="1" height="1"/><rect x="4" y="3" width="1" height="2"/><rect x="3" y="5" width="1" height="1"/><rect x="2" y="6" width="1" height="1"/><rect x="1" y="7" width="1" height="1"/></svg>
</div>

<script>

// ===== GAME STATE =====
let state = { playerName: '', currentChar: null, currentSourceId: null, solvedBlanks: {}, selectedRecords: [], totalCranes: 0, completedStories: [], catchwords: [] };

function loadStateForPlayer(name) {
  try {
    const saved = localStorage.getItem('dmz_diary_' + name);
    if (saved) { const p = JSON.parse(saved); state.totalCranes = p.totalCranes || 0; state.completedStories = p.completedStories || []; }
  } catch(e) {}
}

function saveState() {
  if (!state.playerName) return;
  try { localStorage.setItem('dmz_diary_' + state.playerName, JSON.stringify({ totalCranes: state.totalCranes, completedStories: state.completedStories, playerName: state.playerName })); } catch(e) {}
}

// ===== ANSWER =====
function normalizeAnswer(str) { return str.trim().replace(/\s+/g, '').replace(/[()（）]/g, '').toLowerCase(); }
function checkAnswer(input, blank) {
  const norm = normalizeAnswer(input);
  if (norm === normalizeAnswer(blank.answer)) return true;
  if (blank.altAnswers) return blank.altAnswers.some(alt => norm === normalizeAnswer(alt));
  return false;
}

// ===== SCREENS =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ===== LOGIN =====
function handleLogin() {
  const name = document.getElementById('input-name').value.trim();
  const code = document.getElementById('input-code').value.trim();
  const errEl = document.getElementById('login-error');
  if (!name) { errEl.textContent = '이름을 입력해주세요.'; return; }
  if (code !== '1953') { errEl.textContent = '게임 코드가 올바르지 않습니다.'; return; }
  state.playerName = name;
  loadStateForPlayer(name);
  showScreen('select-screen');
  document.getElementById('display-name').textContent = `아키비스트 ${name}`;
  renderCharacterCards();
}
document.getElementById('input-code').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
document.getElementById('input-name').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('input-code').focus(); });

// ===== CHARACTER SELECT =====
function renderCharacterCards() {
  const container = document.getElementById('character-cards');
  container.innerHTML = Object.entries(GAME_DATA).map(([key, data]) => {
    const done = state.completedStories.includes(key);
    return `<div class="char-card ${done ? 'completed' : ''}" onclick="${done ? '' : `selectCharacter('${key}')`}">
      <div class="char-icon">${data.icon}</div>
      <div>
        <h3>${data.charName}</h3>
        <p class="char-desc">${data.desc}</p>
        <p class="char-era">${data.era}</p>
      </div>
    </div>`;
  }).join('');
}

function selectCharacter(charKey) {
  if (state.completedStories.includes(charKey)) return;
  state.currentChar = charKey;
  state.solvedBlanks = {};
  state.selectedRecords = [];
  state.catchwords = [];
  showScreen('game-screen');
  renderGamePhase1();
}

// ===== GAME PHASE 1 =====
function renderGamePhase1() {
  const data = GAME_DATA[state.currentChar];
  document.getElementById('game-location').innerHTML = `${I.pin} ${data.location}`;
  updateProgress();
  const solvedCount = Object.keys(state.solvedBlanks).length;
  document.getElementById('game-content').innerHTML = `
    <div class="phase-banner">
      <div class="phase-num">${data.era}</div>
      <h2>${data.title}</h2>
      <div class="phase-desc">4개의 자료를 탐색하고, 자료 간 교차 참조로 빈칸을 복원하세요.</div>
      <div class="sound-note">${I.sound} ${data.soundNote}</div>
    </div>
    ${data.sources.map((src, i) => {
      const solved = state.solvedBlanks[src.id];
      return `<div class="source-card ${src.styleClass}" onclick="openSource('${src.id}')" style="animation-delay:${i*0.04}s">
        <div class="card-header">
          <span class="card-icon">${src.icon}</span>
          <div><div class="card-title">${src.title}</div><div class="card-sub">${src.sub}</div></div>
          <span class="card-status ${solved ? 'solved' : ''}">${solved ? '복원 완료' : '빈칸 1개'}</span>
        </div></div>`;
    }).join('')}
    ${solvedCount === 4 ? `<button class="btn-blk" onclick="goToPhase3()">모든 빈칸 복원 완료 — 기록 선택으로</button>` : ''}`;
}

function updateProgress() {
  document.getElementById('game-progress').textContent = `빈칸 복원 ${Object.keys(state.solvedBlanks).length}/4`;
}

// ===== SOURCE DETAIL =====
function openSource(sourceId) {
  const data = GAME_DATA[state.currentChar];
  const isNewSource = state.currentSourceId !== sourceId;
  state.currentSourceId = sourceId;
  const blanks = {};
  for (const key of Object.keys(data.blanks)) {
    blanks[key] = state.solvedBlanks[key]
      ? `<span class="blank-slot filled">${state.solvedBlanks[key]}</span>`
      : `<span class="blank-slot empty" onclick="event.stopPropagation();openAnswerModal('${key}')">[${key}]</span>`;
  }
  const template = TEMPLATES[state.currentChar][sourceId];
  const detailEl = document.getElementById('source-detail');
  document.getElementById('detail-inner').innerHTML = `
    <div class="detail-close"><button onclick="closeSource()">닫기 ✕</button></div>
    ${template(blanks)}`;
  detailEl.classList.add('active');
  if (isNewSource) detailEl.scrollTop = 0;
  document.body.style.overflow = 'hidden';
  showSourceNav(true);
  applyCatchwords();
}

function closeSource() {
  const detailEl = document.getElementById('source-detail');
  detailEl.classList.remove('active');
  document.getElementById('detail-inner').innerHTML = '';
  document.body.style.overflow = '';
  state.currentSourceId = null;
  showSourceNav(false);
  renderGamePhase1();
}

function showSourceNav(show) {
  const method = show ? 'add' : 'remove';
  document.getElementById('source-nav-prev').classList[method]('active');
  document.getElementById('source-nav-next').classList[method]('active');
}

function navigateSource(direction) {
  if (!state.currentChar || !state.currentSourceId) return;
  // 답변모달이 열려 있으면 네비 무시
  if (document.getElementById('answer-modal').classList.contains('active')) return;
  const sources = GAME_DATA[state.currentChar].sources;
  const currentIdx = sources.findIndex(s => s.id === state.currentSourceId);
  if (currentIdx === -1) return;
  let nextIdx = currentIdx + direction;
  if (nextIdx < 0) nextIdx = sources.length - 1;
  if (nextIdx >= sources.length) nextIdx = 0;
  openSource(sources[nextIdx].id);
}

// 스와이프 제스처
(function() {
  let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
  document.addEventListener('touchstart', function(e) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchStartTime = Date.now();
  }, { passive: true });
  document.addEventListener('touchend', function(e) {
    if (!state.currentSourceId) return;
    if (document.getElementById('answer-modal').classList.contains('active')) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const dt = Date.now() - touchStartTime;
    // 수평 스와이프: 최소 60px, 수직보다 크고, 500ms 이내
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5 && dt < 500) {
      navigateSource(dx < 0 ? 1 : -1);
    }
  }, { passive: true });
})();

// ===== ANSWER MODAL =====
let currentBlankId = null;
function openAnswerModal(blankId) {
  currentBlankId = blankId;
  const blank = GAME_DATA[state.currentChar].blanks[blankId];
  document.getElementById('modal-label').textContent = `빈칸 [${blankId}]`;
  document.getElementById('modal-hint').textContent = blank.hint;
  document.getElementById('modal-input').value = '';
  document.getElementById('modal-backdrop').classList.add('active');
  document.getElementById('answer-modal').classList.add('active');
  showSourceNav(false);
  setTimeout(() => document.getElementById('modal-input').focus(), 100);
}
function closeAnswerModal() {
  document.getElementById('modal-backdrop').classList.remove('active');
  document.getElementById('answer-modal').classList.remove('active');
  currentBlankId = null;
  if (state.currentSourceId) showSourceNav(true);
}
document.getElementById('modal-input').addEventListener('keydown', e => { if (e.key === 'Enter') submitAnswer(); });

function submitAnswer() {
  if (!currentBlankId) return;
  const blank = GAME_DATA[state.currentChar].blanks[currentBlankId];
  const input = document.getElementById('modal-input').value.trim();
  if (!input) return;
  if (checkAnswer(input, blank)) {
    const solvedId = currentBlankId;
    state.solvedBlanks[solvedId] = blank.answer;
    closeAnswerModal();
    if (Object.keys(state.solvedBlanks).length === 4) {
      showToast('correct', '정답', `빈칸 [${solvedId}] 복원 완료`);
      setTimeout(() => showAllClearPopup(), 1500);
    } else {
      showToast('correct', '정답', `빈칸 [${solvedId}] 복원 완료`);
      setTimeout(() => openSource(solvedId), 1200);
    }
  } else {
    showToast('incorrect', '다시 확인', '다른 자료를 교차 참조해보세요.');
  }
}

function showToast(type, title, text) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<div class="toast-icon">${type === 'correct' ? '✓' : '✗'}</div><div class="toast-text"><strong>${title}</strong><br>${text}</div>`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2000);
}

function showAllClearPopup() {
  closeSource();

  const popup = document.createElement('div');

  popup.innerHTML = `
    <div class="all-clear-inner">
      <div class="all-clear-icon">${I.craneSm}</div>

      <button class="btn-blk" onclick="this.closest('.all-clear-popup').remove();goToPhase3();">기록 선택으로</button>

// ===== PHASE 3: ARCHIVE =====
function goToPhase3() {
  closeSource();
  const data = GAME_DATA[state.currentChar];
  state.selectedRecords = [];
  document.getElementById('game-content').innerHTML = `
    <div class="archive-selection">
      <div class="archive-prompt">
        <h3>당신은 아키비스트입니다.</h3>
        <p>후대에 남길 자료 <strong>2개</strong>를 선택하십시오.</p>
      </div>
      ${data.choices.map((c, i) => `
        <div class="archive-option" id="arch-opt-${i}" onclick="toggleArchiveChoice(${i})">
          <span class="opt-icon">${c.icon}</span>
          <div><div class="opt-title">${c.title}</div><div class="opt-meaning">${c.meaning}</div></div>
        </div>`).join('')}
      <button class="btn-blk" id="btn-confirm-archive" disabled onclick="confirmArchive()">기록 선택 완료 (0/2)</button>
    </div>`;
  document.getElementById('game-progress').textContent = '기록 선택';
}

function toggleArchiveChoice(idx) {
  const el = document.getElementById(`arch-opt-${idx}`);
  if (el.classList.contains('selected')) {
    el.classList.remove('selected');
    state.selectedRecords = state.selectedRecords.filter(i => i !== idx);
  } else {
    if (state.selectedRecords.length >= 2) return;
    el.classList.add('selected');
    state.selectedRecords.push(idx);
  }
  const btn = document.getElementById('btn-confirm-archive');
  btn.textContent = `기록 선택 완료 (${state.selectedRecords.length}/2)`;
  btn.disabled = state.selectedRecords.length !== 2;
}

function confirmArchive() {
  if (state.selectedRecords.length !== 2) return;
  state.totalCranes++;
  state.completedStories.push(state.currentChar);
  saveState();
  showDelivery();
}

  [5,0],[6,0],
  [4,1],[7,1],
  [3,2],[8,2],
  [2,3],[9,3],
  [1,4],[10,4],
  [0,5],[11,5],
  [1,6],[10,6],
  [2,7],[9,7],
  [3,7],[8,7],
  [4,7],[7,7],
  [5,7],[6,7],
  [5,8],[6,8],
  [5,9],[6,9],
  [5,10],[6,10],
  [4,11],[5,11],[6,11],[7,11],
  [3,12],[8,12],

function buildPixelCrane() {
  const el = document.getElementById('pixel-crane');
  el.innerHTML = '';
  el.classList.remove('flying');
  const px = 5;
  CRANE_PIXELS.forEach(([x, y], i) => {
    const d = document.createElement('div');
    d.className = 'pixel-crane-pixel';
    d.style.cssText = `left:${x*px}px;top:${y*px}px;width:${px}px;height:${px}px;opacity:0;animation:pixelFadeIn .08s ease ${0.3 + i*0.02}s forwards`;
    el.appendChild(d);
  });
}

let deliveryTimer = null;

function showDelivery() {
  const data = GAME_DATA[state.currentChar];
  showScreen('delivery-screen');
  buildPixelCrane();
  const selected = state.selectedRecords.map(i => data.choices[i].title).join(' + ');
  document.getElementById('delivery-typed').textContent = '기록이 전달되었습니다';
  document.getElementById('delivery-typed').style.animation = 'none';
  void document.getElementById('delivery-typed').offsetWidth;
  document.getElementById('delivery-typed').style.animation = '';
  document.getElementById('delivery-dest').innerHTML = `&gt; ${data.destination}`;
  document.getElementById('delivery-selected').innerHTML = `${state.playerName} &mdash; ${selected}`;
  document.getElementById('crane-count').textContent = `[ ${state.totalCranes} crane${state.totalCranes > 1 ? 's' : ''} ]`;
  // Fly away after delay
  const crane = document.getElementById('pixel-crane');
  setTimeout(() => { crane.classList.add('flying'); }, 3000);
  // Auto-advance
  if (deliveryTimer) clearTimeout(deliveryTimer);
  deliveryTimer = setTimeout(() => backToSelect(), 5500);
}

function deliveryClick() {
  if (deliveryTimer) { clearTimeout(deliveryTimer); deliveryTimer = null; }
  backToSelect();
}

function backToSelect() {
  if (state.completedStories.length >= 3) { showResult(); return; }
  showScreen('select-screen');
  document.getElementById('display-name').textContent = `아키비스트 ${state.playerName}`;
  renderCharacterCards();
}

function resetGame() {
  const nameToRemove = state.playerName;
  state = { playerName: '', currentChar: null, solvedBlanks: {}, selectedRecords: [], totalCranes: 0, completedStories: [], catchwords: [] };
  if (nameToRemove) { try { localStorage.removeItem('dmz_diary_' + nameToRemove); } catch(e) {} }
  showScreen('login-screen');
}

// ===== CATCHWORD (텍스트 하이라이트) =====
// state.catchwords = [{ sourceId, wordIndex, text }, ...] — 위치 기반 저장

// 본문 텍스트를 공백 기준으로 분할하여 단어 인덱스 맵 생성
// getFilledBlankIndex와 동일한 글로벌 인덱스 체계 유지:
// - 일반 텍스트 노드: 공백으로 분할한 각 단어가 1 인덱스
// - .blank-slot.filled: 1 인덱스 (텍스트 노드는 건너뜀)
// - .blank-slot.empty: 인덱스 부여 안 함
function buildWordIndex(container) {
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_ELEMENT | NodeFilter.SHOW_TEXT, {
    acceptNode: function(node) {
      if (node.nodeType === Node.ELEMENT_NODE && node.classList && node.classList.contains('detail-close')) return NodeFilter.FILTER_REJECT;
      if (node.nodeType === Node.ELEMENT_NODE && node.closest && node.closest('.detail-close')) return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const entries = []; // { textNode, localStart, localEnd, globalIndex }
  let globalIndex = 0;
  while (walker.nextNode()) {
    const node = walker.currentNode;
    if (node.nodeType === Node.ELEMENT_NODE && node.classList.contains('blank-slot')) {
      if (node.classList.contains('filled')) globalIndex++;
      // blank-slot 내부 텍스트 노드는 walker가 순회하지만 아래 텍스트 처리에서 건너뜀
      continue;
    }
    if (node.nodeType !== Node.TEXT_NODE) continue;
    // blank-slot 내부 텍스트 노드 건너뛰기
    if (node.parentElement && node.parentElement.closest('.blank-slot')) continue;
    const text = node.nodeValue;
    if (!text) continue;
    // 공백으로 분할하여 각 단어에 글로벌 인덱스 부여
    const parts = text.split(/(\s+)/);
    let localPos = 0;
    for (const part of parts) {
      if (part && !/^\s+$/.test(part)) {
        entries.push({ textNode: node, localStart: localPos, localEnd: localPos + part.length, globalIndex, text: part });
        globalIndex++;
      }
      localPos += part.length;
    }
  }
  return entries;
}

// filled blank-slot의 글로벌 인덱스를 계산
function getFilledBlankIndex(container, blankEl) {
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_ELEMENT | NodeFilter.SHOW_TEXT, {
    acceptNode: function(node) {
      if (node.nodeType === Node.ELEMENT_NODE && node.classList && node.classList.contains('detail-close')) return NodeFilter.FILTER_REJECT;
      if (node.nodeType === Node.ELEMENT_NODE && node.closest && node.closest('.detail-close')) return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  let globalIndex = 0;
  while (walker.nextNode()) {
    const node = walker.currentNode;
    if (node.nodeType === Node.TEXT_NODE) {
      // blank-slot 내부 텍스트 노드 건너뛰기 (filled blank은 요소 단위로 카운트)
      if (node.parentElement && node.parentElement.closest('.blank-slot')) continue;
      const text = node.nodeValue;
      if (!text) continue;
      const parts = text.split(/(\s+)/);
      for (const part of parts) {
        if (part && !/^\s+$/.test(part)) globalIndex++;
      }
    } else if (node.nodeType === Node.ELEMENT_NODE && node.classList.contains('blank-slot')) {
      if (node === blankEl) return globalIndex;
      // filled blank = 1 단어 단위
      if (node.classList.contains('filled')) globalIndex++;
    }
  }
  return -1;
}

function applyCatchwords() {
  if (!state.catchwords.length) return;
  const container = document.getElementById('detail-inner');
  if (!container) return;

  // 현재 sourceId에 해당하는 캐치워드만 필터
  const currentCW = state.catchwords.filter(cw => cw.sourceId === state.currentSourceId);
  if (!currentCW.length) return;

  // 글로벌 인덱스 기반으로 하이라이트 대상 수집
  const targetIndices = new Map(); // globalIndex → text
  for (const cw of currentCW) targetIndices.set(cw.wordIndex, cw.text);

  // filled blank-slot 하이라이트 처리
  const filledBlanks = container.querySelectorAll('.blank-slot.filled');
  for (const fb of filledBlanks) {
    const idx = getFilledBlankIndex(container, fb);
    if (targetIndices.has(idx)) {
      fb.classList.add('catchword-highlight');
    }
  }

  // 텍스트 노드 처리
  const wordEntries = buildWordIndex(container);
  // 텍스트 노드별로 그룹핑
  const nodeGroups = new Map();
  for (const entry of wordEntries) {
    if (!targetIndices.has(entry.globalIndex)) continue;
    if (!nodeGroups.has(entry.textNode)) nodeGroups.set(entry.textNode, []);
    nodeGroups.get(entry.textNode).push(entry);
  }

  for (const [textNode, entries] of nodeGroups) {
    const text = textNode.nodeValue;
    const frag = document.createDocumentFragment();
    let lastIndex = 0;
    // 정렬 (localStart 순서)
    entries.sort((a, b) => a.localStart - b.localStart);
    for (const entry of entries) {
      if (entry.localStart > lastIndex) {
        frag.appendChild(document.createTextNode(text.slice(lastIndex, entry.localStart)));
      }
      const span = document.createElement('span');
      span.className = 'catchword-highlight';
      span.dataset.wordIndex = entry.globalIndex;
      span.textContent = text.slice(entry.localStart, entry.localEnd);
      frag.appendChild(span);
      lastIndex = entry.localEnd;
    }
    if (lastIndex < text.length) {
      frag.appendChild(document.createTextNode(text.slice(lastIndex)));
    }
    textNode.parentNode.replaceChild(frag, textNode);
  }
}

function getWordAtClick(e) {
  // 클릭 위치에서 단어 추출 (공백만 경계, 구두점은 단어에 포함)
  if (document.caretRangeFromPoint) {
    const range = document.caretRangeFromPoint(e.clientX, e.clientY);
    if (!range || !range.startContainer || range.startContainer.nodeType !== Node.TEXT_NODE) return null;
    const textNode = range.startContainer;
    const offset = range.startOffset;
    const text = textNode.nodeValue;
    if (!text) return null;

    // 공백류만 경계로 사용
    const wordBreak = /[\s\u3000\u00A0]/;
    let start = offset;
    let end = offset;
    while (start > 0 && !wordBreak.test(text[start - 1])) start--;
    while (end < text.length && !wordBreak.test(text[end])) end++;
    const word = text.slice(start, end);
    return word || null;
  }
  return null;
}

// 클릭 위치의 글로벌 단어 인덱스 계산
function getWordIndexAtClick(e) {
  if (!document.caretRangeFromPoint) return -1;
  const range = document.caretRangeFromPoint(e.clientX, e.clientY);
  if (!range || !range.startContainer || range.startContainer.nodeType !== Node.TEXT_NODE) return -1;
  const textNode = range.startContainer;
  const offset = range.startOffset;
  const text = textNode.nodeValue;
  if (!text) return -1;

  // 클릭한 단어의 로컬 범위 계산
  const wordBreak = /[\s\u3000\u00A0]/;
  let start = offset;
  while (start > 0 && !wordBreak.test(text[start - 1])) start--;

  const container = document.getElementById('detail-inner');
  if (!container) return -1;

  const entries = buildWordIndex(container);
  for (const entry of entries) {
    if (entry.textNode === textNode && entry.localStart === start) return entry.globalIndex;
  }
  return -1;
}

// 스와이프 후 click 방지 플래그
let swipedRecently = false;

(function() {
  let cwTouchStartX = 0, cwTouchStartY = 0;
  document.addEventListener('touchstart', function(e) {
    cwTouchStartX = e.touches[0].clientX;
    cwTouchStartY = e.touches[0].clientY;
    swipedRecently = false;
  }, { passive: true });
  document.addEventListener('touchend', function(e) {
    const dx = Math.abs(e.changedTouches[0].clientX - cwTouchStartX);
    const dy = Math.abs(e.changedTouches[0].clientY - cwTouchStartY);
    if (dx > 30 || dy > 30) {
      swipedRecently = true;
      setTimeout(() => { swipedRecently = false; }, 300);
    }
  }, { passive: true });
})();

// #detail-inner 클릭 이벤트 (delegation)
document.getElementById('detail-inner').addEventListener('click', function(e) {
  // 스와이프 직후 click 무시
  if (swipedRecently) return;

  // 답변모달이 열려 있으면 무시
  if (document.getElementById('answer-modal').classList.contains('active')) return;

  // .blank-slot.empty 클릭 → 기존 답변모달 동작 (캐치워드 대상 아님)
  const blankSlot = e.target.closest('.blank-slot');
  if (blankSlot && blankSlot.classList.contains('empty')) return;

  // .detail-close 버튼 클릭 무시
  if (e.target.closest('.detail-close')) return;

  // .blank-slot.filled 클릭 → 통째로 캐치워드 처리
  if (blankSlot && blankSlot.classList.contains('filled')) {
    const container = document.getElementById('detail-inner');
    const wordIndex = getFilledBlankIndex(container, blankSlot);
    if (wordIndex === -1) return;
    const text = blankSlot.textContent;

    // 이미 있으면 토글 해제
    const existingIdx = state.catchwords.findIndex(cw => cw.sourceId === state.currentSourceId && cw.wordIndex === wordIndex);
    if (existingIdx !== -1) {
      state.catchwords.splice(existingIdx, 1);
    } else {
      // FIFO: sourceId별 3개 초과 시 해당 sourceId의 가장 오래된 것 제거
      const sourceCW = state.catchwords.filter(cw => cw.sourceId === state.currentSourceId);
      if (sourceCW.length >= 3) {
        const oldestIdx = state.catchwords.findIndex(cw => cw.sourceId === state.currentSourceId);
        if (oldestIdx !== -1) state.catchwords.splice(oldestIdx, 1);
      }
      state.catchwords.push({ sourceId: state.currentSourceId, wordIndex, text });
    }
    if (state.currentSourceId) openSource(state.currentSourceId);
    return;
  }

  // .catchword-highlight 클릭 → 토글 해제
  if (e.target.classList.contains('catchword-highlight')) {
    const wordIndex = parseInt(e.target.dataset.wordIndex, 10);
    if (!isNaN(wordIndex)) {
      state.catchwords = state.catchwords.filter(cw => !(cw.sourceId === state.currentSourceId && cw.wordIndex === wordIndex));
    } else {
      // filled blank의 catchword-highlight (dataset 없음) — blankSlot 경로에서 처리됨
      const text = e.target.textContent;
      state.catchwords = state.catchwords.filter(cw => !(cw.sourceId === state.currentSourceId && cw.text === text));
    }
    if (state.currentSourceId) openSource(state.currentSourceId);
    return;
  }

  // 일반 텍스트 클릭 → 단어 추출 + 위치 인덱스 계산
  const word = getWordAtClick(e);
  if (!word || word.length < 1) return;
  const wordIndex = getWordIndexAtClick(e);
  if (wordIndex === -1) return;

  // 이미 있으면 토글 해제
  const existingIdx = state.catchwords.findIndex(cw => cw.sourceId === state.currentSourceId && cw.wordIndex === wordIndex);
  if (existingIdx !== -1) {
    state.catchwords.splice(existingIdx, 1);
  } else {
    // FIFO: sourceId별 3개 초과 시 해당 sourceId의 가장 오래된 것 제거
    const sourceCW = state.catchwords.filter(cw => cw.sourceId === state.currentSourceId);
    if (sourceCW.length >= 3) {
      const oldestIdx = state.catchwords.findIndex(cw => cw.sourceId === state.currentSourceId);
      if (oldestIdx !== -1) state.catchwords.splice(oldestIdx, 1);
    }
    state.catchwords.push({ sourceId: state.currentSourceId, wordIndex, text: word });
  }

  // 현재 소스 다시 렌더링
  if (state.currentSourceId) openSource(state.currentSourceId);
});
