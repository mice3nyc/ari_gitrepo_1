groupwork:
  id: groupwork
  category: 2
  categoryName: 모둠 활동
  title: 모둠 발표 자료
  version: v1
  learningMessage: 혼자 빨리 끝낸 발표 자료는 모둠 안에서 아직 맞춰진 자료가 아니다.
  aiSuitability: mid
  timeBudgetSec: 720
  domainPool: [협업능력, 소통능력, 발표력, 검수능력, 자기검증, 자기성찰, 비판적 사고]
  situation:
    text: 학기 초 모둠 발표가 다음 주로 잡혔다. 우리 모둠은 4명이 각자 파트를 맡았고, 내가 맡은 일은 자료 조사와 슬라이드 3장 만들기였다. 다른 애들이 어떤 흐름으로 준비하는지 아직 잘 모르는데, 숙제도 있고 학원도 있어서 시간이 많지는 않았다.
    image: ../images/s02_ch1.webp
  tier1:
  - id: A
    label: 직접 조사해서 만든다
    desc: 내가 자료를 찾고 모둠 발표에 맞게 슬라이드를 만든다.
    lesson: 내 손으로 직접 했다 — 모둠 발표는 내가 이해해야 내 파트가 된다.
    delegation: +
    knowledge: +
  - id: B
    label: AI에게 맡긴다
    desc: AI에게 슬라이드 초안이나 정리를 부탁한다.
    lesson: AI에 위임했다 — 모둠 자료에 AI를 어디까지 쓸지 따져봐야 한다.
    delegation: '-'
    knowledge: '-'
  - id: C
    label: 다른 모둠·기성 자료에 기댄다
    desc: 모둠원·작년 발표·다른 학년 자료에 기대서 풀어간다.
    lesson: 다른 데서 가져왔다 — 적절히 골라 쓸 수도, 내 파트를 비울 수도 있다.
    delegation: '0'
    knowledge: '0'
  tier2:
    A:
    - id: A1
      label: 자료를 찾고 모둠원과 공유한 뒤 슬라이드를 만든다
      delegation: ++
      knowledge: ++
      lesson: 조사하고 모둠과 맞췄다 — 내 파트가 모둠 흐름 안에 자리 잡는다.
    - id: A2
      label: 직접 자료를 찾아 슬라이드를 만들고 한 장 제목·표현만 AI에 다듬어 달라 한다
      delegation: +
      knowledge: +
      lesson: 자기 슬라이드에 AI 손이 점만 닿았다 — 자료와 흐름은 내 것이고 표현이 매끄러워졌다.
    - id: A3
      label: 자료를 살짝 보고 슬라이드를 만든다
      delegation: '0'
      knowledge: +
      lesson: 얕게 보고 만들었다 — 슬라이드는 있지만 설명할 깊이가 없다.
    B:
    - id: B1
      label: AI에게 주제만 주고 슬라이드 3장을 만들어 달라고 한다
      delegation: --
      knowledge: '-'
      lesson: AI에 다 맡겼다 — 출처 없는 자료가 내 발표가 된다.
    - id: B2
      label: 내가 찾은 자료를 AI에게 주고 슬라이드 문장을 받아 다듬는다
      delegation: '0'
      knowledge: '0'
      lesson: 재료는 줬지만 정리까지 맡겼다 — 모둠 흐름이 빠진 자료가 나온다.
    - id: B3
      label: 내가 조사하고 출처를 적은 뒤 AI에게 정리만 부탁하고 끝까지 검수한다
      delegation: '++'
      knowledge: '++'
      lesson: 자료와 출처는 내가 잡고 AI는 정리만 도왔다 — 자기 조사 위에 적절한 결합이 얹혔다.
    C:
    - id: C1
      label: 다른 학년의 같은 단원 발표 자료에서 흐름을 빌려 보고 우리 모둠 주제로 직접 다시 채운다
      delegation: '++'
      knowledge: '++'
      lesson: 기성 자료를 거름으로 삼아 우리 주제로 다시 채웠다 — 빌리되 내 자리는 내가 채웠다.
    - id: C2
      label: 다른 모둠 작년 발표 슬라이드를 그대로 가져와 제목만 바꿔 낸다
      delegation: --
      knowledge: '-'
      lesson: 다른 모둠 슬라이드가 내 자리에 들어왔다 — 다른 모둠의 자료는 내 것이 아니다.
    - id: C3
      label: 모둠원에게 내 파트까지 좀 해 달라고 부탁한다
      delegation: --
      knowledge: '-'
      lesson: 내 파트를 떠넘겼다 — 발표 당일 내가 답할 수 없게 된다.
  results:
    A1:
      text: 자료 출처를 적어 두고, 모둠 채팅방에 내가 찾은 흐름을 먼저 공유했다. 슬라이드 3장은 조금 늦게 완성됐지만 다른 친구 파트와 이어지는 말이 생겼다.
      basePoint: 93
      deltaR2: 3
      deltaR3: 6
      summary: 모둠 흐름에 맞춘 발표 자료
      lesson: 모둠 발표는 자료를 만드는 일이 아니라 흐름을 맞추는 일이다.
    A2:
      text: 자료는 직접 찾아 출처까지 적었고, 마지막에 한 장 제목과 어색한 한 문장만 AI에 다듬어 달라 했다. 슬라이드는 내 흐름 그대로였고 표현 두 군데가 매끄러워졌다.
      basePoint: 70
      deltaR2: 5
      deltaR3: 11
      summary: 내 자료에 AI 손이 점만 닿은 슬라이드
      lesson: AI는 자기 슬라이드의 표현을 점만 손볼 때 도구가 된다 — 자료와 흐름은 내 일.
    A3:
      text: 검색해서 맨 위에 나온 글 몇 개를 보고 슬라이드를 만들었다. 제목과 그림은 들어갔지만 왜 이 자료를 골랐는지 설명하기가 애매했다.
      basePoint: 49
      deltaR2: 9
      deltaR3: 17
      summary: 겉모양은 있지만 얕은 자료
      lesson: 자료를 얕게 보면 발표할 때 설명할 말이 없다.
    B1:
      text: AI가 바로 슬라이드 3장짜리 내용을 만들어 줬다. 통계 숫자와 멋진 문장이 들어 있었지만 출처가 없고, 책에 없는 말이 인용문처럼 적혀 있었다.
      basePoint: 16
      deltaR2: 13
      deltaR3: 23
      summary: 출처가 비어 있는 AI 슬라이드
      lesson: AI에 통째로 맡기면 그럴듯한 거짓이 내 발표 자료가 된다.
      hiddenIssues:
      - 출처 없는 통계 숫자가 들어감
      - 실제 책이나 자료에 없는 문장이 인용처럼 들어감
      - 모둠의 발표 흐름과 연결되는 부분이 없음
    B2:
      text: 내가 찾은 자료를 AI에게 넣고 슬라이드 문장을 받았다. 내용은 크게 틀리지 않았지만 모둠 친구들이 쓰는 말투와 발표 흐름과는 조금 달랐다.
      basePoint: 58
      deltaR2: 8
      deltaR3: 15
      summary: 자료는 있지만 모둠 흐름이 약한 슬라이드
      lesson: 재료를 줘도 정리까지 맡기면 모둠과 따로 노는 자료가 된다.
    B3:
      text: 자료를 직접 찾아 출처를 정리한 뒤, AI에게 슬라이드 문장을 짧게 정리해 달라고 했다. 받아 본 문장은 출처와 흐름을 다시 확인하고, 모둠 채팅방에 공유해서 친구 파트와 이어지게 맞췄다.
      basePoint: 88
      deltaR2: 5
      deltaR3: 12
      summary: 자기 조사 위에 AI 정리를 얹은 검수된 슬라이드
      lesson: 자기 출발이 있으면 AI는 정리 자리에서 가장 잘 쓰인다 — 자료·출처·흐름은 내 일로 남는다.
    C1:
      text: 다른 학년이 같은 단원으로 발표했던 자료를 찾아 흐름과 순서를 살펴봤다. 어떤 흐름이 잘 풀렸는지 추려서, 우리 모둠 주제에 맞는 자료와 예시로 한 장씩 다시 채우고 출처를 적었다. 모둠 채팅방에 흐름을 공유해 친구 파트와 이어지는 자리를 맞췄다.
      basePoint: 88
      deltaR2: 5
      deltaR3: 12
      summary: 기성 자료의 흐름 위에 우리 주제를 직접 채운 슬라이드
      lesson: 기성 자료는 거름이다 — 흐름은 빌리고 내용은 내 손으로 채울 때 내 자리가 생긴다.
    C2:
      text: 다른 모둠이 작년에 만든 발표 슬라이드를 그대로 가져와 제목만 우리 주제로 바꿔 냈다. 그 모둠이 들었던 예시와 흐름이 내 자리에 그대로 남아 있었다.
      basePoint: 22
      deltaR2: 10
      deltaR3: 20
      summary: 다른 모둠이 들어 있는 슬라이드
      lesson: 다른 모둠 슬라이드는 다른 모둠의 흐름이다 — 내 자리는 비어 있다.
      hiddenIssues:
      - 다른 모둠이 들었던 예시가 그대로 남아 있음
      - 우리 모둠 주제와 연결되지 않는 문장이 섞여 있음
      - 출처와 만든 사람의 흔적이 섞여 있음
    C3:
      text: 모둠원에게 내 파트까지 좀 해 달라고 보냈다. 친구가 몇 줄을 도와주긴 했지만 발표 연습 때 내가 내 슬라이드를 잘 설명하지 못했다.
      basePoint: 11
      deltaR2: 11
      deltaR3: 20
      summary: 내가 설명하지 못한 내 파트
      lesson: 내 파트를 떠넘기면 발표 당일 내가 답할 수 없다.
      hiddenIssues:
      - 내가 맡은 파트의 내용을 직접 이해하지 못함
      - 친구에게 부담이 넘어감
      - 발표 당일 질문에 답하기 어려움
  reviews:
  - id: R1
    label: 그대로 제출
    desc: 검토 없이 그대로 낸다.
    boostType: none
    lesson: 검토를 건너뛰었다 — 검증할 기회를 놓쳤다.
  - id: R2
    label: 한 번 읽고 이상한 곳만 표시
    desc: 명시적인 환각·오류만 발견.
    boostType: explicit
    lesson: 한 번 훑어 명백한 오류를 잡았다. 도메인지식 +1
  - id: R3
    label: 출처 확인 + 모둠 흐름 맞추기
    desc: 자료의 근거와 다른 파트와의 연결까지 확인.
    boostType: all
