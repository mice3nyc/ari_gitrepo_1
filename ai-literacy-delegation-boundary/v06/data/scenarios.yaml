selfintro:
  id: selfintro
  category: 1
  categoryName: 새 학기
  title: 자기소개 글
  version: v1
  learningMessage: AI가 쓴 자기소개에는 내가 말하지 않은 내가 섞일 수 있다.
  aiSuitability: mid
  timeBudgetSec: 720
  domainPool: [자기지식, 표현력, 정리력, 검수능력, 자기검증, 자기성찰, 비판적 사고]
  domainLabel: 자기지식
  situation:
    text: 새 학기 첫날, 선생님이 반 게시판에 붙일 자기소개 글을 내일 아침까지 써 오라고 하셨다. 100자에서 200자 정도면 되고, 좋아하는 것, 기억나는 일, 올해 해 보고 싶은 일을 넣으면 된다고 했다. 집에 와서 빈 종이를 보니 뭘 써야 할지 바로 떠오르지는 않았다.
    image: ../images/s01_ch1.webp
  tier1:
  - id: A
    label: 직접 쓴다
    desc: 내 추억과 관심사를 떠올려서 내 말로 쓴다.
    lesson: 내 손으로 직접 했다 — 자기 일은 자기가 한다.
    delegation: +
    knowledge: +
  - id: B
    label: AI에게 부탁한다
    desc: AI에게 정보를 주고 자기소개 글을 받아 본다.
    lesson: AI에 위임했다 — 자기소개를 AI에 시킬 일인지 따져봐야 한다.
    delegation: '-'
    knowledge: '-'
  - id: C
    label: 다른 사람·기성 자료에 기댄다
    desc: 친구 글이나 작년 내가 쓴 글에 기대서 풀어간다.
    lesson: 다른 데서 가져왔다 — 적절히 골라 쓸 수도, 자기 자리를 비울 수도 있다.
    delegation: '0'
    knowledge: '0'
  tier2:
    A:
    - id: A1
      label: 추억과 관심사를 정리해 자기 말로 쓴다
      delta:
        afterA: { delegation: '++', knowledge: '++' }
        afterB: { delegation: '+', knowledge: '+' }
        afterC: { delegation: '+', knowledge: '+' }
      lesson: 내 경험을 들여다봤다 — 자기 안에서 글이 나온다.
    - id: A2
      label: 자기 말로 쓰다가 한두 표현만 AI에 다듬어 달라 한다
      delta:
        afterA: { delegation: '+', knowledge: '+' }
        afterB: { delegation: '+', knowledge: '+' }
        afterC: { delegation: '+', knowledge: '+' }
      lesson: 자기 글에 AI 손이 점만 닿았다 — 내용은 내 것이고 표현이 매끄러워졌다.
    - id: A3
      label: 떠오르는 대로 쓰고 바로 끝낸다
      delta:
        afterA: { delegation: '0', knowledge: '+' }
        afterB: { delegation: '-', knowledge: '0' }
        afterC: { delegation: '0', knowledge: '0' }
      lesson: 떠오르는 대로 내보냈다 — 자기 안에서 끌어냈지만 정리 없이 나갔다.
    B:
    - id: B1
      label: AI에게 이름만 주고 만들어 달라고 한다
      delta:
        afterA: { delegation: '-', knowledge: '-' }
        afterB: { delegation: '--', knowledge: '-' }
        afterC: { delegation: '--', knowledge: '-' }
      lesson: AI에 다 맡겼다 — 내 빈자리를 가짜로 메운다.
    - id: B2
      label: 내 정보를 자세히 주고 AI 글을 받아 다듬는다
      delta:
        afterA: { delegation: '0', knowledge: '0' }
        afterB: { delegation: '0', knowledge: '0' }
        afterC: { delegation: '0', knowledge: '0' }
      lesson: 재료는 줬지만 글까지 맡겼다 — 말투가 내 것이 아니다.
    - id: B3
      label: 내가 먼저 자기소개를 쓰고 AI에게 표현 두세 개만 보여 달라 한다 — 내 말투에 맞는 것만 골라 쓴다
      delta:
        afterA: { delegation: '++', knowledge: '++' }
        afterB: { delegation: '++', knowledge: '++' }
        afterC: { delegation: '++', knowledge: '++' }
      lesson: 내 글이 중심이고 AI는 거들었다 — 표현만 받고 내 말투로 검수하면 글이 단단해진다.
    C:
    - id: C1
      label: 작년 자기소개를 다시 읽고 올해의 나를 처음부터 새로 쓴다
      delta:
        afterA: { delegation: '++', knowledge: '++' }
        afterB: { delegation: '++', knowledge: '++' }
        afterC: { delegation: '++', knowledge: '++' }
      lesson: 작년의 글이 거름이 되어 올해의 나를 자기 말로 자라게 했다 — 자기 자료를 적극 활용했다.
    - id: C2
      label: 친구 작년 자기소개를 가져와 이름만 바꿔 낸다
      delta:
        afterA: { delegation: '-', knowledge: '-' }
        afterB: { delegation: '--', knowledge: '-' }
        afterC: { delegation: '--', knowledge: '-' }
      lesson: 친구의 글이 내 자리에 들어왔다 — 친구의 자기소개는 내 것이 아니다.
    - id: C3
      label: 잘 부탁드립니다 한 줄만 적는다
      delta:
        afterA: { delegation: '--', knowledge: '-' }
        afterB: { delegation: '--', knowledge: '-' }
        afterC: { delegation: '--', knowledge: '-' }
      lesson: 한 줄만 적었다 — 자기소개를 건너뛰었다.
  results:
    A1:
      text: 초등학교 때 축구하다가 처음 골을 넣었던 일과 요즘 그림 그리는 걸 좋아한다는 말을 넣었다. 글은 조금 느리게 나왔지만 읽어 보니 내 얘기 같았다.
      basePoint: 92
      deltaR2: 3
      deltaR3: 6
      summary: 내 경험이 들어간 자기소개
      lesson: 자기소개는 자기가 가장 잘 안다 — 위임할 일이 아니었다.
    A2:
      text: 직접 자기 말로 쓰다가 한두 표현이 어색해서 AI에게 다듬어 달라 했다. 내 말투는 그대로인데 한두 문장이 매끄러워졌다.
      basePoint: 70
      deltaR2: 5
      deltaR3: 11
      summary: 내 글에 AI 손이 점만 닿은 자기소개
      lesson: AI는 자기 글의 표현을 점만 손볼 때 도구가 된다 — 내용은 내 일.
    A3:
      text: 생각나는 대로 쓰다 보니 문장이 길어졌다가 갑자기 끝났다. 농구 얘기도 있고 게임 얘기도 있는데 서로 잘 이어지지는 않았다.
      basePoint: 48
      deltaR2: 9
      deltaR3: 17
      summary: 흩어진 자기소개
      lesson: 자기 안에서 끌어냈지만 정리 없이 흩어졌다 — 자기 글이라도 묶지 않으면 자기가 안 보인다.
    B1:
      text: AI가 내 이름을 넣어 반듯한 자기소개를 써 줬다. 그런데 글 안에는 내가 말한 적 없는 봉사활동과 독서 습관이 들어 있었다.
      basePoint: 15
      deltaR2: 13
      deltaR3: 23
      summary: 겉은 반듯하지만 내가 빠진 자기소개
      lesson: AI에 자기소개를 시키면 내가 아닌 사람이 인사하게 된다.
      hiddenIssues:
      - 학생이 말한 적 없는 봉사활동을 좋아한다는 내용이 들어감
      - 실제로 확인되지 않은 독서 습관이 들어감
      - 문장은 자연스럽지만 주인공의 실제 경험이 약함
    B2:
      text: 내가 좋아하는 것, 방학 때 있었던 일, 올해 해 보고 싶은 일을 AI에게 자세히 적어 줬다. 글은 깔끔했지만 몇 문장은 내 말투보다 너무 얌전했다.
      basePoint: 57
      deltaR2: 8
      deltaR3: 15
      summary: 내 정보가 들어간 AI 자기소개
      lesson: 내 정보를 줘도 말투까지 위임하면 글이 어색해진다.
    B3:
      text: 내가 먼저 자기소개를 쓰고 AI에게 어색한 표현 두세 개만 보여 달라 했다. 그중 내 말투에 맞는 것만 골라 썼더니, 내 얘기인데 더 매끄럽게 읽혔다.
      basePoint: 88
      deltaR2: 5
      deltaR3: 12
      summary: AI가 거들고 내가 잡은 자기소개
      lesson: 자기 글을 먼저 쓰고 AI는 표현만 검수하면, 내용은 내 안에 있고 글은 단단해진다.
    C1:
      text: 작년에 썼던 자기소개를 다시 읽으니 지금은 안 하는 취미와 새로 좋아하게 된 것이 또렷이 보였다. 작년 글을 거름 삼아 올해의 나로 처음부터 다시 썼다.
      basePoint: 88
      deltaR2: 5
      deltaR3: 12
      summary: 작년의 나로부터 자란 올해의 자기소개
      lesson: 자기 자료를 적극 활용하면 자기 변화가 글로 자라난다.
    C2:
      text: 친구가 작년에 쓴 자기소개를 그대로 가져와 이름만 바꿔 냈다. 친구가 좋아한다던 음악과 친구가 가고 싶다던 곳이 내 자리에 들어 있었다.
      basePoint: 22
      deltaR2: 10
      deltaR3: 20
      summary: 친구가 들어 있는 자기소개
      lesson: 친구의 자기소개는 친구의 것이다 — 내 자리는 비어 있다.
      hiddenIssues:
      - 친구가 좋아한다던 음악과 가고 싶다던 곳이 내 자기소개에 들어가 있음
      - 내 진짜 관심사와 기억은 글에 없음
    C3:
      text: 종이에 '안녕하세요. 잘 부탁드립니다.'라고만 적었다. 칸은 채웠지만 게시판에 붙으면 아무도 나를 알 수 없을 것 같았다.
      basePoint: 10
      deltaR2: 11
      deltaR3: 20
      summary: 비어 있는 자기소개
      lesson: 선택을 건너뛴 자리에는 내가 없다.
      hiddenIssues:
      - 자기소개에 실제 정보가 거의 없음
      - 반 게시판에서 나를 알 수 있는 단서가 없음
  reviews:
  - id: R1
    label: 그대로 제출
    desc: 검토 없이 그대로 낸다.
    boostType: none
    lesson: 검토를 건너뛰었다 — 검증할 기회를 놓쳤다.
  - id: R2
    label: 한 번 읽고 이상한 곳만 표시
    desc: 명시적인 환각·오류만 발견.
    boostType: explicit
    lesson: 한 번 훑어 명백한 오류를 잡았다. 도메인지식 +1
  - id: R3
    label: 처음부터 다시 읽고 내 얘기인지 확인
    desc: 내용, 말투, 빠진 경험까지 확인.
    boostType: all
    lesson: 처음부터 다시 읽으니 빠진 것이 보였다. 도메인지식 +3
  reviewSupplements:
    A1R2: 한 번 읽어 보니 문장 하나가 길어서 둘로 나눴다. 점수 +3.
    A1R3: 처음부터 다시 읽고 올해 해 보고 싶은 일을 한 문장 더 넣었다. 점수 +6.
    A2R2: 한 번 읽어 보니 AI가 다듬은 한 표현이 내 말투와 달랐다. 점수 +5.
    A2R3: AI가 다듬은 자리와 내가 처음 쓴 자리를 비교해서 더 자연스러운 쪽을 골랐다. 점수 +11.
    A3R2: 한 번 읽어 보니 갑자기 끝나는 문장을 발견했다. 점수 +9.
    A3R3: 흩어진 얘기 중 하나를 골라 중심을 잡았다. 점수 +17.
    B1R2: 한 번 읽어 보니 내가 한 적 없는 봉사활동 얘기가 있었다. 점수 +13.
    B1R3: 내가 말하지 않은 내용들을 지우고 실제로 한 일만 남겼다. 점수 +23.
    B2R2: 한 번 읽어 보니 너무 어른스럽게 들리는 문장을 바꿨다. 점수 +8.
    B2R3: AI가 정리한 글에 내 말투와 실제 기억을 다시 넣었다. 점수 +15.
    B3R2: 한 번 읽어 보니 AI가 바꾼 표현 하나가 내 말 같지 않았다. 점수 +5.
    B3R3: 내가 처음 쓴 문장과 AI가 다듬은 문장을 비교해서 내 말투에 맞는 것만 남겼다. 점수 +12.
    C1R2: 한 번 읽어 보니 작년 글에서 가져온 한 문장이 지금 나와 어울리지 않았다. 점수 +5.
    C1R3: 작년 글을 다시 비추며, 지금의 내가 새로 추가하고 싶은 한 문장을 더 넣었다. 점수 +12.
    C2R2: 한 번 읽어 보니 친구가 좋아한다던 음악이 내 글에 그대로 있었다. 점수 +10.
    C2R3: 친구의 자기소개를 거의 다 지우고 내 얘기로 다시 채웠다. 점수 +20.
    C3R2: 한 번 읽어 보니 나를 알려 주는 말이 거의 없었다. 점수 +11.
    C3R3: 짧게라도 좋아하는 것과 올해 해 보고 싶은 일을 추가했다. 점수 +20.
