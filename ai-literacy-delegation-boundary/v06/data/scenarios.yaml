studyplan:
  id: studyplan
  category: 5
  categoryName: 시험 공부
  title: 시험 2주 전 — 공부를 어떻게
  version: v1
  learningMessage: 내가 뭘 모르는지 알아차리는 순간부터 공부 계획은 내 것이 된다.
  aiSuitability: mid
  timeBudgetSec: 720
  situation:
    text: 학기 말 중간고사가 2주 앞으로 다가왔다. 5과목 중 자신 있는 과목은 2개 정도이고, 나머지 3개는 어디부터 해야 할지 잘 모르겠다. 책상 위에는 시험 범위표와 문제집이 펼쳐져 있고, 오늘은 어떻게 공부할지부터 정해야 했다.
    image: ../images/s05_ch1.webp
  tier1:
  - id: A
    label: 직접 계획을 세우고 공부한다
    desc: 내가 아는 것과 모르는 것을 보고 공부 시간을 나눈다.
    lesson: 내 손으로 계획을 짰다 — 내 시험은 내가 가장 잘 안다.
  - id: B
    label: AI에게 공부법을 받는다
    desc: AI에게 시험 공부 방법이나 약점별 공부 순서를 물어본다.
    lesson: AI에 공부법을 맡겼다 — 내 약점을 누가 알아야 하는지 따져봐야 한다.
  - id: C
    label: 친구나 학원에 기대거나 미룬다
    desc: 남의 계획을 따라가거나 공부를 뒤로 미룬다.
    lesson: 남의 계획에 기댔다 — 내 시험은 내가 안 보면 보이지 않는다.
  tier2:
    A:
    - id: A1
      label: 모르는 부분을 먼저 점검하고 약한 과목에 시간을 더 둔다
      delegation: ++
      lesson: 약점을 먼저 봤다 — 내가 뭘 모르는지부터 시작하는 공부.
    - id: A2
      label: 모든 과목을 똑같이 나눠서 공부한다
      delegation: +
      lesson: 모든 과목에 시간을 똑같이 줬다 — 깔끔하지만 약한 과목이 흐려진다.
    - id: A3
      label: 자신 있는 과목만 더 공부한다
      delegation: '0'
      lesson: 잘하는 과목만 펼쳤다 — 기분은 좋지만 모르는 단원은 그대로다.
    B:
    - id: B1
      label: AI에게 중2 시험 공부법을 한 줄로 묻고 그대로 따른다
      delegation: --
      lesson: 한 줄로 묻고 그대로 따랐다 — AI는 내 약점을 모른 채 일반론을 준다.
    - id: B2
      label: 내 약점을 말하고 AI 답을 받아 판단한다
      delegation: '0'
      lesson: 약점을 말하고 답을 받았다 — 내 정보만큼만 답이 좁아진다.
    - id: B3
      label: 내가 약점을 분석한 뒤 AI에게 구체적으로 묻는다
      delegation: +
      lesson: 약점을 먼저 찾고 AI에 물었다 — 도구는 내가 길을 안 다음에 쓰인다.
    C:
    - id: C1
      label: 친구가 짠 공부 계획을 따라 한다
      delegation: '-'
      lesson: 친구 계획을 따라 했다 — 친구의 약점은 내 약점이 아니다.
    - id: C2
      label: 학원 시간표만 믿고 따로 공부하지 않는다
      delegation: '-'
      lesson: 수업만 듣고 끝냈다 — 들은 것과 내가 푸는 것은 다르다.
    - id: C3
      label: 어차피 안 된다고 생각하고 게임을 한다
      delegation: --
      lesson: 선택을 미뤘다 — 시간은 흘러도 시험 범위는 그대로다.
  results:
    A1:
      text: 지난 단원 문제를 조금 풀어 보니 수학 도형과 과학 전기 단원에서 많이 막혔다. 자신 있는 과목은 짧게 확인하고, 막힌 과목에 시간을 더 넣은 계획표를 만들었다.
      basePoint: 94
      deltaR2: 3
      deltaR3: 6
      summary: 약점을 보고 세운 공부 계획
      lesson: 약점을 본 자리에서 진짜 공부가 시작된다 — 위임 아닌 자기 점검.
    A2:
      text: 5과목을 똑같이 나눠서 하루에 조금씩 보기로 했다. 계획표는 깔끔했지만, 이미 아는 과목과 모르는 과목이 같은 칸을 차지했다.
      basePoint: 67
      deltaR2: 6
      deltaR3: 12
      summary: 균등하지만 약점이 흐린 계획
      lesson: 공평한 시간은 공평한 공부가 아니다 — 모르는 자리에 시간이 더 필요하다.
    A3:
      text: 자신 있는 과목을 먼저 펼치니 문제도 잘 풀리고 기분이 조금 나아졌다. 하지만 어려운 과목 문제집은 책상 한쪽에 그대로 쌓여 있었다.
      basePoint: 48
      deltaR2: 9
      deltaR3: 17
      summary: 편한 과목으로 기운 계획
      lesson: 잘하는 과목을 풀어도 모르는 단원은 줄지 않는다.
    B1:
      text: AI는 예습, 복습, 기출 문제, 오답 정리 같은 공부법을 차례로 알려 줬다. 말은 다 맞아 보였지만 내가 수학 도형을 모르는지, 과학 전기를 모르는지는 알지 못했다.
      basePoint: 16
      deltaR2: 13
      deltaR3: 23
      summary: 일반적인 AI 공부법
      lesson: AI에 시험 공부를 시키면 내 약점을 모른 채 일반론이 돌아온다.
      hiddenIssues:
      - 학생의 실제 약한 단원을 알지 못함
      - 모든 과목에 통하는 일반론만 제시됨
      - 내가 뭘 모르는지 확인하는 과정이 빠져 있음
    B2:
      text: AI에게 수학 도형이 약하고 영어 단어가 밀렸다고 말하자, 공부 순서를 나눠 줬다. 도움이 됐지만 내가 정말 어디에서 틀리는지는 문제를 풀어 봐야 알 수 있었다.
      basePoint: 59
      deltaR2: 8
      deltaR3: 15
      summary: 약점을 말하고 받은 공부법
      lesson: 내가 준 정보만큼만 AI가 답한다 — 약점을 알아야 답도 좁아진다.
    B3:
      text: 먼저 문제를 풀어 보고 틀린 단원을 표시한 다음, AI에게 수학 도형은 어디부터 다시 봐야 하는지 물었다. AI 답을 그대로 쓰지 않고 내 오답 옆에 필요한 부분만 적었다.
      basePoint: 72
      deltaR2: 5
      deltaR3: 10
      summary: 약점 분석 뒤 쓴 AI 공부 도구
      lesson: AI는 내가 길을 안 다음에 가장 잘 쓰이는 도구다.
    C1:
      text: 친구가 만든 계획표를 받아 비슷하게 따라 했다. 친구는 영어를 어려워해서 영어 시간이 많았지만, 나는 사실 수학 도형이 더 급했다.
      basePoint: 47
      deltaR2: 8
      deltaR3: 18
      summary: 친구에게 맞춰진 공부 계획
      lesson: 친구의 시험지는 내 시험지가 아니다 — 약점은 사람마다 다르다.
    C2:
      text: 학원 시간표대로만 가면 된다고 생각했다. 수업은 들었지만 집에 와서 내가 어디를 모르는지 따로 확인하지는 않았다.
      basePoint: 51
      deltaR2: 8
      deltaR3: 18
      summary: 학원에 맡긴 공부 흐름
      lesson: 수업을 듣는 것과 내가 푸는 것은 다른 일이다.
    C3:
      text: 책상에 앉았다가 어차피 늦었다는 생각이 들어 게임을 켰다. 잠깐만 하려고 했는데 시험 범위표는 그대로 접힌 채 남았다.
      basePoint: 10
      deltaR2: 11
      deltaR3: 20
      summary: 미뤄 둔 시험 공부
      lesson: 선택을 미룬 자리에는 공부가 없다 — 시간은 그래도 흐른다.
      hiddenIssues:
      - 시험 범위를 확인하지 않음
      - 모르는 과목을 그대로 둠
      - 공부 계획 없이 시간이 지나감
