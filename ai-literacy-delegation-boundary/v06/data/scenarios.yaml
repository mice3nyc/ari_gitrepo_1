studyplan:
  id: studyplan
  category: 5
  categoryName: 시험 공부
  title: 시험 2주 전 — 공부를 어떻게
  version: v1
  learningMessage: 내가 뭘 모르는지 알아차리는 순간부터 공부 계획은 내 것이 된다.
  aiSuitability: mid
  timeBudgetSec: 720
  domainPool: [학습설계, 시간관리, 학습전략, 검수능력, 자기검증, 자기성찰, 비판적 사고]
  situation:
    text: 학기 말 중간고사가 2주 앞으로 다가왔다. 5과목 중 자신 있는 과목은 2개 정도이고, 나머지 3개는 어디부터 해야 할지 잘 모르겠다. 책상 위에는 시험 범위표와 문제집이 펼쳐져 있고, 오늘은 어떻게 공부할지부터 정해야 했다.
    image: ../images/s05_ch1.webp
  tier1:
  - id: A
    label: 직접 계획을 세우고 공부한다
    desc: 문제를 조금 풀어 보고 내가 약한 단원부터 시간을 나눈다.
    lesson: 내 손으로 약점부터 봤다 — 내 시험은 내가 가장 잘 안다.
    delegation: +
    knowledge: +
  - id: B
    label: AI에게 공부법을 받는다
    desc: AI에게 시험 공부 방법이나 약점별 공부 순서를 물어본다.
    lesson: AI에 공부법을 맡겼다 — 내 약점을 누가 알아야 하는지 따져봐야 한다.
    delegation: '-'
    knowledge: '-'
  - id: C
    label: 다른 사람·기성 자료에 기댄다
    desc: 친구 계획·학원 시간표·작년 시험지에 기대서 공부 방향을 잡는다.
    lesson: 다른 데서 가져왔다 — 적절히 골라 쓸 수도, 자기 약점을 못 볼 수도 있다.
    delegation: '0'
    knowledge: '0'
  tier2:
    A:
    - id: A1
      label: 지난 단원 문제를 풀어 약점을 찾고 약한 과목에 시간을 더 둔다
      delegation: ++
      knowledge: ++
      lesson: 내가 뭘 모르는지부터 봤다 — 약점이 보이는 자리에서 공부 순서가 생긴다.
    - id: A2
      label: 약점을 직접 짚은 뒤 막힌 한 단원만 AI에게 어디부터 다시 봐야 하는지 묻는다
      delegation: +
      knowledge: +
      lesson: 내가 길을 안 다음에 AI 손이 점만 닿았다 — 출발은 내 오답이고 도구는 AI다.
    - id: A3
      label: 모든 과목을 똑같이 나눠서 공부한다
      delegation: '0'
      knowledge: +
      lesson: 시간을 공평하게 나눴다 — 깔끔하지만 약점 단원이 같은 칸에 묻힌다.
    B:
    - id: B1
      label: AI에게 중2 시험 공부법을 한 줄로 묻고 그대로 따른다
      delegation: --
      knowledge: '-'
      lesson: 한 줄로 묻고 따랐다 — AI는 내 약점을 모른 채 일반론을 준다.
    - id: B2
      label: 내 약점을 말하고 AI 공부 순서를 받아 그대로 쓴다
      delegation: '0'
      knowledge: '0'
      lesson: 약점을 말하고 답을 받았다 — 내 정보만큼만 답이 좁아진다.
    - id: B3
      label: 내가 먼저 오답을 분석하고 약점을 짚은 뒤, AI에게 단원별로 구체적으로 묻고 답을 내 오답 옆에서 검수한다
      delegation: '++'
      knowledge: '++'
      lesson: 내 약점이 먼저 보이고 나서 AI가 도구가 됐다 — 출발은 내 오답이고 AI 답은 내 검수를 거친다.
    C:
    - id: C1
      label: 작년 기말 시험지와 오답노트를 다시 꺼내 약했던 단원을 짚고, 올해 문제집과 비교해 시간을 다시 배치한다
      delegation: '++'
      knowledge: '++'
      lesson: 작년의 내가 거름이 되어 올해 약점 자리에 시간이 옮겨졌다 — 자기 자료를 적극 활용하면 자기 약점이 또렷해진다.
    - id: C2
      label: 잘하는 친구의 공부 계획표를 받아 그대로 따라 한다
      delegation: --
      knowledge: '-'
      lesson: 친구 계획이 내 자리에 들어왔다 — 친구의 약점은 내 약점이 아니다.
    - id: C3
      label: 어차피 안 된다고 생각하고 게임을 한다
      delegation: --
      knowledge: '-'
      lesson: 선택을 미뤘다 — 시간은 흘러도 시험 범위는 그대로다.
  results:
    A1:
      text: 지난 단원 문제를 조금 풀어 보니 수학 도형과 과학 전기 단원에서 많이 막혔다. 자신 있는 과목은 짧게 확인하고, 막힌 과목에 시간을 더 넣은 계획표를 만들었다.
      basePoint: 92
      deltaR2: 3
      deltaR3: 6
      summary: 약점을 보고 세운 공부 계획
      lesson: 약점이 보인 자리에서 진짜 공부가 시작된다 — 자기 점검에서 출발한 계획.
    A2:
      text: 먼저 문제를 풀어 보니 수학 도형 단원이 가장 막혔다. 그 한 단원만 AI에게 어디부터 다시 봐야 하는지 물어보고, 답 중 시험 범위에 맞는 부분만 내 오답 옆에 적었다.
      basePoint: 75
      deltaR2: 5
      deltaR3: 11
      summary: 자기 약점 위에 AI 손이 점만 닿은 계획
      lesson: AI는 내가 길을 안 다음에 가장 잘 쓰이는 도구다 — 출발점은 내 오답.
    A3:
      text: 5과목을 똑같이 나눠서 하루에 조금씩 보기로 했다. 계획표는 깔끔했지만, 이미 아는 과목과 모르는 과목이 같은 칸을 차지했다.
      basePoint: 55
      deltaR2: 8
      deltaR3: 15
      summary: 균등하지만 약점이 흐린 계획
      lesson: 공평한 시간은 공평한 공부가 아니다 — 모르는 자리에 시간이 더 필요하다.
    B1:
      text: AI는 예습, 복습, 기출 문제, 오답 정리 같은 공부법을 차례로 알려 줬다. 말은 다 맞아 보였지만 내가 수학 도형을 모르는지, 과학 전기를 모르는지는 알지 못했다.
      basePoint: 16
      deltaR2: 13
      deltaR3: 23
      summary: 일반적인 AI 공부법
      lesson: AI에 시험 공부를 시키면 내 약점을 모른 채 일반론이 돌아온다.
      hiddenIssues:
      - 학생의 실제 약한 단원을 알지 못함
      - 모든 과목에 통하는 일반론만 제시됨
      - 내가 뭘 모르는지 확인하는 과정이 빠져 있음
    B2:
      text: AI에게 수학 도형이 약하고 영어 단어가 밀렸다고 말하자, 공부 순서를 나눠 줬다. 도움이 됐지만 내가 정말 어디에서 틀리는지는 문제를 풀어 봐야 알 수 있었다.
      basePoint: 57
      deltaR2: 8
      deltaR3: 15
      summary: 약점을 말하고 받은 공부법
      lesson: 내가 준 정보만큼만 AI가 답한다 — 약점을 좁게 말해야 답도 좁아진다.
    B3:
      text: 먼저 문제를 풀어 보고 틀린 단원을 표시한 다음, AI에게 수학 도형은 어디부터 다시 봐야 하는지 물었다. AI 답을 그대로 쓰지 않고 내 오답 옆에 필요한 부분만 적었다.
      basePoint: 88
      deltaR2: 5
      deltaR3: 12
      summary: 자기 약점 분석 위에 검수된 AI 학습 도구
      lesson: 약점이 먼저 보일 때 AI가 도구가 된다 — 출발은 내 오답, 마지막 검수도 내 손.
    C1:
      text: 작년 기말 시험지와 오답노트를 다시 꺼내 어디서 많이 틀렸는지 짚고, 올해 문제집과 비교해 작년 약점이 그대로 남았는지 확인했다. 그 자리에 시간을 더 넣고 이미 잡힌 단원은 줄였다.
      basePoint: 88
      deltaR2: 5
      deltaR3: 12
      summary: 자기 자료에서 올해 약점까지 옮겨 온 계획
      lesson: 작년의 내가 거름이 되어 올해 약점 자리에 시간이 자랐다 — 자기 자료는 가장 정확한 학습 데이터다.
    C2:
      text: 잘하는 친구가 만든 계획표를 그대로 받아 따라 했다. 친구는 영어를 길게 잡았지만, 나는 수학 도형이 더 급했다. 친구 약점 자리에 내 시간이 들어가 있었다.
      basePoint: 25
      deltaR2: 10
      deltaR3: 20
      summary: 친구에게 맞춰진 공부 계획
      lesson: 친구의 시험지는 내 시험지가 아니다 — 약점 분포는 사람마다 다르다.
      hiddenIssues:
      - 친구의 약한 단원에 내 공부 시간이 들어가 있음
      - 내가 정말 막히는 단원에는 시간이 부족함
      - 내 오답을 직접 본 적이 없음
    C3:
      text: 책상에 앉았다가 어차피 늦었다는 생각이 들어 게임을 켰다. 잠깐만 하려고 했는데 시험 범위표는 그대로 접힌 채 남았다.
      basePoint: 10
      deltaR2: 11
      deltaR3: 20
      summary: 미뤄 둔 시험 공부
      lesson: 선택을 미룬 자리에는 공부가 없다 — 시간은 그래도 흐른다.
      hiddenIssues:
      - 시험 범위를 확인하지 않음
      - 모르는 과목을 그대로 둠
      - 공부 계획 없이 시간이 지나감
