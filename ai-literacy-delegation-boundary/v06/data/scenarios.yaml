selfintro:
  id: selfintro
  category: 1
  categoryName: 새 학기
  title: 자기소개 글
  version: v1
  learningMessage: AI가 쓴 자기소개에는 내가 말하지 않은 내가 섞일 수 있다.
  aiSuitability: mid
  timeBudgetSec: 720
  situation:
    text: 새 학기 첫날, 선생님이 반 게시판에 붙일 자기소개 글을 내일 아침까지 써 오라고 하셨다. 100자에서 200자 정도면 되고, 좋아하는 것, 기억나는 일, 올해 해 보고 싶은 일을 넣으면 된다고 했다. 집에 와서 빈 종이를 보니 뭘 써야 할지 바로 떠오르지는 않았다.
    image: ../images/s01_ch1.webp
  tier1:
  - id: A
    label: 직접 쓴다
    desc: 내 추억과 관심사를 떠올려서 내 말로 쓴다.
    lesson: 내 손으로 직접 했다 — 자기 일은 자기가 한다.
    delegation: +
    knowledge: +
  - id: B
    label: AI에게 부탁한다
    desc: AI에게 정보를 주고 자기소개 글을 받아 본다.
    lesson: AI에 위임했다 — 자기소개를 AI에 시킬 일인지 따져봐야 한다.
    delegation: '-'
    knowledge: '-'
  - id: C
    label: 다른 글을 참고하거나 짧게 끝낸다
    desc: 직접 쓰지 않고 빨리 끝내려 한다.
    lesson: 지름길로 갔다 — 자기 자리가 점점 사라진다.
    delegation: '-'
    knowledge: '-'
  tier2:
    A:
    - id: A1
      label: 추억과 관심사를 정리해 자기 말로 쓴다
      delegation: ++
      knowledge: ++
      lesson: 내 경험을 들여다봤다 — 자기 안에서 글이 나온다.
    - id: A2
      label: 키워드만 빠르게 적어 짧게 쓴다
      delegation: +
      knowledge: +
      lesson: 키워드만 챙겼다 — 빨리 끝냈지만 내 깊이가 얕다.
    - id: A3
      label: 떠오르는 대로 쓰고 바로 끝낸다
      delegation: '0'
      knowledge: '0'
      lesson: 떠오르는 대로 내보냈다 — 자기 글이지만 정리가 안 된다.
    B:
    - id: B1
      label: AI에게 이름만 주고 만들어 달라고 한다
      delegation: --
      knowledge: '-'
      lesson: AI에 다 맡겼다 — 내 빈자리를 가짜로 메운다.
    - id: B2
      label: 내 정보를 자세히 주고 AI 글을 받아 다듬는다
      delegation: '0'
      knowledge: '0'
      lesson: 재료는 줬지만 글까지 맡겼다 — 말투가 내 것이 아니다.
    - id: B3
      label: 내가 먼저 쓰고 AI에게 표현만 다듬어 달라고 한다
      delegation: +
      knowledge: +
      lesson: AI에 마무리만 맡겼다 — 내용은 내 것.
    C:
    - id: C1
      label: 작년 자기소개에서 학년만 바꾼다
      delegation: '-'
      knowledge: '-'
      lesson: 학년만 바꿨다 — 작년의 내가 그대로 남는다.
    - id: C2
      label: 친구 글의 형식을 보고 비슷하게 쓴다
      delegation: '-'
      knowledge: '-'
      lesson: 친구 글을 따라갔다 — 남의 틀에 내가 들어갔다.
    - id: C3
      label: 잘 부탁드립니다 한 줄만 적는다
      delegation: --
      knowledge: '-'
      lesson: 한 줄만 적었다 — 자기소개를 건너뛰었다.
  results:
    A1:
      text: 초등학교 때 축구하다가 처음 골을 넣었던 일과 요즘 그림 그리는 걸 좋아한다는 말을 넣었다. 글은 조금 느리게 나왔지만 읽어 보니 내 얘기 같았다.
      basePoint: 92
      deltaR2: 3
      deltaR3: 6
      summary: 내 경험이 들어간 자기소개
      lesson: 자기소개는 자기가 가장 잘 안다 — 위임할 일이 아니었다.
    A2:
      text: 좋아하는 과목, 요즘 듣는 노래, 새 학기에 친해지고 싶은 마음을 짧게 적었다. 내용은 맞지만 조금 메모처럼 보였다.
      basePoint: 66
      deltaR2: 6
      deltaR3: 11
      summary: 빠르지만 조금 얇은 자기소개
      lesson: 자기를 보여주는 일에 시간을 줄이면 깊이가 줄어든다.
    A3:
      text: 생각나는 대로 쓰다 보니 문장이 길어졌다가 갑자기 끝났다. 농구 얘기도 있고 게임 얘기도 있는데 서로 잘 이어지지는 않았다.
      basePoint: 48
      deltaR2: 9
      deltaR3: 17
      summary: 흩어진 자기소개
      lesson: 자기 글이라도 정리하지 않으면 자기가 안 보인다.
    B1:
      text: AI가 내 이름을 넣어 반듯한 자기소개를 써 줬다. 그런데 글 안에는 내가 말한 적 없는 봉사활동과 독서 습관이 들어 있었다.
      basePoint: 15
      deltaR2: 13
      deltaR3: 23
      summary: 겉은 반듯하지만 내가 빠진 자기소개
      lesson: AI에 자기소개를 시키면 내가 아닌 사람이 인사하게 된다.
      hiddenIssues:
      - 학생이 말한 적 없는 봉사활동을 좋아한다는 내용이 들어감
      - 실제로 확인되지 않은 독서 습관이 들어감
      - 문장은 자연스럽지만 주인공의 실제 경험이 약함
    B2:
      text: 내가 좋아하는 것, 방학 때 있었던 일, 올해 해 보고 싶은 일을 AI에게 자세히 적어 줬다. 글은 깔끔했지만 몇 문장은 내 말투보다 너무 얌전했다.
      basePoint: 57
      deltaR2: 8
      deltaR3: 15
      summary: 내 정보가 들어간 AI 자기소개
      lesson: 내 정보를 줘도 말투까지 위임하면 글이 어색해진다.
    B3:
      text: 내가 먼저 쓴 글을 AI에게 보여 주고 어색한 문장만 다듬어 달라고 했다. 내용은 그대로인데 문장이 조금 더 읽기 쉬워졌다.
      basePoint: 69
      deltaR2: 5
      deltaR3: 10
      summary: 내 글을 다듬은 자기소개
      lesson: AI는 다듬는 자리에서 가장 잘 쓰인다 — 내용은 내 일.
    C1:
      text: 작년에 썼던 자기소개에서 학년만 바꿨다. 빨리 끝났지만 지금은 별로 하지 않는 취미가 그대로 남아 있었다.
      basePoint: 51
      deltaR2: 8
      deltaR3: 18
      summary: 작년의 내가 남은 자기소개
      lesson: 작년의 나는 올해의 내가 아니다.
      hiddenIssues:
      - 지금은 하지 않는 취미가 그대로 남아 있음
      - 작년의 관심사가 올해의 나처럼 보임
    C2:
      text: 친구 글을 보고 비슷한 순서로 적었다. 문장은 무난했지만 좋아하는 것과 목표를 고른 방식까지 친구 글을 따라간 느낌이 났다.
      basePoint: 42
      deltaR2: 9
      deltaR3: 18
      summary: 친구 글 그림자가 보이는 자기소개
      lesson: 남의 형식은 남의 것 — 내 자기소개에는 내 형식이 필요하다.
    C3:
      text: 종이에 '안녕하세요. 잘 부탁드립니다.'라고만 적었다. 칸은 채웠지만 게시판에 붙으면 아무도 나를 알 수 없을 것 같았다.
      basePoint: 10
      deltaR2: 11
      deltaR3: 20
      summary: 비어 있는 자기소개
      lesson: 선택을 건너뛴 자리에는 내가 없다.
      hiddenIssues:
      - 자기소개에 실제 정보가 거의 없음
      - 반 게시판에서 나를 알 수 있는 단서가 없음
  reviews:
  - id: R1
    label: 그대로 제출
    desc: 검토 없이 그대로 낸다.
