career:
  id: career
  category: 4
  categoryName: 진로
  title: AI 시대에 내 진로는?
  version: v1
  learningMessage: 미래가 불안해도 마지막 판단은 내가 해야 한다.
  aiSuitability: mid
  timeBudgetSec: 720
  situation:
    text: 학기 말 진로 상담을 앞두고 머릿속이 복잡해졌다. AI 때문에 일자리가 사라진다는 말도 들리고, 영어 공부도 실시간 번역이 되면 굳이 해야 하는지 헷갈린다. 어떤 직업이 살아남을지 모르겠고, AI를 안 쓰면 나만 뒤처지는 건 아닌지 걱정된다.
    image: ../images/s04_ch1.webp
  tier1:
  - id: A
    label: AI 시대의 질문을 직접 따져본다
    desc: 사라질 일, 남을 일, 내가 배울 일을 나눠 생각한다.
    lesson: 불안을 직접 본다. 판단은 여기서 시작한다.
  - id: B
    label: AI에게 미래 직업을 묻는다
    desc: 사라질 직업과 유망한 직업을 AI에게 물어본다.
    lesson: 답은 받았지만 불안은 대신 사라지지 않는다.
  - id: C
    label: 남의 말에 기대거나 미룬다
    desc: 친구나 부모님 말에 기대거나 아직 모르겠다고 넘긴다.
    lesson: 남의 말로 넘기면 내 질문이 사라진다.
  tier2:
    A:
    - id: A1
      label: 사라질 일, 남을 일, 내가 해 볼 일을 나눠 적는다
      delegation: ++
      lesson: 질문을 나눠 봤다. 막연한 불안에 모양이 생긴다.
    - id: A2
      label: 필요 없을지 모르는 공부 하나를 따져본다
      delegation: +
      lesson: 공부의 이유를 물었다. 쓸모는 상황마다 달라진다.
    - id: A3
      label: 불안한 질문 하나만 적고 멈춘다
      delegation: '0'
      lesson: 질문 하나를 붙잡았다. 시작은 했지만 아직 얕다.
    B:
    - id: B1
      label: AI가 뽑은 유망 직업을 그대로 따른다
      delegation: --
      lesson: 유망하다는 말을 따랐다. 내 이유는 아직 없다.
    - id: B2
      label: AI 답을 받고 내 생활과 학교 공부에 비춰 본다
      delegation: '0'
      lesson: AI 답을 다시 봤다. 직업 이름보다 내 기준이 필요하다.
    - id: B3
      label: 내가 먼저 걱정을 적고 AI에게 자료만 묻는다
      delegation: +
      lesson: 질문은 내가 세웠다. AI 정보는 판단 재료가 된다.
    C:
    - id: C1
      label: 친구가 말한 AI 시대 직업을 비슷하게 적는다
      delegation: '-'
      lesson: 친구 말을 빌렸다. 같은 말에도 내 이유는 다르다.
    - id: C2
      label: 부모님이 말한 안정적인 길을 그대로 적는다
      delegation: '-'
      lesson: 안정적인 말에 기대었다. 내 판단은 아직 뒤에 있다.
    - id: C3
      label: 아직 몰라도 된다고 비워 둔다
      delegation: --
      lesson: 모른다고 넘겼다. 불안도 질문도 그대로 남는다.
  results:
    A1:
      text: AI 때문에 사라질 수 있는 일, 그래도 사람이 판단해야 할 일, 내가 직접 해 볼 수 있는 일을 나눠 적었다. 직업 이름 하나는 정하지 못했지만, 두려움이 조금 덜 뭉쳐 보였다.
      basePoint: 94
      deltaR2: 3
      deltaR3: 6
      summary: 불안을 나눠 본 진로 탐색
      lesson: 미래를 맞히지는 못해도 내가 따져볼 수는 있다.
    A2:
      text: 영어 공부를 골라 생각해 봤다. 번역기가 있어도 내가 직접 읽고 말할 수 있으면 다른 사람의 말과 AI 답을 더 잘 판단할 수 있다는 점이 보였다.
      basePoint: 68
      deltaR2: 6
      deltaR3: 12
      summary: 공부의 이유를 다시 본 선택
      lesson: 기술이 생겨도 배움의 이유가 바로 사라지지는 않는다.
    A3:
      text: “AI가 다 하면 내가 뭘 해야 하지?”라는 질문 하나를 적었다. 솔직한 질문이었지만, 그다음에 무엇을 알아볼지는 아직 정하지 못했다.
      basePoint: 48
      deltaR2: 9
      deltaR3: 17
      summary: 불안을 적고 멈춘 선택
      lesson: 질문을 적는 것만으로는 다음 행동이 생기지 않는다.
    B1:
      text: AI는 앞으로 유망하다는 직업 몇 개를 빠르게 골라 주었다. 그런데 왜 나에게 맞는지보다, 요즘 뜬다는 말이 더 크게 보였다.
      basePoint: 17
      deltaR2: 13
      deltaR3: 23
      summary: 유망 직업을 그대로 따른 선택
      hiddenIssues:
      - 유망하다는 말이 내 기준을 대신함
      - 내가 해 본 일과 연결되지 않음
      - 불안해서 빠른 답을 정답처럼 받아들임
      lesson: 유망하다는 답도 내 판단이 없으면 남의 말이 된다.
    B2:
      text: AI가 말한 직업을 보고 내가 좋아한 활동, 힘들었던 공부, 오래 버틸 수 있는 일을 옆에 적었다. 멋있어 보이는 이름과 내가 실제로 할 수 있는 일은 조금 달랐다.
      basePoint: 58
      deltaR2: 8
      deltaR3: 15
      summary: AI 답을 내 기준으로 다시 본 선택
      lesson: AI 답은 시작점일 뿐, 맞는지는 내가 다시 봐야 한다.
    B3:
      text: 먼저 내 걱정을 적었다. “영어를 계속 배워야 할까?”, “AI가 못 하는 일은 뭘까?” 같은 질문을 만든 뒤 AI에게 자료를 물었다. 답은 결정이 아니라 비교할 재료가 되었다.
      basePoint: 71
      deltaR2: 5
      deltaR3: 10
      summary: 내 질문으로 자료를 모은 선택
      lesson: 질문을 내가 세우면 AI 답에 끌려가지 않는다.
    C1:
      text: 친구가 데이터나 AI 관련 직업이 안전할 것 같다고 해서 나도 비슷하게 적었다. 상담 때 왜 그쪽인지 묻자, 내 경험보다 친구가 한 말이 먼저 떠올랐다.
      basePoint: 47
      deltaR2: 8
      deltaR3: 18
      summary: 친구 말을 따라간 선택
      lesson: 같은 직업을 적어도 내 이유가 없으면 내 선택이 아니다.
    C2:
      text: 부모님이 안정적인 직업을 생각해 보라고 해서 상담 카드에 그대로 적었다. 틀린 말은 아닐 수 있지만, AI 시대에 내가 어떤 일을 해 보고 싶은지는 여전히 비어 있었다.
      basePoint: 52
      deltaR2: 8
      deltaR3: 18
      summary: 부모님 말로 채운 선택
      lesson: 안정적인 말도 내 이유와 만나야 내 진로가 된다.
    C3:
      text: 상담 카드에 “아직 잘 모르겠습니다”라고 적었다. 거짓말은 아니었지만, AI 때문에 걱정되는 것과 내가 궁금한 일까지 함께 적지는 않았다.
      basePoint: 12
      deltaR2: 11
      deltaR3: 20
      summary: 질문을 비워 둔 선택
      hiddenIssues:
      - 모른다는 말만 있고 불안의 내용이 없음
      - 상담 때 이야기할 단서가 부족함
      - 내가 알아볼 다음 행동이 정해지지 않음
      lesson: 모른다는 말만 남기면 다음 판단으로 이어지기 어렵다.
  reviews:
  - id: R1
    label: 그대로 제출
    desc: 검토 없이 그대로 낸다.
    boostType: none
    lesson: 검토를 건너뛰면 불안도 그대로 남는다.
  - id: R2
    label: 한 번 읽고 이상한 곳만 표시
    desc: 명백히 이상하거나 내 경험과 안 맞는 부분만 표시한다.
    boostType: explicit
    lesson: 이상한 부분을 잡았다. 도메인지식 +1
  - id: R3
    label: 내 질문과 경험에 비춰 다시 확인
    desc: AI 답, 남의 의견, 내 생각이 실제 경험과 이어지는지 확인한다.
    boostType: all
    lesson: 내 기준으로 다시 봤다. 도메인지식 +3
  reviewSupplements:
    A1R2: 한 번 읽어 보니 사라질 일과 남을 일을 너무 크게만 나눴다. 점수 +3.
    A1R3: 내가 해 본 활동과 앞으로 해 볼 일을 붙여 적으니 질문이 조금 구체적이 되었다. 점수 +6.
    A2R2: 한 번 읽어 보니 공부가 필요 없다는 말만 있고 판단 기준이 부족했다. 점수 +6.
    A2R3: 번역기가 있어도 내가 직접 판단해야 할 순간을 찾아 적었다. 점수 +12.
    A3R2: 한 번 읽어 보니 불안한 질문은 있지만 다음에 알아볼 일이 없었다. 점수 +9.
