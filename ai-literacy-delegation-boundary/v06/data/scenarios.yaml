groupwork:
  id: groupwork
  category: 2
  categoryName: 모둠 활동
  title: 모둠 발표 자료
  version: v1
  learningMessage: 혼자 빨리 끝낸 발표 자료는 모둠 안에서 아직 맞춰진 자료가 아니다.
  aiSuitability: mid
  timeBudgetSec: 720
  situation:
    text: 학기 초 모둠 발표가 다음 주로 잡혔다. 우리 모둠은 4명이 각자 파트를 맡았고, 내가 맡은 일은 자료 조사와 슬라이드 3장 만들기였다. 다른 애들이 어떤 흐름으로 준비하는지 아직 잘 모르는데, 숙제도 있고 학원도 있어서 시간이 많지는 않았다.
    image: ../images/s02_ch1.webp
  tier1:
  - id: A
    label: 직접 조사해서 만든다
    desc: 내가 자료를 찾고 모둠 발표에 맞게 슬라이드를 만든다.
    lesson: 내 손으로 직접 했다 — 모둠 발표는 내가 이해해야 내 파트가 된다.
  - id: B
    label: AI에게 맡긴다
    desc: AI에게 슬라이드 초안이나 정리를 부탁한다.
    lesson: AI에 위임했다 — 모둠 자료에 AI를 어디까지 쓸지 따져봐야 한다.
  - id: C
    label: 다른 데 기대서 넘긴다
    desc: 다른 모둠원이나 예전 자료에 기대서 빨리 넘긴다.
    lesson: 다른 데 기댔다 — 빠른 길이지만 내 파트가 점점 사라진다.
  tier2:
    A:
    - id: A1
      label: 자료를 찾고 모둠원과 공유한 뒤 슬라이드를 만든다
      delegation: ++
      lesson: 조사하고 모둠과 맞췄다 — 내 파트가 모둠 흐름 안에 자리 잡는다.
    - id: A2
      label: 직접 만들지만 모둠과 공유하지 않는다
      delegation: +
      lesson: 혼자 끝냈다 — 내 파트는 됐지만 모둠 발표는 아직 아니다.
    - id: A3
      label: 자료를 살짝 보고 슬라이드를 만든다
      delegation: '0'
      lesson: 얕게 보고 만들었다 — 슬라이드는 있지만 설명할 깊이가 없다.
    B:
    - id: B1
      label: AI에게 내 파트 슬라이드를 한 줄로 부탁한다
      delegation: --
      lesson: AI에 다 맡겼다 — 출처 없는 자료가 내 발표가 된다.
    - id: B2
      label: AI에게 자료를 주고 슬라이드를 받아 다듬는다
      delegation: '0'
      lesson: 재료는 줬지만 정리까지 맡겼다 — 모둠 흐름이 빠진 자료가 나온다.
    - id: B3
      label: 내가 조사한 뒤 AI에게 정리 도움을 받고 검수한다
      delegation: +
      lesson: AI에 정리만 맡겼다 — 자료와 출처는 내 것.
    C:
    - id: C1
      label: 다른 애들이 잘하니까 적당히만 한다
      delegation: '-'
      lesson: 내 파트를 가볍게 봤다 — 모둠 발표에 빈틈이 생긴다.
    - id: C2
      label: 작년 발표 자료를 베낀다
      delegation: '-'
      lesson: 남의 틀을 가져왔다 — 우리 주제가 그 안에 들어가지 않는다.
    - id: C3
      label: 모둠원에게 네가 좀 해 달라고 한다
      delegation: --
      lesson: 내 파트를 떠넘겼다 — 발표 당일 내가 설명할 수 없게 된다.
  results:
    A1:
      text: 자료 출처를 적어 두고, 모둠 채팅방에 내가 찾은 흐름을 먼저 공유했다. 슬라이드 3장은 조금 늦게 완성됐지만 다른 친구 파트와 이어지는 말이 생겼다.
      basePoint: 93
      deltaR2: 3
      deltaR3: 6
      summary: 모둠 흐름에 맞춘 발표 자료
      lesson: 모둠 발표는 자료를 만드는 일이 아니라 흐름을 맞추는 일이다.
    A2:
      text: 내 파트 슬라이드는 깔끔하게 만들었다. 그런데 모둠원들은 내가 어떤 자료를 썼는지 몰라서 발표 순서를 맞출 때 잠깐 멈췄다.
      basePoint: 67
      deltaR2: 6
      deltaR3: 12
      summary: 혼자 빨리 만든 발표 자료
      lesson: 내 파트가 끝난 것과 모둠 발표가 맞춰진 것은 다르다.
    A3:
      text: 검색해서 맨 위에 나온 글 몇 개를 보고 슬라이드를 만들었다. 제목과 그림은 들어갔지만 왜 이 자료를 골랐는지 설명하기가 애매했다.
      basePoint: 49
      deltaR2: 9
      deltaR3: 17
      summary: 겉모양은 있지만 얕은 자료
      lesson: 자료를 얕게 보면 발표할 때 설명할 말이 없다.
    B1:
      text: AI가 바로 슬라이드 3장짜리 내용을 만들어 줬다. 통계 숫자와 멋진 문장이 들어 있었지만 출처가 없고, 책에 없는 말이 인용문처럼 적혀 있었다.
      basePoint: 16
      deltaR2: 13
      deltaR3: 23
      summary: 출처가 비어 있는 AI 슬라이드
      lesson: AI에 통째로 맡기면 그럴듯한 거짓이 내 발표 자료가 된다.
      hiddenIssues:
      - 출처 없는 통계 숫자가 들어감
      - 실제 책이나 자료에 없는 문장이 인용처럼 들어감
      - 모둠의 발표 흐름과 연결되는 부분이 없음
    B2:
      text: 내가 찾은 자료를 AI에게 넣고 슬라이드 문장을 받았다. 내용은 크게 틀리지 않았지만 모둠 친구들이 쓰는 말투와 발표 흐름과는 조금 달랐다.
      basePoint: 58
      deltaR2: 8
      deltaR3: 15
      summary: 자료는 있지만 모둠 흐름이 약한 슬라이드
      lesson: 재료를 줘도 정리까지 맡기면 모둠과 따로 노는 자료가 된다.
    B3:
      text: 내가 먼저 자료를 찾고 출처를 적은 뒤, AI에게 슬라이드 문장을 짧게 정리해 달라고 했다. 마지막에는 숫자와 인용을 다시 확인하고 모둠 채팅방에 공유했다.
      basePoint: 70
      deltaR2: 5
      deltaR3: 10
      summary: AI 도움을 받은 검수된 슬라이드
      lesson: AI는 정리하는 자리에서 가장 잘 쓰인다 — 출처와 흐름은 내 일.
    C1:
      text: 다른 친구들이 잘할 것 같아서 내 파트는 제목과 사진 중심으로 적당히 채웠다. 발표 연습 때 내 부분에서 설명이 짧아져서 다음 친구가 갑자기 이어 받아야 했다.
      basePoint: 50
      deltaR2: 8
      deltaR3: 18
      summary: 빈틈이 생긴 모둠 파트
      lesson: 내 파트를 가볍게 채우면 그 빈자리는 친구가 떠안는다.
    C2:
      text: 작년에 누가 만든 발표 자료를 찾아서 비슷하게 바꿨다. 슬라이드는 빨리 나왔지만 우리 모둠 주제와 맞지 않는 예시가 그대로 남아 있었다.
      basePoint: 42
      deltaR2: 10
      deltaR3: 20
      summary: 주제와 어긋난 작년 자료
      lesson: 작년 발표는 작년 주제 — 우리 발표에는 우리 자료가 필요하다.
      hiddenIssues:
      - 작년 주제에 맞춘 예시가 그대로 남아 있음
      - 현재 모둠 발표 흐름과 연결되지 않음
      - 출처와 만든 사람의 흔적이 섞여 있음
    C3:
      text: 모둠원에게 내 파트까지 좀 해 달라고 보냈다. 친구가 몇 줄을 도와주긴 했지만 발표 연습 때 내가 내 슬라이드를 잘 설명하지 못했다.
      basePoint: 11
      deltaR2: 11
      deltaR3: 20
      summary: 내가 설명하지 못한 내 파트
      lesson: 내 파트를 떠넘기면 발표 당일 내가 답할 수 없다.
      hiddenIssues:
      - 내가 맡은 파트의 내용을 직접 이해하지 못함
      - 친구에게 부담이 넘어감
      - 발표 당일 질문에 답하기 어려움
  reviews:
  - id: R1
    label: 그대로 제출
    desc: 검토 없이 그대로 낸다.
    boostType: none
    lesson: 검토를 건너뛰었다 — 검증할 기회를 놓쳤다.
  - id: R2
    label: 한 번 읽고 이상한 곳만 표시
    desc: 명시적인 환각·오류만 발견.
    boostType: explicit
    lesson: 한 번 훑어 명백한 오류를 잡았다. 도메인지식 +1
  - id: R3
    label: 출처 확인 + 모둠 흐름 맞추기
    desc: 자료의 근거와 다른 파트와의 연결까지 확인.
    boostType: all
    lesson: 출처와 모둠 흐름을 다시 보니 빠진 것이 보였다. 도메인지식 +3
  reviewSupplements:
    A1R2: 한 번 읽어 보니 슬라이드 한 장의 제목이 친구 파트와 겹쳤다. 점수 +3.
    A1R3: 출처와 발표 순서를 다시 확인하고 친구 파트로 넘어가는 말을 넣었다. 점수 +6.
    A2R2: 한 번 읽어 보니 내가 쓴 자료를 모둠원이 모른다는 걸 깨달았다. 점수 +6.
    A2R3: 채팅방에 자료 출처와 발표 흐름을 공유하고 순서를 맞췄다. 점수 +12.
    A3R2: 한 번 읽어 보니 설명 없이 사진만 들어간 장이 있었다. 점수 +9.
    A3R3: 자료 출처를 다시 찾고 왜 이 예시를 골랐는지 한 문장을 넣었다. 점수 +17.
    B1R2: 한 번 읽어 보니 출처 없는 통계 숫자가 있었다. 점수 +13.
    B1R3: 통계와 인용을 다시 찾아 보고, 모둠 주제와 안 맞는 문장을 지웠다. 점수 +23.
    B2R2: 한 번 읽어 보니 AI 문장이 발표 말투와 너무 달랐다. 점수 +8.
    B2R3: 자료 출처를 다시 붙이고 친구 파트와 이어지는 순서로 바꿨다. 점수 +15.
    B3R2: 한 번 읽어 보니 AI가 줄인 문장 하나에서 중요한 조건이 빠져 있었다. 점수 +5.
    B3R3: 출처, 숫자, 발표 순서를 다시 확인하고 모둠원에게 공유했다. 점수 +10.
    C1R2: 한 번 읽어 보니 내가 설명할 문장이 거의 없었다. 점수 +8.
    C1R3: 빈 슬라이드에 자료와 설명을 더하고 다음 파트와 연결되는 말을 적었다. 점수 +18.
    C2R2: 한 번 읽어 보니 작년 주제에 맞는 예시가 그대로 있었다. 점수 +10.
    C2R3: 작년 자료에서 안 맞는 부분을 빼고 우리 모둠 주제에 맞게 다시 바꿨다. 점수 +20.
    C3R2: 한 번 읽어 보니 내가 설명할 수 없는 문장이 많았다. 점수 +11.
    C3R3: 친구가 써 준 부분을 다시 읽고 내가 말할 수 있는 문장으로 고쳤다. 점수 +20.
