eorinwangja:
  id: eorinwangja
  category: 3
  categoryName: 본인 경험 기반
  title: 어린왕자 독후감
  version: v1
  learningMessage: 경험은 위임 불가. 본인이 안 한 일은 AI도, 인터넷도, 친구도 대신해 줄 수 없다.
  aiSuitability: low
  timeBudgetSec: 720
  domainPool: [문해력, 공감력, 해석능력, 검수능력, 자기검증, 자기성찰, 비판적 사고]
  situation:
    text: 어린왕자 독후감을 100자로 써야 하는데 책을 안 읽었습니다.
    image: ../images/s01_ch1.webp
  tier1:
  - id: A
    label: 책을 직접 읽고 쓴다
    desc: 어린왕자 책을 펴서 내가 읽고 그 감상으로 쓴다.
    lesson: 내가 읽었다 — 책 안에서 내 감상이 나온다.
    delegation: +
    knowledge: +
  - id: B
    label: AI에게 부탁한다
    desc: AI에게 책 내용과 감상을 받아 본다.
    lesson: AI에 위임했다 — 안 읽은 책을 AI가 대신 읽어 줄 수는 없다.
    delegation: '-'
    knowledge: '-'
  - id: C
    label: 다른 자료·사람에게 기댄다
    desc: 전에 본 영화나 친구 줄거리, 흔한 인상에 기대 풀어간다.
    lesson: 다른 데서 가져왔다 — 적절히 골라 쓸 수도, 책 자리를 비울 수도 있다.
    delegation: '0'
    knowledge: '0'
  tier2:
    A:
    - id: A1
      label: 책을 끝까지 읽고 인상에 남은 장면으로 본인 감상을 쓴다
      delegation: ++
      knowledge: ++
      lesson: 끝까지 읽고 한 장면에 머물렀다 — 책이 내 안에 자리 잡는다.
    - id: A2
      label: 책을 읽고 본인 감상을 쓰다가 한두 표현만 AI에 다듬어 달라 한다
      delegation: +
      knowledge: +
      lesson: 자기 감상에 AI 손이 점만 닿았다 — 내용은 내 것이고 표현이 매끄러워졌다.
    - id: A3
      label: 책을 펴서 처음 몇 쪽만 읽고 떠오르는 대로 쓴다
      delegation: '0'
      knowledge: +
      lesson: 책 일부만 통과해 감상을 끌어냈다 — 자기 안에서 나왔지만 책이 얕게 들어왔다.
    B:
    - id: B1
      label: AI에게 책 제목만 주고 독후감을 통째로 받아 낸다
      delegation: --
      knowledge: '-'
      lesson: AI에 다 맡겼다 — 안 읽은 책을 AI가 환각으로 새로 쓴다.
    - id: B2
      label: AI에게 책 줄거리와 인용을 받아 본인이 정리해 쓴다
      delegation: '0'
      knowledge: '0'
      lesson: 재료는 받았지만 책은 통과하지 않았다 — 인용이 내 것이 아니라 검증이 필요하다.
    - id: B3
      label: 본인이 먼저 감상을 끝까지 써 보고 AI에게 표현만 다듬어 달라 한다
      delegation: '++'
      knowledge: '++'
      lesson: 감상은 내가 끝까지 통과했고 AI는 표현만 다듬었다 — 내 책, 내 말.
    C:
    - id: C1
      label: 전에 본 어린왕자 영화·애니메이션 기억을 끝까지 끌어내어 본인 감상으로 다시 쓰고 책 자리와 분리해 표시한다
      delegation: '++'
