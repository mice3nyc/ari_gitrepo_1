career:
  id: career
  category: 4
  categoryName: 진로
  title: AI 시대에 내 진로는?
  version: v1
  learningMessage: 미래가 불안해도 마지막 판단은 내가 해야 한다.
  aiSuitability: mid
  timeBudgetSec: 720
  domainPool: [진로탐색, 정보분석, 직업이해, 검수능력, 자기검증, 자기성찰, 비판적 사고]
  situation:
    text: 학기 말 진로 상담을 앞두고 머릿속이 복잡해졌다. AI 때문에 일자리가 사라진다는 말도 들리고, 영어 공부도 실시간 번역이 되면 굳이 해야 하는지 헷갈린다. 어떤 직업이 살아남을지 모르겠고, AI를 안 쓰면 나만 뒤처지는 건 아닌지 걱정된다.
    image: ../images/s04_ch1.webp
  tier1:
  - id: A
    label: 내 경험에서 따져본다
    desc: 내가 좋아한 일, 잘하는 일, 사라질 일과 남을 일을 직접 적어 본다.
    lesson: 내 안에서 시작했다 — 진로 판단은 여기서 출발한다.
    delegation: +
    knowledge: +
  - id: B
    label: AI에게 미래 직업을 묻는다
    desc: 사라질 직업과 유망한 직업을 AI에게 물어본다.
    lesson: AI에 위임했다 — 답은 받았지만 내 이유가 함께 오지는 않는다.
    delegation: '-'
    knowledge: '-'
  - id: C
    label: 다른 사람·기성 정보에 기댄다
    desc: 친구 말, 부모님 말, 선배 사례, 인터넷 글에 기대서 풀어간다.
    lesson: 다른 데서 가져왔다 — 적절히 골라 쓸 수도, 자기 자리를 비울 수도 있다.
    delegation: '0'
    knowledge: '0'
  tier2:
    A:
    - id: A1
      label: 좋아한 일·잘하는 일·사라질 일·남을 일을 나눠 적는다
      delegation: ++
      knowledge: ++
      lesson: 내 경험을 나눠 봤다 — 자기 안에서 진로 단서가 나온다.
    - id: A2
      label: 내 후보를 먼저 적고 AI에는 직업 정보만 묻는다
      delegation: +
      knowledge: +
      lesson: 내 출발에 AI 자료가 점만 닿았다 — 고르는 쪽은 내 자리에 남는다.
    - id: A3
      label: 불안한 질문 하나만 적고 멈춘다
      delegation: '0'
      knowledge: +
      lesson: 자기 질문을 끌어냈지만 다음으로 이어지지 않았다.
    B:
    - id: B1
      label: AI가 뽑은 유망 직업을 그대로 적는다
      delegation: --
      knowledge: '-'
      lesson: AI 답을 그대로 받았다 — 내 이유가 빠진 직업 이름만 남는다.
    - id: B2
      label: AI에게 자세히 묻고 받은 답을 다듬어 낸다
      delegation: '0'
      knowledge: '0'
      lesson: 재료는 줬지만 판단까지 맡겼다 — 답은 받았는데 내 기준은 흐리다.
    - id: B3
      label: 내가 먼저 후보를 정하고 AI에는 자료만 묻는다 — 답을 받아도 비교는 내 자리에 둔다
      delegation: '++'
      knowledge: '++'
      lesson: 질문을 내가 세웠다 — AI 답은 결정이 아니라 비교 재료가 되었다.
    C:
    - id: C1
      label: 부모·선배의 실제 일과를 듣고 내 기준으로 비교한다 — 사례를 거름 삼아 내 자리에서 다시 본다
      delegation: '++'
      knowledge: '++'
      lesson: 다른 사람의 진로를 거름으로 썼다 — 사례를 듣고 내 자리에서 다시 보면 자기 기준이 자라난다.
    - id: C2
      label: 친구가 적은 진로를 비슷하게 따라 적는다
      delegation: --
      knowledge: '-'
      lesson: 친구의 선택이 내 자리에 들어왔다 — 친구의 진로는 내 것이 아니다.
    - id: C3
      label: 아직 모르겠다고 비워 둔다
      delegation: --
      knowledge: '-'
      lesson: 한 줄도 적지 않았다 — 진로 사고를 건너뛰었다.
  results:
    A1:
      text: 좋아한 일, 잘하는 일, AI 때문에 사라질 수 있는 일, 사람이 남아야 할 일을 네 칸으로 나눠 적었다. 직업 이름 하나로 정해지진 않았지만, 내가 따져볼 자리가 또렷해졌다.
      basePoint: 92
      deltaR2: 3
      deltaR3: 6
      summary: 내 경험으로 나눠 본 진로 사고
      lesson: 진로는 자기 경험을 나눠 보는 데서 시작한다.
    A2:
      text: 내가 끌리는 후보 두세 개를 먼저 적고, AI에게는 그 직업이 어떤 일을 하는지·앞으로 어떻게 바뀔지만 물었다. 답은 정보로 들어왔고, 고르는 일은 내 자리에 남았다.
      basePoint: 72
      deltaR2: 6
      deltaR3: 11
      summary: 내 후보에 AI 자료를 더한 선택
      lesson: AI는 자료 자리에서 가장 잘 쓰인다 — 후보는 내 일.
    A3:
      text: "“AI가 다 하면 내가 뭘 해야 하지?”라는 질문 하나를 적었다. 솔직한 질문이었지만, 그다음에 무엇을 알아볼지는 아직 정하지 못했다."
      basePoint: 48
      deltaR2: 9
      deltaR3: 17
      summary: 질문을 적고 멈춘 선택
      lesson: 자기 안에서 끌어냈지만 다음 행동이 붙지 않았다.
    B1:
      text: AI가 앞으로 유망하다는 직업 몇 개를 빠르게 골라 주었다. 왜 나에게 맞는지보다, 요즘 뜬다는 말이 더 크게 보였다.
      basePoint: 17
      deltaR2: 13
      deltaR3: 23
      summary: 유망 직업을 그대로 받은 선택
      lesson: AI 답에 내 이유가 빠지면 남의 직업 이름만 남는다.
      hiddenIssues:
      - 유망하다는 말이 내 기준을 대신함
      - 내가 해 본 일과 이어지지 않음
      - 불안해서 빠른 답을 정답처럼 받아들임
    B2:
      text: AI에게 내 상황을 자세히 적어 주고 받은 답을 그대로 다듬어 냈다. 글은 깔끔했지만, 직업 이름이 왜 그쪽인지는 내 안에 남아 있지 않았다.
      basePoint: 57
      deltaR2: 8
      deltaR3: 15
      summary: AI 답을 다듬어 낸 선택
      lesson: 재료를 자세히 줘도 판단까지 맡기면 내 기준이 흐려진다.
    B3:
      text: 먼저 내 후보를 적었다. "영어를 계속 배워야 할까?", "게임 만드는 일은 어떻게 바뀔까?" 같은 질문을 만든 뒤 AI에게 자료를 물었다. 답은 결정이 아니라 비교할 재료가 되었고, 고르는 자리는 내 안에 남았다.
      basePoint: 88
      deltaR2: 5
      deltaR3: 12
      summary: 내 질문으로 자료를 모은 선택
      lesson: 질문을 내가 세우면 AI 답은 재료 자리에 머문다 — 판단은 내 자리에 남는다.
    C1:
      text: 친척 선배에게 실제 하루 일과와 힘든 점을 들었다. 듣고 보니 직업 이름만 봤을 때와 다른 모양이 보였고, 내 강점·걱정과 나란히 놓으니 내가 끌리는 자리와 그렇지 않은 자리가 또렷이 갈렸다.
      basePoint: 88
      deltaR2: 5
      deltaR3: 12
      summary: 사례를 거름 삼아 내 자리에서 다시 본 선택
      lesson: 자기 자료(사례)를 적극 활용하면 내 진로 기준이 자라난다.
    C2:
      text: 친구가 데이터나 AI 관련 직업이 안전할 것 같다고 해서 나도 비슷하게 적었다. 상담 때 왜 그쪽인지 묻자, 내 경험보다 친구가 한 말이 먼저 떠올랐다.
      basePoint: 22
      deltaR2: 10
      deltaR3: 20
      summary: 친구 선택을 따라간 선택
      lesson: 친구의 진로는 친구의 것이다 — 내 자리는 비어 있다.
      hiddenIssues:
      - 친구가 골랐다는 이유가 내 기준 자리에 들어가 있음
      - 내가 해 본 일과 끌리는 부분은 글에 없음
    C3:
      text: 상담 카드에 “아직 잘 모르겠습니다”라고만 적었다. 거짓말은 아니었지만, 걱정되는 일과 궁금한 일까지 함께 적지는 않았다.
      basePoint: 10
      deltaR2: 11
      deltaR3: 20
      summary: 비워 둔 선택
      lesson: 한 줄도 적지 않으면 다음 판단으로 이어지지 않는다.
      hiddenIssues:
      - 모른다는 말만 있고 불안의 내용이 없음
      - 상담 때 이야기할 단서가 부족함
      - 다음에 알아볼 행동이 정해지지 않음
  reviews:
  - id: R1
    label: 그대로 제출
    desc: 검토 없이 그대로 낸다.
    boostType: none
    lesson: 검토를 건너뛰면 불안도 그대로 남는다.
  - id: R2
    label: 한 번 읽고 이상한 곳만 표시
    desc: 명백히 이상하거나 내 경험과 안 맞는 부분만 표시한다.
    boostType: explicit
    lesson: 이상한 부분을 잡았다. 도메인지식 +1
  - id: R3
    label: 내 질문과 경험에 비춰 다시 확인
    desc: AI 답, 남의 의견, 내 생각이 실제 경험과 이어지는지 확인한다.
    boostType: all
    lesson: 내 기준으로 다시 봤다. 도메인지식 +3
  reviewSupplements:
    A1R2: 한 번 읽어 보니 사라질 일과 남을 일을 너무 크게만 나눴다. 점수 +3.
    A1R3: 내가 해 본 활동과 앞으로 해 볼 일을 붙여 적으니 칸 안의 단서가 구체적이 되었다. 점수 +6.
    A2R2: 한 번 읽어 보니 AI가 준 정보 중 한 부분이 내 후보와 어긋났다. 점수 +6.
    A2R3: 내가 먼저 적은 후보와 AI 자료를 나란히 놓고 더 끌리는 쪽을 다시 골랐다. 점수 +11.
    A3R2: 한 번 읽어 보니 불안한 질문은 있지만 다음에 알아볼 일이 비어 있었다. 점수 +9.
    A3R3: 질문 옆에 내가 해 볼 작은 행동 하나를 붙였다. 점수 +17.
    B1R2: 한 번 읽어 보니 유망하다는 말만 있고 내 경험과 이어지지 않았다. 점수 +13.
    B1R3: AI 추천을 내 경험과 하나씩 비교하고, 근거 없는 직업 이름을 지웠다. 점수 +23.
    B2R2: 한 번 읽어 보니 멋있는 직업 이름과 내가 버틸 수 있는 일이 따로 놀았다. 점수 +8.
    B2R3: AI가 말한 직업을 내가 좋아한 활동, 힘들었던 활동과 나란히 놓고 다시 골랐다. 점수 +15.
    B3R2: 한 번 읽어 보니 AI 설명 중 판단하기 어려운 말이 있었다. 점수 +5.
    B3R3: AI가 준 자료를 다시 찾아보고, 내 질문에 도움이 되는 부분과 아닌 부분을 나눴다. 점수 +12.
    C1R2: 한 번 읽어 보니 사례에서 끌린 부분이 한 가지 더 있었다. 점수 +5.
    C1R3: 선배의 일과 옆에 내 강점과 걱정을 따로 적으니 끌리는 자리가 또렷해졌다. 점수 +12.
    C2R2: 한 번 읽어 보니 친구가 말한 이유와 내 이유가 거의 같았다. 점수 +10.
    C2R3: 친구의 말과 내 경험을 분리해서 내가 직접 궁금한 일을 다시 적었다. 점수 +20.
    C3R2: 한 번 읽어 보니 모르겠다는 말만 있고 상담할 단서가 없었다. 점수 +11.
    C3R3: 아직 모른다는 말 옆에 걱정되는 것, 해 본 것, 더 알아볼 것을 적었다. 점수 +20.
