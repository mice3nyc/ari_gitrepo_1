    A1R3: 출처와 발표 순서를 다시 확인하고 친구 파트로 넘어가는 말을 넣었다. 점수 +6.
    A2R2: 한 번 읽어 보니 AI가 다듬은 한 표현이 내 발표 말투와 달랐다. 점수 +5.
