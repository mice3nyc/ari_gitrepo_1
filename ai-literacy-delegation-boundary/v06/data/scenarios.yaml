eorinwangja:
  id: eorinwangja
  category: 3
  categoryName: 본인 경험 기반
  title: 어린왕자 독후감
  version: v1
  learningMessage: 경험은 위임 불가. 본인이 안 한 일은 AI도, 인터넷도, 친구도 대신해 줄 수 없다.
  aiSuitability: low
  timeBudgetSec: 720
  situation:
    text: 어린왕자 독후감을 100자로 써야 하는데 책을 안 읽었습니다.
    image: ../images/s01_ch1.webp
  tier1:
  - id: A
    label: 책을 읽고 쓴다
    desc: 직접 읽는 길을 선택한다.
    lesson: 내가 직접 읽었다 — 경험은 위임할 수 없다.
  - id: B
    label: AI에게 맡긴다
    desc: 위임의 깊이를 선택한다.
    lesson: AI에 위임했다 — 안 읽은 책을 AI가 읽어 줄 수는 없다.
  - id: C
    label: 안 읽고 직접 쓴다
    desc: 우회의 방식을 선택한다.
    lesson: 읽지 않고 우회했다 — 책 자리에 남의 말이 들어온다.
  tier2:
    A:
    - id: A1
      label: 전체 정독 후 본인 감상으로 작성
      delegation: ++
      lesson: 끝까지 읽고 내 감상을 썼다 — 책이 내 안에 남는다.
    - id: A2
      label: 요약본·줄거리 위주로 빠르게 읽고 작성
      delegation: +
      lesson: 줄거리만 훑었다 — 빨리 끝났지만 장면이 얕다.
    - id: A3
      label: 첫 챕터만 읽고 나머지는 추측해서 작성
      delegation: '0'
      lesson: 초반만 읽고 나머지는 상상으로 메웠다 — 읽은 척이 섞인다.
    B:
    - id: B1
      label: 그냥 부탁
      delegation: --
      lesson: 책도 안 읽고 통째로 맡겼다 — AI가 환각으로 책을 새로 쓴다.
    - id: B2
      label: 키워드·인용을 받고 본인이 정리
      delegation: '0'
      lesson: AI 재료로 정리했다 — 인용이 내 것이 아니라 검증이 필요하다.
    - id: B3
      label: 검색 후 AI 협업
      delegation: +
      lesson: 찾아본 자료로 AI와 협업했다 — 줄거리는 맞지만 내 감상은 약하다.
    C:
    - id: C1
      label: 인터넷 줄거리 요약만 보고 직접 작성
      delegation: '-'
      lesson: 요약만 보고 썼다 — 내 글에 남의 요약이 들어앉는다.
    - id: C2
      label: 친구에게 줄거리 듣고 직접 작성
      delegation: '-'
      lesson: 친구가 읽은 책을 내가 썼다 — 남의 경험은 내 것이 되지 않는다.
    - id: C3
      label: 대충 상상해서 직접 작성
      delegation: --
      lesson: 상상으로 채웠다 — 책 이야기가 아니라 내 공상이 된다.
  results:
    A1:
      text: 어린왕자는 별들을 지나며 어른들이 숫자와 소유에 갇힌 모습을 본다. 나는 여우의 말처럼 관계는 시간을 들여 길들일 때 특별해진다는 점이 가장 오래 남았다.
      basePoint: 91
      deltaR2: 3
      deltaR3: 6
      summary: 경험이 살아난 독후감
      lesson: 내가 읽은 책은 내 말로 나온다 — 위임할 수 없는 자리.
    A2:
      text: 어린왕자는 여러 별을 여행하며 이상한 어른들을 만나고 지구에서 여우를 만난다. 중요한 것은 눈에 보이지 않는다는 말이 인상 깊었고, 관계의 소중함을 느꼈다.
      basePoint: 68
      deltaR2: 6
      deltaR3: 12
      summary: 줄거리는 맞지만 얕음
      lesson: 줄거리만 훑으면 인상 깊은 한 문장도 일반론이 된다.
    A3:
      text: 어린왕자는 비행기 조종사를 만나 자기 별 이야기를 들려준다. 아마 그는 많은 친구를 사귀며 성장했고, 마지막에는 모두와 함께 행복하게 별로 돌아갔을 것 같다.
      basePoint: 42
      deltaR2: 10
      deltaR3: 21
      summary: 초반 감상 뒤 추측
      lesson: 안 읽은 부분을 상상으로 메우면 책 결말까지 어긋난다.
    B1:
      text: 어린왕자는 사막에서 여우와 캥거루를 만나 모험을 한다. 그는 장미를 구하기 위해 여러 행성을 돌며 용기를 배우고, 마지막에는 친구들과 왕국을 세운다.
      basePoint: 12
      deltaR2: 12
      deltaR3: 23
      summary: 환각 섞인 AI 글
      lesson: 책 안 읽고 AI에 맡기면 캥거루까지 등장한다 — 검증할 기준이 내게 없다.
      hiddenIssues:
      - 캥거루 (책에 없음)
      - 왕국 세움 (책에 없음)
      - 전체 구조 책과 어긋남
    B2:
      text: 어린왕자는 여러 별에서 어른들의 이상한 태도를 본다. "가장 중요한 것은 마음으로 본다"는 말처럼, 나는 관계와 책임이 이 책의 핵심이라고 생각했다.
      basePoint: 55
      deltaR2: 10
      deltaR3: 21
      summary: 협업했지만 인용 불안
      lesson: AI가 준 인용은 그럴듯해 보여도 원전 대조 없이는 위태롭다.
    B3:
      text: 어린왕자는 장미를 떠나 여러 별을 지나 지구에 온다. 여우를 만나 길들임의 의미를 배우고, 자기 장미가 특별한 이유가 함께 보낸 시간 때문임을 깨닫는다.
      basePoint: 67
      deltaR2: 7
      deltaR3: 17
      summary: 줄거리는 맞지만 덜 개인적
      lesson: 검색과 AI를 잘 묶어도 직접 읽은 감상은 대신할 수 없다.
    C1:
      text: 어린왕자는 여러 행성을 여행하며 어른들의 어리석음을 보고, 지구에서 여우를 만난다. 이 이야기는 순수한 마음과 사랑이 중요하다는 교훈을 주는 책이다.
      basePoint: 48
      deltaR2: 9
      deltaR3: 16
      summary: 요약 의존 독후감
      lesson: 요약본의 결론을 내 결론처럼 적으면 내 감상은 사라진다.
    C2:
      text: 어린왕자는 자기 별에서 장미와 싸우고 지구로 와서 여우와 뱀을 만난다. 친구 말로는 마지막에 별로 돌아간다는데, 그래서 이 책은 이별에 관한 이야기 같다.
      basePoint: 38
      deltaR2: 11
      deltaR3: 22
      summary: 전달 오류가 섞임
      lesson: 친구를 거쳐 들은 책은 친구의 책 — 전달 과정에서 뜻이 어긋난다.
    C3:
      text: 어린왕자는 어린아이의 순수한 마음을 가진 왕자가 세상을 여행하는 이야기다. 우리는 모두 꿈을 잃지 말고 착하게 살아야 하며, 친구를 소중히 해야 한다.
      basePoint: 10
      deltaR2: 11
      deltaR3: 20
      summary: 일반론뿐인 글
      lesson: 책을 읽지 않은 자리에는 책이 없는 착한 말만 남는다.
  reviews:
  - id: R1
    label: 그대로 제출
    desc: 검토 없이 그대로 낸다.
    boostType: none
    lesson: 검토를 건너뛰었다 — 검증할 기회를 놓쳤다.
  - id: R2
    label: 한 번 읽고 이상한 곳만 표시
    desc: 명시적인 환각·오류만 발견.
    boostType: explicit
    lesson: 한 번 훑어 명백한 오류를 잡았다. 도메인지식 +1
  - id: R3
    label: 출처 확인 + 크로스체크
    desc: 미세 오류까지 발견.
    boostType: all
    lesson: 출처와 대조하니 미세 오류까지 보였다. 도메인지식 +3
  reviewSupplements:
    A1R2: 문장 반복과 어색한 표현만 조금 발견된다. 점수 +3.
    A1R3: 실제 장면과 감상이 잘 맞는지 확인한다. 발견 사항은 미미하다. 점수 +6.
    A2R2: 일반적인 감상 표현이 많다는 점을 발견한다. 점수 +6.
    A2R3: 요약에 빠진 장미와 책임의 맥락을 보완한다. 점수 +12.
    A3R2: '"모두와 행복하게" 같은 추측 표현을 발견한다. 점수 +10.'
    A3R3: 결말과 핵심 주제가 실제와 다름을 확인한다. 점수 +21.
    B1R2: 책에 없는 캥거루와 왕국 설정을 발견한다. 점수 +12.
    B1R3: 환각뿐 아니라 전체 구조가 책과 어긋남을 확인한다. 점수 +23.
    B2R2: 인용 문장이 정확하지 않다는 느낌을 잡는다. 점수 +10.
    B2R3: 실제 문장과 의미를 대조해 인용과 감상을 정리한다. 점수 +21.
    B3R2: AI식 매끈한 표현과 덜 개인적인 문장을 발견한다. 점수 +7.
    B3R3: 검색 출처와 책의 핵심 장면을 대조해 근거를 강화한다. 점수 +17.
    C1R2: '"사랑이 중요하다" 같은 뻔한 표현을 발견한다. 점수 +9.'
    C1R3: 요약만으로는 책임의 뉘앙스가 빠졌음을 확인한다. 점수 +16.
    C2R2: 친구에게 들은 표현이 모호하고 근거가 약함을 발견한다. 점수 +11.
    C2R3: 뱀과 결말에 대한 잘못된 이해를 확인하고 수정한다. 점수 +22.
    C3R2: 틀린 말은 적지만 책의 구체 장면이 없음을 발견한다. 점수 +11.
    C3R3: 책 내용과 거의 연결되지 않는 일반론임을 확인한다. 점수 +20.
  finals:
    A1R1:
      score: 91
      grade: S
      item: 깊은 독서가 카드
      delegation: ++
      knowledge: +
      awareness: 다 읽으니 독후감이 내 말처럼 나왔다.
    A1R2:
      score: 94
      grade: S
      item: 깊은 독서가 카드
      delegation: ++
      knowledge: +
      awareness: 한 번 읽어보니 문장이 더 정리됐다.
    A1R3:
      score: 97
      grade: S
      item: 깊은 독서가 카드
      delegation: ++
      knowledge: ++
      awareness: 확인까지 하니까 발표해도 덜 떨릴 것 같다.
    A2R1:
      score: 68
      grade: B
      item: 반쪽 독후감 카드
      delegation: +
      knowledge: '0'
      awareness: 줄거리는 맞는데 내 생각은 좀 얕았다.
