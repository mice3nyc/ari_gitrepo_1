      delegation: --
      knowledge: '-'
      lesson: 친구가 읽은 책이 내 자리에 들어왔다 — 친구의 책은 내 것이 아니다.
    - id: C3
      label: '"꿈을 잃지 말자" 같은 일반론 한 줄로 칸만 채운다'
      delegation: --
