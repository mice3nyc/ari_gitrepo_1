<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jsPDF 테스트 — AI 리터러시 성장 리포트</title>

  <!--
    ============================================================
    jsPDF 프로토타입 — AI 리터러시: 위임의 경계 v11
    SPEC §13.3.3 검증 목적
    ------------------------------------------------------------
    4가지 검증 포인트:
    1. 한글 폰트 깨지지 않는지 — Paperlogy ttf fetch → addFont → setFont
    2. 카툰 이미지 삽입되는지 — s01_c1.webp fetch → addImage (base64 변환)
    3. 페이지 분할 자연스러운지 — 섹션마다 y 좌표 체크 후 addPage
    4. 자동 다운로드 되는지 — doc.save('jspdf-test-result.pdf')
    ============================================================
  -->

  <!-- jsPDF CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    .container {
      background: #fff;
      border: 2px solid #111;
      box-shadow: 4px 4px 0 #111;
      padding: 40px;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 32px;
    }

    #download-btn {
      background: #ffd600;
      border: 2px solid #111;
      box-shadow: 3px 3px 0 #111;
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    #download-btn:hover {
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 #111;
    }

    #download-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 #111;
    }

    #download-btn:disabled {
      background: #ddd;
      color: #888;
      cursor: not-allowed;
      transform: none;
      box-shadow: 3px 3px 0 #111;
    }

    #status {
      margin-top: 20px;
      font-size: 0.85rem;
      color: #333;
      min-height: 20px;
    }

    .checklist {
      text-align: left;
      margin-top: 28px;
      font-size: 0.8rem;
      border-top: 1px solid #ddd;
      padding-top: 16px;
    }

    .checklist p {
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 0.85rem;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      color: #555;
    }

    .check-item .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
    }

    .check-item.ok .dot { background: #22c55e; }
    .check-item.fail .dot { background: #ef4444; }
    .check-item.loading .dot { background: #f59e0b; }

    .timer-box {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      padding: 12px;
      background: #fffbe6;
      border: 2px solid #111;
    }
    .timer-cell {
      flex: 1;
      text-align: center;
    }
    .timer-label {
      font-size: 0.7rem;
      color: #666;
      letter-spacing: 1px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .timer-value {
      font-size: 1.4rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: #111;
    }
    .timer-value.pending { color: #999; }
  </style>
</head>
<body>

<div class="container">
  <h1>jsPDF 테스트</h1>
  <p class="subtitle">AI 리터러시 성장 리포트 · SPEC §13.3.3</p>

  <div class="timer-box">
    <div class="timer-cell">
      <div class="timer-label">T1 — 활성화</div>
      <div class="timer-value pending" id="t1-value">— s</div>
    </div>
    <div class="timer-cell">
      <div class="timer-label">T2 — 생성</div>
      <div class="timer-value pending" id="t2-value">— s</div>
    </div>
  </div>

  <button id="download-btn" onclick="runTest()">PDF 다운로드</button>

  <div id="status">버튼을 클릭하면 PDF를 생성하고 자동 다운로드합니다.</div>

  <div class="checklist">
    <p>검증 포인트</p>
    <div class="check-item" id="chk-font">
      <div class="dot"></div>
      <span>1. 한글 폰트 — Paperlogy ttf 로딩 후 PDF 임베딩 (게임 본 폰트)</span>
    </div>
    <div class="check-item" id="chk-image">
      <div class="dot"></div>
      <span>2. 카툰 이미지 — webp fetch → base64 → addImage</span>
    </div>
    <div class="check-item" id="chk-page">
      <div class="dot"></div>
      <span>3. 페이지 분할 — y 좌표 체크 후 addPage</span>
    </div>
    <div class="check-item" id="chk-save">
      <div class="dot"></div>
      <span>4. 자동 다운로드 — doc.save() 호출</span>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ============================================================
  // 타이머 — 페이지 로드 시점부터 측정
  // T1 = 페이지 로드 → 버튼 활성화 (jsPDF는 즉시 활성화 = 0초)
  // T2 = 버튼 클릭 → PDF 다운로드 완료
  // ============================================================
  const PAGE_LOAD_TS = performance.now();
  let clickTs = null;
  function setTimer(id, seconds) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = seconds.toFixed(2) + ' s';
    el.classList.remove('pending');
  }
  // T1 = 버튼 활성화 시점. jsPDF는 페이지 로드 즉시 활성화.
  setTimer('t1-value', (performance.now() - PAGE_LOAD_TS) / 1000);

  // ============================================================
  // 샘플 reportData — SPEC §13.3.3 명세와 동일
  // ============================================================
  const reportData = {
    v: "1.1",
    ts: "2026-05-13T15:30:00",
    name: "테스트학생",
    totalScore: 380,
    level: 3,
    comp: { d: 5, k: 3 },
    compType: "pp",  // 판단+/지식+ — AI 동료
    hist: [
      { s: "selfintro",   sTitle: "자기소개",       leaf: "A1R2", score: 85, grade: "A", t1Label: "스스로 정리하기",   t2Label: "장점부터 쓰기",      rvLabel: "보충" },
      { s: "groupwork",   sTitle: "모둠 발표",       leaf: "B2R1", score: 70, grade: "B", t1Label: "AI에 물어보기",    t2Label: "AI 초안 받기",       rvLabel: "기본" },
      { s: "eorinwangja", sTitle: "어린 왕자 독후감", leaf: "A2R3", score: 92, grade: "A", t1Label: "스스로 정리하기",   t2Label: "내 인상부터 쓰기",   rvLabel: "심화" },
      { s: "career",      sTitle: "진로 탐색",       leaf: "C1R2", score: 65, grade: "C", t1Label: "AI에 다 맡기기",   t2Label: "추천 직업 받기",     rvLabel: "보충" },
      { s: "studyplan",   sTitle: "시험공부 계획",    leaf: "B1R3", score: 68, grade: "C", t1Label: "AI에 물어보기",    t2Label: "AI 계획표 받기",     rvLabel: "심화" }
    ],
    inv: {
      hc: [
        { axis: "중심잡기", tag: "주체성",       s: "selfintro" },
        { axis: "융합하기", tag: "창의적 사고",  s: "eorinwangja" },
        { axis: "성찰하기", tag: "비판적 사고",  s: "career" }
      ],
      dc: [
        { label: "자기이해", s: "selfintro" },
        { label: "표현력",   s: "eorinwangja" }
      ],
      gc: [
        { label: "회복력", s: "groupwork" }
      ],
      cc: []
    }
  };

  // ============================================================
  // 리소스 URL
  // ============================================================
  // 디버그 — NanumBarunGothic 4MB로 임시 검증. 작동하면 Paperlogy ttf 자체 문제.
  const FONT_URL  = 'https://cdn.jsdelivr.net/gh/fonts-archive/NanumBarunGothic@main/NanumBarunGothic.ttf';
  const IMAGE_URL = '../../images/s01_c1.webp';  // pdf-test/ → v11/ → ai-literacy-delegation-boundary/images/

  // ============================================================
  // UI 헬퍼
  // ============================================================
  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  function setCheck(id, state) {
    const el = document.getElementById(id);
    el.className = 'check-item ' + state;
  }

  // ============================================================
  // 리소스 fetch — ArrayBuffer → base64
  // ============================================================
  async function fetchAsBase64(url) {
    // CORS: CDN은 Access-Control-Allow-Origin: * 지원
    const res = await fetch(url);
    if (!res.ok) throw new Error(`fetch 실패: ${url} (${res.status})`);
    const buf = await res.arrayBuffer();
    // ArrayBuffer → base64
    const bytes = new Uint8Array(buf);
    let binary = '';
    for (let i = 0; i < bytes.byteLength; i++) {
      binary += String.fromCharCode(bytes[i]);
    }
    return btoa(binary);
  }

  // ArrayBuffer → base64 (폰트용 — 동일 함수 재사용)
  async function fetchFontBase64(url) {
    return fetchAsBase64(url);
  }

  // 이미지 fetch → Data URL (jsPDF addImage에 사용)
  async function fetchImageDataURL(url) {
    // Blob URL 방식: MIME 타입 보존
    const res = await fetch(url);
    if (!res.ok) throw new Error(`이미지 fetch 실패: ${url}`);
    const blob = await res.blob();
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  // ============================================================
  // PDF 생성 메인 함수
  // ============================================================
  async function buildPDF(fontB64, imageDataURL) {
    const { jsPDF } = window.jspdf;

    // A4 세로 (mm)
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    const PAGE_W = 210;
    const PAGE_H = 297;
    const MARGIN = 16;
    const CONTENT_W = PAGE_W - MARGIN * 2;

    // ----------------------------------------------------------
    // 검증 1: 한글 폰트 등록
    // ----------------------------------------------------------
    // jsPDF는 .ttf base64를 addFileToVFS → addFont 순서로 등록
    doc.addFileToVFS('Paperlogy-4Regular.ttf', fontB64);
    doc.addFont('Paperlogy-4Regular.ttf', 'Paperlogy', 'normal');
    doc.setFont('Paperlogy');

    // ----------------------------------------------------------
    // y 좌표 추적 + 페이지 분할 헬퍼
    // ----------------------------------------------------------
    let y = MARGIN;

    function needNewPage(requiredHeight) {
      // 검증 3: 섹션이 페이지 하단에 걸리면 새 페이지로
      if (y + requiredHeight > PAGE_H - MARGIN) {
        doc.addPage();
        y = MARGIN;
        return true;
      }
      return false;
    }

    function addText(text, x, fontSize, options = {}) {
      doc.setFontSize(fontSize);
      doc.text(text, x, y, options);
      y += fontSize * 0.4 + (options.lineGap || 2);
    }

    function addLine(lineGap = 4) {
      doc.setDrawColor(180);
      doc.line(MARGIN, y, PAGE_W - MARGIN, y);
      y += lineGap;
    }

    function addGap(mm = 4) {
      y += mm;
    }

    // ----------------------------------------------------------
    // 섹션 1: 헤더
    // ----------------------------------------------------------
    // 큰 제목
    doc.setFontSize(20);
    doc.setTextColor(0);
    doc.text('AI 리터러시 성장 리포트', PAGE_W / 2, y, { align: 'center' });
    y += 10;

    // 학생 이름 + 날짜
    doc.setFontSize(11);
    const dateStr = reportData.ts.replace('T', ' ').substring(0, 16);
    doc.text(`${reportData.name}  |  ${dateStr}`, PAGE_W / 2, y, { align: 'center' });
    y += 6;

    addLine(6);

    // ----------------------------------------------------------
    // 섹션 2: 학기 통계 4박스
    // ----------------------------------------------------------
    needNewPage(30);

    doc.setFontSize(10);
    doc.setTextColor(80);
    doc.text('학기 통계', MARGIN, y);
    y += 5;

    const boxes = [
      { label: '학기 총점',        value: String(reportData.totalScore) },
      { label: '최종 레벨',        value: `Lv.${reportData.level}` },
      { label: '판단하는 힘',      value: `+${reportData.comp.d}` },
      { label: '아는것의 힘',      value: `+${reportData.comp.k}` }
    ];

    const boxW = (CONTENT_W - 6) / 4;  // 3px 간격 × 3
    const boxH = 18;
    const boxY = y;

    boxes.forEach((box, i) => {
      const bx = MARGIN + i * (boxW + 2);

      // 박스 테두리
      doc.setDrawColor(0);
      doc.setLineWidth(0.5);
      doc.rect(bx, boxY, boxW, boxH);

      // 값 (큰 글자)
      doc.setFontSize(14);
      doc.setTextColor(0);
      doc.text(box.value, bx + boxW / 2, boxY + 9, { align: 'center' });

      // 라벨 (작은 글자)
      doc.setFontSize(7);
      doc.setTextColor(100);
      doc.text(box.label, bx + boxW / 2, boxY + 15, { align: 'center' });
    });

    y = boxY + boxH + 8;

    // ----------------------------------------------------------
    // 섹션 3: 학습자 유형
    // ----------------------------------------------------------
    needNewPage(20);

    doc.setFontSize(10);
    doc.setTextColor(80);
    doc.text('학습자 유형', MARGIN, y);
    y += 5;

    // 유형 박스
    doc.setDrawColor(0);
    doc.setLineWidth(0.5);
    doc.rect(MARGIN, y, CONTENT_W, 14);

    doc.setFontSize(11);
    doc.setTextColor(0);
    doc.text('pp — AI 동료형', MARGIN + 4, y + 6);

    doc.setFontSize(8);
    doc.setTextColor(60);
    doc.text('AI를 동료로 쓰면서 자기 지식도 같이 키웠다. AI 리터러시의 본 모습.', MARGIN + 4, y + 11);

    y += 14 + 8;

    // ----------------------------------------------------------
    // 섹션 4: 시나리오별 결과 (5개)
    // ----------------------------------------------------------
    needNewPage(14);

    doc.setFontSize(10);
    doc.setTextColor(80);
    doc.text('시나리오별 결과', MARGIN, y);
    y += 5;

    reportData.hist.forEach((item) => {
      // 시나리오 1건 = 약 18mm — 페이지 부족하면 새 페이지
      needNewPage(20);

      // 시나리오 행 배경 (짝수/홀수 구분 없음 — 단순 테두리)
      const rowH = 16;
      doc.setDrawColor(180);
      doc.setLineWidth(0.3);
      doc.rect(MARGIN, y, CONTENT_W, rowH);

      // 시나리오 제목 + 등급
      doc.setFontSize(10);
      doc.setTextColor(0);
      doc.text(item.sTitle, MARGIN + 3, y + 6);

      // 점수 + 등급 (오른쪽 정렬)
      doc.setFontSize(10);
      doc.text(`${item.score}점  ${item.grade}등급`, PAGE_W - MARGIN - 3, y + 6, { align: 'right' });

      // 경로 (t1 → t2 → rv)
      doc.setFontSize(7.5);
      doc.setTextColor(80);
      doc.text(`${item.t1Label}  →  ${item.t2Label}  →  리뷰: ${item.rvLabel}`, MARGIN + 3, y + 12);

      y += rowH + 2;
    });

    addGap(4);

    // ----------------------------------------------------------
    // 섹션 5: 카드 인벤토리
    // ----------------------------------------------------------
    needNewPage(60);

    doc.setFontSize(10);
    doc.setTextColor(80);
    doc.text('카드 인벤토리', MARGIN, y);
    y += 5;

    // 인간중심 카드
    doc.setFontSize(9);
    doc.setTextColor(0);
    doc.text('인간중심 카드', MARGIN, y);
    y += 5;

    reportData.inv.hc.forEach((card) => {
      needNewPage(10);
      doc.setFontSize(8.5);
      doc.setTextColor(40);
      doc.text(`[${card.axis}]  ${card.tag}`, MARGIN + 4, y);
      y += 5;
    });

    addGap(3);

    // 도메인 카드
    doc.setFontSize(9);
    doc.setTextColor(0);
    doc.text('도메인 카드', MARGIN, y);
    y += 5;

    reportData.inv.dc.forEach((card) => {
      needNewPage(10);
      doc.setFontSize(8.5);
      doc.setTextColor(40);
      doc.text(card.label, MARGIN + 4, y);
      y += 5;
    });

    addGap(3);

    // 성장 카드
    doc.setFontSize(9);
    doc.setTextColor(0);
    doc.text('성장 카드', MARGIN, y);
    y += 5;

    reportData.inv.gc.forEach((card) => {
      needNewPage(10);
      doc.setFontSize(8.5);
      doc.setTextColor(40);
      doc.text(card.label, MARGIN + 4, y);
      y += 5;
    });

    addGap(6);

    // ----------------------------------------------------------
    // 섹션 6: 카툰 이미지 삽입 (검증 2 — 실제 이미지, 도형 아님)
    // ----------------------------------------------------------
    // 이미지 높이 추정: 60mm. 페이지 부족하면 새 페이지로
    needNewPage(66);

    doc.setFontSize(10);
    doc.setTextColor(80);
    doc.text('시나리오 카툰 이미지', MARGIN, y);
    y += 4;

    // imageDataURL은 "data:image/webp;base64,..." 형식
    // jsPDF addImage: (imageData, format, x, y, width, height)
    // webp는 jsPDF 2.5.1에서 지원 (Canvas 내부 디코딩)
    const imgW = 80;
    const imgH = 60;
    doc.addImage(imageDataURL, 'WEBP', MARGIN, y, imgW, imgH);

    y += imgH + 8;

    // ----------------------------------------------------------
    // 푸터 — 검증 4: 마지막 페이지 하단에 고정
    // ----------------------------------------------------------
    // 현재 페이지 수 가져오기
    const totalPages = doc.internal.getNumberOfPages();
    for (let p = 1; p <= totalPages; p++) {
      doc.setPage(p);
      doc.setFontSize(7);
      doc.setTextColor(140);
      const footerText = `AI 리터러시: 위임의 경계 v${reportData.v}  /  생성일: ${reportData.ts}  /  ${p} / ${totalPages}`;
      doc.text(footerText, PAGE_W / 2, PAGE_H - 8, { align: 'center' });
    }

    // ----------------------------------------------------------
    // 검증 4: 자동 다운로드
    // ----------------------------------------------------------
    doc.save('jspdf-test-result.pdf');
  }

  // ============================================================
  // 메인 실행 — 버튼 클릭 시
  // ============================================================
  window.runTest = async function () {
    const btn = document.getElementById('download-btn');
    btn.disabled = true;
    clickTs = performance.now();

    try {
      // --- 폰트 로딩 (디버그: 임시 비활성화. 시스템 기본 helvetica 사용) ---
      setCheck('chk-font', 'fail');  // 폰트 임베딩 안 함을 명시
      setStatus('폰트 임베딩 생략 — 시스템 기본(helvetica). 한글은 안 보일 수 있음, 영문/숫자/레이아웃 검증 우선.');
      let fontB64 = null;

      // --- 이미지 로딩 ---
      setStatus('카툰 이미지 로딩 중...');
      setCheck('chk-image', 'loading');
      let imageDataURL;
      try {
        imageDataURL = await fetchImageDataURL(IMAGE_URL);
        setCheck('chk-image', 'ok');
        setStatus('이미지 로딩 완료.');
      } catch (e) {
        // 이미지 실패 시 플레이스홀더 처리 (전체 실패 방지)
        console.warn('이미지 fetch 실패, 플레이스홀더 사용:', e.message);
        imageDataURL = null;
        setCheck('chk-image', 'fail');
      }

      // --- PDF 생성 ---
      setStatus('PDF 생성 중...');
      setCheck('chk-page', 'loading');
      await buildPDFWrapper(fontB64, imageDataURL);

      setCheck('chk-page', 'ok');
      setCheck('chk-save', 'ok');
      setTimer('t2-value', (performance.now() - clickTs) / 1000);
      setStatus('완료! jspdf-test-result.pdf 다운로드됨.');

    } catch (err) {
      console.error(err);
      setStatus('오류: ' + err.message);
      setCheck('chk-save', 'fail');
    } finally {
      btn.disabled = false;
    }
  };

  // buildPDF 래퍼 — 이미지 없을 때 처리
  async function buildPDFWrapper(fontB64, imageDataURL) {
    const { jsPDF } = window.jspdf;

    const PAGE_W = 210;
    const PAGE_H = 297;
    const MARGIN = 16;
    const CONTENT_W = PAGE_W - MARGIN * 2;

    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    // 디버그: 폰트 임베딩 생략. 시스템 기본 helvetica.
    if (fontB64) {
      doc.addFileToVFS('Paperlogy-4Regular.ttf', fontB64);
      doc.addFont('Paperlogy-4Regular.ttf', 'Paperlogy', 'normal');
      doc.setFont('Paperlogy');
    }

    let y = MARGIN;

    function needNewPage(h) {
      // 검증 3: y + 필요높이가 페이지 하단을 넘으면 addPage
      if (y + h > PAGE_H - 16) {
        doc.addPage();
        y = MARGIN;
      }
    }

    function gap(mm = 4) { y += mm; }

    // ---- 섹션 1: 헤더 ----
    doc.setFontSize(20);
    doc.setTextColor(0);
    doc.text('AI 리터러시 성장 리포트', PAGE_W / 2, y, { align: 'center' });
    y += 10;

    doc.setFontSize(11);
    const dateStr = reportData.ts.replace('T', ' ').substring(0, 16);
    doc.text(`${reportData.name}  |  ${dateStr}`, PAGE_W / 2, y, { align: 'center' });
    y += 7;

    doc.setDrawColor(0);
    doc.setLineWidth(0.5);
    doc.line(MARGIN, y, PAGE_W - MARGIN, y);
    y += 7;

    // ---- 섹션 2: 학기 통계 4박스 ----
    needNewPage(28);
    doc.setFontSize(9);
    doc.setTextColor(100);
    doc.text('학기 통계', MARGIN, y);
    y += 4;

    const boxes = [
      { label: '학기 총점',    value: String(reportData.totalScore) },
      { label: '최종 레벨',    value: `Lv.${reportData.level}` },
      { label: '판단하는 힘',  value: `+${reportData.comp.d}` },
      { label: '아는것의 힘',  value: `+${reportData.comp.k}` }
    ];

    const boxW = (CONTENT_W - 6) / 4;
    const boxH = 18;
    const bY = y;

    boxes.forEach((box, i) => {
      const bx = MARGIN + i * (boxW + 2);
      doc.setDrawColor(0);
      doc.setLineWidth(0.5);
      doc.rect(bx, bY, boxW, boxH);
      doc.setFontSize(14);
      doc.setTextColor(0);
      doc.text(box.value, bx + boxW / 2, bY + 9, { align: 'center' });
      doc.setFontSize(7);
      doc.setTextColor(100);
      doc.text(box.label, bx + boxW / 2, bY + 15, { align: 'center' });
    });

    y = bY + boxH + 8;

    // ---- 섹션 3: 학습자 유형 ----
    needNewPage(22);
    doc.setFontSize(9);
    doc.setTextColor(100);
    doc.text('학습자 유형', MARGIN, y);
    y += 4;

    doc.setDrawColor(0);
    doc.setLineWidth(0.5);
    doc.rect(MARGIN, y, CONTENT_W, 14);
    doc.setFontSize(11);
    doc.setTextColor(0);
    doc.text('pp — AI 동료형', MARGIN + 4, y + 6);
    doc.setFontSize(8);
    doc.setTextColor(60);
    doc.text('AI를 동료로 쓰면서 자기 지식도 같이 키웠다. AI 리터러시의 본 모습.', MARGIN + 4, y + 11);
    y += 14 + 8;

    // ---- 섹션 4: 시나리오별 결과 ----
    needNewPage(14);
    doc.setFontSize(9);
    doc.setTextColor(100);
    doc.text('시나리오별 결과', MARGIN, y);
    y += 4;

    reportData.hist.forEach((item) => {
      needNewPage(20);
      const rowH = 16;
      doc.setDrawColor(180);
      doc.setLineWidth(0.3);
      doc.rect(MARGIN, y, CONTENT_W, rowH);

      doc.setFontSize(10);
      doc.setTextColor(0);
      doc.text(item.sTitle, MARGIN + 3, y + 6);

      doc.setFontSize(10);
      doc.text(`${item.score}점  ${item.grade}등급`, PAGE_W - MARGIN - 3, y + 6, { align: 'right' });

      doc.setFontSize(7.5);
      doc.setTextColor(80);
      doc.text(`${item.t1Label}  →  ${item.t2Label}  →  리뷰: ${item.rvLabel}`, MARGIN + 3, y + 12);

      y += rowH + 2;
    });

    gap(5);

    // ---- 섹션 5: 카드 인벤토리 ----
    needNewPage(14);
    doc.setFontSize(9);
    doc.setTextColor(100);
    doc.text('카드 인벤토리', MARGIN, y);
    y += 5;

    doc.setFontSize(9);
    doc.setTextColor(0);
    doc.text('인간중심 카드', MARGIN, y);
    y += 5;
    reportData.inv.hc.forEach((card) => {
      needNewPage(8);
      doc.setFontSize(8.5);
      doc.setTextColor(40);
      doc.text(`[${card.axis}]  ${card.tag}`, MARGIN + 4, y);
      y += 5;
    });

    gap(3);
    doc.setFontSize(9);
    doc.setTextColor(0);
    doc.text('도메인 카드', MARGIN, y);
    y += 5;
    reportData.inv.dc.forEach((card) => {
      needNewPage(8);
      doc.setFontSize(8.5);
      doc.setTextColor(40);
      doc.text(card.label, MARGIN + 4, y);
      y += 5;
    });

    gap(3);
    doc.setFontSize(9);
    doc.setTextColor(0);
    doc.text('성장 카드', MARGIN, y);
    y += 5;
    reportData.inv.gc.forEach((card) => {
      needNewPage(8);
      doc.setFontSize(8.5);
      doc.setTextColor(40);
      doc.text(card.label, MARGIN + 4, y);
      y += 5;
    });

    gap(6);

    // ---- 섹션 6: 카툰 이미지 (검증 2) ----
    needNewPage(70);
    doc.setFontSize(9);
    doc.setTextColor(100);
    doc.text('시나리오 카툰 이미지', MARGIN, y);
    y += 4;

    if (imageDataURL) {
      // 검증 2: webp 이미지를 실제로 삽입. 도형이 아니라 실제 이미지.
      // jsPDF 2.5.1은 addImage 내부에서 Canvas.drawImage로 webp 디코딩
      const imgW = 80;
      const imgH = 60;
      doc.addImage(imageDataURL, 'WEBP', MARGIN, y, imgW, imgH);
      y += imgH + 4;
    } else {
      // 이미지 로딩 실패 시 빈 박스 + 메시지
      doc.setDrawColor(180);
      doc.rect(MARGIN, y, 80, 60);
      doc.setFontSize(9);
      doc.setTextColor(150);
      doc.text('이미지 로딩 실패', MARGIN + 10, y + 30);
      y += 64;
    }

    // ---- 푸터: 모든 페이지 하단 ----
    const totalPages = doc.internal.getNumberOfPages();
    for (let p = 1; p <= totalPages; p++) {
      doc.setPage(p);
      doc.setFontSize(7);
      doc.setTextColor(140);
      const footer = `AI 리터러시: 위임의 경계 v${reportData.v}  /  생성일: ${reportData.ts}  /  ${p} / ${totalPages}`;
      doc.text(footer, PAGE_W / 2, PAGE_H - 8, { align: 'center' });
    }

    // 검증 4: 자동 다운로드
    doc.save('jspdf-test-result.pdf');
  }

})();
</script>

</body>
</html>
