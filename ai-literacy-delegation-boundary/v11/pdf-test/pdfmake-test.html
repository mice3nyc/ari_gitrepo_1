<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pdfmake 테스트 — AI 리터러시 성장 리포트</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      gap: 16px;
    }
    h1 { font-size: 1.2rem; color: #333; margin: 0; }
    #status {
      font-size: 0.9rem;
      color: #666;
      max-width: 480px;
      text-align: center;
      line-height: 1.6;
    }
    #downloadBtn {
      padding: 14px 36px;
      font-size: 1.1rem;
      font-weight: 700;
      background: #ffe066;
      color: #111;
      border: 2.5px solid #111;
      border-radius: 4px;
      box-shadow: 4px 4px 0 #111;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #downloadBtn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #111; }
    #downloadBtn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #111; }
    #downloadBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: 4px 4px 0 #111; }

    .timer-box {
      display: flex;
      gap: 16px;
      padding: 12px 20px;
      background: #fffbe6;
      border: 2px solid #111;
      box-shadow: 4px 4px 0 #111;
      min-width: 340px;
    }
    .timer-cell {
      flex: 1;
      text-align: center;
    }
    .timer-label {
      font-size: 0.7rem;
      color: #666;
      letter-spacing: 1px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .timer-value {
      font-size: 1.4rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: #111;
    }
    .timer-value.pending { color: #999; }
  </style>
</head>
<body>

<h1>pdfmake 테스트 — AI 리터러시 성장 리포트</h1>
<div class="timer-box">
  <div class="timer-cell">
    <div class="timer-label">T1 — 활성화</div>
    <div class="timer-value pending" id="t1-value">— s</div>
  </div>
  <div class="timer-cell">
    <div class="timer-label">T2 — 생성</div>
    <div class="timer-value pending" id="t2-value">— s</div>
  </div>
</div>
<div id="status">폰트 + 이미지 로딩 중...</div>
<button id="downloadBtn" disabled>PDF 다운로드</button>

<!--
  검증 포인트 4가지:
  1. 한글 폰트 깨지지 않는지 — Paperlogy TTF를 fetch→base64 변환→vfs 등록 (게임 본 폰트)
  2. 카툰 이미지 삽입되는지 — webp를 fetch→dataURL 변환→image 노드 삽입
  3. 페이지 분할 자연스러운지 — 시나리오 블록·카드 섹션에 pageBreak/unbreakable 적용
  4. 자동 다운로드 되는지 — pdfMake.createPdf(docDefinition).download() 호출
-->

<!-- pdfmake CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/vfs_fonts.js"></script>

<script>
(function() {

  // ── 타이머 ──────────────────────────────────────────────────────
  // T1 = 페이지 로드 → 버튼 활성화 (폰트+이미지 사전 로딩 시간)
  // T2 = 버튼 클릭 → PDF 다운로드 완료
  const PAGE_LOAD_TS = performance.now();
  let clickTs = null;
  function setTimer(id, seconds) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = seconds.toFixed(2) + ' s';
    el.classList.remove('pending');
  }

  // ── 샘플 데이터 ──────────────────────────────────────────────────
  const reportData = {
    v: "1.1",
    ts: "2026-05-13T15:30:00",
    name: "테스트학생",
    totalScore: 380,
    level: 3,
    comp: { d: 5, k: 3 },
    compType: "pp",
    hist: [
      { s: "selfintro",   sTitle: "자기소개",       leaf: "A1R2", score: 85, grade: "A", t1Label: "스스로 정리하기",   t2Label: "장점부터 쓰기",    rvLabel: "보충" },
      { s: "groupwork",   sTitle: "모둠 발표",       leaf: "B2R1", score: 70, grade: "B", t1Label: "AI에 물어보기",    t2Label: "AI 초안 받기",     rvLabel: "기본" },
      { s: "eorinwangja", sTitle: "어린 왕자 독후감", leaf: "A2R3", score: 92, grade: "A", t1Label: "스스로 정리하기",   t2Label: "내 인상부터 쓰기", rvLabel: "심화" },
      { s: "career",      sTitle: "진로 탐색",       leaf: "C1R2", score: 65, grade: "C", t1Label: "AI에 다 맡기기",   t2Label: "추천 직업 받기",   rvLabel: "보충" },
      { s: "studyplan",   sTitle: "시험공부 계획",   leaf: "B1R3", score: 68, grade: "C", t1Label: "AI에 물어보기",    t2Label: "AI 계획표 받기",   rvLabel: "심화" }
    ],
    inv: {
      hc: [
        { axis: "중심잡기", tag: "주체성",      s: "selfintro" },
        { axis: "융합하기", tag: "창의적 사고", s: "eorinwangja" },
        { axis: "성찰하기", tag: "비판적 사고", s: "career" }
      ],
      dc: [
        { label: "자기이해", s: "selfintro" },
        { label: "표현력",   s: "eorinwangja" }
      ],
      gc: [
        { label: "회복력", s: "groupwork" }
      ],
      cc: []
    }
  };

  // ── 학습자 유형 설명 ─────────────────────────────────────────────
  const compTypeDesc = {
    pp: "AI를 동료로 쓰면서 자기 지식도 같이 키웠다. AI 리터러시의 본 모습.",
    pd: "판단하는 힘은 강하지만 아는것의 힘이 더 자라면 좋겠다.",
    dp: "아는것의 힘은 충분하지만 주도권을 더 가져오면 좋겠다.",
    dd: "AI와 함께 성장할 여지가 크다. 천천히 쌓아가는 중."
  };

  // ── 유틸: ArrayBuffer → base64 ───────────────────────────────────
  // [검증 1] 한글 폰트 처리: fetch TTF → ArrayBuffer → base64 → vfs 등록
  function arrayBufferToBase64(buffer) {
    const bytes = new Uint8Array(buffer);
    let binary = '';
    // btoa 한계(65536) 초과 대비 chunk 분할
    const CHUNK = 8192;
    for (let i = 0; i < bytes.length; i += CHUNK) {
      binary += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
    }
    return btoa(binary);
  }

  // ── 유틸: URL → dataURL ──────────────────────────────────────────
  // [검증 2] 카툰 이미지: webp를 fetch → Blob → FileReader → dataURL
  // pdfmake image 노드는 dataURL(base64) 또는 vfs 키 참조를 사용
  function urlToDataURL(url) {
    return fetch(url)
      .then(r => {
        if (!r.ok) throw new Error('이미지 로드 실패: ' + r.status);
        return r.blob();
      })
      .then(blob => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      }));
  }

  const statusEl = document.getElementById('status');
  const btn = document.getElementById('downloadBtn');

  // ── 폰트 + 이미지 비동기 로딩 ──────────────────────────────────
  const FONT_URL  = 'https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy@main/Paperlogy-4Regular.ttf';
  const IMAGE_URL = '../../images/s01_c1.webp';  // pdf-test/ → v11/ → ai-literacy-delegation-boundary/images/

  let cartoonDataURL = null; // 이미지 로드 결과 (실패 시 null 유지)

  statusEl.textContent = '폰트 로딩 중...';

  // 폰트와 이미지를 병렬 로딩
  const fontPromise = fetch(FONT_URL)
    .then(r => {
      if (!r.ok) throw new Error('폰트 로드 실패: ' + r.status);
      return r.arrayBuffer();
    })
    .then(buf => {
      const b64 = arrayBufferToBase64(buf);
      // vfs에 폰트 등록 (기존 Roboto 외에 추가)
      pdfMake.vfs['Paperlogy-4Regular.ttf'] = b64;
      // 폰트 패밀리 정의
      pdfMake.fonts = {
        Paperlogy: {
          normal:      'Paperlogy-4Regular.ttf',
          bold:        'Paperlogy-4Regular.ttf', // bold 전용 없으면 Regular로 fallback
          italics:     'Paperlogy-4Regular.ttf',
          bolditalics: 'Paperlogy-4Regular.ttf'
        },
        // 기본 Roboto는 보존 (혹시 fallback 필요 시)
        Roboto: {
          normal:      'Roboto-Regular.ttf',
          bold:        'Roboto-Medium.ttf',
          italics:     'Roboto-Italic.ttf',
          bolditalics: 'Roboto-MediumItalic.ttf'
        }
      };
    });

  const imagePromise = urlToDataURL(IMAGE_URL)
    .then(dataURL => { cartoonDataURL = dataURL; })
    .catch(err => {
      console.warn('카툰 이미지 로드 실패 (PDF에 이미지 없이 생성됩니다):', err.message);
    });

  // 둘 다 완료되면 버튼 활성화
  Promise.all([fontPromise, imagePromise])
    .then(() => {
      setTimer('t1-value', (performance.now() - PAGE_LOAD_TS) / 1000);
      statusEl.textContent = '준비 완료. 버튼을 클릭하면 PDF가 자동 다운로드됩니다.';
      btn.disabled = false;
    })
    .catch(err => {
      statusEl.textContent = '로딩 오류: ' + err.message;
      console.error(err);
    });

  // ── PDF 생성 함수 ────────────────────────────────────────────────
  btn.addEventListener('click', function() {
    btn.disabled = true;
    clickTs = performance.now();
    statusEl.textContent = 'PDF 생성 중...';

    try {
      buildPDF();
    } catch(e) {
      statusEl.textContent = 'PDF 생성 오류: ' + e.message;
      console.error(e);
      btn.disabled = false;
    }
  });

  function buildPDF() {
    const ts = reportData.ts.replace('T', ' ').substring(0, 16);

    // ── 섹션 1: 헤더 ─────────────────────────────────────────────
    const headerSection = [
      {
        text: 'AI 리터러시 성장 리포트',
        style: 'title',
        marginBottom: 4
      },
      {
        columns: [
          { text: '학생: ' + reportData.name, style: 'subheader', width: '*' },
          { text: '날짜: ' + ts,              style: 'subheader', width: '*', alignment: 'right' }
        ],
        marginBottom: 16
      },
      { canvas: [{ type: 'line', x1: 0, y1: 0, x2: 515, y2: 0, lineWidth: 1.5, lineColor: '#111' }] },
      { text: '', margin: [0, 8, 0, 0] }
    ];

    // ── 섹션 2: 학기 통계 4박스 ─────────────────────────────────
    // [검증 3] 페이지 분할: 테이블은 pageBreak 하지 않도록 keepTogether
    const statsSection = [
      { text: '학기 통계', style: 'sectionTitle', marginBottom: 8 },
      {
        table: {
          widths: ['*', '*', '*', '*'],
          body: [
            [
              { text: '학기 총점', style: 'boxLabel', alignment: 'center' },
              { text: '최종 레벨', style: 'boxLabel', alignment: 'center' },
              { text: '판단하는 힘', style: 'boxLabel', alignment: 'center' },
              { text: '아는것의 힘', style: 'boxLabel', alignment: 'center' }
            ],
            [
              { text: String(reportData.totalScore),  style: 'boxValue', alignment: 'center' },
              { text: 'Lv.' + reportData.level,        style: 'boxValue', alignment: 'center' },
              { text: '+' + reportData.comp.d,          style: 'boxValue', alignment: 'center' },
              { text: '+' + reportData.comp.k,          style: 'boxValue', alignment: 'center' }
            ]
          ]
        },
        layout: {
          fillColor: function(rowIndex) { return rowIndex === 0 ? '#eeeeee' : '#ffffff'; },
          hLineWidth: function() { return 1; },
          vLineWidth: function() { return 1; },
          hLineColor: function() { return '#111111'; },
          vLineColor: function() { return '#111111'; }
        },
        marginBottom: 16
      }
    ];

    // ── 섹션 3: 학습자 유형 ──────────────────────────────────────
    const typeSection = [
      { text: '학습자 유형', style: 'sectionTitle', marginBottom: 6 },
      {
        table: {
          widths: ['*'],
          body: [[
            {
              stack: [
                { text: 'TYPE: ' + reportData.compType.toUpperCase(), style: 'typeTag' },
                { text: compTypeDesc[reportData.compType] || reportData.compType, style: 'typeDesc' }
              ],
              fillColor: '#fffbe6',
              border: [true, true, true, true]
            }
          ]]
        },
        layout: {
          hLineWidth: function() { return 1.5; },
          vLineWidth: function() { return 1.5; },
          hLineColor: function() { return '#111111'; },
          vLineColor: function() { return '#111111'; }
        },
        marginBottom: 16
      }
    ];

    // ── 섹션 4: 시나리오별 결과 ─────────────────────────────────
    // [검증 3] pageBreak: 각 시나리오 블록을 unbreakable stack으로 감싸기
    const scenarioSection = [
      { text: '시나리오별 결과', style: 'sectionTitle', marginBottom: 8 }
    ];

    reportData.hist.forEach(function(h) {
      const gradeColor = h.grade === 'A' ? '#1a6b1a' : h.grade === 'B' ? '#1a4b8b' : '#8b1a1a';
      scenarioSection.push({
        // unbreakable: 내부 분할 방지 (pageBreak 대신 stack + keepTogether)
        stack: [
          {
            columns: [
              {
                stack: [
                  { text: h.sTitle, style: 'scenarioTitle' },
                  { text: h.t1Label + '  →  ' + h.t2Label + '  →  ' + h.rvLabel, style: 'scenarioPath' }
                ],
                width: '*'
              },
              {
                stack: [
                  { text: String(h.score) + '점', style: 'scenarioScore' },
                  { text: h.grade + '등급', style: 'scenarioGrade', color: gradeColor }
                ],
                width: 60,
                alignment: 'center'
              }
            ]
          },
          { canvas: [{ type: 'line', x1: 0, y1: 4, x2: 515, y2: 4, lineWidth: 0.5, lineColor: '#cccccc' }] },
          { text: '', margin: [0, 4, 0, 0] }
        ],
        marginBottom: 4
      });
    });
    scenarioSection.push({ text: '', margin: [0, 8, 0, 0] });

    // ── 섹션 5: 카드 인벤토리 ────────────────────────────────────
    // [검증 3] 카드 섹션이 중간에 끊기지 않도록 unbreakable 처리
    const invSection = [
      { text: '카드 인벤토리', style: 'sectionTitle', marginBottom: 8 }
    ];

    // 인간중심 카드
    if (reportData.inv.hc.length > 0) {
      invSection.push({ text: '인간중심 카드 (' + reportData.inv.hc.length + '장)', style: 'cardGroupTitle', marginBottom: 4 });
      reportData.inv.hc.forEach(function(c) {
        invSection.push({
          text: '[' + c.axis + '] ' + c.tag,
          style: 'cardItem'
        });
      });
      invSection.push({ text: '', margin: [0, 4, 0, 0] });
    }

    // 도메인 카드
    if (reportData.inv.dc.length > 0) {
      invSection.push({ text: '도메인 카드 (' + reportData.inv.dc.length + '장)', style: 'cardGroupTitle', marginBottom: 4 });
      reportData.inv.dc.forEach(function(c) {
        invSection.push({ text: c.label, style: 'cardItem' });
      });
      invSection.push({ text: '', margin: [0, 4, 0, 0] });
    }

    // 성장 카드
    if (reportData.inv.gc.length > 0) {
      invSection.push({ text: '성장 카드 (' + reportData.inv.gc.length + '장)', style: 'cardGroupTitle', marginBottom: 4 });
      reportData.inv.gc.forEach(function(c) {
        invSection.push({ text: c.label, style: 'cardItem' });
      });
      invSection.push({ text: '', margin: [0, 4, 0, 0] });
    }

    // 콤보 카드 없음 표시
    if (reportData.inv.cc.length === 0) {
      invSection.push({ text: '콤보 카드: (없음)', style: 'cardGroupTitle', color: '#999999', marginBottom: 4 });
    }
    invSection.push({ text: '', margin: [0, 8, 0, 0] });

    // ── 섹션 6: 카툰 이미지 ─────────────────────────────────────
    // [검증 2] webp를 dataURL로 변환 후 image 노드에 삽입
    const imageSection = [];
    if (cartoonDataURL) {
      imageSection.push(
        { text: '카툰 이미지 (페이지 분할 검증용)', style: 'sectionTitle', marginBottom: 8 },
        {
          image: cartoonDataURL,
          width: 280,
          alignment: 'center',
          marginBottom: 16
        }
      );
    } else {
      imageSection.push({
        text: '[카툰 이미지 로드 실패 — 이미지 없이 생성]',
        style: 'note',
        color: '#cc4444',
        marginBottom: 16
      });
    }

    // ── docDefinition 조립 ───────────────────────────────────────
    const docDefinition = {
      pageSize: 'A4',
      pageOrientation: 'portrait',
      pageMargins: [40, 50, 40, 50],

      // [검증 1] 한글 폰트: 모든 텍스트에 Paperlogy 적용
      defaultStyle: {
        font: 'Paperlogy',
        fontSize: 10,
        lineHeight: 1.4,
        color: '#111111'
      },

      styles: {
        title: {
          fontSize: 20,
          bold: true,
          marginBottom: 8
        },
        subheader: {
          fontSize: 11,
          color: '#444444'
        },
        sectionTitle: {
          fontSize: 13,
          bold: true,
          marginBottom: 6
        },
        boxLabel: {
          fontSize: 9,
          bold: true,
          color: '#444444',
          margin: [4, 6, 4, 4]
        },
        boxValue: {
          fontSize: 16,
          bold: true,
          margin: [4, 4, 4, 8]
        },
        typeTag: {
          fontSize: 11,
          bold: true,
          margin: [8, 8, 8, 2]
        },
        typeDesc: {
          fontSize: 10,
          margin: [8, 2, 8, 8]
        },
        scenarioTitle: {
          fontSize: 11,
          bold: true
        },
        scenarioPath: {
          fontSize: 9,
          color: '#555555',
          marginTop: 2
        },
        scenarioScore: {
          fontSize: 14,
          bold: true,
          alignment: 'center'
        },
        scenarioGrade: {
          fontSize: 10,
          bold: true,
          alignment: 'center'
        },
        cardGroupTitle: {
          fontSize: 10,
          bold: true,
          color: '#333333'
        },
        cardItem: {
          fontSize: 10,
          margin: [12, 1, 0, 1]
        },
        note: {
          fontSize: 9,
          italics: false
        },
        footer: {
          fontSize: 8,
          color: '#888888'
        }
      },

      // ── 푸터 ─────────────────────────────────────────────────
      footer: function(currentPage, pageCount) {
        return {
          stack: [
            {
              canvas: [{ type: 'line', x1: 40, y1: 0, x2: 555, y2: 0, lineWidth: 0.5, lineColor: '#cccccc' }],
              margin: [0, 4, 0, 2]
            },
            {
              columns: [
                { text: 'AI 리터러시: 위임의 경계 v' + reportData.v + '  /  생성일: ' + ts, style: 'footer', width: '*' },
                { text: currentPage + ' / ' + pageCount, style: 'footer', alignment: 'right', width: 60 }
              ],
              margin: [40, 0, 40, 0]
            }
          ]
        };
      },

      // ── 본문 콘텐츠 ──────────────────────────────────────────
      content: [
        ...headerSection,
        ...statsSection,
        ...typeSection,
        ...scenarioSection,
        ...invSection,
        ...imageSection
      ]
    };

    // [검증 4] 자동 다운로드: download() 호출
    pdfMake.createPdf(docDefinition).download('pdfmake-test-result.pdf', function() {
      setTimer('t2-value', (performance.now() - clickTs) / 1000);
      statusEl.textContent = 'PDF 다운로드 완료.';
      btn.disabled = false;
    });
  }

})();
</script>

</body>
</html>
