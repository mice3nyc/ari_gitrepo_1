  reviewLabels:
    A1R1: 좋아하는 것만 적고 그대로 제출한다
    A1R2: 왜 좋아하는지 이유를 하나씩 붙인다
    A1R3: AI에게 좋아하는 것들 사이의 공통점을 묻게 한 뒤 납득되는 것만 남긴다
    A2R1: 걱정 문장만 적고 그대로 제출한다
    A2R2: '그 걱정이 어떤 일, 공부, 경험과 연결되는지 덧붙인다'
    A2R3: 'AI에게 걱정 속에 섞인 사실, 예상, 상상을 나누게 한 뒤 확인할 질문을 고른다'
    A3R1: 해볼 방법만 적고 끝낸다
    A3R2: 실제로 해볼 시간과 장소를 정한다
    A3R3: AI에게 너무 큰 계획을 작게 줄여 달라고 한 뒤 하나만 고른다
    B1R1: 유망하다는 말만 보고 주제로 정한다
    B1R2: 그 일이 왜 유망하다는지 근거를 찾아보고 내가 끌리는 이유를 적는다
    B1R3: 'AI에게 추천 이유를 사실, 예상, 의견으로 나누게 한 뒤 근거를 확인한다'
    B2R1: AI가 추천한 프로젝트를 그대로 내 진로 방향으로 쓴다
    B2R2: 억지로 붙인 조합과 진짜 끌리는 조합을 나눈다
    B2R3: AI에게 추천한 프로젝트를 쉬운 순서로 나누게 한 뒤 첫 단계만 정한다
    B3R1: 결과물이 그럴듯하니 이 일을 할 수 있다고 쓴다
    B3R2: AI가 한 부분과 내가 판단한 부분을 나눈다
    B3R3: AI에게 내가 직접 더 배워야 할 부분을 표시하게 한 뒤 하나를 고른다
    C1R1: 유명한 사람이 추천했거나 뉴스에 많이 나오니 그대로 제출한다
    C1R2: 그 일이 왜 좋다고 했는지 근거와 어려움도 함께 확인한다
    C1R3: AI에게 영상이나 뉴스에서 빠진 위험과 질문을 묻게 한 뒤 내가 확인할 것을 고른다
    C2R1: 믿을 만한 사람이 추천했으니 그대로 제출한다
    C2R2: 추천받은 이유가 내 경험과 맞는지 다시 본다
    C2R3: AI에게 추천 방향을 확인할 작은 활동을 제안하게 한 뒤 하나를 고른다
    C3R1: 순위나 안정성만 보고 진로를 정한다
    C3R2: 그 학과나 자격증에서 실제로 배우고 하는 일을 찾아본다
    C3R3: 'AI에게 학과 이름과 실제 공부 내용이 다른 부분, 자격증보다 먼저 해볼 경험을 묻게 한다'
