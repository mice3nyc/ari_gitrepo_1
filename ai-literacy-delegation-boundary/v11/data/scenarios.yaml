  reviewLabels:
    A1R1: 짧아도 그대로 제출한다
    A1R2: 다시 읽어보고 빠진 내용이나 기억나는 장면을 추가한다
    A1R3: 'AI에게 추가하면 좋을 내용을 묻고, 내가 읽은 내용과 맞는 것만 골라 보충한다'
    A2R1: 밑줄 친 문장이나 장면만 적어서 제출한다
    A2R2: 그 문장이나 장면에서 생긴 내 생각을 덧붙인다
    A2R3: 'AI에게 밑줄 친 장면을 읽고 떠오르는 질문을 만들게 한 뒤, 내가 답할 수 있는 내용만 보충한다'
    A3R1: 헷갈린 내용을 썼으니 그대로 제출한다
    A3R2: 어떤 문장이나 장면에서 막혔는지 덧붙이고 다시 읽은 뒤 생각을 정리한다
    A3R3: 'AI에게 헷갈린 부분을 질문으로 바꾸게 한 뒤, 책에서 근거를 찾아 내 말로 고친다'
    B1R1: 요약과 한 장면을 봤으니 그대로 제출한다
    B1R2: 요약과 실제 책 장면이 다르게 느껴지는 부분을 쓴다
    B1R3: 'AI에게 요약에서 중요하다고 한 장면을 물어본 뒤, 그 장면은 책에서 다시 확인한다'
    B2R1: 유명한 문장을 확인했으니 그대로 제출한다
    B2R2: 그 문장이 왜 그 장면에서 나왔는지 내 생각을 덧붙인다
    B2R3: 'AI에게 그 문장의 앞뒤 맥락을 물어본 뒤, 책에서 다시 확인하고 내 말로 고친다'
    B3R1: 궁금한 장면은 읽었으니 그대로 제출한다
    B3R2: 친구나 영상의 설명과 내가 읽은 장면이 다른 부분을 쓴다
    B3R3: 'AI에게 두 설명의 차이를 정리하게 한 뒤, 책 장면을 다시 확인하고 내 생각을 보충한다'
    C1R1: AI가 쓴 독후감이 깔끔하니 그대로 제출한다
    C1R2: 내가 읽지 않은 장면이나 설명할 수 없는 문장을 지운다
    C1R3: AI에게 독후감처럼 보이게 감상을 더 붙여 달라고 한다
    C2R1: 내용을 알 것 같으니 그대로 제출한다
    C2R2: 줄거리에서 감상처럼 보일 만한 문장을 덧붙인다
    C2R3: 'AI에게 영상이나 검색 내용과 책이 다를 수 있는 부분을 물어본 뒤, 한 장면은 책에서 확인한다'
    C3R1: 분위기가 그럴듯하니 그대로 제출한다
    C3R2: 그 문장이나 이미지가 책에서 어떤 상황에 나오는지 찾아본다
    C3R3: 'AI에게 너무 흔한 감상 표현을 표시하게 한 뒤, 책 장면과 연결되는 말만 남긴다'
