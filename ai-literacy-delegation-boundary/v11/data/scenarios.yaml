  id: studyplan
  category: 5
  categoryName: 시험 공부
  title: 시험 2주 전 — 공부를 어떻게
  version: v1
  learningMessage: 내가 뭘 모르는지 알아차리는 순간부터 공부 계획은 내 것이 된다.
  aiSuitability: mid
  timeBudgetSec: 720
  domainPool:
  - 학습설계
  - 시간관리
  - 학습전략
  - 검수능력
  - 자기검증
  - 자기성찰
  - 비판적 사고
  domainLabel: 학습설계
  situation:
    text: '중간고사가 2주 앞으로 다가왔다. 시험 과목은 5개이고, 자신 있는 과목은 2개 정도다. 나머지 과목은 어디부터 공부해야 할지 잘 모르겠다. 책상 위에는 시험 범위표와 문제집이 펼쳐져 있다. 계획표를
      먼저 짜야 할 것 같지만, 내가 무엇을 알고 무엇을 모르는지부터 헷갈린다.'
    image: ../images/s05_ch1.webp
  tier1:
  - id: A
    label: 먼저 내 실력을 확인한다
    desc: 문제를 풀거나 시험 범위를 보며 내가 아는 것과 모르는 것을 먼저 확인하는 길이다.
    lesson: 내 약점부터 봤다 — 시험 준비는 모르는 자리에서 시작한다.
    delegation: +
    knowledge: +
    basePoint: 10
    varPoint: 15
    discountTags:
      humanCentric: 중심잡기
      domain:
      - 학습력
      - 자기이해
