    B2R3: 책 원전과 대조하니 인용이 다듬어진 표현이라 직접 인용을 다시 찾았다.
    B3R1: 자기 감상을 끝까지 먼저 쓰고 AI에는 표현만 다듬어 받았다. 감상의 무게는 자기 안에 있었다.
    B3R2: 한 번 읽으며 AI가 바꾼 표현 하나가 자기 감상 같지 않아 처음 쓴 문장으로 되돌렸다.
    B3R3: 처음 쓴 문장과 AI가 다듬은 문장을 한 줄씩 비교해 자기 말에 맞는 쪽만 남겼다.
    C1R1: 'AI가 만든 줄거리와 독후감 초안을 그대로 냈다. 글은 깔끔하지만 내가 읽고 느낀 장면이 거의 없어, 질문을 받으면 설명하기 어려운 독후감이 된다.'
