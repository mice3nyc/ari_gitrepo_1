groupwork:
  id: groupwork
  category: 2
  categoryName: 모둠 활동
  title: 모둠 발표 자료
  version: v1
  learningMessage: 혼자 빨리 끝낸 발표 자료는 모둠 안에서 아직 맞춰진 자료가 아니다.
  aiSuitability: mid
  timeBudgetSec: 720
  domainPool:
  - 협업능력
  - 소통능력
  - 발표력
  - 검수능력
  - 자기검증
  - 자기성찰
  - 비판적 사고
  domainLabel: 협업능력
  situation:
    text: '학기 초 모둠 발표가 다음 주로 잡혔다. 우리 모둠은 4명이 각자 파트를 맡았고, 내가 맡은 일은 자료 조사와 슬라이드 3장 만들기였다. 다른 애들이 어떤 흐름으로 준비하는지 아직 잘 모르는데, 숙제도
      있고 학원도 있어서 시간이 많지는 않았다.'
    image: ../images/s02_ch1.webp
  tier1:
  - id: A
    label: 모둠과 먼저 방향을 정한다
    desc: '모둠이 함께 발표 질문을 정하고, 역할을 나누고, 각자 맡은 내용을 이해하려는 길이다.'
    lesson: 모둠 자리에서 시작했다 — 발표는 모둠이 함께 이해한 이야기일 때 단단하다.
    delegation: +
    knowledge: +
    basePoint: 10
    varPoint: 15
    discountTags:
      humanCentric: 중심잡기
      domain:
      - 협업력
      - 소통력
  - id: B
    label: AI로 발표 준비를 빠르게 만들어본다
    desc: 'AI에게 발표 개요, 슬라이드 문구, 발표 대본 같은 결과물을 빠르게 받아보는 길이다.'
    lesson: AI 결과물부터 받았다 — 우리 동네와 모둠 생각이 약해진다.
    delegation: '-'
    knowledge: '-'
    basePoint: 10
    varPoint: 0
    discountTags:
      humanCentric: 중심잡기
      domain:
      - 자료판단력
  - id: C
    label: 각자 따로 준비하거나 발표 모양부터 만든다
    desc: '모둠 회의를 충분히 하지 않고 각자 자료를 찾거나, 발표 잘하는 친구에게 맡기거나, 슬라이드 디자인과 대본의 모양을 먼저 만드는 길이다.'
    lesson: 회의 없이 또는 모양부터 만들었다 — 완성된 것처럼 보이는 발표와 모둠이 이해한 발표는 다르다.
