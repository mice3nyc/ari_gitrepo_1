  reviewLabels:
    A1R1: 다 썼으니 그대로 제출한다
    A1R2: 단어마다 짧은 설명을 덧붙이고 문장 흐름을 다시 본다
    A1R3: AI에게 읽고 궁금한 점을 물어보게 한 뒤 내가 답할 수 있는 내용만 보충한다
    A2R1: 이야기만 그대로 제출한다
    A2R2: 이 일이 왜 나를 보여주는지 한 문장 덧붙인다
    A2R3: AI에게 이 이야기를 읽고 떠오르는 내 특징을 물어본 뒤 맞는 것만 고른다
    A3R1: 짧거나 어색해도 그대로 제출한다
    A3R2: 다시 읽어보고 빠진 내용을 추가하거나 반복을 줄인다
    A3R3: AI에게 추가하거나 줄이면 좋을 곳을 표시하게 한 뒤 내가 고른 부분만 고친다
    B1R1: 답한 내용을 그대로 제출한다
    B1R2: 답마다 이유나 경험을 한 문장씩 덧붙인다
    B1R3: AI에게 더 궁금한 질문을 하나만 더 받아 답을 보충한다
    B2R1: 형식이 정리되어 있으니 그대로 제출한다
    B2R2: 내가 말하고 싶은 부분이 잘 보이도록 순서와 내용을 다시 본다
    B2R3: AI에게 흐름이 끊기거나 너무 빈칸처럼 보이는 부분을 표시하게 한 뒤 보충한다
    B3R1: 좋은 문장과 내 메모가 들어갔으니 그대로 제출한다
    B3R2: 내 메모에서 살아 있던 표현이 사라지지 않았는지 확인한다
    B3R3: AI에게 너무 일반적이거나 과한 문장을 표시하게 한 뒤 내 말로 고친다
    C1R1: 그대로 제출한다
    C1R2: 내가 실제로 하지 않은 말이나 경험을 직접 지운다
    C1R3: AI에게 내가 설명하기 어려운 문장을 표시하게 한 뒤 고친다
    C2R1: 내 정보가 들어갔으니 그대로 제출한다
    C2R2: '왜 좋아하는지, 왜 그렇게 생각하는지 이유를 덧붙인다'
    C2R3: AI에게 이 글을 읽고 나에 대해 더 궁금한 점을 물어보게 한 뒤 보충한다
    C3R1: 다시 썼으니 그대로 제출한다
    C3R2: 왜 그 내용에 동의하는지 내 경험과 연결한다
    C3R3: AI에게 친구나 선생님이 물어볼 만한 질문을 만들게 한 뒤 대답하기 어려운 부분을 고친다
