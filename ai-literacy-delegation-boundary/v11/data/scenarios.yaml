selfintro:
  id: selfintro
  category: 1
  categoryName: 새 학기
  title: 자기소개 글
  version: v1
  learningMessage: AI가 쓴 자기소개에는 내가 말하지 않은 내가 섞일 수 있다.
  aiSuitability: mid
  timeBudgetSec: 720
  domainPool:
  - 자기지식
  - 표현력
  - 정리력
  - 검수능력
  - 자기검증
  - 자기성찰
  - 비판적 사고
  domainLabel: 자기지식
  situation:
    text: '새 학기 첫날, 선생님이 반 게시판에 붙일 자기소개 글을 내일 아침까지 써 오라고 하셨다. 100자에서 200자 정도면 되고, 좋아하는 것, 기억나는 일, 올해 해 보고 싶은 일을 넣으면 된다고 했다.
      집에 와서 빈 종이를 보니 뭘 써야 할지 바로 떠오르지는 않았다.'
    image: ../images/s01_ch1.webp
  tier1:
  - id: A
    label: 내 이야기를 먼저 찾아본다
    desc: '완벽하지 않아도 내 단어, 내 기억, 내 초안에서 시작한다.'
    lesson: 내 자리에서 시작했다 — AI를 쓰더라도 나를 대신 소개하게 하지 않았다.
    delegation: +
    knowledge: +
    basePoint: 10
    varPoint: 15
    discountTags:
      humanCentric: 중심잡기
      domain:
      - 자기이해
  - id: B
    label: AI에게 시작을 도움받는다
    desc: 'AI를 질문자, 구조 제공자, 초안 제공자로 쓰면서 시작을 도움받는다.'
    lesson: AI로 시작을 열었다 — 내가 질문에 답하고 내 경험을 넣지 않으면 글이 일반적으로 흐를 수 있다.
    delegation: '-'
    knowledge: '-'
    basePoint: 10
    varPoint: 0
    discountTags:
      humanCentric: 중심잡기
      domain:
      - 표현력
  - id: C
    label: AI에게 자기소개를 맡겨본다
    desc: AI에게 자기소개 결과물을 먼저 맡기는 길이다.
    lesson: 결과물부터 맡겼다 — 검토 단계에서 내 재료와 말투를 얼마나 되찾는지가 중요하다.
    delegation: '0'
    knowledge: '0'
    basePoint: 10
    varPoint: 8
    discountTags:
      humanCentric: 성찰하기
      domain:
      - 검토력
  tier2:
    A:
    - id: A1
      label: 나를 떠올리는 단어에서 시작해 직접 글을 쓴다
      delta:
        afterA:
          delegation: ++
          knowledge: ++
        afterB:
          delegation: +
          knowledge: +
        afterC:
          delegation: +
          knowledge: +
      lesson: 내가 고른 단어에서 글이 시작됐다 — 자기 안에서 재료를 찾는 것이 자기소개의 출발점이다.
      basePoint: 10
      varPoint: 25
      discountTags:
        humanCentric: 중심잡기
        domain:
        - 자기이해
        - 표현력
        strongDomain:
        - 자기이해
    - id: A2
      label: 나를 소개할 만한 일을 떠올려 짧은 이야기로 쓴다
      delta:
        afterA:
          delegation: +
          knowledge: +
        afterB:
          delegation: +
          knowledge: +
        afterC:
          delegation: +
          knowledge: +
      lesson: 실제로 겪은 일에서 글이 나왔다 — 경험이 자기소개의 근거가 된다.
      basePoint: 10
      varPoint: 12
      discountTags:
        humanCentric: 중심잡기
        domain:
        - 자기이해
        - 표현력
        strongDomain:
        - 자기이해
    - id: A3
      label: 서툴어도 일단 초안을 쓴 뒤 필요한 도움만 받는다
      delta:
        afterA:
          delegation: '0'
          knowledge: +
        afterB:
          delegation: '-'
          knowledge: '0'
        afterC:
          delegation: '0'
          knowledge: '0'
      lesson: 짧고 서툴어도 내가 먼저 썼다 — 내 말투는 살아 있지만 더 다듬을 여지가 남는다.
      basePoint: 10
      varPoint: 0
      discountTags:
        humanCentric: 성찰하기
        domain:
        - 표현력
        - 검토력
        strongDomain:
        - 표현력
    B:
    - id: B1
      label: AI 질문에 떠오르는 만큼 답하고 글을 만든다
      delta:
        afterA:
          delegation: '-'
          knowledge: '-'
        afterB:
          delegation: '--'
          knowledge: '-'
        afterC:
          delegation: '--'
          knowledge: '-'
      lesson: AI 질문에 답하며 글이 시작됐다. 다만 답이 구체적이지 않으면 AI가 빈자리를 채워 일반적인 글로 흐를 수 있다.
      basePoint: 10
      varPoint: 0
      discountTags:
        humanCentric: 중심잡기
        domain:
        - 탐색력
        - 자기이해
        strongDomain:
        - 탐색력
    - id: B2
      label: AI에게 글의 순서를 받고 내 이야기에 맞게 바꾼다
      delta:
        afterA:
          delegation: '0'
          knowledge: '0'
        afterB:
          delegation: '0'
          knowledge: '0'
        afterC:
          delegation: '0'
          knowledge: '0'
      lesson: AI 구조에 내 이야기를 채웠다 — 틀은 정리됐지만 내용이 틀에 맞춰 들어간 느낌이 남을 수 있다.
      basePoint: 10
      varPoint: 5
      discountTags:
        humanCentric: 융합하기
        domain:
        - 표현력
        - 자기이해
        strongDomain:
        - 표현력
    - id: B3
      label: AI 초안을 받고 좋아 보이는 문장과 내 메모를 섞어 글을 만든다
      delta:
        afterA:
          delegation: ++
          knowledge: ++
        afterB:
          delegation: ++
          knowledge: ++
        afterC:
          delegation: ++
          knowledge: ++
      lesson: AI 문장과 내 메모가 섞였다 — 어떤 표현이 내 이야기의 중심인지 확인하는 것이 핵심이다.
      basePoint: 10
      varPoint: 25
      discountTags:
        humanCentric: 융합하기
        domain:
        - 검토력
        - 표현력
        strongDomain:
        - 검토력
    C:
    - id: C1
      label: 아무 정보 없이 AI에게 바로 써달라고 한다
      delta:
        afterA:
          delegation: '-'
          knowledge: '-'
        afterB:
          delegation: '--'
          knowledge: '-'
        afterC:
          delegation: '--'
          knowledge: '-'
      lesson: AI가 아무 정보 없이 만든 글에서 시작했다 — 문장은 매끄럽지만 내 이야기는 거의 없다.
      basePoint: 10
      varPoint: -10
      discountTags:
        humanCentric: 성찰하기
        domain:
        - 검토력
        strongDomain:
        - 검토력
    - id: C2
      label: 내 정보 몇 가지만 넣어 AI에게 써달라고 한다
      delta:
        afterA:
          delegation: '0'
          knowledge: '0'
        afterB:
          delegation: '0'
          knowledge: '0'
        afterC:
          delegation: '0'
          knowledge: '0'
      lesson: 기본 정보는 들어갔지만 이유와 맥락은 부족했다 — 검토에서 얼마나 채우는지가 중요하다.
      basePoint: 10
      varPoint: 5
      discountTags:
        humanCentric: 성찰하기
        domain:
        - 자기이해
        - 검토력
        strongDomain:
        - 자기이해
    - id: C3
      label: AI 글을 받은 뒤 내 글로 다시 쓴다
      delta:
        afterA:
          delegation: +
          knowledge: +
        afterB:
          delegation: +
          knowledge: +
        afterC:
          delegation: +
          knowledge: +
      lesson: 'AI 흐름을 참고해 다시 썼다 — 내가 동의하는 내용만 골랐는지, 내 이야기가 들어갔는지가 핵심이다.'
      basePoint: 10
      varPoint: 15
      discountTags:
        humanCentric: 융합하기
        domain:
        - 표현력
        - 검토력
        strongDomain:
        - 검토력
  results:
    A1:
      text: 내가 고른 단어를 바탕으로 직접 이어 썼다. 단어마다 뭔가 설명하려는 문장이 있었지만 연결이 어색하거나 설명이 부족한 곳도 있었다.
      deltaR2: 3
      deltaR3: 6
      summary: 내가 고른 단어로 시작한 자기소개
      lesson: 자기 단어에서 글이 시작됐다 — 어색해도 내 재료가 들어간 자리다.
    A2:
      text: 실제로 겪은 일을 짧게 적은 이야기형 초안이 만들어졌다. 사건은 보이지만 그 일이 왜 나를 보여주는지는 아직 분명하지 않았다.
      deltaR2: 5
      deltaR3: 11
      summary: 실제 경험이 들어간 자기소개
      lesson: 경험이 들어오면 자기소개에 무게가 생긴다 — 왜 그 경험인지가 연결될 때 글이 완성된다.
    A3:
      text: 짧고 서툴지만 내가 직접 쓴 초안이 만들어졌다. 내 말투는 살아 있었지만 내용이 부족하거나 반복되는 부분이 있었다.
      deltaR2: 9
      deltaR3: 17
      summary: 내 말투가 살아 있는 초안
      lesson: '서툴어도 먼저 썼다 — 내 말투는 살아 있고, 더 다듬을 자리도 보인다.'
    B1:
      text: AI가 준 질문에 답한 내용을 바탕으로 자기소개 초안이 만들어졌다. 시작은 쉬웠지만 답이 짧거나 경험이 빠진 자리가 있었다.
      deltaR2: 13
      deltaR3: 23
      summary: AI 질문에서 시작한 자기소개
      lesson: AI 질문이 시작을 도왔다 — 내 이유와 경험이 들어가야 내 자기소개가 된다.
      hiddenIssues:
      - AI 질문에 짧게만 답해 왜 그렇게 생각하는지가 빠진 자리가 있음
      - 실제 경험이 없는 답이 그대로 글로 들어갈 수 있음
      - 문장은 자연스럽지만 내 특징을 드러내는 내용이 약함
    B2:
      text: AI가 준 자기소개 순서를 바탕으로 내 정보를 넣고 일부 순서를 바꿨다. 구조는 정리됐지만 빈칸을 채운 느낌이 남았다.
      deltaR2: 8
      deltaR3: 15
      summary: AI 구조에 내 이야기를 채운 자기소개
      lesson: 구조는 빌렸지만 내용은 내 것이었다 — 내가 말하고 싶은 부분이 잘 보이는지 확인이 필요하다.
    B3:
      text: AI 초안에서 좋아 보이는 문장을 고르고 내가 쓴 짧은 메모를 함께 넣어 초안이 만들어졌다. 문장은 자연스럽지만 어느 표현이 내 이야기의 중심인지 흐릿했다.
      deltaR2: 5
      deltaR3: 12
      summary: AI 문장과 내 메모가 섞인 자기소개
      lesson: AI 표현과 내 메모가 섞였다 — 내 메모의 표현이 살아 있는지 확인하는 것이 핵심이다.
    C1:
      text: AI가 아무 정보 없이 만든 일반적인 자기소개 초안이 만들어졌다. 문장은 매끄럽지만 실제 나에 대한 정보는 거의 없었다.
      deltaR2: 5
      deltaR3: 12
      summary: AI가 상상한 학생의 자기소개
      lesson: AI가 상상한 글에는 내가 없다 — 검토에서 얼마나 내 이야기를 되찾는지가 전부다.
    C2:
      text: '이름, 취미, 좋아하는 과목, 성격 같은 기본 정보를 바탕으로 AI가 만든 초안이 만들어졌다. 내 정보는 들어 있지만 이유와 맥락이 부족했다.'
      deltaR2: 10
      deltaR3: 20
      summary: 내 정보가 들어간 AI 자기소개
      lesson: 정보가 들어가도 이유가 없으면 글이 얕아진다 — 왜 그것을 좋아하는지가 내 자기소개를 만든다.
      hiddenIssues:
      - 기본 정보는 들어 있지만 이유와 경험이 빠진 자리가 있음
      - 내가 실제로 어떤 사람인지보다 항목 나열로 보일 수 있음
    C3:
      text: AI 글의 흐름이나 표현을 참고하되 내가 동의하는 내용만 골라 다시 썼다. AI에서 출발했지만 일부 판단은 내가 한 상태였다.
      deltaR2: 11
      deltaR3: 20
      summary: AI 흐름을 참고해 다시 쓴 자기소개
      lesson: AI 흐름에 맞추다 보면 내 이야기가 덜 들어갈 수 있다 — 내가 동의한 내용이 내 경험과 연결되는지 확인이 필요하다.
      hiddenIssues:
      - AI 흐름을 따르다 내 이야기가 덜 들어간 부분이 남을 수 있음
      - 내가 실제로 설명할 수 있는 문장인지 확인이 필요함
  reviews:
  - id: R1
    label: 바로 반 게시판 글로 넘긴다
    desc: 확인하지 않고 바로 넘겼다. 빠르게 끝났지만 어색한 표현이나 내가 책임지기 어려운 내용이 남을 수 있다.
    boostType: none
    lesson: 검토를 건너뛰었다 — 검증할 기회를 놓쳤다.
    points: 10
    discountTags:
      humanCentric: ''
      domain: []
      strongDomain: []
  - id: R2
    label: 어색한 문장과 내 말투가 아닌 표현만 고친다
    desc: '어색한 문장과 내 말투가 아닌 표현을 골라 고쳤다. 글의 표면은 다듬었지만, 내용의 중심까지 모두 확인한 것은 아니다.'
    boostType: explicit
    lesson: 한 번 훑어 명백한 오류를 잡았다. 도메인지식 +1
    points: 18
    discountTags:
      humanCentric: 성찰하기
      domain:
      - 검토력
      - 표현력
      strongDomain:
      - 검토력
  - id: R3
    label: 친구가 물어봐도 내가 설명할 수 있는 내용인지 다시 본다
    desc: 친구가 물어봐도 내가 설명할 수 있는 내용인지 처음부터 다시 확인했다. 자기소개를 내가 책임질 수 있는 글로 만드는 검토다.
    boostType: all
    lesson: 처음부터 다시 읽으니 빠진 것이 보였다. 도메인지식 +3
    points: 30
    discountTags:
      humanCentric: 성찰하기
      domain:
      - 검토력
      - 자기이해
      strongDomain:
      - 검토력
  reviewSupplements:
    A1R1: 직접 고른 단어와 내 말로 이어 쓴 자기소개를 그대로 냈다. 일부 문장이 갑자기 튀거나 왜 그 단어가 나를 보여주는지 이해하기 어려운 부분이 남았다.
    A1R2: '단어마다 짧은 설명을 덧붙이고 문장 흐름을 다시 봤다. 내가 고른 단어와 설명이 더 잘 이어져, 내가 어떤 사람인지 조금 더 또렷하게 보이는 자기소개가 됐다.'
    A1R3: AI에게 읽고 궁금한 점을 물어보게 한 뒤 내가 답할 수 있는 내용만 보충했다. 독자가 궁금해할 부분을 발견하고 실제로 답할 수 있는 내용만 골라 채운 자기소개가 됐다.
    A2R1: 실제로 겪은 일을 짧게 적은 이야기를 그대로 냈다. 경험은 들어 있지만 읽는 사람이 그 경험에서 내 특징을 스스로 짐작해야 하는 자기소개가 됐다.
    A2R2: 이 일이 왜 나를 보여주는지 한 문장을 덧붙였다. 경험과 내 특징이 연결되어 친구들이 나를 조금 더 이해하기 쉬운 자기소개가 됐다.
    A2R3: 'AI에게 이야기를 읽고 떠오르는 내 특징을 물어본 뒤 맞는 것만 골랐다. AI가 제안한 특징 중 실제 나와 맞는 것만 골라, 경험과 성격이 연결된 자기소개가 됐다.'
    A3R1: 짧고 어색해도 그대로 냈다. 내 말투는 살아 있지만 친구들이 나를 알기에는 정보가 부족하거나 정리가 덜 된 자기소개가 됐다.
    A3R2: '다시 읽어보고 빠진 내용을 추가하거나 반복을 줄였다. 처음보다 구체적인 내용이 들어가고 어색한 부분이 줄어, 서툴지만 나를 보여주는 힘이 커진 자기소개가 됐다.'
    A3R3: AI에게 추가하거나 줄이면 좋을 곳을 표시하게 한 뒤 내가 고른 부분만 고쳤다. AI의 제안을 모두 따르지 않고 내게 맞는 내용만 골라 보충하거나 줄인 자기소개가 됐다.
    B1R1: AI가 준 질문에 답한 내용을 그대로 냈다. 질문에 답한 내용은 들어 있지만 왜 그렇게 생각하는지나 실제 경험은 부족한 자기소개가 됐다.
    B1R2: 답마다 이유나 경험을 한 문장씩 덧붙였다. AI 질문에서 시작했지만 내 이유와 경험이 들어가면서 조금 더 나다운 자기소개가 됐다.
    B1R3: AI에게 더 궁금한 질문을 하나만 더 받아 답을 보충했다. AI가 던진 추가 질문을 통해 빠진 내용을 발견하고 내가 답한 내용으로 보충한 자기소개가 됐다.
    B2R1: AI가 준 순서에 맞게 내 정보를 넣어 그대로 냈다. 읽기 편한 형식은 갖췄지만 내 이야기는 정해진 틀에 맞춰 넣은 정도로만 보이는 자기소개가 됐다.
    B2R2: 내가 말하고 싶은 부분이 잘 보이도록 순서와 내용을 다시 봤다. AI가 준 구조를 그대로 따르지 않고 내가 중요하게 생각한 내용이 더 잘 드러나도록 정리한 자기소개가 됐다.
    B2R3: AI에게 흐름이 끊기거나 너무 빈칸처럼 보이는 부분을 표시하게 한 뒤 보충했다. 구조의 빈약한 부분을 찾고 그 자리에 내 이야기를 보충한 자기소개가 됐다.
    B3R1: 좋은 문장과 내 메모가 들어갔으니 그대로 냈다. AI 문장과 내 메모가 함께 들어 있지만 어떤 부분이 내 말이고 어떤 부분이 AI의 표현인지 애매한 자기소개가 됐다.
    B3R2: 내 메모에서 살아 있던 표현이 사라지지 않았는지 확인했다. 내 짧은 메모에 있던 솔직한 표현을 되살려 더 내 말에 가까운 자기소개가 됐다.
    B3R3: AI에게 너무 일반적이거나 과한 문장을 표시하게 한 뒤 내 말로 고쳤다. AI의 도움으로 과한 문장을 찾고 내가 실제로 말할 수 있는 표현으로 바꾼 자기소개가 됐다.
    C1R1: 아무 정보 없이 AI가 만든 글을 그대로 냈다. 글은 자연스럽지만 내가 누구인지보다 AI가 상상한 학생의 모습이 더 많이 남는 자기소개가 됐다.
    C1R2: 내가 실제로 하지 않은 말이나 경험을 직접 지웠다. 사실과 다른 부분은 줄었지만 남은 글도 아직 내 이야기가 충분하지 않은 자기소개가 됐다.
    C1R3: AI에게 내가 설명하기 어려운 문장을 표시하게 한 뒤 고쳤다. 내가 책임지기 어려운 문장을 찾아내고 일부를 내 말로 바꾸었지만 여전히 내 재료를 더 넣어야 하는 자기소개가 됐다.
    C2R1: 기본 정보 몇 가지를 바탕으로 AI가 만든 글을 그대로 냈다. 내 정보가 들어 있어 그럴듯해 보이지만 왜 그것을 좋아하는지나 실제로 어떤 사람인지는 약한 자기소개가 됐다.
    C2R2: '왜 좋아하는지, 왜 그렇게 생각하는지 이유를 덧붙였다. 기본 정보 뒤에 내 이유가 붙어 단순 정보보다 내 생각이 조금 더 보이는 자기소개가 됐다.'
    C2R3: AI에게 이 글을 읽고 나에 대해 더 궁금한 점을 물어보게 한 뒤 보충했다. AI가 던진 질문을 통해 기본 정보 뒤에 숨은 내 이야기를 조금 더 채운 자기소개가 됐다.
    C3R1: AI 흐름을 참고해 다시 쓴 글을 그대로 냈다. 문장은 내가 다시 썼지만 AI 흐름에 맞추느라 내 이야기가 덜 들어간 부분이 남는 자기소개가 됐다.
    C3R2: 왜 그 내용에 동의하는지 내 경험과 연결했다. AI 문장 중 내가 인정한 내용을 내 경험과 연결해 선택의 이유가 보이는 자기소개가 됐다.
    C3R3: AI에게 친구나 선생님이 물어볼 만한 질문을 만들게 한 뒤 대답하기 어려운 부분을 고쳤다. 질문을 예상해보며 내가 설명하기 어려운 부분을 고치고 더 책임질 수 있는 자기소개가 됐다.
