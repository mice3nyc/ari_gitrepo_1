# 마이크로 항로 — 2차 선택(tier2) 위임 깊이 보정값 (elem)
#   -1 = 직접 쪽(스스로 더 함/돌아옴) / 0 = 유지 / +1 = 위임 쪽(더 맡김)
#   라벨 읽고 수기 판정 — 아리공 26.07.01, mid 6/12 기준 참조. 값만 바꾸면 빌드 반영.

bookreport:
  A1: 0    # 직접,유지
  A2: 0    # 직접,유지
  A3: 1    # AI에 설명 요청=도움→위임쪽
  B1: 0    # AI 산출물 분류에 머묾,유지
  B2: -1   # 책 펼쳐 직접 확인→직접쪽
  B3: -1   # AI 최소화·질문만→직접쪽
  C1: 1    # 거의 그대로=깊은 위임
  C2: 0    # 표면수정,유지
  C3: -1   # 책 보고 내 느낌=돌아옴

animaltalk:
  A1: 0    # 직접,유지
  A2: 0    # 직접,유지
  A3: 1    # 부족분만 AI→위임쪽
  B1: 0    # AI서 고르기,유지
  B2: -1   # 내가 설명 가능한 것 필터→직접쪽
  B3: -1   # AI 질문받되 내 답 준비→직접쪽
  C1: 1    # 그대로 읽기=깊은 위임
  C2: 0    # 표면수정,유지
  C3: -1   # 안 보고 설명=소화·돌아옴

jobcard:
  A1: 0    # 얕은 직접,유지
  A2: 0    # 직접,유지
  A3: -1   # 실제 하는 일 조사=직접 심화
  B1: 1    # AI 추천에 기댐→위임쪽
  B2: 0    # 추천 이유 검토,유지
  B3: -1   # 실제 하루 비교=직접
  C1: 1    # 그대로 쓰고 꾸미기만=깊은 위임
  C2: 0    # 표면수정,유지
  C3: -1   # 내 이유 넣어 고침=돌아옴

classmascot:
  A1: 0    # 직접,유지
  A2: 0    # 직접 기준 세움,유지
  A3: 1    # 깔끔하게 할 방법만 AI→위임쪽
  B1: 1    # AI서 고르기만=기댐→위임쪽
  B2: 0    # 내 재료 넣되 다시 AI,유지
  B3: -1   # 내가 직접 수정→직접쪽
  C1: 1    # 그대로 제출=깊은 위임
  C2: 0    # 성찰 멈춤,유지
  C3: -1   # 우리 반 이야기로 돌아옴

historycheck:
  A1: 0    # 얕은 직접,유지
  A2: -1   # 여러 자료 교차확인=직접 심화
  A3: -1   # 검색어 바꿔 더 찾음=직접 심화
  B1: 1    # AI에 재확인=기댐→위임쪽
  B2: -1   # 직접 확인할 말 적음→직접쪽
  B3: -1   # 뉴스·백과·실록 직접 조사=돌아옴
  C1: 1    # 신기해서 그대로=깊은 위임
  C2: 0    # 성찰 멈춤,유지
  C3: -1   # 인터넷 검색 확인=돌아옴
