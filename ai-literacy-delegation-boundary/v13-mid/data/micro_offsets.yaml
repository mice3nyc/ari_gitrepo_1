  B2: 0    # 내 약점을 말하고 순서만 받는다
  B3: 1    # 요약본·예상문제 산출물을 받는다
  C1: 0    # 친구·학원 계획표를 따라 한다
  C2: 0    # 작년 시험지·요약 자료에 기댄다
  C3: 0    # 부담 없는 일부터 한다 (회피 — 유지)
