# 마이크로 항로 — 2차 선택(tier2) 위임 깊이 보정값 (SPEC-report §4d-2, 6/12 3차 게이트 ①깊이 매핑 채택)
#
# 값의 뜻: tier1 칸 기준 2차 선택이 어느 쪽으로 움직였나
#   -1 = 직접 쪽으로 (스스로 더 함 / 돌아옴)
#    0 = 그 자리 유지
#   +1 = 위임 쪽으로 (더 맡김 / 더 기댐)
#
# ⚠ tier2 번호(1·2·3)는 위임 깊이 순서가 아니다 — 라벨을 읽고 수기로 판정한 초안 (아리공 6/12).
#   피터공·다연샘 검수 환영: 값만 바꾸면 빌드에 반영된다. 주석은 판정 근거용 라벨 요약.

selfintro:
  A1: 0    # 나를 떠올리는 단어에서 시작해 직접 쓴다
  A2: 0    # 소개할 만한 일을 떠올려 짧은 이야기로 쓴다
  A3: 1    # 초안을 쓴 뒤 필요한 도움만 받는다 — 도움 받음
  B1: -1   # AI 질문에 내가 답하고 글은 내가 만든다
  B2: 0    # 글의 순서만 받고 내 이야기로 바꾼다
  B3: 1    # AI 초안을 받아 문장과 메모를 섞는다 — 더 맡김
  C1: 1    # 아무 정보 없이 바로 써달라고 한다 — 가장 깊은 위임
  C2: 0    # 내 정보 몇 가지만 넣어 써달라고 한다
  C3: -1   # AI 글을 받은 뒤 내 글로 다시 쓴다 — 돌아옴

groupwork:
  A1: 0    # 모둠원들과 발표 질문을 먼저 정한다
  A2: 0    # 역할을 나누고 각자 맡을 내용을 정한다
  A3: -1   # 맡은 내용을 먼저 이해하고 말로 정리한다 — 깊은 직접
  B1: 0    # AI에게 주제와 개요를 부탁한다
  B2: 1    # AI에게 슬라이드 문구 생성을 맡긴다 — 산출물 위임
  B3: -1   # 내가 찾은 자료를 바탕으로 초안만 받는다
  C1: 0    # 회의 없이 각자 찾아 합친다 (위임 아닌 회피 — 유지)
  C2: 1    # 한 사람에게 많이 맡긴다 — 사람에게 전체 위임
  C3: 0    # 자료보다 발표 모양을 먼저 만든다

eorinwangja:
  A1: -1   # 처음부터 읽고 짧게라도 쓴다 — 가장 직접
  A2: 0    # 밑줄 친 문장·장면 중심으로 쓴다
  A3: -1   # 이해 안 되는 부분을 붙들고 쓴다 — 깊은 직접
  B1: 1    # 요약으로 줄거리 파악, 한 장면만 책에서 — 요약 의존
  B2: 0    # 유명한 문장의 앞뒤 장면을 직접 읽는다
  B3: -1   # 책을 읽으며 AI에게 묻고 내 생각을 정리한다
  C1: 1    # AI에게 줄거리와 초안을 바로 부탁한다
  C2: 0    # 검색한 줄거리만 보고 쓴다
  C3: 0    # 유명한 문장이나 분위기만으로 쓴다

career:
  A1: 0    # 자주 보는 것·좋아하는 것을 적어본다
  A2: 0    # 걱정하는 말을 적어본다
  A3: -1   # 관심을 작은 실험으로 바꿔본다 — 행동까지 직접
  B1: 1    # 유망한 일을 추천받는다 — 판단 위임
  B2: 0    # 내 관심으로 새 일을 제안받는다
  B3: -1   # AI로 작은 결과물을 만들어보고 생각한다
  C1: 0    # 유튜브·뉴스에서 본 길을 찾아본다
  C2: 1    # 남이 좋다고 한 길을 따라본다 — 판단 전부 타인
  C3: 0    # 인기 학과·안정적인 길을 먼저 찾아본다

studyplan:
