# 항로 AI 표시 — 선택지별 AI 개입 여부 (SPEC-report §4e-1, R3.6, 피터공 6/12 제안)
#
# 값의 뜻: 그 선택지의 행동에 AI가 도구·주체로 명시 또는 함의되는가
#   true  = AI 개입 (항로 비용 열 옆에 AI 칩 표시)
#   false = AI 없음 (직접 / 사람에게 위임 / 검색·자료 / 회피)
#
# 판정 기준: 선택지 라벨의 행동 기준. 검색·유튜브·뉴스·친구·학원·작년 시험지는 false.
#   tier1(A/B/C)은 갈래 라벨 기준, tier2는 개별 선택지 라벨 기준.
# 수기 태깅 초안 (아리공 6/12). 피터공·다연샘 검수 환영: 값만 바꾸면 빌드에 반영된다.

selfintro:
  A: false   # 내 이야기를 먼저 찾아본다
  B: true    # AI에게 시작을 도움받는다
  C: true    # AI에게 자기소개를 맡겨본다
  A1: false  # 나를 떠올리는 단어에서 시작해 직접 글을 쓴다
  A2: false  # 나를 소개할 만한 일을 떠올려 짧은 이야기로 쓴다
  A3: true   # 초안을 쓴 뒤 필요한 도움만 받는다 — 이 시나리오의 도움 주체는 AI
  B1: true   # AI 질문에 떠오르는 만큼 답하고 글을 만든다
  B2: true   # AI에게 글의 순서를 받고 내 이야기에 맞게 바꾼다
  B3: true   # AI 초안을 받고 문장과 내 메모를 섞는다
  C1: true   # 아무 정보 없이 AI에게 바로 써달라고 한다
  C2: true   # 내 정보 몇 가지만 넣어 AI에게 써달라고 한다
  C3: true   # AI 글을 받은 뒤 내 글로 다시 쓴다 — 돌아옴이지만 AI 개입은 있었음

groupwork:
  A: false   # 모둠과 먼저 방향을 정한다
  B: true    # AI로 발표 준비를 빠르게 만들어본다
  C: false   # 각자 따로 준비하거나 발표 모양부터 만든다
  A1: false  # 모둠원들과 발표 질문을 먼저 정한다
  A2: false  # 역할을 나누고 각자 맡을 내용을 정한다
  A3: false  # 맡은 내용을 먼저 이해하고 말로 정리한다
  B1: true   # AI에게 발표 주제와 개요를 부탁한다
  B2: true   # AI에게 슬라이드 문구를 만들어 달라고 한다
  B3: true   # 내가 찾은 자료를 바탕으로 AI에게 대본 초안을 받는다
  C1: false  # 회의 없이 각자 자료를 찾아 합친다 — 검색·자료
  C2: false  # 발표 잘하는 친구에게 많이 맡긴다 — 사람-위임
  C3: false  # 자료보다 발표 모양을 먼저 만든다

eorinwangja:
  A: false   # 책을 직접 읽고 쓴다
  B: true    # AI나 다른 도움으로 읽을 실마리를 잡는다
  C: false   # 책 읽기를 건너뛰고 독후감을 만들어본다 — 건너뛰기 자체는 AI 무관(하위에 갈림)
  A1: false  # 처음부터 읽고 짧게라도 독후감을 쓴다
  A2: false  # 밑줄 친 문장이나 장면을 중심으로 쓴다
  A3: false  # 이해되지 않는 부분을 붙들고 쓴다
  B1: true   # AI나 검색 요약으로 줄거리 파악, 한 장면은 책에서
  B2: false  # 유명한 문장·소개 자료의 앞뒤 장면을 직접 읽는다 — 자료, AI 아님
  B3: true   # 책을 읽으며 AI에게 묻고 내 생각을 정리한다
  C1: true   # AI에게 줄거리와 독후감 초안을 바로 부탁한다
  C2: false  # 검색한 줄거리나 영상 소개만 보고 쓴다 — 검색·영상
  C3: false  # 유명한 문장이나 분위기만으로 쓴다

career:
  A: false   # 내가 끌리는 것과 걱정하는 것부터 찾아본다
  B: true    # AI로 가능성을 넓혀본다
  C: false   # 사람들이 좋다고 말하는 길을 먼저 찾아본다
  A1: false  # 자주 보는 것과 좋아하는 것을 적어본다
  A2: false  # AI 시대에 걱정하는 말을 적어본다 — AI는 주제이지 도구 아님
  A3: false  # 관심을 작은 실험으로 바꿔본다
  B1: true   # AI에게 유망한 일을 추천받는다
  B2: true   # AI에게 내 관심으로 만들 새 일을 제안받는다
  B3: true   # AI로 작은 결과물을 만들어보고 생각한다
  C1: false  # 유튜브나 뉴스에서 본 길을 찾아본다
  C2: false  # 부모님·친구·선생님이 좋다고 한 길을 따라본다 — 사람
  C3: false  # 인기 학과·자격증·안정적인 길을 먼저 찾아본다

studyplan:
  A: false   # 먼저 내 실력을 확인한다
  B: true    # AI로 시험공부를 도와보게 한다
  C: false   # 공부한 느낌이 드는 쉬운 방법에서 시작한다
  A1: false  # 문제를 풀어보고 약한 단원을 찾는다
  A2: false  # 범위표로 아는/모르는 단원을 나눈다
  A3: false  # 자신감과 실제 풀이를 비교한다
  B1: true   # AI에게 2주 계획표를 통째로 받는다
  B2: true   # AI에게 약점을 말하고 공부 순서를 받는다
  B3: true   # 약점·범위를 넣어 AI에게 요약본·예상문제를 받는다
  C1: false  # 친구나 학원 계획표를 따라 한다 — 사람
  C2: false  # 작년 시험지나 인터넷 요약 자료에 기댄다 — 자료
  C3: false  # 부담 없는 일부터 한다 — 회피
