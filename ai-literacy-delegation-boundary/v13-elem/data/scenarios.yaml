      text: AI 답을 바로 믿지 않고 다른 자료와 비교하는 것이 가장 좋은 방법이다.
      deltaR2: 8
      deltaR3: 10
      summary: AI가 알려 준 검색어로 뉴스와 백과사전에서 직접 찾아봤다.
      lesson: AI가 알려 준 말로 직접 인터넷에서 찾아봤다 — AI는 출발점이었고, 사실 확인은 내가 했다.
    C1:
      text: 발표는 재미있을 수 있지만, 사실 확인 없이 그대로 쓰면 틀린 정보를 제출할 위험이 크다.
