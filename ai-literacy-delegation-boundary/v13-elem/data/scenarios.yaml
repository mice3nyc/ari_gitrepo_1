  reportData:
    A1R1:
      pathSummary: 코끼리 유배 이야기를 직접 인터넷에 검색 → 검색 결과 맨 위 글을 열어 읽고 카드에 → 코끼리 유배 이야기가 믿음직해 보여서 그
      caption1: 사회 수행평가로 조선 시대 사례 카드를 만들어야 하는데, 태종 때 코끼리가 섬으로 유배를 갔다는 이야기를 발견했다.
      caption2: 코끼리 유배 이야기를 직접 인터넷에 검색해 보기로 했다.
      caption3: 검색 결과 맨 위 글을 열어 읽고 카드에 쓸 내용을 골랐다.
      caption4: 코끼리 유배 이야기가 믿음직해 보여서 그대로 수행평가 카드로 제출했다.
      caption5: 첫 글만 보고 출처 확인이 약하다. 재미있다는 이유로 바로 넣어 사실인지 확인하는 과정이 부족하다.
      reflection: 확인 없이 바로 카드를 냈다 — 재미있다는 느낌이 사실 확인을 대신할 수 없다는 것을 나중에 알았다.
