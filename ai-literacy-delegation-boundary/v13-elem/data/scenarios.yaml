  reportData:
    A1R1:
      pathSummary: 우리 반 캐릭터에 뭐가 어울릴지 먼저 떠 → 좋아하는 동물과 물건을 이것저것 넣어 캐 → 캐릭터가 마음에 들어서 친구 반응이나 설
      caption1: 우리 반 캐릭터 공모전이 열렸다. 뽑힌 캐릭터는 교실 문 앞과 반 게시판에 1년 동안 쓰인다.
      caption2: 우리 반 캐릭터에 뭐가 어울릴지 먼저 떠올리고, 거기서 그림을 시작하기로 했다.
      caption3: 좋아하는 동물과 물건을 이것저것 넣어 캐릭터를 그렸다.
      caption4: 캐릭터가 마음에 들어서 친구 반응이나 설명 없이 바로 제출했다.
      caption5: 직접 그렸지만 우리 반다움 약하다. 보기 좋은 결과에서 멈춰 우리 반을 대표하는 이유는 충분히 확인하지 않았다.
      reflection: 그림이 괜찮아 보여서 바로 냈다 — 우리 반다운 이유가 충분한지 확인하지 않은 채 제출이 끝났다.
