      interpretation: "<b>직접 처리</b> 패턴 — 자기 판단으로 시작하는 학생."
    B_dominant:
      pattern: "B 우세"
      interpretation: "<b>AI 위임</b> 패턴 — AI 활용 판단을 빠르게 결정하는 스타일."
    C_dominant:
      pattern: "C 우세"
