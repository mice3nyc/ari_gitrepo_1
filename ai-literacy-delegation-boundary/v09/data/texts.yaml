    mixed:
      pattern: "혼합"
      interpretation: "상황마다 다른 길을 골랐다 — <b>유연한 판단력</b>."

  # ── 카드 누적 분포 (3트랙) ────────────────
  card_distribution:
    human_centric_dominant: "인간중심 카드 {humanCentric}장 / 도메인 카드 {domain}장 — <b>자기 기준과 사고력</b>이 학기 통틀어 자랐다."
    domain_dominant: "인간중심 카드 {humanCentric}장 / 도메인 카드 {domain}장 — <b>실제 행동 역량</b>에서 깊은 카드가 쌓였다."
    balanced: "인간중심 카드 {humanCentric}장 / 도메인 카드 {domain}장 — 사고력과 행동 역량이 균형 있게 쌓였다."
