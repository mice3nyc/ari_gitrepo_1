stories:
  - origin_file: 03-국가유산-문화재.yaml
    origin_sid: s0303
    story:
      id: s0303
      title: 허준의 무덤
      era: 1537~1615년 허준 · 2009년 세계기록유산
      location: 파주시 진동면 하포리
      sources:
        - id: A
          type: diary
          icon: 📓
          title: 허준 후손의 일기
          sub: 증조할아버지의 산소를 찾아가는 길
          styleClass: source-diary
          templateData:
            meta: 1616년(광해군 8년) 가을 · 허준의 증손 허영(가상)
            paragraphs:
              - 증조할아버지께서 돌아가신 지 한 해가 되었다.
              - 올해 처음 산소에 성묘를 간다. 임진강을 건너 파주 진동의 산자락.
              - 증조할아버지는 어의(御醫)이셨다. 임진왜란 때 선조 대왕을 의주까지 수행하셨고, 그 공으로 호성공신 3등에 오르셨다.
              - |-
                무엇보다 증조할아버지는 {{A}}을 남기셨다. 25권의 의학서. 선조 대왕이 명하시길 — 백성이 스스로 몸을 돌볼 수 있는 책을 만들라 하셨고, 16년의 연구 끝에 완성하셨다.
              - 산소는 해발이 높은 곳에 있다. 쌍분으로, 왼쪽이 증조할아버지, 오른쪽이 증조할머니(안동김씨)이시다.
              - 증조할아버지. 당신이 남기신 책이 백 년 뒤에도, 천 년 뒤에도 사람들을 살리고 있을 것입니다.
        - id: B
          type: newspaper
          icon: 📰
          title: 신문 보도
          sub: 통일뉴스 2026.7.31
          styleClass: source-newspaper
          templateData:
            paperName: 통 일 뉴 스
            date: 2026년 7월 31일
            headline: '[기획] 동의보감 {{B}} 등재 17주년… 허준 묘는 지금'
            paragraphs:
              - |-
                2009년 7월 31일, 유네스코는 동의보감을 세계기록유산(Memory of the World)으로 등재했다. 의학 서적이 세계기록유산에 오른 것은 세계 최초다.
              - 허준(1537~1615)의 묘는 경기도 {{C}} 진동면 하포리에 있다. 경기도 기념물 제128호.
              - |-
                1991년 재미 고문서연구가가 '양천허씨족보' 기록을 바탕으로 군부대 협조를 얻어 발견했다. 쌍분 형태로 좌측이 허준, 우측이 부인 안동김씨로 추정된다.
        - id: C
          type: photo
          icon: 📷
          title: 사진 자료
          sub: 동의보감
          styleClass: source-photo
          templateData:
            photos:
              - src: photos/cat03/3-3.jpg
                alt: 동의보감
                caption: |-
                  [사진] 동의보감 목차 페이지. 허준이 16년간 연구하여 1610년 완성, 1613년 목판 간행한 {{D}}권의 방대한 의학 백과사전이다. 2009년 유네스코 세계기록유산에 등재되었다.
                credit: 허준 원저(1613). Public Domain
        - id: D
          type: oral
          icon: 🎙️
          title: 구술 인터뷰
          sub: 파주시 문화유산 해설사
          styleClass: source-oral
          templateData:
            meta: '구술자: 김종태(가상), 파주시 문화유산 해설사'
            quotes:
              - '"허준 묘가 발견된 게 1991년이에요. 임진강 건너 해발 159m 산자락에 있었는데, 족보 기록 보고 군부대 협조 얻어서 찾아간 거예요."'
              - '"쌍분이에요. 왼쪽이 허준 선생, 오른쪽이 부인. 문인석 두 기가 서 있는데 높이가 203cm."'
              - '"동의보감이 25권인데, 선조 임금이 명해서 16년 걸려 완성한 거예요. 백성이 스스로 몸을 돌볼 수 있게."'
              - '"지금은 무료로 누구나 올 수 있어요. 임진각에서 출발하는 관광 코스에 포함돼 있거든요."'
      blanks:
        A:
          answer: 동의보감
          hint: 신문 보도(B)에서 유네스코에 등재된 의학서 이름을 확인하세요.
          source: B
        B:
          answer: 세계기록유산
          hint: 구술 인터뷰(D) 또는 사진(C)에서 유네스코 등재 유형을 확인하세요.
          source: C
        C:
          answer: 파주시
          hint: 구술 인터뷰(D)에서 해설사의 소속 지역을 확인하세요.
          source: D
        D:
          answer: '25'
          hint: 일기(A) 또는 구술(D)에서 동의보감의 권수를 확인하세요.
          source: A
      choices:
        - id: A
          icon: 📓
          title: 후손의 일기
          meaning: 가족의 기억을 기록한다
        - id: B
          icon: 📰
          title: 신문 보도
          meaning: 역사적 사실을 기록한다
        - id: C
          icon: 📷
          title: 사진
          meaning: 문화유산의 모습을 남긴다
        - id: D
          icon: 🎙️
          title: 구술 인터뷰
          meaning: 해설사의 지식을 기록한다
  - origin_file: 03-국가유산-문화재.yaml
    origin_sid: s0304
    story:
      id: s0304
      title: 병자호란 감화전투
      era: 1637년 1월 병자호란
      location: 철원군 김화읍
      sources:
        - id: A
          type: diary
          icon: 📓
          title: 군사의 딸 일기
          sub: 아버지가 돌아오시면
          styleClass: source-diary
          templateData:
            meta: 1637년(인조 15년) 정월 · 연이(가상, 14세), 평안도 군사의 딸
            paragraphs:
              - 아버지가 떠나신 지 열흘이 넘었다.
              - |-
                오랑캐가 쳐들어왔다고 했다. {{A}}이라고 했다. 아버지는 새벽에 창을 들고 나가셨다. 남한산성에 임금님이 갇혀 계시다고, 구하러 가야 한다고 하셨다.
              - 평안도에서 5천 명이 모였다고 들었다. 아버지는 {{B}} 장군 휘하라고 하셨다.
              - 아버지. 제발 다치지 마세요. 아버지가 돌아오시면, 제가 좋아하는 인절미를 만들어 드릴 거예요.
              - |-
                — 아버지는 돌아오지 않으셨다. 김화 백전 전투에서 전사하신 것이다. 마을 사람들이 흩어진 유해를 모아 무덤을 만들었다. 전골총이라 부른다. 가까이에는 {{C}}이라는 무덤도 있다.
        - id: B
          type: newspaper
          icon: 📰
          title: 신문 보도
          sub: 통일뉴스 2026.1.28
          styleClass: source-newspaper
          templateData:
            paperName: 통 일 뉴 스
            date: 2026년 1월 28일
            headline: '[기획] 병자호란 389주년 — DMZ 속에 잠든 김화 전투의 영웅들'
            paragraphs:
              - |-
                1637년 1월 28일, 병자호란 당시 평안도관찰사 홍명구(1596~1637)가 이끄는 2,000명과 유림의 3,000명, 총 5,000명의 근왕군이 철원 김화에서 청군과 4차례 교전하여 약 3,000명의 적군을 섬멸했다.
              - 홍명구 장군은 이 전투에서 장렬하게 전사하여 시호 '충렬'을 수여받았다.
              - |-
                전사한 병사들의 유해는 마을 주민들이 수습하여 전골총에 안장했다. 전골총은 현재 DMZ 남방한계선 내에 위치하여 현장 조사가 불가능하다. 인근의 매두분(고려 말 홍건적 매장지)도 마찬가지다.
        - id: C
          type: photo
          icon: 📷
          title: 사진 자료
          sub: 연천 호로고루
          styleClass: source-photo
          templateData:
            photos:
              - src: photos/cat03/3-4.jpg
                alt: 호로고루
                caption: |-
                  [사진] 연천 호로고루(사적 제467호). 고구려시대 보루로, DMZ 접경지역에 위치한 문화유산의 대표적 사례다. 김화의 전골총과 매두분 역시 접경지역 내 문화유산이지만, {{D}} 남방한계선 안에 위치하여 현장 접근이 불가능하다.
                credit: Jaehee Jang1, 2015. CC BY-SA 4.0
        - id: D
          type: oral
          icon: 🎙️
          title: 구술 인터뷰
          sub: 철원 향토사학자
          styleClass: source-oral
          templateData:
            meta: '구술자: 박종수(가상), 철원 향토사학자'
            quotes:
              - '"김화 백전 전투가 병자호란 2대 승첩 중 하나에요. 평안도에서 5천 명이 달려온 거예요."'
              - '"홍명구 장군이 전사하고, 마을 사람들이 유해를 모아서 전골총을 만들었어요."'
              - '"그 옆에 매두분이라는 무덤도 있어요. 고려 말 홍건적 시체를 묻은 곳이에요."'
              - '"문제는 둘 다 DMZ 안이라 가볼 수가 없어요. 389년 된 무덤을 현장 조사조차 못 하고 있는 거예요."'
      blanks:
        A:
          answer: 병자호란
          hint: 신문 보도(B)에서 전쟁의 이름을 확인하세요.
          source: B
        B:
          answer: 홍명구
          hint: 신문 보도(B)에서 2,000명을 이끈 장군 이름을 확인하세요.
          source: B
        C:
          answer: 매두분
          hint: 구술 인터뷰(D)에서 전골총 옆의 무덤 이름을 확인하세요.
          source: D
        D:
          answer: DMZ
          hint: 구술 인터뷰(D)에서 접근 불가능한 이유를 확인하세요.
          source: D
      choices:
        - id: A
          icon: 📓
          title: 군사의 딸 일기
          meaning: 전쟁 속 가족의 아픔을 기록한다
        - id: B
          icon: 📰
          title: 신문 보도
          meaning: 역사적 전투를 기록한다
        - id: C
          icon: 📷
          title: 사진
          meaning: 접경 문화유산의 모습을 남긴다
        - id: D
          icon: 🎙️
          title: 구술 인터뷰
          meaning: 향토사학자의 지식을 기록한다
  - origin_file: 04-DMZ의 사람들.yaml
    origin_sid: s0401
    story:
      id: s0401
      title: 선전마을이 생기게 된 이유
      era: 1953년 이후 ~ 2018년
      location: 대성동(남측 DMZ)·기정동(북측 DMZ) — 판문점 일대
      soundNote: 확성기 방송 소리, 깃대가 바람에 휘날리는 소리, 새벽 행진곡
      sources:
        - id: A
          type: blog
          icon: 🌐
          title: 블로그 글
          sub: 프리랜서 기자 박민주 — 판문점 견학기 (2018)
          styleClass: source-blog
          docTitle: 판문점에서 만난 두 개의 마을
          templateData:
            title: 판문점에서 만난 두 개의 마을
            meta: '작성자: 박민주(프리랜서 기자) / #판문점 #DMZ #대성동 #기정동 #분단선너머'
            paragraphs:
              - 지난주 통일부가 주관하는 판문점 견학 프로그램을 신청해 다녀왔다. 버스를 타고 임진강을 건너고, 검문소에서 신분증을 세 번이나 확인하고 주의사항을 들으며 자유의 집 앞에 섰다. 어릴 적 할아버지가 몇 번이고 내게 "내 고향이 저 너머 개성"이라고 말했던 그 땅을, 나는 이날 처음으로 가장 가까이에서 봤다. 가장 인상 깊었던 건 대성동이라는 마을이었다. 공식 명칭은 '자유의 마을'. 지금도 사람들이 농사를 짓고 산다. 북측 DMZ 안에는 '기정동'이라는 또 다른 마을이 있다. 그때 가이드가 재미있는 이야기를 들려주었다.
              - "\"공식 이름은 자유의 마을과 평화의 마을이지만 1960년대부터 외신 기자들은 이 두 마을을 한꺼번에 영어로 'Propaganda Village'라고 불렀습니다. 우리말로 옮기면 {{A}}이죠.\""
              - 1960년대 후반부터, 남북은 서로에게 '우리 체제가 더 살기 좋다'는 신호를 보내기 위해 이 두 마을을 하나의 연극 무대처럼 꾸몄다고 한다. 집 창문은 크게, 깃대는 높게, 확성기는 시끄럽게. 외국 기자들이 그 풍경을 기사로 전하면서 {{A}}이라 이름 붙였다고 한다. 자유와 평화라는 이름 대신 붙은 그 단어가 마을을 전혀 다른 각도로 보게 만들었다.
        - id: B
          type: report
          icon: 📋
          title: 공식 자료
          sub: 판문점 선언 원문 + 선전 경쟁 역사 종합
          styleClass: source-report
          docTitle: 판문점 선언과 선전 경쟁의 해체
          templateData:
            header: 판문점 선언과 선전 경쟁의 해체
            meta: '출처: 통일부 남북회담본부 「한반도의 평화와 번영, 통일을 위한 판문점 선언」(2018. 4. 27.) 원문 / 주요 언론 보도 종합'
            paragraphs:
              - '[1] 판문점 선언 — "남과 북은 지상과 해상, 공중을 비롯한 모든 공간에서 군사적 긴장과 충돌의 근원이 되는 상대방에 대한 일체의 적대행위를 전면 중지하기로 하였다. 당면하여 5월 1일부터 군사분계선 일대에서 확성기 방송과 전단살포를 비롯한 모든 적대 행위들을 중지하고 그 수단을 철폐하며, 앞으로 비무장지대를 실질적인 평화지대로 만들어 나가기로 하였다." — 「한반도의 평화와 번영, 통일을 위한 판문점 선언」 제2조 1항 中'
              - "[2] {{B}} 경쟁사 (1970년대 ~ 1982년) — 1970년대, 북측은 기정동에 약 80m 높이의 {{B}}를 먼저 세웠다. 1982년 1월, 남측은 대성동에 높이 99.8m 태극기 {{B}}를 설치하며 대응했다(태극기 크기 18m×12m, 국내 최고 높이). 같은 해 북측은 기정동에 높이 160m 인공기 {{B}}를 다시 세웠고, 이후 남측이 더 높이지 않으면서 '깃대 경쟁'은 1982년 무렵 일단락되었다. 기정동 {{B}}는 1982년부터 2010년까지 28년간 세계에서 가장 높은 {{B}}라는 자리를 유지했다."
              - "[2] 확성기 방송과 두 마을의 공식 명칭 — 같은 시기부터 남북은 군사분계선을 사이에 두고 각자의 체제 우월성을 상대편에 전달하기 위한 방송을 송출했다. 남측은 대북 확성기를 통해 {{D}}을 내보냈고, 북측은 대남 확성기로 대남방송을 맞받았다. 두 마을을 오랫동안 취재한 외신은 이 경쟁 구도 전체를 두고 'Propaganda Village', {{A}}이라 통칭했지만 두 마을의 공식 명칭은 '자유의 마을(대성동)'과 '{{C}}(기정동)'이다."
              - '[3] 2018년 5월 1일 — 일단락된 선전 경쟁 — 판문점 선언 이행 조치로 국방부는 2018년 5월 1일부터 군사분계선 일대의 심리전 수단을 철거한다고 공식 발표했다. 이로써 대북 확성기 방송과 대남 확성기 방송이 동시에 멎었고, 수십 년간 두 마을을 무대 삼아 벌어지던 선전 경쟁의 가장 상징적 수단 하나가 사라졌다.'
