        - id: D
          type: oral
          icon: 🎙️
          title: 구술 인터뷰
          sub: 대성동초등학교 前 교사의 구술 (2025)
          styleClass: source-oral
          docTitle: 대성동초등학교 교사 구술 인터뷰
          templateData:
            meta: '구술자: 이정호 (가상, 대성동초등학교 前 교사, 2020~2024 재직) · 채록 일시: 2025년 12월'
            quotes:
              - "\"우리 학교가 있는 대성동 자유의 마을이 {{D}}년 정전협정 때 만들어진 특수한 곳이잖아요. 그러다 보니 학교에 오려면 통일대교 검문소부터 지나야 해요. 저도 처음 여기 발령받은 게 2020년 3월이었는데, 첫 출근 날 스쿨버스에 같이 올라타서 검문소를 지날 때 군인이 출입증을 확인하더라고요. '내가 학교를 가는 건가 군부대를 가는 건가' 싶었던 기억이 생생해요. 근데 막상 교실 문 열면 아이들이 '선생님!' 하면서 뛰어오거든요. 그 순간에는 그냥 평범한 초등학교였어요.\""
              - '"우리 학교에서 제일 신기한 게 영어 수업이에요. JSA 쪽에서 유엔사 경비대대 장병들이 정기적으로 학교에 내려와서 수업을 해주거든요. 한 학년 학생이 다섯 명 안팎이니까 거의 1대1 수업이에요. 외국인 선생님이 바뀌어도 아이들은 금방 적응해요. 6학년 졸업할 때쯤이면 영어로 자기 소개, 일상 대화 정도는 자연스럽게 해요."'
              - "\"재학생 대부분은 대성동 자유의 마을 거주 자녀가 아니에요. 문산, 파주 시내에서 매일 스쿨버스 타고 통일대교 검문을 지나 등교해요. 처음엔 '이걸 매일?' 싶은데, 신기하게 아이들은 한 달만 지나면 그게 그냥 일상이 돼요. 오히려 어른들이 적응하는데 오래 걸리는 것 같아요.\""
              - '"졸업식이 특별해요. 졸업생은 서너 명인데 참석자가 아주 화려해요. 통일부에서도 오고, 유엔군사령부에서도 오고, 파주시장님에 파주교육지원청 교육장님까지 오세요. 졸업생보다 손님이 훨씬 많은 졸업식이죠. 작은 학교에서 자란 아이들이 그렇게 많은 관심 속에서 초등학교를 마치고 나가는 걸 보면, 교사로서 뿌듯하면서도 책임감이 컸어요."'
