            paragraphs:
              - '{{A}}은 1972년 1번 국도가 끊기는 지점에 실향민의 안식처로 세워졌다. 평화관광지로 알려져 있지만, 이곳에 절을 올리고 {{C}} 끝에서 발길을 돌리는 사람들에게 이곳은, 휴전선 너머 고향에 가장 가까이 닿는 자리다.'
