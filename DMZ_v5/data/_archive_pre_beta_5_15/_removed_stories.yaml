            paragraphs:
              - '지난 주말, 할아버지가 {{A}} 에 같이 가자고 하셨다. 어머니께 말씀드리니, 자식들 빼고 손주만 데려가시겠다고 말씀하셨다고 한다. 어릴 적 가족 나들이로 한두 번 와본 기억이 흐릿하게 남아 있는 곳이었다.'
