              - '광장 끝까지 걸어가니 {{C}}가 나왔다. 다리 끝 철책에는 태극기와 사람들이 매단 리본이 빼곡했다. 안내판에는 1953년 정전협정 후 포로 12,773명이 이 다리를 건너 남쪽으로 돌아왔다고 적혀 있었다. 할아버지는 그 앞에서 한참 서 계셨다. 돌아오는 길에 평화의 종 앞에서 사진 한 장 찍자고 했더니 거절하셨다. 그날 따라 할아버지는 별 말씀이 없으셨다.'
        - id: B
