            paragraphs:
              - '[견학 운영] 운영일: 매주 화·수·금·토요일'
              - '[신청 자격 및 절차] 만 8세 이상 대한민국 국민에 한하며, 개인별 5명까지 신청 가능, 당해년도 1회로 제한. 견학 확정 전 신원조사 절차를 거쳐 문자로 확정 통보. 견학 당일 신분증 필히 지참(주민등록증·운전면허증·여권 등). 외국 협력 연구원의 경우 학술 교류 협력 절차로 별도 협조.'
              - '[복장 및 휴대] 민소매·반바지·짧은 치마·슬리퍼·샌들 착용 불가. 위장무늬 복장 착용 금지(군 병력으로 오인될 우려). 견학 당일 음주 행위 금지.'
              - '[견학 코스] ① 임진각 집결 → ② JSA안보견학관 영상 브리핑 → ③ 판문점 도착 후 {{A}} 외 회담장 일대 안내.'
              - '[판문점이 만든 평화의 발자국] 1953. 8. 한국전쟁 정전 후 포로 교환 / 1971. 8. 20. 남북 첫 대화(적십자 파견원 접촉) / 1985. 9. 20.~23. 남북 {{D}} 고향방문단 및 예술공연단 교환방문 — 분단 후 첫 공식 {{D}} 상봉 / 2002. 5. 31. 판문점 일반관광 개시 / 2018. 4. 27. 남북정상회담(판문점선언 채택) / 2019. 6. 30. 남·북·미 3자 회동.'
              - '[의의] 정전 직후 양측 포로 송환에서 시작된 평화의 발자국은 첫 적십자 회담과 {{D}} 상봉을 거쳐 오늘에 이르렀습니다. 안보견학으로 시작된 판문점 견학은 2002년 5월 31일, 일반관광 개시를 계기로 평화관광으로 그 성격을 전환해 왔습니다. 관람객은 분단의 현장을 마주하고, 판문점은 정전 체제를 넘어 평화의 무대로 거듭나고 있습니다.'
