          styleClass: source-diary
          docTitle: 초등학생의 일기 — 졸업합니다
          templateData:
            meta: '쓰는 이: 6학년 한서윤 (가상, 문산 거주, 1학년 때 입학) · 날짜: 2026년 2월 6일'
            paragraphs:
              - 내일이면 졸업이다. 나와 함께 졸업하는 친구는 4명이다. 우리는 {{A}} 자유의 마을에 있는, DMZ 안에서 단 하나뿐인 초등학교 졸업생이다.
              - 생각해 보면 6년이 정말 빨랐다. 1학년 입학식 날, 강당에 모인 신입생이 우리뿐이었던 게 기억난다. 엄마가 "전교생이 다 합쳐서 30명쯤이래"라고 해서 진짜냐고 몇 번이나 물어봤다. 그땐 학교가 너무 작은 게 이상했는데, 지금은 한 명 한 명 다 가족 같다.
              - 스쿨버스를 타고 통일대교를 처음 건너던 날도 기억난다. 군인 아저씨가 버스에 올라타서 출입증을 확인하는 걸 보고 깜짝 놀랐다. 학교 가는 길에 검문을 받는다니. 지금은 그 풍경이 너무 익숙해져서, 문산에 사는 친구들한테 이 얘기를 하면 다들 신기해한다.
              - 여기서 제일 신기했던 건 유엔사 군인 아저씨들이 학교에 와서 영어를 가르쳐 주는 거였다. 처음 1학년 때는 키 큰 외국인 선생님이 무섭게 느껴졌는데, 6년 동안 매주 만나다 보니 지금은 그냥 우리 영어 선생님이다. 내일 졸업식에도 오신다고 했다.
        - id: B
          type: newspaper
          icon: 📰
          title: 뉴스 보도
          sub: 대성동초등학교 영어특성화 학교 전환 보도 (2007)
          styleClass: source-newspaper
          docTitle: DMZ 내 유일 초교 대성동초, 영어특성화 학교로 재출발
          templateData:
            paperName: 놀공뉴스
            date: 2007년 3월 5일
            headline: DMZ 내 유일 초교 대성동초, 영어특성화 학교로 재출발
            paragraphs:
              - 비무장지대(DMZ) 안 유일한 학교인 대성동초등학교가 5일 신학기 개학식을 열고, 올해 3월 전입한 외부 통학생 12명과 함께 새 학기를 시작했다. 1954년 2월 대성동 마을 자치학교로 출발해 1968년 정식 국민학교로 승격한 대성동초는 한때 전교생이 10명 안팎까지 줄어 폐교 위기를 맞았으나, 지난해 9월 경기도교육청이 영어특성화 학교로 지정하고 파주시 공동학구로 묶으면서 외부 학생을 받기 시작했다.
              - 영어특성화 학교로 전환한 올해부터는 {{B}} 소속 장병이 정기적으로 교실에 와서 영어 수업을 담당한다. 한 학년 정원은 5명 안팎으로, 원어민 장병과 사실상 1대1에 가까운 영어 수업이 이루어진다. 학교 관계자는 "DMZ 안 학교라는 지리적 제약을 외국어 교육의 강점으로 바꾼 사례"라고 설명했다.
              - 외부 통학생들은 매일 스쿨버스를 타고 통일대교 검문소를 지나 등교한다. 자유의 마을 출입을 위해 헌병의 출입증 확인을 매일 아침 거치는 이색 통학길이다. 파주 문산에서 온 1학년 학부모는 "처음에는 DMZ라는 말에 놀랐지만, 원어민 영어 수업과 소수정예 교육을 보고 결정했다"라고 말했다.
