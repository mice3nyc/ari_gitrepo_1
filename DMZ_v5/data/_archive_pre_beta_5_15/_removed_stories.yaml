            paragraphs:
              - '오전, 임진각 집결. 동료들과 단체 방문을 신청해 두었다. 신분증 검사를 두 번 진행했다.'
              - 'JSA 도착. 의장대 사이를 지나 {{A}} 안으로 들어갔다. 외관은 평범한 건물이다. 1965년 9월, 회담을 위해 남측이 JSA 내에 준공한 건물이다.'
              - '{{A}} 로비에서 영상 브리핑이 시작됐다. 60년 넘게, 분단의 남북적십자 연락과 회담 지원이 모두 이 안에서 이뤄져 왔다고 했다. 분단의 시간이 그대로 새겨진 건물이다.'
              - '회담장 사이의 길. 회의장 정중앙을 가로지르는 콘크리트 분계선의 높이는 5cm이다. 이 턱을 남과 북의 정상이 함께 넘은 장면이 떠올랐다. 그 너머로 보이는 것이 {{C}}. 지금은 판문관이라고 부르는 곳이다. 두 건물이 서로 마주 보고 있는 모습이 꼭 분단의 현실을 보여주는 것 같다.'
              - '가이드가 정전 직후인 1953년 여름, 양측의 포로를 교환했다고 설명했다. 포로 교환을 시작으로 오늘에 이르기까지 수많은 일이 있었지만 점점 더 평화를 향해 가고 있다고 생각했다. 언젠가는 내가 오늘 둘러본 이곳 전체가 평화를 상징하는 박물관이 되기를 희망한다.'
