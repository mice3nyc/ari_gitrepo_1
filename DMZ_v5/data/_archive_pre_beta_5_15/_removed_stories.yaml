            quotes:
              - '"14살 때 흥남에서 배를 탔어. 1950년 12월이었지. 어머니랑 형이랑 거제에 내렸고, 부산으로, 서울로 옮겨 다녔어. {{A}}이 1번 국도 끝이라는 말은 들었어도, 처음 와본 건 1972년 무렵이었던 것 같아. 강 건너만 보고 돌아갔지."'
              - '"{{B}}에 처음 절 올린 날은 또렷해. 향로 앞에 절하고 나니까 무릎이 한참 안 펴지더라고. 흥남에 두고 온 아버지 얼굴이 흐릿하게 떠올랐어."'
