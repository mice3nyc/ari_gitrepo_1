  - id: s0505
    title: 판문점을 건넌 사람들 — 갈등과 협력의 두 장면
    era: 1989년·1994년·1998년
    location: 판문점 — 군사분계선 일대
    sources:
      - id: A
        type: diary
        icon: 📔
        title: 개인 일기
        sub: 박지수 (놀공대학교 영문학과 88학번) — 1989년 광복절 일기
        styleClass: source-diary
        docTitle: 영문학과 학생의 일기
        templateData:
          heading: 영문학과 학생의 일기
          meta: '박지수 (놀공대학교 영문학과 88학번, 1989년 2학년) / 1989. 8. 15. (화) 밤'
          paragraphs:
            - '광복절이었다. 학과 사무실에 잠깐 들렀다가 정태와 점심을 먹고 헤어졌다. 다들 별일 없는 휴일이었다.'
            - '오후 TV에서 한국외대 4학년 임수경이 판문점을 걸어 내려오는 장면을 봤다. 6월 월북한 후 56일째라고 했다. 옆에는 문규현 신부가 함께 있었다. 두 사람은 군사분계선을 넘자마자 {{A}} 위반 혐의로 끌려갔다.'
            - '내 또래의 사람이 평양에 다녀와 판문점을 통과하는 동안 나는 학과 사무실과 집을 오갔다는 게 이상하다. 어머니께서 저녁을 먹으면서 너랑 같은 또래가 뉴스에 나왔다는 말을 하셨다. 나는 무어라 대꾸를 해야 할지 몰라 그냥 밥만 먹었다.'
      - id: B
        type: newspaper
        icon: 📰
        title: 신문 기사
        sub: 놀공신문 — 1994년 10월 22일 1면 종합
        styleClass: source-newspaper
        docTitle: 北 핵 동결·경수로 지원, 北美 합의문 서명
        templateData:
          paperName: '놀공신문'
          date: '1994년 10월 22일 (토)'
          headline: '北 핵 동결·경수로 지원, 北美 합의문 서명'
          paragraphs:
            - '【제네바·서울 종합】 미국과 북한이 21일(현지 시간) 제네바에서 북한 핵 동결과 경수로 지원, 북미 관계 개선을 골자로 하는 합의문에 서명했다. 1993년 3월 북한의 핵확산금지조약(NPT) 탈퇴 선언으로 시작된 1차 북핵위기가 1년 7개월 만에 일단락된 것이다.'
            - '돌파구는 6월 15일에 열렸다. 지미 카터 전 미국 대통령이 부인 로잘린 여사와 함께 판문점을 경유해 평양으로 향했다. 판문점 북측에서 송호경 북한 외교부 부부장이 카터 일행을 영접했고, 카터는 평양에서 김일성 주석과 6월 16~17일 두 차례 회담했다.'
            - '그러나 협상의 동력은 끊기지 않았다. 8월 5일 제네바에서 북·미 고위급회담이 시작됐고, 9월 23일 2차 회담을 거쳐 10월 17일 합의문 가서명, 21일 정식 서명에 이르렀다. 21일 서명된 이번 {{B}}는 1차 북핵위기를 일단락 짓는 합의로 평가된다.'
      - id: C
        type: photo
        icon: 📷
        title: 사진 자료
        sub: 분단 이후 민간인의 판문점 통과 — 1989·1998
        styleClass: source-photo
        docTitle: 분단 이후 민간인의 판문점 통과 — 1989·1998
        templateData:
          photos:
            - src: photos/cat05/판문점사례1_C_01.png
              alt: 1989년 임수경·문규현 판문점 귀환 장면
              caption: '1989년 8월 15일, 평양 세계청년학생축전에 참석하고 돌아온 대학생 임수경과 동행한 문규현 신부가 판문점을 거쳐 귀환했다. 두 사람은 도착 직후 {{A}} 위반 혐의로 체포되었다.'
              credit: '출처: 통일부 판문점견학지원센터(panmuntour.go.kr) 「판문점 주요사건」'
            - src: photos/cat05/판문점사례1_C_02.png
              alt: 1998년 정주영 소떼 방북 장면
              caption: '1998년 6월 16일, 정주영 현대 명예회장이 트럭 50대에 소떼 500마리를 싣고 판문점을 넘었다. 1994년 {{B}}로 1차 북핵위기가 봉합된 뒤, 김대중 정부가 천명한 {{C}} 아래 남북 민간교류의 물꼬를 튼 기념비적 사건이다.'
              credit: '출처: 통일부 판문점견학지원센터(panmuntour.go.kr) 「판문점 주요사건」'
      - id: D
        type: oral
        icon: 🎙️
        title: 구술 인터뷰
        sub: 1998년 정주영 1차 방북 트럭 운전기사 구술 (익명)
        styleClass: source-oral
        docTitle: 소떼방북 트럭 운전기사 구술 인터뷰
        templateData:
          meta: '화자: 1998.6.16 정주영 1차 방북 트럭 50대 중 한 대를 운전한 사람 (회상 인터뷰, 익명) / 면담자: 놀공 연구팀'
          quotes:
            - '그날 새벽에 모였어요. 5톤 트럭 50대가. 현대자동차에서 며칠 동안 다른 건 안 만들고 그것만 만들었다고 들었어요.'
            - '짐칸엔 {{D}}가 한 차에 열 마리씩 올라타는데 정말 장관이었지.'
            - '통일대교를 건넌 게 아침 8시쯤이었나, 그날은 워낙 긴장해서 정확한 건 잘 모르겠어요. 판문점에 도착해서 정주영 회장이 걸어서 군사분계선을 넘어가고 우리는 트럭을 끌고 그 뒤를 따라갔죠.'
            - '뉴스에 그 장면이 나오거나 김대중 정부의 {{C}}을 말할 때 너무 신기하고 자랑스러워요. 나 같은 운전기사한테 그런 순간이 또 오겠어요? 시간이 지날수록 정말 대단하다는 생각이 들어요.'
    blanks:
      A:
        answer: 국가보안법
        hint: 두 사람이 군사분계선을 넘자마자 적용된 법률 이름은 자료 C(사진 자료) 캡션 ①에서 확인할 수 있습니다.
        source: A
      B:
        answer: 제네바 합의
        hint: 1994년 1차 북핵위기를 일단락 짓는 합의의 이름은 자료 C(사진 자료) 캡션 ②에서 확인할 수 있습니다.
        source: B
      C:
        answer: 햇볕정책
        hint: 김대중 정부가 천명한 대북 정책의 이름은 자료 D(구술 인터뷰)에서 확인할 수 있습니다.
        source: C
      D:
        answer: 소떼
        hint: 트럭 짐칸에 열 마리씩 올라탄 것은 무엇인지 자료 C(사진 자료) 캡션 ②에서 확인할 수 있습니다.
        source: D
    choices:
      - id: A
        icon: 📔
        title: 개인 일기
        meaning: 같은 시대를 살았던 평범한 대학생의 시선으로 역사적 순간을 기록한다
      - id: B
        icon: 📰
        title: 신문 기사
        meaning: 당시 보도를 통해 외교 협상의 전개 과정을 사실로 정리한다
      - id: C
        icon: 📷
        title: 사진 자료
        meaning: 시각적 증거와 공식 캡션으로 판문점 통과의 역사적 맥락을 전한다
      - id: D
        icon: 🎙️
        title: 구술 인터뷰
        meaning: 현장에 있었던 트럭 운전기사의 증언으로 사건의 현장감을 살린다
  - id: s0506
    title: 판문점의 만남들
    era: 2018년 4월 ~ 2019년 6월
    location: 판문점 (평화의 집·통일각·도보다리)
    sources:
      - id: A
        type: diary
        icon: 🗒️
        title: 사무관 일기
        sub: 통일부 남북회담본부 사무관 — 4·27 남북정상회담 당일 (2018)
        styleClass: source-diary
        docTitle: 통일부 남북회담본부 사무관의 일기
        templateData:
          heading: 통일부 남북회담본부 사무관의 일기
          meta: '작성자: 통일부 남북회담본부 사무관 / 날짜: 2018년 4월 27일 (금) 밤'
          paragraphs:
            - '어제 만찬장에서 평양 옥류관 수석요리사가 면을 뽑으러 온다는 얘기를 들었다. 통일각에 제면기를 놓는다고 했다. 식수 행사도 점검했다. 1953년생 소나무 한 그루와 한라산 흙과 백두산 흙, 한강 물과 대동강 물이 따로 담겨 있었다. 정 주무관님이 ''내일 한숨도 못 주무실 겁니다.''하고 웃으셨는데 사실이었다.'
            - '두 정상이 손을 맞잡는 장면을 모니터 너머로 봤다. 화면으로 보는 건데도 손이 떨렸다. 회담이 백 분 가까이 이어졌다. 오후 늦게 공동 식수가 있었고, 어제 점검한 {{C}}의 흙과 백두산 흙이 한강·대동강 물과 함께 소나무 아래에 부어졌다. 만찬에는 옥류관 {{A}}와 봉하 쑥국, 달고기 구이, 스위스식 감자전이 올랐다.'
      - id: B
        type: newspaper
        icon: 📰
        title: 신문 기사
        sub: 놀공뉴스 — 판문점에서 만난 정상들 (2019. 7. 1.)
        styleClass: source-newspaper
        docTitle: 판문점에서 만난 정상들 — 1년 2개월의 기록
        templateData:
          paperName: '놀공뉴스'
          date: '2019년 7월 1일 (월)'
          headline: '판문점에서 만난 정상들 — 1년 2개월의 기록'
          paragraphs:
            - '2018년 4월 27일 — 첫 만남. 군사분계선을 사이에 두고 문재인 대통령과 김정은 국무위원장이 손을 잡았다. 두 정상은 평화의 집에서 100분간 회담했고, 군사분계선 옆 ''소떼 길''에서 1953년생 소나무를 함께 심은 뒤 도보다리를 걸었다. 이날 두 정상은 「한반도의 평화와 번영, 통일을 위한 {{B}}」을 채택했다. 완전한 비핵화와 평화체제 구축에 대한 합의가 담긴 문서였다. 환영 만찬에는 평양 옥류관 수석요리사가 직접 면을 뽑은 {{A}}이 올랐다.'
            - '2018년 5월 26일 — 통일각 깜짝 회담. 한 달 뒤 두 정상은 다시 만났다. 이번엔 판문점 북측 통일각. 김정은 위원장이 제안한 지 12시간 만에 성사된 비공개 회담이었다. 통일부는 이날 회담이 "신속하게 격식 없이 진행됐다"라고 밝혔다. 6월 12일 {{D}}을 앞둔 시점이라 관련 이야기가 있었을 것이라는 추측이다.'
            - '2019년 6월 30일 — 다시 판문점. 트럼프 대통령이 트위터로 만남을 제안한 지 32시간 만에 성사됐다. 이날 트럼프 대통령은 군사분계선을 넘어 북측 땅을 밟았다. 현직 미국 대통령으로는 최초였다. 남북미 정상이 한자리에 섰고, 트럼프 대통령과 김정은 위원장은 자유의 집 2층에서 약 53분간 단독 회담을 가졌다.'
