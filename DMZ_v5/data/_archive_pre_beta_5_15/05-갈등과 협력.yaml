          quotes:
            - '그날 아침 9시 54분, 북한 경비정이 {{D}}을 넘어왔다는 상황이 전파됐어요. 우리 {{C}} 편대가 차단하러 나갔죠. 같은 편대의 357호가 제일 앞이었고, 저는 358호에 있었습니다. 10시 25분에 갑자기 총격이 시작됐어요. 사전 경고도 없이.'
            - '온 나라가 월드컵 3·4위전에 집중하고 있었어요. 거리가 붉은 옷으로 가득하고… 우리는 방금 전 동료들을 잃었는데. 그때 우리만 다른 나라에 사는 것 같았어요. 바다에 덩그러니 남은 기분이고. 섭섭하고 억울한 마음이 오래 갔어요.'
            - '조금 마음이 풀린 건 전사한 여섯 명 전원에게 특진과 {{B}}을 추서했을 때였어요. 훈장 하나로 동료들이 돌아오는 건 아니지만, 적어도 "이 사람들이 여기서 나라를 지키다 죽었다"는 사실을 국가가 공식으로 기록해 준 거잖아요. 그때부터 조금은 덜 외로웠어요.'
