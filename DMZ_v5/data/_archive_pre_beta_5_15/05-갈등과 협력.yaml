topic: cat05
topic_name: 갈등과 협력
stories:
  - id: s0501
    title: 귀순 이야기
    era: 1967년 ~ 2018년
    location: 판문점 공동경비구역(JSA) — 군사분계선 일대
    sources:
      - id: A
        type: diary
        icon: 📓
        title: 의료진 일지
        sub: 아주대학교병원 권역외상센터 외상외과 전임의 — 당직 일지 (2017, 가상 재구성)
        styleClass: source-diary
        docTitle: 다섯 발의 흔적
        templateData:
          heading: 다섯 발의 흔적
          meta: '출처: 아주대학교병원 권역외상센터 의료진 일지 (가상 재구성) / 쓰는 이: 외상외과 전임의 (가상, 당시 34세) / 날짜: 2017년 11월 13일 ~ 11월 22일'
          paragraphs:
            - '2017. 11. 13. (월) 오후 — 응급 호출. JSA 북측에서 총상 환자 이송 중. 북한군 육군 하전사 {{A}}, 25세. UN사 헬기로 도착. 의식 불명. 복부·어깨·팔꿈치·옆구리에 관통상 다섯 군데. 이국종 교수님 지휘 아래 곧바로 1차 수술 준비.'
            - '2017. 11. 14. (화) 새벽 — 1차 수술 종료. 장기 손상이 많았고 복강이 분변으로 심하게 오염돼 있었다. 쇼크에서 겨우 빠져나옴. 중환자실로 이동.'
            - '2017. 11. 15. (수) — 2차 수술. 오후 5시 30분부터 밤 11시 3분까지. 복강을 다시 열고 오염 부위를 씻어내는 사이 기생충이 여럿 나왔다. 남한 환자 몸에서 좀처럼 보기 어려운 종류였고, 굵기도 길이도 무시무시했다. 상처 부위까지 침범해 조직을 갉아먹고 있었다. 수술이 길었다. 이 교수님은 차분했지만 모두가 지쳐 보였다.'
            - '2017. 11. 16. (목) — 의식이 서서히 돌아오는 조짐. 눈꺼풀이 움직인다. 말은 못 한다. 이 사람은 지금 어디에 있는지 알까?'
            - '2017. 11. 22. (수) — UN사가 사건 당일 판문점 CCTV를 공개했다. 군사분계선을 넘어 남측까지 들어온 북한 추격병의 총격 장면이 그대로 찍혀 있었다. 병사는 차츰 눈을 맞추고 반응한다. 말이 돌아오는 데는 더 시간이 걸릴 것이다.'
      - id: B
        type: newspaper
        icon: 📰
        title: 신문 기사
        sub: 놀공신문 특별취재팀 — 특집보도 (2018)
        styleClass: source-newspaper
        docTitle: 군사분계선을 넘은 사람들
        templateData:
          paperName: '놀공신문'
          date: '2018년 10월 12일 (금)'
          headline: '군사분계선을 넘은 사람들'
          paragraphs:
            - '어제 2018년 10월 11일, 서울중앙지법 형사23부는 1969년 간첩 혐의로 사형당한 {{B}}에 대해 재심에서 무죄를 선고했다. 사형 집행 49년 만의 명예 회복이다. 본지는 이 판결을 계기로, 같은 판문점에서 목숨을 걸고 군사분계선을 넘은 두 사람의 궤적을 되짚는다.'
            - '[1] 1967 — 귀순, 누명, 그리고 49년 만의 무죄. {{B}}은 북한 조선중앙통신사 부사장이었다. 1967년 3월 22일 판문점에서 열린 군사정전위원회 회담을 취재하던 중, 유엔군 대표의 승용차에 올라타 북측 경비병의 총격을 뚫고 남쪽으로 넘어왔다. 귀순 직후 그는 반공 강연과 결혼으로 남한 사회에 정착한 듯 보였다. 그러나 1969년 1월 27일, 위조여권으로 홍콩을 거쳐 출국하던 중 베트남 사이공 공항에서 중앙정보부에 체포됐다. 중정은 위장 간첩 혐의로 기소했고, 같은 해 5월 10일 국가보안법·반공법 위반으로 사형이 선고됐다. 형 확정 두 달 만인 7월, 교수형이 집행됐다.'
            - '2018년 10월 11일 서울중앙지법은 "자백이 중앙정보부 수사관의 고문과 폭행에 의해 작성됐고, 암호명, 난수표 등 간첩의 필수 소지물이 발견되지 않아 {{B}}를 위장간첩으로 인정할 증거가 없다"라며 간첩 부분에 무죄를 선고했다. 다만 그가 남한을 탈출하는 과정에서 저지른 여권 위조 및 행사, 외국환관리법 위반 등의 혐의는 인정해 징역 2년을 내렸다.'
            - '[2] 1984 — 소련인의 망명 시도, 판문점 최초의 총격전. 1984년 11월 23일 오전 11시 30분경, 소련 관광안내원 바실리 야코블레비치 {{C}}가 판문점 군사정전위 회담장 부근에서 북측 관광단과 동행하던 중 돌연 남쪽으로 뛰었다. 북한군 경비병들이 제지 총격을 가하며 군사분계선을 넘어 남측까지 추격해 들어왔다. 총격전 끝에 한국군 JSA 대대 소속 장명기 일병이 엄호사격 중 북측 초소에서 날아온 총탄에 피격돼 전사했다. 미군 1명이 부상을 입었고 북한군은 3명이 전사, 5명이 부상을 입었다. {{C}}는 무사히 남측 안전지대에 도달했다. 그해 11월 30일 이탈리아 로마로 떠나 UN 난민 수용소를 거친 뒤, 미국으로 {{D}}했다.'
      - id: C
        type: photo
        icon: 📷
        title: 사진 자료
        sub: 1984년 11월 30일, 로마행 비행기에 탑승한 소련인 마투조크
        styleClass: source-photo
        docTitle: 1984년 11월 30일, 로마행 비행기에 탑승한 소련인 마투조크
        templateData:
          photos:
            - src: photos/cat05/귀순이야기_C_01.png
              alt: 1984년 11월 30일 로마행 비행기에 탑승하는 소련인 마투조크
              caption: '1984년 11월 30일, 로마행 비행기에 탑승한 소련인 {{C}}. 일주일 전 판문점 공동경비구역 안 군사정전위 회담장 부근에서 그는 돌연 남쪽으로 달렸다. 추격에 나선 북한 경비병들과 한국·미군 경비병 사이에 총격전이 벌어져 한국군 카투사 장명기 일병이 전사했고, 북한군 3명도 숨졌다. 그는 이탈리아 로마를 거쳐 UN 난민 수용소에 머물렀고, 이후 미국으로 {{D}}해 새 삶을 시작했다.'
              credit: '판문점견학지원센터'
      - id: D
        type: oral
        icon: 🎙️
        title: 구술 인터뷰
        sub: 예비역 카투사 구술 — JSA 경비대대 복무자 (2018)
        styleClass: source-oral
        docTitle: 예비역 카투사 구술 인터뷰 (JSA 경비대대)
        templateData:
          meta: '구술자: 예비역 A씨 (가상, 1963년생 / 1983.7 카투사 입대, 1985.10 전역) / 인터뷰 시점: 2018년 12월'
          quotes:
            - '"갑자기 총성이 터졌어. 처음엔 훈련 사격인 줄 알았는데 곧바로 무전이 왔어. A guy''s running south!"'
            - '"그 사람이 {{C}}였지. 북한군 경비병들이 제지 사격을 하면서 군사분계선을 넘어 우리 쪽까지 들어왔어. 총소리가 엄청났어. 북한군도 죽었고, 미군도 부상을 입었고 우리 군도 죽었어. 장명기. 장명기 일병이 죽었어."'
            - '"요즘 사람들은 {{B}}를 모르지? 1967년에 판문점을 넘어온 북한 기자 이름이 {{B}}이야. 그런데 갑자기 사형을 당했어. 얼마전에 무죄가 나왔다던데 안타깝지 뭐. 거기서 근무를 해서 그런가 귀순과 관련된 뉴스는 자꾸 찾아보게 돼."'
            - '"또 있잖아. {{A}} 씨. 아주대병원에서 살렸다던 사람. {{C}}가 넘어온 길이랑 {{A}}이 넘어온 길이 그렇게 멀지 않을 거야. {{C}}는 소련에서 미국으로 {{D}}을 택했고, {{B}}와 {{A}}은 남으로 넘어왔는데 한 사람은 사형이고 한 사람은 살아 있어."'
    blanks:
      A:
        answer: 오청성
        hint: 이 이름은 자료 D(구술 인터뷰)에서 직접 확인할 수 있습니다.
        source: D
      B:
        answer: 이수근
        hint: 이 인물의 이름은 자료 B(신문 기사)와 자료 D(구술 인터뷰)에서 확인할 수 있습니다.
        source: B
      C:
        answer: 마투조크
        hint: 이 인물의 성은 자료 C(사진 자료) 캡션과 자료 D(구술 인터뷰)에서 확인할 수 있습니다.
        source: C
      D:
        answer: 망명
        hint: 이 단어는 자료 B(신문 기사)와 자료 C(사진 자료)에서 확인할 수 있습니다.
        source: B
    choices:
      - id: A
        icon: 📓
        title: 의료진 일지
        meaning: 치료 기록으로 귀순자의 생존 과정을 복원한다
      - id: B
        icon: 📰
        title: 신문 기사
        meaning: 보도 자료로 사건의 전말과 역사적 맥락을 정리한다
      - id: C
        icon: 📷
        title: 사진 자료
        meaning: 시각적 증거로 당사자의 탈출 순간을 기록한다
      - id: D
        icon: 🎙️
        title: 구술 인터뷰
        meaning: 현장 복무자의 증언으로 사건의 현장감을 전한다
  - id: s0502
    title: 남북 협력 사례
    era: 2000년대 ~ 2021년
    location: 개성공단·화살머리고지·도라산역·봉동역
    sources:
      - id: A
        type: diary
        icon: 📔
        title: 개성공단 직원 일기
        sub: 박○○ 답사수첩 발췌 — ○○어패럴 생산관리, 2008.4 ~ 2016.2
        styleClass: source-diary
        docTitle: 2016년 마지막 출근일
        templateData:
          heading: 2016년 마지막 출근일
          meta: '박○○ 답사수첩 발췌 (가상) / ○○어패럴 생산관리 / 2008.4 ~ 2016.2'
          paragraphs:
            - '어제 오후 다섯 시에 발표가 났다. 다음 날까지 짐을 정리하라는 지시. 아침에 출근했을 때 라인은 이미 멈춰 있었고, 함께 일하던 북측 동료들은 한 명도 보이지 않았다.'
            - '8년 전 첫 출근 때 받은 사원증의 모서리가 많이 닳았다. 라커에 붙여두었던 사진도 챙겼다. 입사 첫해, 도라산에서 봉동까지 가던 화물열차에 처음으로 원자재를 실어 보낸 날 찍은 사진이다. 점심때면 옆 라인의 북측 어르신이 먼저 말을 걸어왔다. 자식 자랑이 한참 이어지면, 우리 쪽 누군가가 어제 축구 이야기로 받아치곤 했다. 오늘은 점심시간이 적막했다. 새벽마다 우리 층을 청소해주던 분이 와서 두 손으로 내 손을 오래 잡았다.'
            - '"선생님, 언젠가 꼭 다시 만납시다."'
            - '차창 밖으로 군사분계선 표지가 멀어지는 동안 누구도 이야기를 하지 않았다. 8년 동안 새벽마다 남북출입사무소를 지나 {{A}}으로 향하던 길이 너무나 그리울 것 같다.'
      - id: B
        type: scholar
        icon: 📚
        title: 학술 논문과 공식 합의서
        sub: 양문수·이우영·윤철기(2013) 논문 + 9·19 군사합의서 + 윤지원(2022) 논문
        styleClass: source-scholar
        docTitle: 개성공단·화살머리고지 관련 학술 자료 종합
        templateData:
          meta: '양문수·이우영·윤철기(2013) / 윤지원(2022) / 「역사적인 「판문점선언」 이행을 위한 군사분야 합의서」'
          paragraphs:
            - '"북한 근로자들은 남한에 대한 적대감이 크게 완화되고 있는 것으로 보인다."'
            - '"사실 {{A}}에서 성공한 기업들이 이구동성으로, 성공의 핵심 요인으로 꼽는 것이 ''북한 근로자들의 마음을 얻는 것''이라는 점 또한 매우 시사적이다." — 양문수·이우영·윤철기(2013)'
            - '"2000년부터 시작된 6·25 전사자 유해발굴사업은 전쟁 기간 동안 수습되지 못한 전사자 13만여 분을 찾아 국가와 가족의 품으로 모신다는데 목적을 두고 추진 중이다." — 윤지원(2022)'
            - '"쌍방은 비무장지대내에서 시범적 남북공동유해발굴을 진행하기로 하였다." — 「역사적인 「판문점선언」 이행을 위한 군사분야 합의서」 제2조 ③항'
            - '이 합의에 따라 남북은 시범 발굴 지역으로 강원도 철원 비무장지대 안 {{B}} 일대를 선정했고, 2018년 10월 도로개설에 착수해 11월 22일 폭 12미터 비포장 남북 연결도로가 개설됐다. 시범 공동 발굴은 2019년 4월부터 우리 측 단독으로 전환되었으며, 2021년 6월 종료 시점까지 우리 측 지역에서 유해 3,092점(잠정유해 424구), 유품 101,816점이 수습됐다.'
          heading: 개성공단·화살머리고지 관련 학술 자료 종합
      - id: C
        type: photo
        icon: 📷
        title: 사진 자료
        sub: 화살머리고지 유해발굴 현장 + 도라산역 경의선 철길
        styleClass: source-photo
        docTitle: 화살머리고지와 도라산역 경의선
        templateData:
          photos:
            - src: photos/cat05/남북협력사례_C_01.jpg
              alt: 국방부 유해발굴감식단원들이 화살머리고지에서 유해를 수습하는 장면
              caption: '국방부 유해발굴감식단원들이 국군 제2사단 고 송해경 이등중사의 유해를 수습하고 있다. {{B}}는 6·25전쟁 당시 4차례 격전이 벌어진 고지 쟁탈전의 무대였고, 분단 이후 70년 넘게 일반인 출입이 제한돼 전쟁 당시 흔적이 고스란히 남아 있는 곳이다. 비무장지대 안에서 이뤄진 최초의 6·25 전사자 유해발굴이라는 점에서 의미가 깊다.'
              credit: '출처: 국가유산청'
            - src: photos/cat05/남북협력사례_C_02.jpg
              alt: 도라산역 승강장에서 본 경의선 철길
