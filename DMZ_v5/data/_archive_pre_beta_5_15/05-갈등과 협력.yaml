          paragraphs:
            - '2002년 6월 29일 제2연평해전에서 전사한 6명 전원에게 정부는 특진과 {{B}}을 추서했다. 박동혁은 상병에서 중사로 2계급, 나머지 5명은 1계급씩 특진했다. 고 윤영하 소령과 고 박동혁 중사에게는 충무{{B}}이, 고 한상국·조천형·황도현·서후원 상사에게는 화랑{{B}}이 수여됐다.'
            - '해군은 새로 도입한 유도탄고속함에 전사자 이름을 부여했다. 2008년 12월 17일 윤영하함이 가장 먼저 함대에 배치됐고, 이어서 한상국·조천형·황도현·서후원·박동혁함이 차례로 배치됐다. 2015년 6월에는 6척 모두가 임무에 들어갔다.'
            - '2008년 4월부터 추모 행사는 국무총리 주관 정부기념행사로 승격됐으며, 2010년 6월 29일부터 기념식 장소가 용산 전쟁기념관 평화의 광장으로 이전됐다. 2015년 9월에는 국립대전현충원에 전사자 6명이 합동 안장되어 13년 만에 한자리에 모였다.'
