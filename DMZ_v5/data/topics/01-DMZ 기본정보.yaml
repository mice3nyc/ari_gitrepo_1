  - id: s0106
    title: 세계사 속의 DMZ
    era: 2026년 현재 · 세계 비무장지대 비교
    location: 독일 그뤼네스 반트, 베트남, 키프로스, 남극, 한반도 DMZ
    sources:
      - id: A
        type: diary
        icon: 📓
        title: 생태학자의 일기
        docTitle: 죽음의 띠가 생명의 띠가 되기까지
        sub: 죽음의 띠가 생명의 띠가 되기까지
        styleClass: source-diary
        templateData:
          heading: 죽음의 띠가 생명의 띠가 되기까지
          meta: '2025년 9월 15일 · 쓰는 이: 박소연 연구원, DMZ 생태연구소'
          paragraphs:
            - 오늘 독일의 {{A}}를 걸었다.
            - 여러 희귀 동식물이 이곳에 산다. 동독과 서독으로 나눠진 동안 사람의 발길이 닿지 않아서 생긴 일이다. 무려 41년이나 말이다.
            - |-
              옛 동독 국경경비대의 순찰로를 걷는데, 발밑에 꽃이 피어 있었다. 감시탑이 있던 자리에는 새가 둥지를 틀었다. 총구가 향하던 곳에 이제는 나비가 날고 있다.
            - |-
              우리의 DMZ는 어느덧 73년이다. 독일보다 30년이 넘는 시간이 지났다. 누군가 말했다. DMZ는 세계에서 가장 슬픈 이유로 만들어진, 가장 아름다운 자연이라고.
            - 언젠가 한국의 DMZ도 누구나 드나드는 생태 길이 되어서 학생들과 함께 걷고 싶다.
      - id: B
        type: newspaper
        icon: 📰
        title: 신문 기획보도
        docTitle: 세계의 비무장지대 비교
        sub: 통일뉴스 2026.3.18
        styleClass: source-newspaper
        templateData:
          paperName: 통 일 뉴 스
          date: 2026년 3월 18일
          headline: '[기획] 세계의 경계선 — 사라진 것과 남아 있는 것은 무엇인가?'
          paragraphs:
            - |-
              ■ 독일 그뤼네스 반트: 길이 약 1,393km, 면적 약 177km2. 1949~1990년(41년). 통일 후 생태 회랑으로 전환. 2024년 유네스코 세계유산 잠정목록 등재
            - |-
              ■ 베트남 DMZ: 길이 약 100km. {{B}}강을 따라 남북 각 최대 5km. 1954~1976년(22년). 1954년 제네바 협정으로 설치. 1976년 7월 2일 통일 선포로 소멸되어 현재 관광지로 사용
            - |-
              ■ 터키 키프로스 그린라인: 길이 약 180km. 1974년부터 현재까지. 유엔평화유지군이 관리 중이며 2003년부터 민간 통행을 허용하고 있음. 현재 9개 검문소 운영 중
            - |-
              ■ 남극: 남극 대륙 전체. 1959년부터 현재. 세계 최초 비무장화 대륙. 군사기지, 훈련, 무기실험 금지. 과학연구 목적의 인력과 장비는 허용
            - '■ 한반도 DMZ: 길이 약 248km, 면적 약 907km2. 1953년부터 현재까지. 현존하는 비무장 지대 중 최장 기간 지속 중'
      - id: C
        type: photo
        icon: 📷
        title: 사진 자료
        docTitle: 베트남 DMZ — 벤하이강의 히엔르엉 다리
