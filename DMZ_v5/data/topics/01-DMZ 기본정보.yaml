        styleClass: source-photo
        templateData:
          photos:
            - src: photos/cat01/1-6.jpg
              alt: 베트남 벤하이강 히엔르엉 다리
              caption: |-
                베트남 벤하이강의 히엔르엉 다리. 1954년 제네바 협정에 따라 이 강을 경계로 비무장지대가 설정되었다. {{C}}년간 베트남을 남북으로 가르던 이 다리는 통일 이후 유적지로 보존되고 있다.
              credit: Rolf Müller, Wikimedia Commons, CC BY-SA 3.0
      - id: D
        type: oral
        icon: 🎙️
        title: 구술 인터뷰
        docTitle: 한정호(가상), 통일연구원 선임연구위원
        sub: 통일연구원 선임연구위원
        styleClass: source-oral
        templateData:
          meta: '구술자: 한정호(가상), 통일연구원 선임연구위원 · 채록 일시: 2025년 12월<br>주제: 세계 분단국가 비교 연구'
          quotes:
            - |-
              "세계에서 DMZ라 불리는 곳을 다 가봤어요. 독일, 베트남, 키프로스. 세 곳 다 공통점이 있는데, 분단이 끝났거나 최소한 민간 통행이 가능해졌다는 거예요."
            - |-
              "베트남은 1954년에 제네바 협정으로 벤하이강에 DMZ를 만들었는데, 남북 각 5km씩이라 우리보다 넓었어요. 22년 만에 통일되면서 지금은 관광지가 됐죠."
            - |-
              "키프로스 그린라인은 {{D}}이 관리하는데, 2003년부터 검문소를 통해 남북 이동이 가능해졌어요. 완충지대 안에 만 명 이상이 거주하고 있어요. 우리하고는 차원이 다르죠."
