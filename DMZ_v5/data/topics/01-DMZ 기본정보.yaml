  - id: s0103
    title: DMZ의 지리적 위치
    era: 1953년 정전협정 ~ 2019년 논문
    location: 서해 임진강 하구 ~ 동해 고성
    sources:
      - id: A
        type: diary
        icon: 📓
        title: 중학생 일기
        docTitle: 방학숙제 때문에 DMZ를 찾아봤다
        sub: 방학숙제 때문에 DMZ를 찾아봤다
        styleClass: source-diary
        templateData:
          heading: 방학숙제 때문에 DMZ를 찾아봤다
          meta: 2025년 8월 2일 토요일 · 중학교 2학년 서하 (가상)
          paragraphs:
            - 방학 숙제로 'DMZ의 지리적 위치'를 조사하게 됐다. 우리 집이 김포인데, 조금만 올라가면 DMZ라 주제가 딱 맞았다.
            - |-
              DMZ는 서쪽 {{A}}에서 동쪽 고성까지 싹 이어진다고 한다. 길이는 239km, 면적은 약 904km². 서울보다 1.5배나 되는 넓은 땅인데 아무도 못 들어간다니 신기하다.
            - |-
              DMZ랑 닿아 있는 동네는 8개라고 한다. 경기도에서는 김포, 파주, 연천. 강원도에서는 철원, 화천, 양구, 인제, 고성. 서쪽에서 동쪽으로 쭉 이어진다. 내가 사는 김포도 들어있어서 괜히 뿌듯했다.
            - 내일은 도서관에서 더 찾아봐야지. 쓸 게 너무 많다.
      - id: B
        type: scholar
        icon: 📄
        title: 논문 직접 인용
        docTitle: 김창환(2019), "비무장지대 및 군사분계선의 길이에 관한 연구"
        sub: 김창환(2019) · 김창환(2007)
        styleClass: source-scholar
        templateData:
          heading: 논문 직접 인용
          meta: 김창환(2019), "비무장지대 및 군사분계선의 길이에 관한 연구" · 김창환(2007), "DMZ의 공간적 범위에 관한 연구"
          paragraphs:
            - '[군사분계선 길이 — 시·도별]'
            - |-
              "본 연구는 비무장지대 및 군사분계선의 길이를 측정한 것이다. 정전협정문 첨부지도 9개 도엽을 ArcGIS의 지오레퍼런싱 기능을 사용하여 좌표를 부여하고 군사분계선을 디지타이징하였다."
            - |-
              "그 길이를 측정한 결과는 239.42km(148.77mile)이다. 이는 현재 비무장지대와 관련된 연구나 보고서 그리고 대중 매체에서 표기하는 '155마일 휴전선' 또는 '248km 비무장지대'라는 표현의 부적합을 의미하는 것이다."
            - |-
              [표] 구분: 강원도 / 경기도 / 합계 — km: 157.96 / 81.46 / 239.42 — mile: 98.15 / 50.62 / 148.77
            - — 김창환(2019), 비무장지대 및 군사분계선의 길이에 관한 연구에서 발췌
            - '[DMZ 면적]'
            - |-
              "DMZ의 면적은 약 903.8km²이다. 선행 연구들은 '248km × 4km = 992km²'로 단순 계산하였으나, 군사분계선이 직선이 아니므로 실측 값은 이보다 작다."
            - |-
              "DMZ는 동해안 고성군 명호리로부터 중부의 양구, 화천, 철원을 거쳐 개성 남쪽의 판문점을 지나 서쪽의 임진강 하구에 이르는 군사분계선을 따라 남북 방향으로 각각 2km씩 설정된 완충지대이다."
            - — 김창환(2019), DMZ의 공간적 범위에 관한 연구에서 발췌
      - id: C
        type: photo
        icon: 📷
        title: 사진 자료
        docTitle: NASA 위성이 촬영한 DMZ
        sub: NASA 위성 사진
        styleClass: source-photo
        templateData:
          photos:
            - src: photos/cat01/1-3.jpg
              alt: NASA 위성에서 본 DMZ
              caption: |-
                NASA 위성이 촬영한 한반도 중부. 남북 사이로 녹색 띠가 선명하게 보인다. 서쪽 한강하구에서 동쪽 고성까지 이어지는 비무장지대로, 총 면적은 약 {{C}}km²다.
              credit: |-
                Jesse Allen, NASA Earth Observatory, Landsat 4 & 5 위성 모자이크 (1989-1991). Public Domain (미국 연방정부 저작물)
      - id: D
        type: scholar
        icon: 📄
        title: 강의록
        docTitle: DMZ는 어디에 있을까?
        sub: 청소년 대상 DMZ 특강
        styleClass: source-scholar
        templateData:
          heading: DMZ는 어디에 있을까?
          meta: '강연자: 지리학 교수 (가상 재구성) · 대상: 청소년 대상 DMZ 특강'
          paragraphs:
            - 여러분, DMZ가 어디에 있는지 지도에서 찾아볼까요?
            - |-
              서쪽 한강하구에서 시작해서 동쪽 고성 해안까지, 한반도 허리를 가로지르는 선이 군사분계선이에요. 길이는 239.42km입니다. 248km라고 배운 분도 있죠? 그건 1952년 전쟁 중에 나온 추정치예요. 정확하지 않아요.
            - |-
              이 선을 중심으로 남북 각 2km, 합쳐서 폭 4km가 비무장지대, DMZ입니다. 면적은 약 903.8km². 서울이 605km²니까, 서울보다 1.5배 넓은 땅이네요.
            - |-
              자, DMZ에 맞닿은 지역을 서쪽부터 따라가 볼게요. 경기도에는 김포, 파주, 연천이 있고요. 강원도로 넘어가면 철원, 화천, 양구, 인제, 고성까지 이어집니다. 총 {{D}}개 시군이 DMZ와 닿아 있어요.
            - 이 중 강원도 구간이 157.96km로 전체의 66%를 차지해요. 산악 지형을 따라 구불구불 이어지니까 경기도 구간보다 훨씬 길지요.
