          date: 2026년 3월 12일
          headline: '[기획] DMZ는 누가 어떻게 관리하나 — 정전협정·국내법·국제기구의 중첩 구조'
          paragraphs:
            - DMZ의 관리 체계는 단일 기관이 아닌 복수의 국제, 국내 기관이 중층적으로 관여하는 구조다.
            - |-
              DMZ 자체의 관할은 정전협정에 따라 유엔군사령부(UNC)가 담당하며 DMZ 남쪽 민간인통제구역은 국방부, DMZ의 평화적 이용 정책은 통일부, 접경지역 발전은 행정안정부가 담당한다. 따라서 DMZ 내 출입은 UNC의 허가가 필요하며 동시 입장 인원은 {{B}}명 이하로 제한된다.
            - '[DMZ 거버넌스 구조]'
            - 역할 구분 / 관할 영역 / 담당 / 근거
            - DMZ 관할 / 군사분계선 남·북 각 2km / 유엔사 (UNC) / 정전협정 (1953)
            - 민간인통제구역 관리 / DMZ 남방 약 5~10km / 국방부 / 관할부대장 / 군사기지 및 군사시설 보호법
            - 남북교류협력 정책 / DMZ 평화적 이용, 남북 교류 / 통일부 / 남북교류협력에 관한 법률
            - 접경지역 발전 / 민간인통제구역 이남 접경 시·군 / 행정안전부 / 15개 시·군 / 접경지역 지원 특별법
