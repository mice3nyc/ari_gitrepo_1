            - '■ 2023.11.22: 북한, 9.19 군사합의 파기 선언. 이후 북한군 경비병이 권총을 착용한 것을 확인'
            - '■ 2023.12.19: 유엔사, 북한군 무장에 대응하여 유엔사 측 JSA 근무자에게 재무장 승인'
            - '■ 2024.06.04: 대한민국 정부, 국무회의 의결로 9.19 군사합의 전체 효력 정지'
            - 현재 JSA는 2018년 이전의 무장 경비 상태로 복귀했다.
