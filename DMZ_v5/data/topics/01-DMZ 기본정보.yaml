  - id: s0105
    title: JSA와 판문점
    era: 2018년 비무장화 ~ 2023년 재무장
    location: 판문점, 공동경비구역(JSA)
    sources:
      - id: A
        type: letter
        icon: ✉️
        title: 군인의 편지
        docTitle: 판문점에서 보내는 마지막 밤
        sub: JSA 근무 병장 최준혁
        styleClass: source-letter
        templateData:
          heading: 판문점에서 보내는 마지막 밤
          meta: '2026년 1월 20일 · 보내는 이: 육군 병장 최준혁(가상) · 받는 이: 동생 최민혁'
          paragraphs:
            - 민혁아,
            - 네가 JSA에 지원하고 싶다고 했을 때 솔직히 놀랐어. 형이 근무하는 거 보고 멋있어서 지원하고 싶다니, 기특하면서도 걱정이 된다.
            - |-
              지원 조건부터 말해 줄게. 키 174cm 이상, 체중 65kg 이상, 교정시력 1.0 이상이어야 해. 병무청에서 전문 특기병으로 모집하는데, 1차 서류심사 통과하면 2차에서 체력 평가랑 면접을 봐. 팔굽혀펴기, 윗몸일으키기, 달리기.
            - |-
              합격하면 훈련소 수료 후 카투사 교육대에서 미군 기초 군사교육을 받아. 그 다음 유엔사 경비대대(UNCSB-JSA) 소속으로 배치돼. 한국군 신분인데 유엔사 지휘를 받는 독특한 구조야.
            - |-
              나는 주로 T2에서 근무해. 파란색 T2 건물 알지? 거기 안에 긴 탁자가 있는데, 그 탁자 중심선이 군사분계선이야. 탁자 건너편에는 북한 쪽 판문각이 보여. 겨우 발자국 거리인데, 세상에서 가장 먼 곳이야.
            - |-
              {{A1}}년에는 남북이 합의해서 이 안에서 무기를 다 치웠대. 양쪽 35명씩, 노란 완장만 차고 근무했다고 해. 잠깐이었지만 그때 여기서 남북 군인들이 자유롭게 오갔대. 근데 {{A2}}년에 북한이 다시 무장하면서, 지금은 원래대로야.
            - 이제 곧 전역이다. 엄마한테 형이 된장찌개 먹고 싶어 한다고 전해줘.
          sign: 형 준혁이가.
      - id: B
        type: report
        icon: 📋
        title: 보도자료
        docTitle: 공동경비구역(JSA)의 무장 경비 상태 변화
        sub: 9.19 합의 타임라인
        styleClass: source-report
        templateData:
