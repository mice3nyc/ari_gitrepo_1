topic: cat01
topic_name: DMZ 기본정보
stories:
  - id: s0101
    title: DMZ의 탄생
    era: 1953년 7월 27일
    location: 판문점, 중부전선, DMZ 일대
    soundNote: 포성이 줄어들다 침묵 → 벌레 소리, 바람 소리
    sources:
      - id: A
        type: letter
        icon: ✉️
        title: 군인의 편지
        docTitle: 총소리가 멈춘 밤에
        sub: DMZ에서 발견된 편지
        styleClass: source-letter
        templateData:
          heading: 총소리가 멈춘 밤에
          meta: '1953년 7월 27일 · 보내는 이: 국군 병장 박진우 · 받는 이: 어머니'
          paragraphs:
            - 어머니, 총소리가 멈췄습니다.
            - |-
              오늘 밤 열 시를 기해 모든 총성이 그쳤습니다. 아침에 {{A}}이라는 곳에서 정전협정이 체결되었다고 합니다. 서명에 단 10분밖에 걸리지 않았다 합니다. 3년이 넘는 전쟁을 그렇게 매듭짓다니.
            - 이것은 평화가 아닙니다. '정전'이라 합니다. 총을 내려놓은 것이지 악수를 한 것이 아닙니다.
            - |-
              72시간 안에 우리는 2킬로미터를 물러납니다. 그 사이 빈 땅이 생기고, 군사분계선을 따라 1,292개의 표지판이 세워진다 합니다. 김 상병의 고향 마을도 그 안에 들어갑니다. 그는 오늘 밤 한마디도 하지 않았습니다.
            - 달이 밝습니다. 이 전쟁은 멈추었지만, 끝나지 않았습니다.
          sign: 아들 진우 올림
          soundNote: 포성이 줄어들며… 침묵. 벌레 소리, 바람 소리.
      - id: B
        type: newspaper
        icon: 📰
        title: 신문 보도
        docTitle: 정전협정 체결 — 판문점에서 쌍방 서명 완료
        sub: 통일뉴스 1953년 7월 28일
        styleClass: source-newspaper
        templateData:
          paperName: 통 일 뉴 스
          date: 1953년 7월 28일 (화)
          headline: 정전협정 체결 — 판문점에서 쌍방 서명 완료
          paragraphs:
            - |-
              유엔군대표단 측 수석대표 미육군대장 {{B}}와 조선인민군 및 중국인민지원군대표단 수석대표 조선인민군대장 남일이 대표로 참석해 27일 오전 10시에 정전협정에 서명했다. 양측은 일체의 발언 없이 서명만을 교환하였다.
            - |-
              협정에 따라 발효 후 72시간 이내에 쌍방 군사력은 군사분계선으로부터 각 2킬로미터씩 후퇴하여야 한다. 이로써 서해 강화도에서 강원 고성까지 약 248킬로미터에 걸친 비무장지대가 설치된다.
      - id: C
        type: photo
        icon: 📷
        title: 사진 자료
        docTitle: 정전협정 서명식
        sub: 정전협정 서명식 · 군사분계선 표지판
        styleClass: source-photo
        templateData:
          photos:
            - src: photos/resized/01_signing_1953.jpg
              alt: 정전협정 서명식
              caption: |-
                [사진 1] 1953년 7월 27일 오전 10시, 판문점. 유엔군대표단 수석대표 미육군대장 해리슨 2세(왼쪽 테이블)가 정전협정문에 서명하고 있다. 반대쪽에는 조선인민군 및 중국인민지원군대표단 수석대표 {{C}} 대장이 앉아 있다.
              credit: 미국 국립문서기록관리청(NARA)
            - src: photos/resized/02_mdl_marker.jpg
              alt: 군사분계선 표지판
              caption: '[사진 2] 판문점 DMZ 내 군사분계선 표지판. 서해 강화도에서 동해 고성까지 약 248킬로미터 구간에 총 1,292개가 설치되었다.'
              credit: 미국 공군(USAF)
      - id: D
        type: oral
        icon: 🎙️
        title: 구술 인터뷰
        docTitle: 정전협정 당일 기억
        sub: 참전용사 김영수 (2010년 채록)
        styleClass: source-oral
        templateData:
          meta: '구술자: 김영수 (1933년생, 당시 이등병) · 채록: 2010년 6월<br>주제: 정전협정 당일 기억'
          quotes:
            - '"그날 밤 열 시에 총소리가 딱 멈추니까, 세상이 쥐 죽은 듯이 조용해졌어. 근데 아무도 안 웃었어. 울지도 않고. 그냥 멍했지."'
            - |-
              "72시간 안에 물러나라 그래서, 3년 지킨 참호를 제 손으로 허물었어. 2킬로씩 물러나니까 폭이 {{D}}킬로짜리 빈 땅이 생기는 거야. 거기가 비무장지대가 된 거지."
            - '"우리 부대에 연천 사람이 하나 있었는데, 그 친구 고향이 딱 그 안에 들어갔어. 그 친구는 그날 밤새 북쪽만 보고 있었어."'
          soundNote: 먼 곳의 침묵… 벌레 소리, 바람 소리
    blanks:
      A:
        answer: 판문점
        hint: 이 편지 속 장소는 다른 자료에서 확인할 수 있습니다. 자료 B(신문)를 읽어보세요.
        source: B
      B:
        answer: 해리슨 2세
        hint: 이 인물은 사진 자료에서 확인할 수 있습니다. 자료 C(사진)의 캡션을 읽어보세요.
        source: C
        altAnswers:
          - 해리슨
      C:
        answer: 남일
        hint: 공산군 측 수석대표의 이름은 자료 B(신문)에서 확인할 수 있습니다.
        source: B
      D:
        answer: '4'
        hint: 각 2킬로미터씩 후퇴하면 총 폭은? 자료 B(신문)를 참고하세요.
        source: B
        altAnswers:
          - 사
          - 4km
          - 4킬로미터
