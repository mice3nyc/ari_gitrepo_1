  - id: s0104
    title: DMZ의 관리체계
    era: 1953년 정전협정 ~ 현재
    location: 판문점(NNSC 본부), DMZ, 민간인통제구역
    sources:
      - id: A
        type: letter
        icon: ✉️
        title: NNSC 장교의 편지
        docTitle: 세상에서 가장 긴 임무
        sub: 스웨덴 소령 에릭 린드그렌
        styleClass: source-letter
        templateData:
          heading: 세상에서 가장 긴 임무
          meta: '2026년 1월 15일 · 보내는 이: 에릭 린드그렌(가상), 스웨덴 육군 소령 · 받는 이: 아내 안나'
          paragraphs:
            - 사랑하는 안나에게.
            - 판문점에 온 지 석 달이 지났다. 스톡홀름에서 여기까지 8,000km. 아이들은 잘 지내고 있지?
            - |-
              나는 중립국감독위원회(NNSC)의 스웨덴 대표단으로 이곳에 있어. 우리 임무는 1953년 정전협정이 제대로 지켜지고 있는지 감시하는 거야. 한반도에 새로운 무기나 추가 병력이 들어오지 않는지 확인하지.
            - |-
              NNSC는 원래 4개국이었어. 스웨덴과 {{A}}가 유엔군사령부(UNC) 측 지명이고, 폴란드와 체코가 북한 측 지명. 지금은 체코가 빠지고 폴란드도 상주하지 않아. 스웨덴 5명, 스위스 5명. 이렇게 10명이 세계에서
            - |-
              여기서 가장 인상 깊은 건 아침이야. 해가 뜰 때 DMZ 너머로 새소리가 들려. 세상에서 가장 무거운 침묵과 세상에서 가장 맑은 새소리가 공존하는 곳. 그게 이곳이야.
            - 아이들에게 아빠가 보고 싶어 한다고 전해줘. 금방 갈게.
          sign: 사랑을 담아, 에릭
      - id: B
        type: newspaper
        icon: 📰
        title: 신문 기획보도
        docTitle: DMZ는 누가 어떻게 관리하나
        sub: 통일뉴스 2026.3.12
        styleClass: source-newspaper
        templateData:
