          meta: 뉴스 보도 재구성 (정책브리핑·VOA·Korea Herald 참고)
          paragraphs:
            - '■ 2018.09.19: 평양에서 9.19 군사합의 서명. JSA 비무장화 합의.'
            - '■ 2018.10.01~20: JSA 내 지뢰 제거 작업 완료.'
            - |-
              ■ 2018.10.25: 남북 초소 철수(남측 4곳·북측 5곳), 화기·탄약·병력 철수 완료. 이후 남북에서는 각 35명이 비무장 상태로 노란 완장("판문점 민사경찰") 착용 후 근무.
