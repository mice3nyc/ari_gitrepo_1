topic: cat03
topic_name: 국가유산-문화재
stories:
  - id: s0301
    title: 고려시대 유산(만월대)
    era: 918~1392년 고려 · 2007~2018년 발굴
    location: 개성 만월대
    sources:
      - id: A
        type: diary
        icon: 📓
        title: 만월대의 일기
        sub: 나는 천 년 동안 이 자리에 있었습니다
        styleClass: source-diary
        templateData:
          meta: 만월대 (고려 궁궐터) — 의인화
          paragraphs:
            - 나는 만월대입니다. 고려의 정궁. 송악산 남쪽 기슭에서, 나는 약 470년간 이 나라의 중심이었습니다.
            - 1361년, 홍건적이 들이닥쳤을 때 나는 불탔습니다. 그 뒤로 아무도 나를 다시 세우지 않았습니다.
            - 2007년, 드디어 남과 북의 사람들이 함께 왔습니다. 내 몸을 파기 시작했습니다. 조심스럽게, 아주 조심스럽게.
            - 8차례의 발굴 끝에 40여 동의 건물터가 드러났고, {{A}}여 점의 유물이 나왔습니다. 그중에는 금속활자도 있었습니다.
            - 나는 2013년에 {{B}}이 되었습니다. 세계가 나를 알아본 것입니다.
            - 하지만 발굴은 멈추었습니다. 남과 북의 사이가 다시 멀어졌기 때문입니다. 나는 기다립니다. 천 년을 기다렸으니, 조금 더 기다릴 수 있습니다.
      - id: B
        type: report
        icon: 📋
        title: 문화재청 보도자료
        sub: 만월대 남북공동발굴 성과
        styleClass: source-report
        templateData:
          header: 문화재청 보도자료 — 개성 만월대 남북공동발굴 12년 성과
          paragraphs:
            - 2007년부터 2018년까지 8차례에 걸친 남북공동발굴조사 결과, 서부건축군 약 33,000m²를 발굴하여 40여 동의 건물터를 확인했다.
            - 출토 유물은 약 17,900여 점으로, 2015~2016년 발굴에서는 금속활자 5점이 출토되었다.
            - |-
              개성역사유적지구는 만월대, 개성 남대문, 고려 성균관, 선죽교, 왕건왕릉, {{C}} 등 12개 유적으로 구성되며, 2013년 유네스코 세계문화유산에 등재되었다.
      - id: C
        type: photo
        icon: 📷
        title: 사진 자료
        sub: 개성 만월대 전경
        styleClass: source-photo
        templateData:
          photos:
            - src: photos/cat03/3-1.jpg
              alt: 만월대
              caption: |-
                [사진] 개성 송악산 남쪽 기슭의 만월대. 고려 정궁 터로, 약 25만m² 규모이다. 2013년 개성역사유적지구의 일부로 유네스코 세계문화유산에 등재되었다. 개성역사유적지구에는 만월대 외에도 공민왕릉, 왕건왕릉, 선죽교 등 {{C}}개 유적이 포함되어 있다.
              credit: Eternal and life, 2011. CC BY-SA 4.0
      - id: D
        type: oral
        icon: 🎙️
        title: 구술 인터뷰
        sub: 남북공동발굴단 연구원
        styleClass: source-oral
        templateData:
          meta: '구술자: 정승민(가상), 전 남북공동발굴단 연구원'
          quotes:
            - '"2007년에 처음 만월대 땅을 밟았을 때요, 손이 떨렸어요. 분단 이후 남쪽 고고학자가 북쪽 땅에서 발굴하는 거잖아요."'
            - '"북쪽 연구자들이랑 같이 일했는데, 신기한 게 뭐냐면 삽질하는 방법이 같아요. 같은 교과서로 배웠으니까."'
            - '"{{D}}이 나왔을 때는 진짜 울었어요. 고려시대에 이미 활자를 만들었다는 증거가 수백 년간 이 땅 아래 잠들어 있었던 거잖아요."'
            - '"발굴이 멈춘 지 벌써 몇 년이에요. 아직 궁성의 핵심 구역은 손도 못 댔어요."'
    blanks:
      A:
        answer: 17,900
        hint: 보도자료(B)에서 출토 유물 수를 확인하세요.
        source: B
        altAnswers:
          - '17900'
      B:
        answer: 세계문화유산
        hint: 보도자료(B)에서 2013년 등재된 명칭을 확인하세요.
        source: B
        altAnswers:
          - 세계유산
      C:
        answer: '12'
        hint: 보도자료(B)에서 개성역사유적지구의 유적 수를 확인하세요.
        source: B
      D:
        answer: 금속활자
        hint: 일기(A)에서 유물 중 특별한 발견을 확인하세요.
        source: A
    choices:
      - id: A
        icon: 📓
        title: 만월대의 일기
        meaning: 천 년의 기다림을 기록한다
      - id: B
        icon: 📋
        title: 보도자료
        meaning: 발굴 성과를 공식 기록한다
      - id: C
        icon: 📷
        title: 사진
        meaning: 현장의 모습을 남긴다
      - id: D
        icon: 🎙️
        title: 구술 인터뷰
        meaning: 발굴자의 감동을 기록한다
  - id: s0302
    title: 경순왕릉
    era: 935년 신라 멸망 ~ 현재
    location: 연천군 장남면 고랑포리
    sources:
      - id: A
        type: letter
        icon: ✉️
        title: 경순왕의 편지
        sub: 경주에 가지 못한 왕
        styleClass: source-letter
        templateData:
          heading: 경주에 가지 못한 왕
          meta: 시간을 초월하여 · 경순왕 김부 (신라 제56대, 마지막 왕)
          paragraphs:
            - 나의 후손들에게,
            - 나는 {{A}}의 마지막 왕, 김부입니다.
            - 935년, 나는 신하들과 함께 고려에 나라를 넘겨주기로 했습니다. 더 이상의 피를 보고 싶지 않았습니다.
            - 979년, 내가 세상을 떠났을 때 장례 행렬은 경주를 향했습니다. 하지만 고랑포에서 고려 조정이 막았습니다.
            - 그래서 나는 이곳, 임진강이 보이는 언덕에 묻혔습니다. 경주가 아닌 곳에 잠든 유일한 신라의 왕.
            - 천 년이 흘렀습니다. 나의 무덤 주변에는 {{D}}가 묻혔다고 합니다. 사람이 만든 것 중 가장 잔인한 것이, 나의 잠을 지키고 있습니다.
          sign: 경순왕 김부 올림
      - id: B
        type: newspaper
        icon: 📰
        title: 신문 보도
        sub: 통일뉴스 2026.4.10
        styleClass: source-newspaper
        templateData:
          paperName: 통 일 뉴 스
          date: 2026년 4월 10일
          headline: '[르포] 지뢰밭 속의 왕릉 — 경순왕릉을 찾아서'
          paragraphs:
            - |-
              경기도 {{B}} 장남면 고랑포리. 사적 제244호 경순왕릉은 한때 민간인통제구역 안에 있었다. 능 주변 야산에는 미확인 지뢰가 매설되어 있어, 진입로 양쪽에 '지뢰' 표지 울타리가 세워져 있다.
            - |-
              경순왕은 신라 마지막 왕(제56대)이다. 935년 고려에 항복한 뒤, 979년 사망 시 장례 행렬이 경주로 향하다가 고랑포에서 고려 조정의 저지를 받았다.
            - 오랫동안 잊혀져 있다가 조선 영조 때 재확인되었으며, 현재는 민간에 공개되어 누구나 참배할 수 있다.
      - id: C
        type: photo
        icon: 📷
        title: 사진 자료
        sub: 경순왕릉
        styleClass: source-photo
        templateData:
          photos:
            - src: photos/cat03/3-2.jpg
              alt: 경순왕릉
              caption: '[사진] 경기도 연천군 소재 경순왕릉. {{C}} 제244호. 신라 마지막 왕의 무덤으로, 한때 민간인통제구역 내에 위치했다.'
              credit: Altostratus, 2011. CC BY-SA 3.0
      - id: D
        type: kakao
        icon: 💬
        title: 카카오톡 대화
        sub: 경순왕릉 방문 후 친구 대화
        styleClass: source-kakao
        templateData:
          messages:
            - name: 수아
              text: 오늘 경순왕릉 다녀왔는데 소름 돋았어
            - name: 민지
              text: 거기 연천에 있는 거지? 신라 왕 무덤이 왜 거기 있어?
            - name: 수아
              text: 경주로 가다가 고려 조정이 막았대. 신라 부흥운동 일어날까 봐
            - name: 민지
              text: 헐 그래서 임진강 근처에 묻힌 거야?
            - name: 수아
              text: ㅇㅇ 그리고 무덤 주위에 지뢰가 매설돼 있어
            - name: 민지
              text: 지뢰?? 진짜??
            - name: 수아
              text: 민통선 안에 있었거든. 지금은 공개됐지만 뒤쪽 철책 너머로는 절대 못 가
            - name: 민지
              text: 천 년 전 왕을 지뢰가 지키고 있는 거네...
    blanks:
      A:
        answer: 신라
        hint: 신문 보도(B)에서 경순왕의 왕조를 확인하세요.
        source: B
      B:
        answer: 연천군
        hint: 카카오톡(D)에서 왕릉 소재지를 확인하세요.
        source: D
      C:
        answer: 사적
        hint: 신문 보도(B)에서 왕릉의 문화재 지정 유형을 확인하세요.
        source: B
      D:
        answer: 지뢰
        hint: 신문 보도(B)에서 왕릉 주변에 매설된 것을 확인하세요.
        source: B
    choices:
      - id: A
        icon: ✉️
        title: 경순왕의 편지
        meaning: 천 년 전 왕의 목소리를 기록한다
      - id: B
        icon: 📰
        title: 신문 보도
        meaning: 현장 르포를 기록한다
      - id: C
        icon: 📷
        title: 사진
        meaning: 왕릉의 모습을 남긴다
      - id: D
        icon: 💬
        title: 카카오톡 대화
        meaning: 방문 경험을 기록한다
  - id: s0303
    title: 허준의 무덤
    era: 1537~1615년 허준 · 2009년 세계기록유산
    location: 파주시 진동면 하포리
    sources:
      - id: A
        type: diary
        icon: 📓
        title: 허준 후손의 일기
        sub: 증조할아버지의 산소를 찾아가는 길
        styleClass: source-diary
        templateData:
          meta: 1616년(광해군 8년) 가을 · 허준의 증손 허영(가상)
          paragraphs:
            - 증조할아버지께서 돌아가신 지 한 해가 되었다.
            - 올해 처음 산소에 성묘를 간다. 임진강을 건너 파주 진동의 산자락.
            - 증조할아버지는 어의(御醫)이셨다. 임진왜란 때 선조 대왕을 의주까지 수행하셨고, 그 공으로 호성공신 3등에 오르셨다.
            - |-
              무엇보다 증조할아버지는 {{A}}을 남기셨다. 25권의 의학서. 선조 대왕이 명하시길 — 백성이 스스로 몸을 돌볼 수 있는 책을 만들라 하셨고, 16년의 연구 끝에 완성하셨다.
            - 산소는 해발이 높은 곳에 있다. 쌍분으로, 왼쪽이 증조할아버지, 오른쪽이 증조할머니(안동김씨)이시다.
            - 증조할아버지. 당신이 남기신 책이 백 년 뒤에도, 천 년 뒤에도 사람들을 살리고 있을 것입니다.
      - id: B
        type: newspaper
        icon: 📰
        title: 신문 보도
        sub: 통일뉴스 2026.7.31
        styleClass: source-newspaper
        templateData:
          paperName: 통 일 뉴 스
          date: 2026년 7월 31일
          headline: '[기획] 동의보감 {{B}} 등재 17주년… 허준 묘는 지금'
          paragraphs:
            - |-
              2009년 7월 31일, 유네스코는 동의보감을 세계기록유산(Memory of the World)으로 등재했다. 의학 서적이 세계기록유산에 오른 것은 세계 최초다.
            - 허준(1537~1615)의 묘는 경기도 {{C}} 진동면 하포리에 있다. 경기도 기념물 제128호.
            - |-
              1991년 재미 고문서연구가가 '양천허씨족보' 기록을 바탕으로 군부대 협조를 얻어 발견했다. 쌍분 형태로 좌측이 허준, 우측이 부인 안동김씨로 추정된다.
      - id: C
        type: photo
        icon: 📷
        title: 사진 자료
        sub: 동의보감
        styleClass: source-photo
        templateData:
          photos:
            - src: photos/cat03/3-3.jpg
              alt: 동의보감
              caption: |-
                [사진] 동의보감 목차 페이지. 허준이 16년간 연구하여 1610년 완성, 1613년 목판 간행한 {{D}}권의 방대한 의학 백과사전이다. 2009년 유네스코 세계기록유산에 등재되었다.
              credit: 허준 원저(1613). Public Domain
      - id: D
        type: oral
        icon: 🎙️
        title: 구술 인터뷰
        sub: 파주시 문화유산 해설사
        styleClass: source-oral
        templateData:
          meta: '구술자: 김종태(가상), 파주시 문화유산 해설사'
          quotes:
            - '"허준 묘가 발견된 게 1991년이에요. 임진강 건너 해발 159m 산자락에 있었는데, 족보 기록 보고 군부대 협조 얻어서 찾아간 거예요."'
            - '"쌍분이에요. 왼쪽이 허준 선생, 오른쪽이 부인. 문인석 두 기가 서 있는데 높이가 203cm."'
            - '"동의보감이 25권인데, 선조 임금이 명해서 16년 걸려 완성한 거예요. 백성이 스스로 몸을 돌볼 수 있게."'
            - '"지금은 무료로 누구나 올 수 있어요. 임진각에서 출발하는 관광 코스에 포함돼 있거든요."'
    blanks:
      A:
        answer: 동의보감
        hint: 신문 보도(B)에서 유네스코에 등재된 의학서 이름을 확인하세요.
        source: B
      B:
        answer: 세계기록유산
        hint: 구술 인터뷰(D) 또는 사진(C)에서 유네스코 등재 유형을 확인하세요.
        source: C
      C:
        answer: 파주시
        hint: 구술 인터뷰(D)에서 해설사의 소속 지역을 확인하세요.
        source: D
      D:
        answer: '25'
        hint: 일기(A) 또는 구술(D)에서 동의보감의 권수를 확인하세요.
        source: A
    choices:
      - id: A
        icon: 📓
        title: 후손의 일기
        meaning: 가족의 기억을 기록한다
      - id: B
        icon: 📰
        title: 신문 보도
        meaning: 역사적 사실을 기록한다
      - id: C
        icon: 📷
        title: 사진
        meaning: 문화유산의 모습을 남긴다
      - id: D
        icon: 🎙️
        title: 구술 인터뷰
        meaning: 해설사의 지식을 기록한다
  - id: s0304
    title: 병자호란 감화전투
    era: 1637년 1월 병자호란
    location: 철원군 김화읍
    sources:
      - id: A
        type: diary
        icon: 📓
        title: 군사의 딸 일기
        sub: 아버지가 돌아오시면
        styleClass: source-diary
        templateData:
          meta: 1637년(인조 15년) 정월 · 연이(가상, 14세), 평안도 군사의 딸
          paragraphs:
            - 아버지가 떠나신 지 열흘이 넘었다.
