        source: C
      D:
        answer: 펀치볼
        hint: '양구 해안면에 있는 분지형 평화관광지의 이름은 자료 A(일기)와 자료 B(뉴스 기사)에서 확인할 수 있습니다.'
        source: D
    choices:
      - id: A
        icon: 📔
