  - id: s0605
    title: 제3땅굴, 갈등의 증거가 평화의 자원으로
    era: 1978년 발견 ~ 2002년 관광 개방 이후
    location: 경기도 파주 — 서울 북방 52km
    sources:
      - id: A
        type: diary
        icon: 📔
        title: 회고 에세이
        sub: 박지훈(1979년생) — 제2회 평화관광 에세이 공모전 입선작
        styleClass: source-diary
        docTitle: 30년 만에 다시 찾은 곳
        templateData:
          heading: 30년 만에 다시 찾은 곳
          meta: '작성자: 박지훈(1979년생, 직장인) / 제2회 평화관광 에세이 공모전 입선작'
          paragraphs:
            - '국민학교 5학년 가을, 학교에서 단체 버스를 타고 파주에 갔다. 그땐 학교에서 {{A}}견학이라는 이름으로 진행하던 연례 행사였다. 헬멧을 쓰고 좁은 통로를 따라 한참을 내려갔던 기억이 생생하다. 천장이 낮아 어른들이 자꾸 고개를 숙였고, 누군가 농담을 하면 그 소리가 굴 안에 둥글게 울렸다. 어렸던 나는 무엇을 본 건지 잘 몰랐던 것 같다.'
            - '30년이 흘러 이번엔 초등학교 1학년이 된 딸과 함께 왔다. 매표소 앞은 외국인 관람객이 더 많았다. 모노레일도 새로 생겼는데 걸어서 들어갔던 어둑한 통로는 그대로였다. {{B}}이 무슨 뜻이냐고 묻는 딸에게 설명을 해주고 집으로 돌아오는데 딸이 내게 말했다.'
            - '"오늘 재미있었어. 아빠." 아이의 눈에는 {{D}}이 대립과 갈등의 장소가 아니라 평소에는 볼 수 없었던 신기하고 재미있는 공간으로 보이는 모양이다. 나 역시 무섭고 긴장감이 넘치던 곳이 관광지가 된 것에 놀라던 참이었다. 아무리 심각한 갈등도 시간이 흐르면 봉합된다는 것을 몸으로 체감한 것 같다.'
      - id: B
        type: newspaper
        icon: 📰
        title: 신문 보도
        sub: 놀공뉴스 2002년 6월 1일자
        styleClass: source-newspaper
        docTitle: '갈등의 증거가 평화의 자원으로 — 제3땅굴 어제 일반관광 개시…군사시설 24년 만의 변신'
        templateData:
          paperName: '놀공뉴스'
          date: '2002년 6월 1일'
          headline: '갈등의 증거가 평화의 자원으로 — 제3땅굴 어제 일반관광 개시…군사시설 24년 만의 변신'
          paragraphs:
            - '{{D}}이 어제(5월 31일) 일반 관람객에게 공개되었다. {{D}}은 1978년 10월 17일 발견된 길이 1,635미터의 땅굴로 서울과의 거리는 52킬로미터다. 지하 동굴의 규모는 시간당 약 3만 명의 무장병력이 통과할 수 있는 규모로, 북한이 {{B}}을 목적으로 굴착한 군사 시설로 확인됐다. 1971년 김일성의 지시에 이어, 1974년 9월 귀순한 북한 노동당 연락부 측량기사 김부성의 제보를 단서로 3년간의 시추 끝에 찾아낸 땅굴이다. 발견 후, 24년간 군 통제 하 {{A}}견학 형태로만 출입이 허용돼 왔다.'
            - '공개 구간은 전체 1,635미터 중 265미터로, 군사분계선 가까운 안쪽은 보안상 비공개로 남는다. 이날부터 운영을 시작한 모노레일은 관광객의 편의를 돕는다. 평화를 상징하는 조형물 {{C}}은 평화관광지로서 도약하고자 하는 {{D}}의 새로운 얼굴이 될 전망이다.'
            - '파주시 관계자는 "{{D}}은 발견 당시 {{A}}와 위협의 상징이었지만, 오늘부터는 분단을 직접 보고 평화의 의미를 되묻는 공간이 된다"라며 "갈등의 증거가 평화 자원으로 바뀌는 한국형 다크투어리즘의 출발점"이라고 의의를 설명했다.'
      - id: C
        type: photo
        icon: 📷
        title: 사진 자료
        sub: 제3땅굴 DMZ전시관 로비 및 상징조형물 (통일부)
        styleClass: source-photo
        docTitle: '제3땅굴 — DMZ전시관 로비와 상징조형물 하나되는지구'
        templateData:
          photos:
            - src: photos/cat06/제3땅굴_C_01.jpg
              alt: 제3땅굴 DMZ전시관 로비 전경
              caption: '{{D}} DMZ전시관 로비. 관람객이 분단 역사와 발견 경위를 다룬 전시를 둘러보고 있다. 1978년 {{B}} 침투 시설로 발견된 이래 24년간 {{A}}견학 형태로만 출입이 허용되었던 {{D}}은, 2002년부터 일반 관람객에게 공개되어 한국형 다크투어리즘의 대표 사례로 운영되고 있다.'
              credit: '출처: 통일부 판문점견학지원센터(panmuntour.go.kr)'
