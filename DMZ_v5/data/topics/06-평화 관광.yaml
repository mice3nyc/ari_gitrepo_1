            - '저는 양구 {{D}}을 좋아합니다. 분지 한가운데서 사방을 둘러보면 여기서 큰 전투가 있었다는 게 실감이 나지 않아요. 지금은 고추나 인삼 농사를 짓는 마을이 되었구요. 외국인 분들이 {{D}}이라는 이름을 듣고 다 웃으세요. UN군이 화채그릇 같다고 부른 게 그대로 남았다고 설명하면 재미있어 하시죠.'
