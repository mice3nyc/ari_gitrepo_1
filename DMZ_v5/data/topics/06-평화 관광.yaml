  - id: s0604
    title: 전망대 위에서
    era: 1987년 ~ 현재
    location: 도라전망대(경기 파주) · 화천 평화의 댐 · 양구 펀치볼
    sources:
      - id: A
        type: diary
        icon: 📔
        title: 외국인 일기
        sub: 캘럴라인 하들리 — 도라전망대 방문기 (2025)
        styleClass: source-diary
        docTitle: 전망대 위에서 북쪽을 바라보며
        templateData:
          heading: 전망대 위에서 북쪽을 바라보며
          meta: '작성자: 캘럴라인 하들리(외교관 배우자, 40대 여성, 한국 거주 4년차)'
          paragraphs:
            - '남편이 한국 근무를 시작한 지 4년이 지났는데도, 휴전선 가까이 가본 적이 없었다. 동료 외교관 가족이 "한국에 살면서 도라전망대는 한 번 가봐야 한다"라고 권해줬다. 하루 시간을 내어 남편 동료 부부와 함께 파주로 향했다.'
            - '안내센터에서 여권을 제시하고 표를 받았다. 이곳이 도라전망대까지 가는 출발점이라고 했다. 셔틀버스에 올라타니 한국어·영어·중국어·일본어로 안내 방송이 나왔다. 도라전망대는 {{B}}에 있다고 한다. {{C}}에 도착하니 4층짜리 건물이 모습을 드러냈다. 한국인 가이드가 망원경 앞에서 손짓했다. 망원경을 들여다보니 북쪽 산의 능선이 또렷하게 보였다.'
            - '돌아오는 길에 가이드는 다른 답사지도 권해줬다. 강원도 화천에 {{A}}이 있는데, 1986년 한국 시민들이 모금해 시작한 댐이라고 했다. 2025년 봄부터 일반 차량으로도 갈 수 있게 됐다고 한다. 양구에 있는 {{D}}도 흥미로웠다. 한국전쟁 때 UN군이 분지 모양이 그릇 같다며 {{D}}이라 부른 게 지금까지 남았다고 했다. 추천받은 곳을 다 가보지는 못했지만 언젠가 또 시간을 내어 한 번 더 오고 싶다.'
      - id: B
        type: newspaper
        icon: 📰
        title: 뉴스 기사
        sub: 놀공 뉴스 2026년 5월호
        styleClass: source-newspaper
        docTitle: 파주에서 양구까지 — 한반도 평화관광 3선
        templateData:
          paperName: '놀공 뉴스 NOLGONG NEWS'
          date: '2026년 5월호'
          headline: '파주에서 양구까지 — 한반도 평화관광 3선'
          paragraphs:
            - '한반도 {{B}}을 찾는 외국인 방문객이 점점 증가하는 추세다. 경기도와 강원특별자치도에 걸쳐 있는 평화관광 거점이 정상 운영을 시작하면서 통일부가 2025년부터 추진 중인 「{{B}} 평화 구축과 민생경제 활성화」 사업도 탄력을 받고 있다. 2000년 제정된 「{{B}} 지원법」을 대체해 2011년 제정된 「{{B}} 지원 특별법」에 따라 지정된 이 권역은 민간인 통제선 남쪽 25킬로미터 이내를 포함한다. 인천광역시에 2개 군, 경기도에 7개 시·군, 강원특별자치도에 6개 시·군이 이에 해당한다.'
            - '대표적인 평화관광지 중 하나인 {{C}}는 {{B}}의 서쪽 끝에 있다. 1987년 처음 일반에 공개됐고 2018년 10월 새롭게 단장한 뒤, 현재 연간 80여 만 명이 찾고 있다. 화천에 있는 {{A}}도 평화관광지로 부상하고 있다. 1986년 시민 모금으로 공사를 시작해 2002년 확장 공사를 거치며 높이 125미터, 길이 601미터, 저수량 26.3억 톤의 규모를 갖추게 되었다. 지난해 3월 화천의 민간인 통제선이 3.5킬로미터 북상하면서, {{A}}까지 이르는 약 9.9킬로미터 구간이 일반 차량 자유 통행 구간으로 바뀌었기 때문이다.'
            - '양구 해안면의 {{D}}도 평화관광지로 자리 잡았다. 한글 공식 명칭은 해안 분지다. 한국전쟁 당시 UN군이 분지의 우묵한 모양을 보고 화채를 담는 사발(Punch Bowl)과 닮았다고 부른 별칭이 그대로 남았다. {{D}}을 한 바퀴 도는 둘레길은 산림청 누리집 ''숲나들e''에서 4일 전 사전 예약하고 숲길등산지도사와 함께 걷는 방식으로 운영되며, 이용료는 받지 않는다.'
      - id: C
        type: photo
        icon: 📷
        title: 사진 자료
        sub: 도라전망대 4층 관람석 (2018 재개관 후)
        styleClass: source-photo
        docTitle: '{{C}} 4층 관람석'
        templateData:
          photos:
            - src: photos/cat06/전망대_C_01.jpg
              alt: 도라전망대 4층 관람석 전경
              caption: '{{C}} 4층 관람석. 1987년 처음 일반에 공개됐고 2018년 10월 재개관해, 매년 80여 만 명이 이곳을 찾는다. 방문객 500명이 동시에 머물 수 있는 공간이다. 중간 안내데스크에는 한국인 문화관광해설사가 상주하고 있으며, 망원경 34대가 설치되어 있다. {{C}}은 {{B}} 서쪽 끝에 자리한 평화관광 거점이다. 같은 권역 안에는 화천 {{A}}, 양구 {{D}}도 빼놓을 수 없는 볼거리다.'
              credit: '출처: 통일부 판문점견학지원센터(panmuntour.go.kr)'
