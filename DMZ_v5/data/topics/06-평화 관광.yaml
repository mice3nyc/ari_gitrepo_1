  - id: s0603
    title: 실향민의 자리, 임진각
    era: 1972년 ~ 현재
    location: 경기도 파주시 문산읍 — 임진각 광장
    sources:
      - id: A
        type: diary
        icon: 📓
        title: 방문기
        sub: 김모네(32세) — 할아버지와 임진각 (2026년 4월)
        styleClass: source-diary
        docTitle: 할아버지와 임진각
        templateData:
          heading: 할아버지와 임진각
          meta: '글쓴이: 김모네(32세) / 2026년 4월'
          paragraphs:
            - '지난 주말, 할아버지가 {{A}} 에 같이 가자고 하셨다. 어머니께 말씀드리니, 자식들 빼고 손주만 데려가시겠다고 말씀하셨다고 한다. 어릴 적 가족 나들이로 한두 번 와본 기억이 흐릿하게 남아 있는 곳이었다.'
            - '4월 어느 평일 아침, 자유로를 따라 한 시간 남짓 달려 {{A}} 광장에 닿았다. 평일이라 한산했다. 할아버지는 차에서 내리시자마자 곧장 {{B}} 쪽으로 향하셨다. 89세인데도 걸음이 나보다 빨랐다. {{B}} 앞에서 할아버지는 향로를 한참 들여다보시더니 두 번 절을 올리셨다.'
            - '"매년 설과 추석이면 이북 사람들이 {{D}}라고 합동 차례를 지내. 한참 다니다가 이젠 못 가지."'
            - '나는 무어라 대답해야 할지 잘 몰랐다. 그저 할아버지 옆에 서 있었다. {{B}} 뒤편에는 폭격 자국이 가득한 증기기관차가 있었다. "이 차에 우리도 탈 뻔했지"라며 작게 웃으셨다.'
            - '광장 끝까지 걸어가니 {{C}}가 나왔다. 다리 끝 철책에는 태극기와 사람들이 매단 리본이 빼곡했다. 안내판에는 1953년 정전협정 후 포로 12,773명이 이 다리를 건너 남쪽으로 돌아왔다고 적혀 있었다. 할아버지는 그 앞에서 한참 서 계셨다. 돌아오는 길에 평화의 종 앞에서 사진 한 장 찍자고 했더니 거절하셨다. 그날 따라 할아버지는 별 말씀이 없으셨다.'
      - id: B
        type: newspaper
        icon: 📰
        title: 뉴스 기사
        sub: 놀공뉴스 2026년 5월호 — 임진각 평화관광 리포트
        styleClass: source-newspaper
        docTitle: 휴전선 너머 고향과 가장 가까운 곳, 임진각
        templateData:
          paperName: '놀공뉴스'
          date: '2026년 5월호'
          headline: '휴전선 너머 고향과 가장 가까운 곳, 임진각'
          paragraphs:
            - '{{A}}은 1972년 1번 국도가 끊기는 지점에 실향민의 안식처로 세워졌다. 평화관광지로 알려져 있지만, 이곳에 절을 올리고 {{C}} 끝에서 발길을 돌리는 사람들에게 이곳은, 휴전선 너머 고향에 가장 가까이 닿는 자리다.'
            - '매년 설과 추석이 가까워지면, {{A}} 광장 한가운데 자리한 {{B}} 앞에 사람들이 모인다. 이북에 고향을 둔 실향민과 그 후손들이다. 휴전선 너머로 갈 수 없으니, 가장 가까운 자리에서 절을 올리는 합동 차례, {{D}}를 봉행한다.'
            - '{{B}}은 1986년 9월 26일 건립됐다. 분단 이후 고향에 돌아가지 못한 실향민이 차례 지낼 곳이 마땅찮다는 요청에 따라 {{A}} 광장에 세워졌다. 향로와 제단은 북녘을 향하고 있다. {{D}}는 (사)통일경모회 주관으로 매년 설과 추석에 거행된다. 제문을 낭독하고 헌화와 분향, 재배에 이어 만세삼창을 하면 행사가 끝난다. 2026년 2월, 제42회 {{D}}가 열렸고 해를 거듭할수록 1세대 실향민의 자리는 줄고, 2·3세 후손의 자리가 늘고 있다.'
            - '광장 뒤편의 {{C}}는 1953년 정전협정 직후, 포로였던 국군·유엔군 12,773명이 남쪽으로 돌아온 통로다. 다리 끝 철책에 빼곡히 매달린 태극기와 리본은, 그날 이후 70여 년 동안 많은 사람들이 이곳을 찾은 흔적이다.'
      - id: C
        type: report
        icon: 📋
        title: 공식 자료
        sub: 국가유산청 국가유산포털 — 자유의 다리 (경기도 기념물 제162호)
        styleClass: source-report
        docTitle: 자유의 다리
        templateData:
          header: 자유의 다리
          meta: '출처: 국가유산청 / 국가유산포털 / 경기도 기념물 제162호 (1996. 12. 24. 지정)'
          paragraphs:
            - '{{C}}는 1953년 정전협정 직후, 임진강에 임시로 놓은 목조 다리다. 길이 83미터, 폭 4.5~7미터. 그해 공산군의 포로였던 국군 및 유엔군 12,773명이 이 다리를 건너 돌아왔다.'
            - '{{A}} 광장에서 {{B}} 뒤편으로 이어지는 산책로가 {{C}}를 지난다. 설과 추석에는 {{B}}에서 {{D}}가 열린다. {{C}} 아래에는 한반도 모양의 통일연못이 있다.'
      - id: D
        type: oral
        icon: 🎙️
        title: 구술 채록
        sub: 김재선(가상, 90세, 1936년생, 함경남도 흥남 출신) — 라디오 다큐멘터리 채록
        styleClass: source-oral
        docTitle: 라디오 다큐멘터리 채록 — 김재선
        templateData:
          meta: '화자: 김재선(가상, 90세, 1936년생, 함경남도 흥남 출신) / 라디오 다큐멘터리 채록'
          quotes:
            - '"14살 때 흥남에서 배를 탔어. 1950년 12월이었지. 어머니랑 형이랑 거제에 내렸고, 부산으로, 서울로 옮겨 다녔어. {{A}}이 1번 국도 끝이라는 말은 들었어도, 처음 와본 건 1972년 무렵이었던 것 같아. 강 건너만 보고 돌아갔지."'
            - '"{{B}}에 처음 절 올린 날은 또렷해. 향로 앞에 절하고 나니까 무릎이 한참 안 펴지더라고. 흥남에 두고 온 아버지 얼굴이 흐릿하게 떠올랐어."'
            - '"그 옆에 {{C}}도 있잖아. 우리 국군이랑 유엔군 포로들이 그 다리를 건너 돌아왔다고 안내문에 적혀 있더라고. 거기 왜 우리 아버지는 없었을까."'
            - '"설하고 추석에는 {{D}}에 가는 게 일이었지. 헌화하고, 분향하고, 두 번 절 올리고, 만세삼창까지 해. 절차는 짧은데, 그 자리에 앉으면 시간이 더디 가는 거 같아."'
            - '"이젠 다리가 무거워서 잘 못 가. 나 같은 1세대가 사라지고 나면, 누가 와서 절을 올릴까 싶어."'
    blanks:
