topic: cat06
topic_name: 평화 관광
stories:
  - id: s0601
    title: DMZ 평화의 길 — 금강산전망대 코스
    era: 2016년 이후 (DMZ 평화의 길 개방)
    location: 강원특별자치도 고성 — 통일전망대·금강산전망대(717OP) 일대
    sources:
      - id: A
        type: diary
        icon: 📓
        title: 일기
        sub: 김도현(초등학교 5학년) — DMZ 평화의 길 현장 체험 일기
        styleClass: source-diary
        docTitle: DMZ 평화의 길에 다녀온 5학년의 일기
        templateData:
          heading: DMZ 평화의 길에 다녀온 5학년의 일기
          meta: '작성자: 김도현(초등학교 5학년)'
          paragraphs:
            - '오늘 우리 학교에서 강원도 고성에 단체로 다녀왔다. DMZ 평화의 길이라는 곳이다. 선생님이 {{B}}로 신청하셨다고 했다.'
            - '오전 10시, 통일전망대에 모였다. 평화의 길 해설사 선생님과 함께 도착한 곳은 금강산전망대였다. 해설사 선생님이 원래 이곳은 DMZ 안쪽 최전방을 지키던 군인의 초소였다고 한다.'
            - '전망대에 올라가니 시원한 풍경이 펼쳐졌다. 저 너머에 호수가 있는데 호수가 너무 깨끗해서 봉우리가 그대로 비칠 정도라고 하셨다. {{A}}라는 이름에도 거울처럼 맑다는 뜻이 담겨 있다고 했다. 호수 뒤에 보이는 봉우리가 구선봉, 그 너머가 해금강이라는 설명을 들으면서 상상만 했다. 같은 반 친구가 물었다.'
            - '"저기까지 걸어갈 수 있는 날이 올까요?"'
            - '해설사 선생님이 잠깐 말을 멈췄다가 답했다.'
            - '"지금은 여기서 바라보는 것만으로도 의미가 있어요."'
            - '언젠가는 거울처럼 깨끗하다는 {{A}}를 실제로 볼 수 있게 되면 좋겠다.'
          sign: '김도현'
      - id: B
        type: poster
        icon: 📄
        title: 홍보 팜플릿
        sub: 금강산전망대 코스 안내 팜플릿 — 한국관광공사 발행
        styleClass: source-poster
        docTitle: '금강산이 손에 잡히는 자리 — 금강산전망대(717OP)'
        templateData:
          title: '금강산이 손에 잡히는 자리 — 금강산전망대(717OP)'
          meta: '발행: 한국관광공사 / 주최: 문화체육관광부 / 협력: 통일부·국방부·행정안전부·기후에너지환경부, 강원특별자치도'
          paragraphs:
            - 'DMZ 평화의 길 12개 테마노선 중 강원특별자치도 고성에서 운영하는 코스다. 통일전망대를 출발해 금강산을 가장 가까운 곳에서 볼 수 있는 금강산전망대를 거쳐 다시 통일전망대로 돌아오는 왕복 7.2km 코스다. 차량 이동과 현장 견학을 포함해 약 70분이 소요된다.'
            - '■ 풍경 — 전망대에 오르면 금강산 능선이 한눈에 들어온다. 동해 쪽으로 흩어진 {{D}}의 바위섬과 금강산의 마지막 봉우리인 {{C}}까지 손에 잡힐 듯한 거리에서 볼 수 있다. 그 아래 거울처럼 맑은 {{A}}까지 모두 뛰어난 절경을 자랑한다.'
            - '■ 신청 안내 — {{B}} 누리집 또는 {{B}} 앱에서 방문일 8일 전까지 사전 예약한다. 참가비 1만 원 / 회차별 정원 20명(최소 4명) / 만 7세 이상, 신분증 필수(대한민국 국민 한정) / 운영: 화·수·금·토·일 오전 10시·오후 2시 / 운영기간: 2026년 4월 17일 ~ 11월 30일(혹서기 7·8월 제외)'
      - id: C
        type: photo
        icon: 📷
        title: 사진 자료
        sub: 금강산전망대에서 본 북측 풍경 — 한국관광공사
        styleClass: source-photo
        docTitle: 금강산전망대 풍경
        templateData:
          photos:
            - src: photos/cat06/DMZ평화의길_C_01.jpg
              alt: 금강산전망대에서 본 북측 풍경
              caption: '금강산전망대에서 본 북측 풍경. 멀리 앞쪽에 거울처럼 맑은 {{A}}와 금강산의 마지막 봉우리인 {{C}}, 동해 쪽으로 흩어진 {{D}}의 바위섬, 그리고 우측에 동해 백사장이 한눈에 들어온다. 1953년부터 1983년까지 DMZ 안쪽 최전방을 지키던 군 초소가 평화의 길 코스의 종점이 되었다. 방문 신청은 {{B}} 누리집과 앱에서 가능하다.'
              credit: '한국관광공사(KTO) / 게재처: 두루누비 — DMZ 평화의 길 고성 B코스'
      - id: D
        type: oral
        icon: 🎙️
        title: 즉석 인터뷰
        sub: DMZ 평화의 길 탐방객 즉석 인터뷰 — 놀공 연구팀 수집
        styleClass: source-oral
        docTitle: DMZ 평화의 길 탐방객 즉석 인터뷰
        templateData:
          meta: '면담자: 놀공 연구팀 / 장소: 금강산전망대·통일전망대 코스 종점'
          quotes:
            - '"{{B}}로 신청했어요. 차에서 내려 전망대에 올라간 순간 말이 안 나왔어요. 금강산 봉우리들이 손에 잡힐 듯 가까워서. {{C}}과 {{D}}, 거울처럼 맑은 호수 {{A}}까지 다 멋있었어요. 다음에는 가족이랑 같이 와보고 싶어요." — 이주연(38세, 회사원)'
            - '"도보 3.6km 짧은 코스인데 두 겹의 철책 사이로 동해가 펼쳐지는 풍경이 잊히지 않아요. 남방한계선 바로 앞에 설 때는 우리나라가 분단 국가라는 걸 새삼 느꼈고요. 다음엔 동호회 사람들과 같이 오고 싶어요." — 송영민(58세, 도보 여행 동호회 회원)'
    blanks:
      A:
        answer: 감호
        hint: '호수 이름에 거울처럼 맑다는 뜻이 담겨 있다고 해설사가 설명합니다. 자료 B(팜플릿)와 자료 D(인터뷰)에서도 같은 호수 이름을 확인할 수 있습니다.'
        source: A
      B:
        answer: 두루누비
        hint: '사전 예약에 사용하는 누리집과 앱의 이름입니다. 자료 A(일기)와 자료 C(사진 캡션), 자료 D(인터뷰)에서도 동일하게 등장합니다.'
        source: B
      C:
        answer: 구선봉
        hint: '금강산의 마지막 봉우리 이름입니다. 자료 C(사진 캡션)가 가장 직접적인 출처이며, 자료 A(일기)와 자료 B(팜플릿)에서도 확인할 수 있습니다.'
        source: C
      D:
        answer: 해금강
        hint: '동해 쪽으로 흩어진 바위섬의 이름입니다. 자료 D(인터뷰)가 직접 출처이며, 자료 A(일기)와 자료 B(팜플릿)에서도 언급됩니다.'
        source: D
    choices:
      - id: A
        icon: 📓
        title: 일기
        meaning: 현장을 체험한 학생의 눈으로 장소와 느낌을 생생하게 전한다
      - id: B
        icon: 📄
        title: 홍보 팜플릿
        meaning: 공식 발행 자료로 코스 정보와 신청 절차를 안내한다
      - id: C
        icon: 📷
        title: 사진 자료
        meaning: 시각적 증거로 전망대에서 보이는 북측 풍경을 기록한다
      - id: D
        icon: 🎙️
        title: 즉석 인터뷰
        meaning: 실제 탐방객의 목소리로 현장 경험을 직접 전달한다
  - id: s0602
    title: 철마는 달리고 싶다 — 월정리역
    era: 1913년 ~ 현재
    location: 강원특별자치도 철원군 철원읍 홍원리 — 경원선 남측 마지막 역
    sources:
      - id: A
        type: letter
        icon: ✉️
        title: 편지
        sub: 실향민 김순례(84세, 평강 출신) — 동생 김순희에게 (2026년 6월)
        styleClass: source-letter
        docTitle: 부치지 못한 편지
        templateData:
          heading: 부치지 못한 편지
          meta: '보내는 사람: 김순례(1942년생, 평강 출신 실향민, 84세, 서울 거주) / 받는 사람: 김순희(1944년생 동생, 1·4 후퇴 때 헤어져 북에 남음, 생사 미상) / 2026년 6월'
          paragraphs:
            - '순희야. 부치지도 못할 편지를 또 한 장 적는다. 어제 손녀가 나를 데리고 철원에 다녀왔단다.'
            - '평강 집 마당이 자꾸 눈에 밟히는구나. 너는 너무 어려서 기억이 안 날지도 모르겠다. 집 앞으로 {{A}} 철길이 났던 거 생각나니? 그 철길 위로 흰 김을 뿜는 기차가 다녔지. 아버지가 원산 가시는 날이면 그 기차에 오르셨고, 우리는 마당 끝까지 나가 손을 흔들었단다.'
            - '그해 겨울이 자꾸 생각난다. 어른들은 며칠만 피해 있다 오면 된다고 하셨지. 우리도 다시 돌아올 줄로만 알았단다. 길이 막히고 다리가 끊기고, 그 며칠이 평생이 되었구나. 너를 두고 온 그 골목이 지금도 눈에 선하다.'
            - '어제 월정리역에 갔었어. 남쪽에 있는 마지막 역이라고 하더라. 객차 한 칸이 녹슨 채로 그대로 있었다. 이정표에 평강까지 19km라고 쓰여 있었어. 어려서 살던 집이 가까이 있을 거라 생각하니까 마음이 먹먹하다.'
            - '순희야. 이 편지를 니가 읽는다면 끊어진 {{A}}도 다시 이어지겠지. 그날 평강 집 마당에서 다시 만나자.'
          sign: '너의 언니가. 2026년 6월.'
      - id: B
        type: report
        icon: 📋
        title: 안내문
        sub: DMZ 평화관광 안내문 발췌 — 월정리역·철원 노동당사
        styleClass: source-report
        docTitle: DMZ 평화관광 안내문 — 월정리역·철원 {{B}}
        templateData:
          header: DMZ 평화관광 안내문 — 월정리역·철원 {{B}}
          meta: '출처: DMZ 평화관광 공식 안내문 / 강원특별자치도 철원군'
          paragraphs:
            - '■ 월정리역 — {{A}} 폐역 (1913.7.10 개통 / 1950.6.25 폐역 / 1988 안보관광 시설로 복원) / 강원특별자치도 철원군 철원읍 홍원리 711-2'
            - '월정리역은 {{A}}의 남측 마지막 역이다. 본래 서울에서 원산까지 이어졌던 이 노선은 1950년 6·25전쟁으로 끊어졌다. 역사는 폭격으로 무너졌고 객차 한 칸이 녹슨 채로 남아 있었지만, 1988년에는 안보관광 시설로 복원되어 일반에 공개됐다. 이정표에는 ''서울 104km, 평강 19km, 원산 123km, 함흥 247km''라 표기되어 있으며 그 옆에 ''철마는 달리고 싶다''라는 문구가 함께 적혀 있다.'
            - '■ 철원 {{B}} — 국가등록문화유산 (등록문화재 제22호, 2002년 5월 31일 등록) / 강원특별자치도 철원군 철원읍 금강산로 265 (관전리)'
            - '1946년 당시 북한이 철원과 그 인근 지역을 관장하기 위해 지은 지상 3층 러시아식 건물이다. 지역 주민의 노동력과 자금을 강제로 동원하여 지었으며, 철원·김화·평강·포천 일대를 수탈하는 중심지였다. 1950년 6·25전쟁 중 폭격으로 건물 대부분이 파괴되었다. 골조 벽면에 포탄과 총탄 자국이 그대로 남아 한국전쟁의 흔적을 보여준다.'
      - id: C
        type: photo
        icon: 📷
        title: 사진 자료
        sub: 월정리역 풍경 — 표지판·객차 잔해·철로 (2026)
        styleClass: source-photo
        docTitle: 월정리역 풍경
        templateData:
          photos:
            - src: photos/cat06/월정리역_C_01.jpg
              alt: 월정리역 철마는 달리고 싶다 표지판과 객차 잔해
              caption: '''철마는 달리고 싶다'' 표지판 옆으로 객차 잔해와 철로가 남아 있다. 1950년 6·25전쟁으로 끊긴 {{A}}의 마지막 남쪽 역, {{C}}은 1988년 안보관광 시설로 복원되었다.'
              credit: '놀공 (2026 자체 촬영) / 한국관광공사 (공공누리 제1유형)'
            - src: photos/cat06/월정리역_C_02.jpg
              alt: 월정리역 전경과 철원 일대 풍경
              caption: '지금은 안보관광 코스이자 다양한 문화행사 공간으로도 쓰인다. 매년 6월 철원 일대에서 열리는 {{D}} 음악 페스티벌이 대표적이다.'
              credit: '놀공 (2026 자체 촬영) / 한국관광공사 (공공누리 제1유형)'
      - id: D
        type: oral
        icon: 🎙️
        title: 인터뷰
        sub: 음악 웹진 인터뷰 — 박서영(38세, 5년차 페스티벌 단골)
        styleClass: source-oral
        docTitle: 음악 웹진 인터뷰 — DMZ 피스트레인 페스티벌 참가자
        templateData:
          meta: '구술자: 박서영(38세, 직장인, 5년차 페스티벌 단골) / 출처: 음악 웹진 인터뷰'
          quotes:
            - '벌써 다섯 번째 참석하는 거예요. 올해는 처음으로 주변을 같이 둘러봤어요. 제2땅굴, 평화전망대, {{C}}, {{B}}까지 둘러봤어요.'
            - '{{C}}에 있는 표지판은 볼 때마다 마음이 좀 이상해요. 차로 30분도 안 걸리는 거리인데 못 간다는 게 한참 멍하게 만들었어요.'
            - '{{B}}도 제대로 본 건 이번이 처음이에요. 벽만 남은 건물 앞에 섰는데 어릴 적 텔레비전에서 본 서태지 「발해를 꿈꾸며」 뮤직비디오가 그대로 떠오르더라고요.'
            - '저녁에 음악을 들으니까 낮에 본 풍경이 하나씩 떠올랐어요. 평화가 뭐 대단한 건가 싶었어요. 이런 게 평화죠. {{D}} 음악 페스티벌 오시는 분들도 주변에 있는 곳도 같이 보시면 좋을 것 같아요.'
    blanks:
      A:
        answer: 경원선
        hint: 월정리역이 속한 철도 노선 이름은 자료 B(안내문)와 자료 C(사진 캡션)에서 확인할 수 있습니다.
        source: B
      B:
        answer: 노동당사
