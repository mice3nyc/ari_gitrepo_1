AB:
  name: 교차 기록가
  desc: 개인의 감정과 공식 기록을 나란히 놓고 비교한다. 한쪽만으로는 불완전한 기록이 된다는 것을 안다.
AC:
  name: 현장 기록가
  desc: 누군가의 이야기를 듣고, 그것이 실재했음을 증명할 사진을 함께 남긴다.
AD:
  name: 증언 수집가
  desc: 공식 문서보다 사람에게 먼저 귀를 기울인다. 편지 속 떨리는 글씨와 녹음 속 침묵이 어떤 통계보다 많은 것을 말해준다고 믿는다.
BC:
  name: 실증 분석가
  desc: 감정을 배제하고 검증 가능한 것만 남긴다. 신문 기사의 날짜와 사진 속 장소가 일치하는 순간, 기록은 역사가 된다.
BD:
  name: 구술사 연구자
  desc: 신문이 보도하지 않은 이야기를 찾아 나선다. 공식 기록과 현장의 목소리를 대조할 때 숨겨진 진실이 드러난다.
CD:
  name: 현장 증언자
  desc: 그 자리에 있었던 것처럼 기록한다. 사진이 보여주는 풍경과 그곳에 있던 사람의 목소리를 겹쳐놓으면 독자도 그 자리에 서게 된다.
BALANCED:
  name: 균형 잡힌 기록가
  desc: 어떤 기록도 버리지 않는다. 모든 형태의 기록이 동등한 가치를 가진다고 믿는 사람.
