topic: cat02
topic_name: 생태환경
stories:
  - id: s0201
    title: DMZ 생태계가 갖는 의의
    era: 2026년 현재
    location: DMZ 일원
    sources:
      - id: A
        type: diary
        icon: 📓
        title: 종군기자의 일기
        sub: 산이 하얗게 죽었다
        styleClass: source-diary
        templateData:
          heading: 산이 하얗게 죽었다
          meta: '1952년 10월 · 글쓴이: 제임스 콜먼(가상), AP통신 종군기자'
          paragraphs:
            - 10월 8일
            - 전선으로 향하는 트럭 위에서 이 글을 쓴다. 철원 북쪽, 한국군 제9사단이 지키고 있는 고지로 간다.
            - 10월 12일
            - |-
              열흘 사이에 이 고지의 주인이 12번 바뀌었다. 중공군 제38군과 한국군 제9사단이 밤낮으로 고지를 빼앗고 빼앗겼다. 숫자로는 쓸 수 있지만, 눈앞의 광경은 숫자로 옮길 수 없다. 산이 하얗다. 나무가 하나도 없다.
            - 10월 14일
            - |-
              고지 아래에 섰다. 숲이었던 자리에 부러진 나무 밑동만 줄지어 있다. 그을린 나뭇가지 사이로 연기가 피어오르고 있었다. 한 한국군 병사가 내게 말했다. 작년까지만 해도 노루가 살았었다고. 한국에 처음 왔을 때는 산이 초록색이었는데.
      - id: B
        type: report
        icon: 📋
        title: 환경부 보도자료
        sub: 2018.6.14 DMZ 생태조사 결과
        styleClass: source-report
        templateData:
          header: 환 경 부 보 도 자 료          2018년 6월 14일
          meta: 환경부 보도자료 (2018.6.14) 기반 재구성
          paragraphs:
            - DMZ 일원에 멸종위기종 101종 포함 야생생물 5,929종 서식
            - — 전쟁으로 초토화된 땅, 70년 만에 한반도 최대 생태 보고로
            - |-
              한국전쟁 당시 비무장지대 일원은 대규모 포격과 네이팜탄(항공기에서 투하하는 소이탄의 일종으로, 고온의 젤리 형태 연소 물질이 넓은 면적을 태우는 무기) 폭격으로 산림이 대부분 소실되었다. 백마고지 전투에서는 열흘간 고지의 주인이 12번 바뀌었고, 산의 겉흙이 벗겨져 하얀 돌이 드러난 데에서 이름이 유래했다.
            - |-
              그로부터 많은 시간이 흐른 지금, 환경부와 국립생태원은 1974년부터 2017년까지의 누적 조사 자료를 종합한 결과, DMZ 일원에 총 5,929종의 야생생물이 서식하고 있음을 확인했다. 이 중 멸종위기 야생생물은 I급 18종, II급 83종 등 총 101종이다.
            - |-
              국토 면적의 약 1.6%에 불과한 이 좁은 띠에 생물다양성이 높게 나타나는 이유는 크게 세 가지다. 첫째, 민간인의 출입이 통제되면서 인위적 개발과 훼손이 차단되었고 둘째, DMZ 일원에는 산악, 하천, 습지, 농경지 등 다양한 서식 환경이 공존하며 셋째, 백두대간과 연결되어 남북 생태축의 역할을 하고 있다.
      - id: C
        type: photo
        icon: 📷
        title: 사진 자료
        sub: 1956년 철원 항공사진 / 현재 DMZ 풍경
        styleClass: source-photo
        templateData:
          photos:
            - src: photos/cat02/2-1.jpg
              alt: 1956년 철원 항공사진
              caption: |-
                1956년 강원도 철원 일대 항공사진. 사진 하단에 백마고지가 보인다. 한국전쟁이 끝난 지 3년이 지났지만, 대규모 포격과 {{C}} 폭격으로 겉흙이 벗겨진 산등성이가 보인다.
              credit: 부경근대사료연구소 김한근 소장. CC BY (한국저작권위원회 공유마당)
            - src: photos/cat02/2-2.png
              alt: 현재 DMZ 풍경
              caption: |-
                DMZ 일대의 현재 모습. 70여 년간 사람의 손길이 닿지 않은 비무장지대는 백두대간과 연결되는 한반도 핵심 생태 축으로 복원되었다. 환경부의 2018년 조사 결과에 따르면, DMZ 일원에는 총 5,929종의 야생생물이 서식하고 있다.
              credit: 국립수목원·녹색연합 발행 「평화와 생명의 DMZ」(2018) 발췌
      - id: D
        type: oral
        icon: 🎙️
        title: 구술 인터뷰
        sub: 철원 지역 주민 박순복
        styleClass: source-oral
        templateData:
          meta: '구술자: 박순복(가상), 1945년생, 철원군 주민 · 채록 일시: 2025년 10월<br>출처: 철원 지역 주민 구술 채록 (가상 자료)'
          quotes:
            - '"할머니가 여덟 살인가, 아홉 살인가 그랬을 때 전쟁이 끝났거든. 우리 마을 뒷산 있잖아. 그때는 산이 아니었어. 하얀 돌밖에 없었어."'
            - |-
              "어른들이 그러시는 거야. 전쟁 때 포탄이 쏟아져서 산이 저렇게 됐다고. 하늘에서 보면 하얀 말이 누워 있는 것 같다고 해서 백마고지라고 부른다고."
            - '"어릴 때는 무서웠어. 철조망 너머로는 아무도 못 가거든. 풀도 없고 짐승도 없고. 그냥 조용했어."'
            - '"근데 세월이 지나니까 달라지더라. 10년, 20년 지나니까 풀이 나고, 나무가 자라고. 어느 날 보니까 산이 초록색이 된 거야."'
            - '"요즘 텔레비전에서 그러더라. 여기가 동물들이 남북으로 오가는 {{D}}라고. 사람이 못 들어가니까 오히려 짐승들한테는 좋은 길이 된 거래."'
    blanks:
      C:
        answer: 네이팜탄
        hint: 환경부 보도자료(B)에서 산림을 소실시킨 폭격 무기를 확인하세요.
        source: B
      D:
        answer: 생태 통로
        hint: 환경부 보도자료(B)에서 백두대간과 연결되는 DMZ의 역할을 확인하세요.
        source: B
        altAnswers:
          - 생태통로
    choices:
      - id: A
        icon: 📓
        title: 종군기자의 일기
        meaning: 전쟁 현장의 참상을 기록한다
      - id: B
        icon: 📋
        title: 환경부 보도자료
        meaning: 공식 조사 결과를 기록한다
      - id: C
        icon: 📷
        title: 사진 자료
        meaning: 과거와 현재의 변화를 보여준다
      - id: D
        icon: 🎙️
        title: 구술 인터뷰
        meaning: 주민의 살아있는 경험을 기록한다
  - id: s0202
    title: 두루미 월동지
    era: 2025~2026년 겨울
    location: 철원평야, DMZ 일대
    sources:
      - id: A
        type: diary
        icon: 📓
        title: 두루미의 일기
        sub: 올해도 돌아왔습니다
        styleClass: source-diary
        templateData:
          heading: 올해도 돌아왔습니다
          meta: '2025년 10월 ~ 2026년 3월 · 작성자: 이름 없는 두루미 한 마리'
          paragraphs:
            - 10월 3일
            - |-
              {{A}}의 바람이 차가워졌습니다. 출발할 시간입니다. 올해도 남쪽으로 갑니다. 수천 킬로미터를 날아서, 매년 같은 곳으로. 나의 할머니도, 할머니의 할머니도 그곳에 갔습니다.
            - 11월 18일
            - |-
              드디어 철원 평야에 도착했습니다. 하늘에서 내려다보면 이상한 곳입니다. 남쪽은 건물과 도로로 빽빽하고, 북쪽은 어둡고 고요합니다. 그 사이에 가느다란 초록색 띠가 있습니다. 사람들은 거기를 DMZ라고 부른다고 합니다.
            - 12월 15일
            - |-
              들판에 내려앉으면 철조망이 보입니다. 사람들은 이쪽과 저쪽을 나누어 놓았습니다. 하지만 저에게는 경계가 없습니다. 바람이 부는 대로, 먹이가 있는 대로 날아갑니다. 70년 넘게 사람이 오지 않은 이 땅은, 저에게는 세상에서 가장 안전한 식탁입니다.
            - 1월 20일
            - |-
              올해는 동료가 많이 왔습니다. 나와 같은 두루미 친구들은 1,500마리가 넘고, 재두루미는 몇 배는 더 되는 것 같습니다. 새벽에 함께 날아오르면 하늘을 하얗게 뒤덮곤 합니다. 사람들이 아래에서 올려다봅니다. 총을 쏘지 않는 사람들입니다.
            - 3월 5일
            - |-
              다시 북쪽으로 떠날 시간입니다. 내년에도 이 들판이 있을까요? 이 고요가 있을까요? 사람들의 일은 모르겠습니다. 다만 저는 올해도, 내년에도, 그다음 해에도 돌아올 것입니다.
      - id: B
        type: newspaper
        icon: 📰
        title: 뉴스 보도
        sub: 통일뉴스 2026.1.20
        styleClass: source-newspaper
        templateData:
          paperName: 통 일 뉴 스
          date: 2026년 1월 20일
          headline: '"시베리아에서 철원까지 3,000km"… 두루미들의 대장정, 올겨울도 이어지다'
          meta: 뉴스 보도 재구성 (문화재청 보도자료, International Crane Foundation 참고)
          paragraphs:
            - |-
              올겨울에도 철원 평야에 두루미와 재두루미가 찾아왔다. 두루미(학명 Grus japonensis, 천연기념물 제202호·멸종위기 야생생물 I급)는 약 1,500마리, {{B}}(학명 Antigone vipio, 천연기념물 제203호·멸종위기 야생생물 Ⅱ급)는 약 5,000마리 이상이 관찰되었다.
            - |-
              이들의 여정은 시베리아와 중국 동북부의 번식지에서 시작된다. 매년 9월 하순이면 북쪽의 찬바람을 신호 삼아 남하를 시작해, 중국 동북부 습지를 경유하고 북한 상공을 통과하여 약 2,000~3,000km를 날아 10월 하순에 철원·연천·파주 일대에 도착한다.
            - '[두루미·재두루미 이동 경로]'
            - |-
              두루미와 재두루미의 이동 경로는 조금 다르다. 두루미 대륙 이동 개체군은 러시아 극동과 중국 동북부에서 번식한 뒤 한반도 DMZ 일대에 집중적으로 월동한다. 전 세계 두루미 약 4,600마리 중 대륙 이동 개체군 대부분이 한반도를 찾는다.
            - |-
              재두루미는 몽골 동부·러시아·중국 동북부 등 더 넓은 지역에서 번식하며, 월동지도 한반도·일본 이즈미(가고시마현)·중국 포양호 등 3개국에 분산된다. 크게 두 무리로 나뉘어 이동하는데, 동쪽 무리는 한반도와 일본으로, 서쪽 무리는 중국 내륙으로 향한다.
            - 전문가들은 "70여 년간 인간의 접근이 제한된 DMZ 일대의 농경지와 습지가 훼손되지 않아 핵심 서식지 역할을 하고 있다"라고 분석한다.
      - id: C
        type: photo
        icon: 📷
        title: 사진 자료
        sub: 겨울 철원의 두루미
        styleClass: source-photo
        templateData:
          photos:
            - src: photos/cat02/2-3.jpg
              alt: 두루미
              caption: |-
                겨울 철원 평야의 두루미. 흰 몸에 검은 목과 날개깃, 머리 꼭대기의 붉은 피부가 특징이다. 천연기념물 제{{C1}}호이자 멸종위기 야생생물 I급으로 지정되어 있으며, 전 세계 약 4,600마리에 불과한 희귀종이다.
              credit: 문화재청 국가유산포털, 천연기념물 제202호 두루미
            - src: photos/cat02/2-4.jpg
              alt: 재두루미
              caption: |-
                논에서 먹이를 찾는 재두루미 무리. 회색 몸통과 목덜미에 있는 흰 줄무늬, 눈 주위의 붉은 피부가 두루미와 구별되는 특징이다. 천연기념물 제{{C2}}호이자 멸종위기 야생생물 Ⅱ급으로 지정되어 있다. 매년 겨울 철원평야에 약 10,000마리 이상이 찾아온다.
              credit: 문화재청 국가유산포털, 천연기념물 제203호 재두루미
      - id: D
        type: oral
        icon: 🎙️
        title: 현장 해설
        sub: 철원 DMZ 문화해설사 김영숙
        styleClass: source-oral
        templateData:
          meta: '구술자: 김영숙(가상), 철원 DMZ 문화해설사 · 채록 일시: 2025년 12월<br>출처: 문화해설사 구술 채록 (가상 자료)'
          quotes:
            - |-
              "두루미가 학인 거 알고 있죠? 500원짜리 동전 있잖아요. 뒤집어 보세요. 거기 새겨진 새가 바로 두루미예요. 매일 주머니에 넣고 다니면서도 모르는 사람이 많아요."
            - |-
              "옛날에 조선시대 문관 관리들 옷에 학 문양을 수놓았어요. 학흉배라고 하는데, {{D}}이 고결하고 청렴한 선비를 상징했거든요. 십장생에도 학이 들어가죠. 장수의 상징이에요."
            - |-
              "학수고대라는 말 아시죠? 학의 목처럼 길게 빼고 기다린다는 뜻이에요. 학춤도 있고요. 부산에는 동래학춤이라는 게 있는데 학이 걷고 날개 펴는 동작을 춤으로 만든 거죠."
            - '"인천시 상징 새도 두루미고요. 전국에 학동, 학성, 학익동 같은 지명이 수두룩해요. 그만큼 우리 선조들한테 학은 늘 가까이 있던 새였어요."'
    blanks:
      A:
        answer: 시베리아
        hint: 뉴스 보도(B)에서 두루미의 번식지를 확인하세요.
