          meta: '해진의 연천 살이 · 작성자: 해진 (연천 토박이, 임진강 생물다양성 탐사단 3기)'
          paragraphs:
            - 드디어 탐사단 첫 활동 다녀왔다!!
            - 연천 임진강 생물다양성 탐사단은 연천군이 유네스코 생물권보전지역으로 지정된 이후 2023년에 처음 만들어진 프로그램이다.
            - |-
              참가 조건이 연천군민이어야 해서 나는 바로 신청했다. 우리 동네가 유네스코 생물권보전지역이라는 게 아직도 신기하다. 2019년에 지정됐는데, 연천군 전역이랑 임진강 유역이 포함된다. 같은 해에 강원도에도 {{A}} 생물권보전지역이 지정됐다.
            - |-
              오늘은 차탄천에서 탐조했다. 망원경으로 새를 관찰하고, eBird라는 앱에 기록하는 거다. 내가 기록한 데이터가 진짜 연구에 쓰인다니까 좀 뿌듯하다.
            - 해설사 선생님이 임진강이 깨끗한 건 비무장지대에서 흘러나오는 물이라 오염이 거의 없기 때문이고 했다.
            - 다음 달에는 임진강 북삼교 쪽으로 간다고 한다. 무척 기대된다.
            - '카테고리: 연천 일상 / 태그: 임진강, 생물다양성탐사단, 유네스코, 생물권보전지역, 탐조'
      - id: B
        type: scholar
        icon: 📄
        title: 백과사전
        sub: 유네스코 생물권보전지역
        styleClass: source-scholar
        templateData:
          heading: 유네스코 생물권보전지역
