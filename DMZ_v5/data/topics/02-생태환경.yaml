          paragraphs:
            - |-
              유네스코 생물권보전지역(UNESCO Biosphere Reserve)은 유네스코가 운영하는 인간과 생물권 프로그램(Man and the Biosphere Programme, MAB)에 따라 지정되는 국제 보전 지역이다.
            - |-
              생물권보전지역은 세 가지 용도 구역으로 구성된다. 핵심구역(Core Area)은 법적 보호를 받는 구역으로, 사람의 출입과 개발 행위가 엄격히 제한된다. 완충구역(Buffer Zone)은 핵심구역을 둘러싸며, 환경교육과 생태관광 등 제한적 활동이 가능하다. 협력구역(Transition Area)은 주민이 거주하며 지속가능한 개발이 이루어지는 구역이다.
            - |-
              2019년 6월, 한반도 비무장지대 접경 두 곳이 생물권보전지역으로 동시에 지정되었다. 두 지역 모두 70년 이상 군사적 접근 통제로 인해 민간인 출입이 제한된 결과, 원시 생태계가 보존되어 있다. 군사분계선에 의한 분단이 역설적으로 생태적 가치를 높인 사례로 평가된다.
            - |-
              강원생태평화 생물권보전지역은 강원도 인제, 철원, 화천, 양구, 고성 다섯 개 군에 걸쳐 있다. 면적 1,828.5제곱킬로미터. 산양, 사향노루, 두루미 등 멸종위기종 서식지가 핵심구역에 포함된다.
            - |-
              {{B}} 생물권보전지역은 경기도 연천군 전역과 임진강 유역을 포함한다. 비무장지대에서 흘러나오는 임진강의 수질이 양호하여 가는납줄개, 묵납자루 등 한반도 고유 민물고기가 서식한다.
            - |-
              두 지역은 남북 접경에 위치하여, MAB 프로그램이 별도로 운영하는 초국경 생물권보전지역(Transboundary Biosphere Reserve) 지정의 잠재적 대상지로 분류된다.
            - '관련 항목: 비무장지대, 인간과 생물권 프로그램(MAB), 초국경 생물권보전지역, 동아시아-대양주 철새이동경로'
            - '출처: 유네스코 한국위원회, 환경부'
      - id: C
        type: photo
        icon: 📷
        title: 사진 자료
        sub: 연천임진강 / 강원생태평화 생물권보전지역
        styleClass: source-photo
        templateData:
          photos:
            - src: photos/cat02/2-7.png
              alt: 연천임진강 생물권보전지역
              caption: |-
                연천임진강 생물권보전지역의 가을. 사람의 손이 거의 닿지 않은 임진강 유역에는 가는납줄개, 묵납자루 같은 한반도 고유 민물고기와 수달, 삵이 살고 있다. 이 일대는 생물권보전지역의 세 구역 가운데 가장 안쪽에 위치한 {{C}}에 해당하며, 출입이 엄격히 제한되고 법적으로 보호받는 구역이다.
