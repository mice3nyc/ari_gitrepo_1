      - id: D
        type: oral
        icon: 🎙️
        title: 라디오 인터뷰
        sub: 임진강 보전 활동가 이정민
        styleClass: source-oral
        templateData:
          meta: "진행자: 김수정 · 출연: 이정민, 임진강 보전 활동가 (환경단체 '맑은강' 소속, 가상)<br>출처: 지역 라디오 프로그램 (가상)"
          quotes:
            - "[진행자] 오늘은 임진강에서 10년 넘게 생태 조사 활동을 하고 계신 환경단체 '맑은강'의 이정민 활동가를 모셨습니다. 안녕하세요."
            - '[활동가] 네, 안녕하세요.'
            - '[진행자] 연천 임진강 유역이 2019년에 생물권보전지역으로 지정됐잖아요. 현장에서 직접 활동하시는 입장에서 어떤 의미인가요?'
            - |-
              [활동가] 저희가 10년 넘게 이 지역의 보전 가치를 정부와 국제기구에 알려왔는데, 국제적으로 공식 인정받은 거라서 활동의 전환점이 됐어요. 단순히 타이틀이 붙은 게 아니라, 핵심구역·완충구역·협력구역이라는 관리 체계가 생긴 거니까요.
            - '[진행자] 지정을 이끌어내기까지 어떤 노력이 있었나요?'
            - |-
              [활동가] 국제 지정 신청서를 준비하려면 장기간의 생태 조사 데이터가 필요합니다. 저희 단체가 10년 넘게 임진강 유역의 수질, 어류, 수달 서식 현황을 기록해왔어요. 그 자료가 신청의 근거가 됐습니다. 연천군과 환경부도 적극 협력해주셨고요.
            - '[진행자] 지정 이후에 달라진 점이 있나요?'
            - |-
              [활동가] 가장 큰 변화는 제도적 뒷받침이에요. 연천군에서 생물다양성 탐사단을 만들어 주민이 직접 모니터링에 참여하게 했고, 환경영향평가 때 생물권보전지역이라는 점이 반영되기 시작했어요. 국제 사회가 인정한 보전지역이니까 함부로 개발하기 어려워진 거죠.
            - '[진행자] 2024년에는 또 다른 국제 인정을 받았다면서요?'
            - |-
              [활동가] 네. 연천 임진강이 동아시아-대양주 철새이동경로 네트워크 서식지로 등재됐어요. 이건 저희가 오랫동안 요청해온 건데, 국제 지정이 신뢰도를 높여준 결과라고 봅니다. 국제 네트워크에 들어가면 모니터링 기준이나 보전 노하우를 공유받을 수 있어요.
            - '[진행자] 앞으로 바라는 점이 있다면요?'
            - |-
              [활동가] 이 지역이 군사분계선 바로 아래에 있잖아요. {{D}}에는 초국경 생물권보전지역이라는 제도가 있어요. 남과 북이 공동 신청해서 하나의 보전지역으로 관리하는 겁니다. 아직은 어렵지만, 생태 보전이 평화 협력의 첫걸음이 될 수 있다고 생각합니다.
