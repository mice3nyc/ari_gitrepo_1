              alt: 북측 기정동 마을 전경과 160m 인공기 게양대
              caption: 1987년 9월, 미 공군이 군사분계선 너머에서 촬영한 북측 기정동 마을. 뒤로 보이는 것이 1982년에 세워진 160m 인공기 {{B}}로, 2010년까지 28년간 세계에서 가장 높은 {{B}}라는 명성을 얻었다. 북측은 이 마을을 공식적으로 {{C}}이라 부르며, 남측 대성동과 1.8킬로미터를 사이에 두고 마주 서 있다.
