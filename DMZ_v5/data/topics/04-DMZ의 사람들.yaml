        type: kakao
        icon: 💬
        title: 카카오톡 대화
        sub: 북향민(60대)과 북한학 연구자의 가상 대화
        styleClass: source-kakao
        docTitle: 북향민 구술 — 카카오톡 대화
        templateData:
          source: 박준희(66세, 개성 인근 출생, 1990년대 초 탈북) · 이소정(42세, 북한학 박사)
          messages:
            - name: 이소정
              text: 선생님, 어제 인터뷰 감사했어요. 하나만 더 여쭤봐도 될까요? 어린 시절에 기정동 마을 쪽을 직접 보거나 들으신 이야기 있으신지요.
              align: right
            - name: 박준희
              text: 조금은 있어요. 우리 고향은 평화리에서 좀 떨어진 데였는데, 어른들이 그쪽 동네 이야기를 가끔 하셨어요. 우리는 그 마을을 '분계선마을'이라고 불렀어요. 남쪽에서 뭐라고 부르는지는 그때는 몰랐죠. 근데 그게 원래부터 그런 모양은 아니었대요. 엄마가 그러셨어요. 70년대 중반에… 아마 {{D}}년이었을 거예요. 그때 한꺼번에 집이 새로 지어졌다고. 그전에는 그렇게 번듯한 집들이 없었는데, 어느 순간 파란 지붕 건물들이 쫙 생겼다고.
              align: left
            - name: 이소정
              text: 정확한 연도까지 기억하고 계시네요. 선생님은 그 마을에 직접 가 보신 적은 없으시고요?
              align: right
            - name: 박준희
              text: 아니요, 일반 주민이 들어갈 수 있는 데가 아니에요. 체계상으로는 '판문점협동농장' 소속인데, 거기 실제로 사람이 살지는 않는다고 다들 그랬어요. 가끔 농번기에 다른 동네 사람들이 불려 가서 일하고 돌아오는 정도였다고.
              align: left
            - name: 이소정
              text: 말씀하신 '실제로 사람이 살지 않는다'는 부분, 그건 어떻게 알게 되셨던 거예요?
              align: right
            - name: 박준희
              text: 그냥 어른들 사이에서는 알려진 얘기였어요. 겉으로는 집이 많아 보여도 그 집은 속이 비어 있다고요. 실제로 가서 본 사람들도 그렇게 말했고요. 학교나 공장 같은 건물은 있는데 그 안에서 수업을 하거나 일을 하는 게 아니라 그냥 건물만 세워놓은 거라고.
              align: left
            - name: 박준희
              text: 하나 덧붙이자면, 저 어릴 때 우리 동네 할아버지가 그러셨어요. 저 마을이 원래는 남쪽 사람 넘어오라고 만든 동네라고. 그 말이 맞는지는 저도 잘 모르지만, 할아버지 말씀은 그랬어요.
              align: left
            - name: 이소정
              text: 네, 선생님. 그 부분까지 상세히 말씀해 주셔서 정말 큰 도움이 됐어요. 추가 인용 필요하면 다시 연락드리겠습니다.
              align: right
    blanks:
      A:
        answer: 평화리
        hint: 답사 노트의 행정구역명은 자료 B(지역 정보)와 자료 C(사진 캡션)에서 확인할 수 있습니다.
