  - id: s0405
    title: UN과 함께하는 대성동 주민의 삶
    era: 1953년 ~ 2026년 현재
    location: 대성동 자유의 마을 (DMZ 남측, 경기도 파주시 군내면 조산리)
    soundNote: 유엔기 바람 소리, 검문소 헌병 목소리, 저녁 가구 점호 발소리
    sources:
      - id: A
        type: diary
        icon: 🗒️
        title: 촬영일지
        sub: 다큐멘터리 PD의 대성동 3일 사전취재 기록 (2026)
        styleClass: source-diary
        docTitle: 다큐멘터리 PD의 대성동 촬영일지
        templateData:
          meta: "기록자: 김혜원 (독립다큐 제작사 '필름노트' PD, 8년 차) · 촬영 일자: 2026년 5월 14~16일"
          heading: 5월 14일 (수) 맑음
          paragraphs:
            - 오전 9시, 통일대교 검문소 도착. 유엔사가 발급해 준 사전 출입 허가증을 헌병에게 보여주고 촬영 장비 차량을 통과시켰다. 동행 공무원이 앞 유리에 파란 유엔기를 부착했다. 이 깃발이 없으면 대성동 출입 자체가 불가능하다. 9시 30분 마을에 도착했다. 첫 인상은 여느 농촌과 크게 다르지 않았다. 단층 주택, 논밭, 마을회관이 있었다. 다른 점은 지나가는 차량 대부분에 같은 깃발이 달려 있다는 것이었다.
            - 5월 15일 (목) 흐림
            - 오전, 이장 인터뷰. 대성동은 1953년 정전 직후 조성됐다. 정식 명칭은 '[A] {{A}}'. 남북이 DMZ 안에 마을 하나씩만 남기기로 한 합의에 따라 남쪽은 이곳, 북쪽은 약 1.8킬로미터 떨어진 기정동이다. DMZ는 양측이 군사분계선으로부터 각 2km씩 물러나 설정한 {{B}}로, 그 안에 주민이 실제 거주하는 마을은 남북 통틀어 이 두 곳뿐이다. 올해로 73년째다. 현재 49세대 138명이 거주한다.
            - 집 증축·화장실 보수 같은 건설 행위는 유엔사 승인이 필요하고, 매일 저녁에는 유엔사 민정반이 가구별 점호를 돈다. 그 대신 주민은 세금과 병역을 면제받는다. 외부인 출입은 유엔사 사전 허가 사안이다. 오후, 마을회관 앞 벤치에서 주민 몇 분의 일상 담소를 카메라에 담았다. 장은 문산까지 나가서 본다고 했다. 은행·병원 모두 외부로 나가야 한다.
            - 5월 16일 (금) 맑음
            - 마지막 날이었다. 한 주민이 논에 나가는 길을 따라 붙었다. 군인 한 명이 동행했다. 들판 건너편으로 군사분계선 표지가 간헐적으로 보였다. 오후 5시 30분에 철수했다. 통일대교로 나오는 길, 사이드 미러에 달린 유엔기가 바람에 흔들렸다.
      - id: B
        type: report
        icon: 📋
        title: 공식 문서
        sub: 「한국 군사 정전에 관한 협정」 및 유엔군사령부 대성동 관리 규정 발췌
        styleClass: source-report
        docTitle: 한국 군사 정전에 관한 협정 및 유엔군사령부 대성동 관리 규정 발췌
        templateData:
          header: '출처: 「한국 군사 정전에 관한 협정」(1953년 7월 27일 체결) 및 유엔군사령부 공식 규정 발췌'
          paragraphs:
            - 1. 「한국 군사 정전에 관한 협정」 제1조 발췌
            - 제1항 — 한개의 군사분계선을 확정하고 쌍방이 이 선으로부터 각기 2킬로미터씩 후퇴함으로써 적대군대 간에 한개의 비무장지대를 설정한다. 한개의 비무장지대를 설정하여 이를 {{B}}로 함으로써 적대행위의 재발을 초래할 수 있는 사건의 발생을 방지한다.
            - 제6항 — 쌍방은 모두 비무장지대 내에서 혹은 비무장지대로부터 어떠한 적대행위도 감행하지 못한다.
            - 제9항 — 민사행정 및 구제사업의 집행에 관계되는 인원과 군사정전위원회의 특정한 허가를 얻고 들어가는 인원을 제외하고는 어떠한 군인이나 민간인이나 비무장지대에 들어감을 허가하지 않는다.
            - 제10항 — 비무장지대 내의 군사분계선 이남 부분에 있어서의 민사행정 및 구제사업은 국제연합군 총사령관이 책임진다. 비무장지대 내의 군사분계선 이북 부분에 있어서의 민사행정 및 구제사업은 조선인민군 최고사령관과 중국인민지원군 사령관이 공동으로 책임진다.
            - 2. 유엔군사령부 대성동 자유의 마을 관리 규정 발췌
            - 제1조 (목적) — 본 규정은 1953년 정전협정 제1조 제10항에 근거하여, 비무장지대 내 군사분계선 이남 유일의 민간인 거주 마을인 대성동 자유의 마을에 대한 출입·거주·행정을 관리함을 목적으로 한다.
            - 제3조 (외부인 출입 절차) — 마을 방문을 희망하는 외부 민간인은 주민의 초대를 전제로, 방문 희망일 7일 전까지 사전 신청서를 제출하여야 한다. 신원 확인을 거친 자에 한해 매일 09:00~17:30 시간대에 한정하여 출입이 허가된다.
            - 제5조 (차량 식별 의무) — 마을을 통행하는 모든 차량에는 유엔사가 정한 식별 표지를 부착하여야 한다.
            - 제7조 (가구별 인원 점검) — 마을 주민은 매일 19:00, JSA 민정중대가 실시하는 가구별 인원 점검에 응하여야 한다.
            - 제9조 (건설 행위 사전 승인) — 마을 내 주택의 신축·증축·개축 및 이에 준하는 보수 행위는 사전에 유엔군사령부의 승인을 받아야 한다.
