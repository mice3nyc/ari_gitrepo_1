          quotes:
            - 1982년에 남쪽이 99.8미터 태극기 {{B}}를 세우니 북쪽이 곧 160미터로 응수했다고 들었어요. 제가 근무할 땐 이미 경쟁이 끝난 뒤였죠. 대신 매일 아침 두 깃발이 동시에 올라가는 걸 초소에서 봤어요.
            - 매일 아침 북쪽에서 행진곡 비슷한 소리가 흘러나왔고, 남쪽에서도 맞받는 {{D}}이 울렸죠. 치열한 심리전의 연속이었어요. 총은 한 번도 쏘지 않았죠. 대신 깃대를 높이고 방송을 틀고 마을을 가꿨어요. 매일같이 서로에게 '우리가 더 살기 좋다'는 신호를 보내는 거죠.
