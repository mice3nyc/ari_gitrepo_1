            - 민통선 안에 있는 마을들도 성격이 조금씩 다릅니다. 양구 해안면 현리는 1956년 전쟁 피난민 160세대가 들어가 세운 '재건촌'입니다. 철원 김화읍 생창리는 1970년 국가가 접경 땅을 지키려고 100세대를 일제히 입주시킨 '전략촌'이고요. 두 유형은 지금까지 사람이 들어와 살고 있는 마을입니다.
            - 제진리는 성격이 또 다릅니다. 전쟁 뒤 사람이 돌아와 살지는 못했지만, 관할을 유지하기 위해 민통선 안쪽에 공간이 보존되어 있는 마을이죠. 지금은 인근 마을 주민들이 허가를 받아 매일 드나들며 논밭을 돌보고 있습니다. 대한민국 땅인데 주민등록상 거주자는 한 명도 없는 마을은 제진리가 대표적이에요. 그렇지만 농사는 짓고 있어요. 이렇게 실제로 거주하지는 않지만 외부에서 주민이 매일 들어와 짓는 농사를 {{D}}이라고 합니다.
