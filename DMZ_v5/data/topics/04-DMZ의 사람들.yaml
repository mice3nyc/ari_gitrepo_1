  - id: s0403
    title: 기정동 마을
    era: 2025년 (현재 답사)
    location: 기정동 (DMZ 북측, 개성특별시 판문구역)
    soundNote: 도라전망대 망원경 작동음, 멀리서 들려오는 정적, 카카오톡 알림음
    sources:
      - id: A
        type: diary
        icon: 🗒️
        title: 답사 노트
        sub: 북한학 전공자의 도라전망대·도라산역 답사 (2025)
        styleClass: source-diary
        docTitle: 북한학 전공자의 답사 노트
        templateData:
          meta: '답사자: 북한학 전공 대학생 · 경로: 도라전망대 → 제3땅굴 → 도라산역'
          paragraphs:
            - '이 노트는 내가 ''북한지역연구'' 기말 리포트를 위해 다녀온 답사를 정리한 기록이다. 나는 북한학을 전공하고 있고 이번 리포트 주제는 기정동과 관련된 사실들이 2025년 현재에도 유효한가 이다. 이를 확인하기 위해 도라전망대 → 제3땅굴 → 도라산역 경로로 하루 답사를 다녀왔다. 답사에 앞서 BBC News 코리아 영상 〈대성동: 비무장지대의 유일한 민간인 마을에 가다〉(2024. 4. 5.), 자유아시아방송(RFA)의 〈[줌인 북한] DMZ 남북 선전마을 차이 ''뚜렷''〉(2022. 11. 24.), 통일부 북한정보포털의 ''개성특별시 판문구역'' 항목을 검토했다.'
            - '10:10 · 도라전망대 3층 전망실 — 3층 전망실에서 망원경을 맞추자 북서 방향 약 2km 지점에 기정동 마을이 들어왔다. 가장 먼저 확인한 것은 자료에 반복해서 등장하는 ''콘크리트 껍데기 건물''과 ''유리 없는 창문''이었다. 실제로 창문은 모두 검은 사각형으로만 보였고, 커튼, 빨래, 화분처럼 일상의 흔적은 보이지 않았다. 외벽 상태 역시 2010년대 외신 사진과 비교해도 달라진 점이 거의 없었다.'
            - '13:40 · 도라산역 — 답사 경로의 마지막 지점인 도라산역에 들러 DMZ 관련 전시 자료를 확인했다. 공식 안내에서도 기정동이 1970년대 중반 이후 외형이 유지되어 왔다는 점, 상시 거주 인구에 대한 객관적 자료가 사실상 존재하지 않는다는 점이 그대로 언급되고 있었다. 오전에 망원경으로 본 인상과 전시 안내가 서로 어긋나지 않는다는 것을 확인했다. 안내문에는 기정동이 속한 행정구역이 ''개성특별시 판문구역 {{A}}''로 명기되어 있었다.'
      - id: B
        type: scholar
        icon: 📚
        title: 지역 정보
        sub: 개성특별시 판문구역 평화리 — 공식 자료 종합
        styleClass: source-scholar
        docTitle: 개성특별시 판문구역 평화리 지역 정보
        templateData:
          heading: 개성특별시 판문구역 평화리 지역 정보
          meta: '출처: 통일부 북한정보포털 / 한국민족문화대백과사전 「개성시」 / 경기도 DMZ 비무장지대 자료실 (2024년 갱신 기준)'
          paragraphs:
            - '[1] 행정구역 개요 — 기정동은 북한 행정구역상 조선민주주의인민공화국 개성특별시 판문구역 평화리에 속한다. 2019년 개성시가 개성특별시로 승격되면서 관할이 재편되었다. 마을은 남북을 가르는 군사분계선 북쪽의 비무장지대(DMZ) 안에 위치하며, 남측 경기도 파주시 장단면 도라산리의 도라전망대에서 북서 방향 약 2km 지점에서 관측된다.'
            - '[2] 연혁 — 1953년 7월 27일 정전협정에 따라 비무장지대 내에 남아 있던 분계선마을 가운데 하나로 기정동이 지정되었다. 이후 1976년을 기점으로 현재 모습에 가깝게 대규모 정비가 이루어졌고, 외형 구조는 이 시기 이후로 큰 변화 없이 유지되고 있다.'
            - '[3] 별칭 및 특기 사항 — 북측 공식 자료에서는 기정동을 ''평화촌'' 또는 ''판문점협동농장 {{B}}''로 표기한다. DMZ 내부에 남아 있는 북측의 유일한 민간 거주지로 기록되어 있으나, 상시 거주 규모에 대한 공개 통계는 존재하지 않는다. 2024년 이후 북측이 DMZ 경계시설 보강에 나서는 흐름 속에서도 기정동 자체의 외형에는 눈에 띄는 변화가 확인되지 않았다.'
