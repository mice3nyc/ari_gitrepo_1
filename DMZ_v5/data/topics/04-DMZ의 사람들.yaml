              caption: '[사진 1] 남측 비무장지대 접경 지점에서 촬영한 기정동 마을 전경. 파란 지붕의 집합주택과 단독주택이 격자형으로 늘어서 있고, 오른쪽 중간에는 흰색 급수탑이 보인다. 북한 행정체계상 기정동은 평화리 행정구역의 {{C}} 소속 ''분계선마을''로 편제되어 있다.'
              credit: 전영재, 『DMZ 1895』(2012. 11. 9. 촬영). 공유마당(한국저작권위원회) 기증저작물 · CC BY 라이선스.
