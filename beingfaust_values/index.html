<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MEPHISTØ & co.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css" rel="stylesheet">
    <style>
        /* ===== VARIABLES ===== */
        :root {
            --bg-deep: #0D0D0D;
            --bg: #141414;
            --bg-card: #1C1C1C;
            --bg-elevated: #222222;
            --text: #F0EDE8;
            --text-secondary: rgba(240,237,232,0.6);
            --text-muted: rgba(240,237,232,0.55);
            --accent: #C04040;
            --accent-hover: #A33333;
            --font-display: 'Paperlogy', -apple-system, 'Helvetica Neue', sans-serif;
            --font-quote: 'Paperlogy', -apple-system, 'Helvetica Neue', sans-serif;
            --font-logo: 'Bodoni Moda', 'Didot', 'Georgia', serif;
            --font-body: 'Paperlogy', -apple-system, 'Helvetica Neue', sans-serif;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        /* ===== RESET ===== */
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            height: 100%;
            overflow: hidden;
            overscroll-behavior: contain;
        }
        body {
            height: 100%;
            overflow: hidden;
            background: var(--bg-deep);
            color: var(--text);
            font-family: var(--font-body);
            font-weight: 400;
            font-size: 15px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== APP ===== */
        #app {
            position: relative;
            width: 100%;
            max-width: 430px;
            height: 100dvh;
            height: 100vh;
            margin: 0 auto;
            overflow: hidden;
        }
        @supports (height: 100dvh) {
            #app { height: 100dvh; }
        }

        /* ===== SCREEN BASE ===== */
        .screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, transform 0.5s ease, visibility 0.5s;
            transform: translateY(10px);
            overflow: hidden;
        }
        .screen.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* ===== SHARED: BUTTONS ===== */
        .btn {
            display: block;
            width: 100%;
            padding: 15px 24px;
            border: none;
            border-radius: 6px;
            font-family: var(--font-body);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, opacity 0.3s;
            letter-spacing: 0.02em;
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.25; cursor: default; transform: none; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:active:not(:disabled) { background: var(--accent-hover); }
        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-ghost:active:not(:disabled) { background: rgba(255,255,255,0.05); }

        .screen-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 20px calc(16px + var(--safe-bottom));
            background: linear-gradient(transparent, var(--bg-deep) 35%);
            z-index: 10;
            pointer-events: none;
        }
        .screen-footer > * { pointer-events: auto; }
        .footer-row {
            display: flex;
            gap: 10px;
        }
        .footer-row .btn { flex: 1; }

        /* ========================================
           SCREEN 1: WELCOME
           ======================================== */
        #welcome {
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 32px;
            background:
                radial-gradient(ellipse at 20% 10%, rgba(140,45,45,0.12) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 90%, rgba(35,35,90,0.08) 0%, transparent 55%),
                var(--bg-deep);
            overflow-y: auto;
        }

        .welcome-brand { margin-bottom: 36px; }
        .welcome-logo-img {
            height: 48px;
            margin-bottom: 12px;
            opacity: 0;
            animation: fadeUp 0.8s 0.2s ease forwards;
        }
        .mephisto-logo {
            font-family: var(--font-logo);
            font-size: 20px;
            font-weight: 400;
            letter-spacing: 0.35em;
            text-indent: 0.35em;
            color: var(--accent);
            margin-bottom: 6px;
            opacity: 0;
            animation: fadeUp 0.8s 0.5s ease forwards;
        }

        .welcome-line {
            width: 36px;
            height: 1px;
            background: var(--text-muted);
            margin: 0 auto 28px;
            opacity: 0;
            animation: fadeUp 0.7s 0.7s ease forwards;
        }

        .welcome-question {
            font-family: var(--font-quote);
            font-size: 15px;
            font-weight: 300;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 44px;
            max-width: 280px;
            opacity: 0;
            animation: fadeUp 0.8s 0.9s ease forwards;
        }

        .welcome-form {
            width: 100%;
            max-width: 260px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 0;
            animation: fadeUp 0.8s 1.1s ease forwards;
        }

        .input-field {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s, background 0.3s;
        }
        .input-field:focus {
            border-color: rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.06);
        }
        .input-field::placeholder { color: var(--text-muted); }
        .input-field.shake {
            animation: shake 0.4s ease;
            border-color: var(--accent);
        }

        .welcome-form .btn { margin-top: 4px; }

        .bf-badge {
            margin-top: 40px;
            opacity: 0;
            animation: fadeUp 0.6s 1.4s ease forwards;
        }
        .bf-badge img {
            height: 14px;
            opacity: 0.18;
        }

        /* ========================================
           SCREEN 2: CARD SELECTION
           ======================================== */
        #selection { background: var(--bg-deep); }

        .sel-header {
            padding: 18px 20px 12px;
            text-align: center;
            flex-shrink: 0;
        }
        .sel-instruction {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.01em;
            margin-bottom: 4px;
        }
        .sel-counter {
            font-family: var(--font-display);
            font-size: 34px;
            font-weight: 400;
            letter-spacing: 0.04em;
        }
        .sel-count {
            color: var(--accent);
            display: inline-block;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .sel-count.bump { transform: scale(1.35); }
        .sel-sep { color: var(--text-muted); margin: 0 1px; font-weight: 300; }
        .sel-total { color: var(--text-muted); font-weight: 300; }

        /* ===== SWIPE STACK ===== */
        .sel-tray {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 2px 16px 0;
            min-height: 62px;
            align-items: flex-start;
            flex-shrink: 0;
        }
        .tray-slot {
            width: 28px; height: 42px;
            border-radius: 3px;
            border: 1.5px dashed rgba(255,255,255,0.08);
            flex-shrink: 0;
        }
        .tray-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            animation: trayPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        .tray-item {
            width: 28px; height: 42px;
            border-radius: 3px;
            overflow: hidden;
            border: 1.5px solid var(--c);
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .tray-item:active { transform: scale(0.85); }
        .tray-item img { width: 100%; height: 100%; object-fit: cover; }
        .tray-label {
            font-size: 10px;
            font-weight: 500;
            white-space: nowrap;
        }

        .swipe-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            touch-action: none;
        }

        /* Card deck stack — 3 cards layered */
        .swipe-stack-card {
            position: absolute;
            width: 68%;
            max-width: 270px;
            will-change: transform;
            user-select: none;
            pointer-events: none;
        }
        .swipe-stack-card.front {
            z-index: 3;
            pointer-events: auto;
        }
        .swipe-stack-card.middle {
            z-index: 2;
            transform: scale(0.93) translateY(12px);
            opacity: 0;
            transition: transform 0.35s cubic-bezier(0.22,1,0.36,1), opacity 0.35s;
        }
        .swipe-stack-card.back {
            z-index: 1;
            transform: scale(0.86) translateY(24px);
            opacity: 0;
            transition: transform 0.35s cubic-bezier(0.22,1,0.36,1), opacity 0.35s;
        }
        .swipe-stack-card img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
            box-shadow: 0 6px 36px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .swipe-name { display: none; }

        .swipe-badge {
            position: absolute;
            top: 10px; right: 10px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            color: white;
            padding: 3px 9px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            display: none;
            pointer-events: none;
        }
        .swipe-stack-card.is-on .swipe-badge { display: block; }

        .swipe-hint {
            position: absolute;
            bottom: 8px;
            left: 0; right: 0;
            text-align: center;
            font-size: 13px;
            color: var(--text);
            pointer-events: none;
            transition: opacity 0.6s;
            z-index: 5;
        }

        .card-dots {
            display: flex;
            justify-content: center;
            gap: 5px;
            padding: 8px 16px 4px;
            flex-shrink: 0;
        }
        .c-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            transition: background 0.2s, transform 0.2s;
        }
        .c-dot.now { background: var(--text); transform: scale(1.5); }
        .c-dot.picked { background: var(--accent); }

        /* ========================================
           SCREEN 3: CONFIRM
           ======================================== */
        #confirm {
            background: var(--bg-deep);
            overflow-y: auto;
        }

        .cfm-header {
            padding: 28px 24px 4px;
            text-align: center;
            flex-shrink: 0;
        }
        .cfm-name {
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 400;
            letter-spacing: 0.04em;
            margin-bottom: 3px;
        }
        .cfm-sub {
            font-size: 13px;
            font-weight: 300;
            color: var(--text-secondary);
        }

        .cfm-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 16px 20px 110px;
            flex: 1;
            overflow-y: auto;
        }
        .cfm-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-radius: 8px;
            color: white;
        }
        .cfm-bar-kr {
            font-size: 16px;
            font-weight: 500;
        }
        .cfm-bar-en {
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.08em;
            opacity: 0.85;
        }

        /* ========================================
           SCREEN 4: PRIORITY RANKING
           ======================================== */
        #priority {
            background: var(--bg-deep);
        }

        .pri-header {
            padding: 28px 24px 14px;
            text-align: center;
            flex-shrink: 0;
        }
        .pri-title {
            font-family: var(--font-display);
            font-size: 19px;
            font-weight: 400;
            letter-spacing: 0.03em;
            margin-bottom: 3px;
        }
        .pri-hint {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 300;
        }

        .pri-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 110px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            -webkit-overflow-scrolling: touch;
        }

        .pri-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border-radius: 10px;
            transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
            user-select: none;
            cursor: grab;
            touch-action: none;
        }
        .pri-item.dragging {
            background: #2A2A2A;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            z-index: 100;
            transform: scale(1.03);
        }

        .pri-rank {
            font-family: var(--font-display);
            font-size: 17px;
            font-weight: 700;
            color: white;
            min-width: 24px;
            text-align: center;
        }

        .pri-info {
            flex: 1;
            min-width: 0;
            font-size: 15px;
            font-weight: 500;
            color: white;
        }

        .pri-arrows {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .arr-btn {
            width: 30px; height: 26px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 4px;
            color: var(--text-muted);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }
        .arr-btn:active { background: rgba(255,255,255,0.12); }
        .arr-btn:disabled { opacity: 0.15; }

        /* ========================================
           SCREEN 5: DONE
           ======================================== */
        #done {
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 28px;
            background:
                radial-gradient(ellipse at 50% 25%, rgba(140,45,45,0.08) 0%, transparent 60%),
                var(--bg-deep);
            overflow-y: auto;
        }

        .done-m {
            width: 44px; height: 44px;
            border: 1.5px solid var(--text-muted);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 400;
            margin: 0 auto 22px;
            opacity: 0;
            animation: fadeUp 0.6s 0.15s ease forwards;
        }

        .done-title {
            font-family: var(--font-quote);
            font-size: 21px;
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 28px;
            opacity: 0;
            animation: fadeUp 0.6s 0.35s ease forwards;
            white-space: nowrap;
        }

        .done-list {
            list-style: none;
            width: 100%;
            max-width: 250px;
            margin: 0 auto 28px;
            text-align: left;
            opacity: 0;
            animation: fadeUp 0.6s 0.55s ease forwards;
        }
        .done-list li {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .done-list li:last-child { border-bottom: none; }
        .done-rk {
            font-family: var(--font-display);
            font-size: 15px;
            color: var(--text-muted);
            min-width: 20px;
            text-align: right;
        }
        .done-nm { flex: 1; font-size: 18px; font-weight: 500; }
        .done-en {
            font-size: 15px;
            color: var(--text-muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .done-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .done-count {
            font-size: 13px;
            color: var(--text-muted);
            min-width: 24px;
            text-align: right;
        }
        .done-refresh {
            display: inline-block;
            margin-top: 16px;
            padding: 8px 24px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: var(--text-secondary);
            font-family: var(--font-body);
            font-size: 13px;
            cursor: pointer;
            opacity: 0;
            animation: fadeUp 0.6s 0.85s ease forwards;
        }
        .done-refresh:active { background: rgba(255,255,255,0.12); }

        .done-note {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 300;
            line-height: 1.7;
            opacity: 0;
            animation: fadeUp 0.6s 0.75s ease forwards;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(3px); }
        }
        @keyframes trayPop {
            from { transform: scale(0) translateY(10px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }
        /* flyUp removed — carousel uses translateX slides */
    </style>
</head>
<body>
<div id="app">

    <!-- ====== SCREEN 1: WELCOME ====== -->
    <section id="welcome" class="screen active">
        <div class="welcome-brand">
            <img src="imgs/bf_logo_white.png" class="welcome-logo-img" alt="Being Faust">
            <div class="mephisto-logo">Mephisto &amp; Co.</div>
        </div>
        <div class="welcome-line"></div>
        <p class="welcome-question">
            당신이 욕망하는 가치는 무엇인가요?<br>
            당신은 어떤 댓가를 치를 준비가 되었나요?
        </p>
        <div class="welcome-form" id="welcome-form">
            <input type="text" class="input-field" id="inp-name"
                   placeholder="이름" autocomplete="off" enterkeyhint="next">
            <input type="text" class="input-field" id="inp-room"
                   placeholder="방 코드" value="2026emerging" autocomplete="off" enterkeyhint="go">
            <button class="btn btn-primary" id="btn-enter">입장하기</button>
        </div>
        <div class="bf-badge"></div>
    </section>

    <!-- ====== SCREEN 2: CARD SELECTION (SWIPE) ====== -->
    <section id="selection" class="screen">
        <div class="sel-header">
            <div class="sel-instruction">당신이 욕망하는 가치를 선택하세요</div>
            <div class="sel-counter">
                <span class="sel-count" id="sel-count">0</span><span class="sel-sep"> / </span><span class="sel-total">6</span>
            </div>
        </div>
        <div class="sel-tray" id="sel-tray"></div>
        <div class="swipe-area" id="swipe-area">
            <!-- Carousel track built by JS -->
            <div class="swipe-hint" id="swipe-hint">좌우로 넘기고 · 위로 올려서 선택</div>
        </div>
        <div class="card-dots" id="card-dots"></div>
        <div class="screen-footer">
            <button class="btn btn-primary" id="btn-next" disabled>다음</button>
        </div>
    </section>

    <!-- ====== SCREEN 3: CONFIRM ====== -->
    <section id="confirm" class="screen">
        <div class="cfm-header">
            <div class="cfm-name" id="cfm-name"></div>
            <div class="cfm-sub">당신이 선택한 가치입니다</div>
        </div>
        <div class="cfm-grid" id="cfm-grid"></div>
        <div class="screen-footer">
            <div class="footer-row">
                <button class="btn btn-ghost" id="btn-reselect">다시 선택</button>
                <button class="btn btn-primary" id="btn-to-pri">순위 정하기</button>
            </div>
        </div>
    </section>

    <!-- ====== SCREEN 4: PRIORITY ====== -->
    <section id="priority" class="screen">
        <div class="pri-header">
            <div class="pri-title">순위를 정해주세요</div>
            <div class="pri-hint">가장 중요한 가치가 위로 · 드래그 또는 화살표</div>
        </div>
        <div class="pri-list" id="pri-list"></div>
        <div class="screen-footer">
            <div class="footer-row">
                <button class="btn btn-ghost" id="btn-back-cfm">이전</button>
                <button class="btn btn-primary" id="btn-submit">제출하기</button>
            </div>
        </div>
    </section>

    <!-- ====== SCREEN 5: DONE ====== -->
    <section id="done" class="screen">
        <div class="done-m">M</div>
        <div class="done-title">당신의 가치가 기록되었습니다</div>
        <ul class="done-list" id="done-list"></ul>
        <button class="done-refresh" onclick="refreshDoneCounts()">새로고침</button>
    </section>

</div>

<script>
/* ==========================================================
   VALUE DATA
   ========================================================== */
const VALUES = [
    { id: 'love',      en: 'LOVE',      kr: '사랑',     de: 'LIEBE',       color: '#E63946' },
    { id: 'beauty',    en: 'BEAUTY',    kr: '아름다움', de: 'SCHÖNHEIT',   color: '#9B59B6' },
    { id: 'faith',     en: 'FAITH',     kr: '믿음',     de: 'GLAUBE',      color: '#A8C256' },
    { id: 'fame',      en: 'FAME',      kr: '명예',     de: 'RUHM',        color: '#7A7A7A' },
    { id: 'family',    en: 'FAMILY',    kr: '가족',     de: 'FAMILIE',     color: '#E67E22' },
    { id: 'freedom',   en: 'FREEDOM',   kr: '자유',     de: 'FREIHEIT',    color: '#2980B9' },
    { id: 'knowledge', en: 'KNOWLEDGE', kr: '지식',     de: 'WISSEN',      color: '#27AE60' },
    { id: 'pleasure',  en: 'PLEASURE',  kr: '쾌락',     de: 'WOLLUST',     color: '#E84393' },
    { id: 'power',     en: 'POWER',     kr: '권력',     de: 'MACHT',       color: '#C5A55A' },
    { id: 'progress',  en: 'PROGRESS',  kr: '발전',     de: 'FORTSCHRITT', color: '#00BCD4' },
    { id: 'wealth',    en: 'WEALTH',    kr: '돈',       de: 'REICHTUM',    color: '#F1C40F' },
    { id: 'youth',     en: 'YOUTH',     kr: '젊음',     de: 'JUGEND',      color: '#85C1E9' }
];

const V_MAP = Object.fromEntries(VALUES.map(v => [v.id, v]));

/* ==========================================================
   STATE
   ========================================================== */
const state = {
    name: '',
    room: '',
    selected: new Set(),   // value IDs, max 6
    priority: []           // ordered value IDs after ranking
};

/* ==========================================================
   DOM REFS
   ========================================================== */
const $ = id => document.getElementById(id);

/* ==========================================================
   SCREEN NAVIGATION
   ========================================================== */
function go(screenId) {
    document.querySelectorAll('.screen').forEach(s => {
        s.classList.remove('active');
    });
    const target = $(screenId);
    target.classList.add('active');
    // 스크롤 위치 초기화
    const scrollable = target.querySelector('.cfm-grid, .pri-list');
    if (scrollable) scrollable.scrollTop = 0;
}

/* ==========================================================
   SCREEN 1: WELCOME
   ========================================================== */
function enterGame() {
    const nameEl = $('inp-name');
    const roomEl = $('inp-room');
    const name = nameEl.value.trim();
    const room = roomEl.value.trim();

    let ok = true;
    if (!name) { nameEl.classList.add('shake'); ok = false; }
    if (!room) { roomEl.classList.add('shake'); ok = false; }
    if (!ok) return;

    state.name = name;
    state.room = room.toUpperCase();
    go('selection');
}

/* ==========================================================
   SCREEN 2: CARD SELECTION (SWIPE STACK)
   ========================================================== */
let cardIdx = 0;
let animating = false;

/* --- Card Stack State --- */
const STACK_SIZE = 3;
let stackCards = [];   // array of { el, idx } — [0]=front, [1]=middle, [2]=back
const sw = { startX: 0, startY: 0, dx: 0, dy: 0, dir: null, on: false };

function createCardEl() {
    const card = document.createElement('div');
    card.className = 'swipe-stack-card';
    card.innerHTML = `
        <img src="" alt="">
        <span class="swipe-badge">✓ 선택됨</span>
        <div class="swipe-name">
            <div class="swipe-kr"></div>
            <div class="swipe-en"></div>
        </div>`;
    return card;
}

function setCardContent(el, idx) {
    idx = ((idx % VALUES.length) + VALUES.length) % VALUES.length;
    const v = VALUES[idx];
    el.querySelector('img').src = 'valuecards/beingfaust_' + v.id + '.png';
    el.querySelector('.swipe-kr').textContent = v.kr;
    el.querySelector('.swipe-en').textContent = v.en;
    el.style.setProperty('--c', v.color);
    el.classList.toggle('is-on', state.selected.has(v.id));
    return idx;
}

function applyStackPositions() {
    stackCards.forEach((sc, i) => {
        const isOn = sc.el.classList.contains('is-on');
        sc.el.className = 'swipe-stack-card';
        if (isOn) sc.el.classList.add('is-on');
        sc.el.style.transform = '';
        sc.el.style.opacity = '';
        sc.el.style.transition = '';
        if (i === 0) {
            sc.el.classList.add('front');
        } else if (i === 1) {
            sc.el.classList.add('middle');
        } else {
            sc.el.classList.add('back');
        }
    });
}

function updateDots() {
    const idx = stackCards.length > 0 ? stackCards[0].idx : cardIdx;
    $('card-dots').querySelectorAll('.c-dot').forEach((d, i) => {
        d.className = 'c-dot';
        if (i === idx) d.classList.add('now');
        else if (state.selected.has(VALUES[i].id)) d.classList.add('picked');
    });
}

function initSwipe() {
    // 점 인디케이터 생성
    const dots = $('card-dots');
    VALUES.forEach(() => {
        const d = document.createElement('span');
        d.className = 'c-dot';
        dots.appendChild(d);
    });
    // 초기 트레이 (빈 슬롯 6개)
    renderTray();

    // Build initial 3-card stack
    const area = $('swipe-area');
    for (let i = 0; i < STACK_SIZE; i++) {
        const el = createCardEl();
        const realIdx = setCardContent(el, i);
        area.insertBefore(el, $('swipe-hint'));
        stackCards.push({ el, idx: realIdx });
    }
    cardIdx = 0;
    applyStackPositions();
    updateDots();

    // 터치 이벤트
    area.addEventListener('touchstart', swStart, { passive: true });
    area.addEventListener('touchmove', swMove, { passive: false });
    area.addEventListener('touchend', swEnd);

    // 마우스 이벤트 (데스크톱 테스트용)
    area.addEventListener('mousedown', e => {
        swStart({ touches: [{ clientX: e.clientX, clientY: e.clientY }] });
        const onMove = ev => swMove({ touches: [{ clientX: ev.clientX, clientY: ev.clientY }], preventDefault: () => ev.preventDefault() });
        const onUp = () => { swEnd(); document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
    });
}

/* nextUnselected: find next card index that isn't selected */
function nextUnselected(fromIdx) {
    for (let i = 0; i < VALUES.length; i++) {
        const idx = (fromIdx + i) % VALUES.length;
        if (!state.selected.has(VALUES[idx].id)) return idx;
    }
    return fromIdx;
}

/* showCard: rebuild stack from a given index, skipping selected */
function showCard(idx) {
    idx = ((idx % VALUES.length) + VALUES.length) % VALUES.length;
    let current = nextUnselected(idx);
    cardIdx = current;
    for (let i = 0; i < STACK_SIZE; i++) {
        stackCards[i].idx = setCardContent(stackCards[i].el, current);
        current = nextUnselected((current + 1) % VALUES.length);
    }
    applyStackPositions();
    updateDots();
}

/* flyCard: animate the front card out, promote others, add new card at back */
function flyCard(direction, onComplete) {
    if (animating) return;
    animating = true;

    const front = stackCards[0];
    const el = front.el;

    let flyTransform;
    if (direction === 'left') {
        flyTransform = 'translateX(-140%) rotate(-18deg)';
    } else if (direction === 'right') {
        flyTransform = 'translateX(140%) rotate(18deg)';
    } else if (direction === 'up') {
        flyTransform = 'translateY(-120vh) rotate(6deg)';
    }

    // Animate front card out
    el.style.transition = 'transform 0.4s cubic-bezier(0.22,1,0.36,1), opacity 0.3s';
    el.style.transform = flyTransform;
    el.style.opacity = '0';

    // Promote middle → front, back → middle
    if (stackCards[1]) {
        stackCards[1].el.classList.remove('middle');
        stackCards[1].el.classList.add('front');
    }
    if (stackCards[2]) {
        stackCards[2].el.classList.remove('back');
        stackCards[2].el.classList.add('middle');
    }

    setTimeout(() => {
        stackCards.shift();

        const lastIdx = stackCards.length > 0 ? stackCards[stackCards.length - 1].idx : cardIdx;
        const newIdx = nextUnselected((lastIdx + 1) % VALUES.length);

        el.style.transition = 'none';
        el.style.transform = '';
        el.style.opacity = '';
        el.className = 'swipe-stack-card back';
        setCardContent(el, newIdx);
        void el.offsetHeight;
        el.style.transition = '';

        stackCards.push({ el, idx: newIdx });

        cardIdx = stackCards[0].idx;
        applyStackPositions();
        updateDots();

        animating = false;
        if (onComplete) onComplete();
    }, 380);
}

function resetFrontCard() {
    if (!stackCards[0]) return;
    const card = stackCards[0].el;
    card.style.transition = 'transform 0.35s cubic-bezier(0.22,1,0.36,1), opacity 0.35s';
    card.style.transform = '';
    card.style.opacity = '';
    if (stackCards[1]) {
        stackCards[1].el.style.transition = 'transform 0.35s cubic-bezier(0.22,1,0.36,1), opacity 0.35s';
        stackCards[1].el.style.transform = 'scale(0.93) translateY(12px)';
        stackCards[1].el.style.opacity = '0.5';
    }
}

function refreshCount() {
    const n = state.selected.size;
    const el = $('sel-count');
    el.textContent = n;
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 220);
    const btn = $('btn-next');
    btn.disabled = n !== 6;
    btn.textContent = n === 6 ? '다음 →' : '다음';
}

function renderTray() {
    const tray = $('sel-tray');
    tray.innerHTML = '';
    state.selected.forEach(id => {
        const v = V_MAP[id];
        const wrap = document.createElement('div');
        wrap.className = 'tray-wrap';
        const el = document.createElement('div');
        el.className = 'tray-item';
        el.style.setProperty('--c', v.color);
        el.innerHTML = '<img src="valuecards/beingfaust_' + v.id + '.png" alt="' + v.kr + '">';
        el.addEventListener('click', () => deselectCard(id));
        const label = document.createElement('div');
        label.className = 'tray-label';
        label.style.color = v.color;
        label.textContent = v.kr;
        wrap.appendChild(el);
        wrap.appendChild(label);
        tray.appendChild(wrap);
    });
    for (let i = state.selected.size; i < 6; i++) {
        const sl = document.createElement('div');
        sl.className = 'tray-slot';
        tray.appendChild(sl);
    }
}

function deselectCard(id) {
    state.selected.delete(id);
    renderTray();
    refreshCount();
    showCard(cardIdx);
}

/* ---------- SWIPE TOUCH ---------- */
function swStart(e) {
    if (animating) return;
    sw.startX = e.touches[0].clientX;
    sw.startY = e.touches[0].clientY;
    sw.dx = 0; sw.dy = 0; sw.dir = null; sw.on = true;
    if (stackCards[0]) {
        stackCards[0].el.style.transition = 'none';
    }
}

function swMove(e) {
    if (!sw.on || animating) return;
    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;
    sw.dx = x - sw.startX;
    sw.dy = y - sw.startY;

    if (!sw.dir) {
        if (Math.abs(sw.dx) > 8 || Math.abs(sw.dy) > 8) {
            sw.dir = Math.abs(sw.dx) > Math.abs(sw.dy) ? 'h' : 'v';
        } else return;
    }
    e.preventDefault();

    const card = stackCards[0].el;
    if (sw.dir === 'h') {
        const rot = sw.dx * 0.04;
        card.style.transform = 'translateX(' + sw.dx + 'px) rotate(' + rot + 'deg)';
        const prog = Math.min(Math.abs(sw.dx) / 200, 1);
        if (stackCards[1]) {
            stackCards[1].el.style.transition = 'none';
            stackCards[1].el.style.transform = 'scale(' + (0.93 + prog * 0.07) + ') translateY(' + (12 - prog * 12) + 'px)';
            stackCards[1].el.style.opacity = String(0.5 + prog * 0.5);
        }
    } else if (sw.dy < 0) {
        const prog = Math.min(Math.abs(sw.dy) / 300, 1);
        card.style.transform = 'translateY(' + sw.dy + 'px) scale(' + (1 - prog * 0.08) + ')';
        card.style.opacity = String(1 - prog * 0.4);
        if (stackCards[1]) {
            stackCards[1].el.style.transition = 'none';
            stackCards[1].el.style.transform = 'scale(' + (0.93 + prog * 0.07) + ') translateY(' + (12 - prog * 12) + 'px)';
            stackCards[1].el.style.opacity = String(0.5 + prog * 0.5);
        }
    }
}

function swEnd() {
    if (!sw.on || animating) return;
    sw.on = false;

    if (sw.dir === 'h') {
        if (sw.dx < -60) {
            flyCard('left');
        } else if (sw.dx > 60) {
            flyCard('right');
        } else {
            resetFrontCard();
        }
    } else if (sw.dir === 'v' && sw.dy < -80) {
        const v = VALUES[cardIdx];
        if (!state.selected.has(v.id) && state.selected.size < 6) {
            flyCard('up', () => {
                state.selected.add(v.id);
                renderTray();
                refreshCount();
                $('swipe-hint').style.opacity = '0';
                let next = cardIdx;
                for (let i = 0; i < VALUES.length; i++) {
                    if (!state.selected.has(VALUES[(cardIdx + i) % VALUES.length].id)) {
                        next = (cardIdx + i) % VALUES.length;
                        break;
                    }
                }
                showCard(next);
            });
            return;
        } else {
            resetFrontCard();
        }
    } else {
        resetFrontCard();
    }
}

/* ==========================================================
   SCREEN 3: CONFIRM
   ========================================================== */
function showConfirm() {
    $('cfm-name').textContent = state.name + '님,';
    const grid = $('cfm-grid');
    grid.innerHTML = '';
    state.selected.forEach(id => {
        const v = V_MAP[id];
        const bar = document.createElement('div');
        bar.className = 'cfm-bar';
        bar.style.background = v.color;
        bar.innerHTML = `<span class="cfm-bar-kr">${v.kr}</span><span class="cfm-bar-en">${v.en}</span>`;
        grid.appendChild(bar);
    });
    go('confirm');
}

/* ==========================================================
   SCREEN 4: PRIORITY RANKING
   ========================================================== */
function showPriority() {
    state.priority = [...state.selected];
    renderPriList();
    go('priority');
}

function renderPriList() {
    const list = $('pri-list');
    list.innerHTML = '';
    state.priority.forEach((id, i) => {
        const v = V_MAP[id];
        const el = document.createElement('div');
        el.className = 'pri-item';
        el.dataset.id = id;
        el.style.background = v.color;
        el.innerHTML = `
            <span class="pri-rank">${i + 1}</span>
            <div class="pri-info">${v.kr} | ${v.en}</div>
            <div class="pri-arrows">
                <button class="arr-btn arr-up" ${i === 0 ? 'disabled' : ''}>▲</button>
                <button class="arr-btn arr-dn" ${i === state.priority.length - 1 ? 'disabled' : ''}>▼</button>
            </div>`;
        // 화살표 이벤트
        el.querySelector('.arr-up').addEventListener('click', () => moveItem(id, -1));
        el.querySelector('.arr-dn').addEventListener('click', () => moveItem(id, 1));
        list.appendChild(el);
    });
    initDrag();
}

function moveItem(id, dir) {
    const i = state.priority.indexOf(id);
    const j = i + dir;
    if (j < 0 || j >= state.priority.length) return;
    [state.priority[i], state.priority[j]] = [state.priority[j], state.priority[i]];
    renderPriList();
}

function syncPriority() {
    const items = $('pri-list').querySelectorAll('.pri-item');
    state.priority = [...items].map(el => el.dataset.id);
    items.forEach((el, i) => {
        el.querySelector('.pri-rank').textContent = i + 1;
        const up = el.querySelector('.arr-up');
        const dn = el.querySelector('.arr-dn');
        up.disabled = i === 0;
        dn.disabled = i === items.length - 1;
    });
}

/* ---------- DRAG & DROP ---------- */
function initDrag() {
    const list = $('pri-list');
    let dragged = null;
    let startY = 0;

    list.addEventListener('touchstart', e => {
        if (e.target.closest('.arr-btn')) return;
        dragged = e.target.closest('.pri-item');
        startY = e.touches[0].clientY;
        dragged.classList.add('dragging');
    }, { passive: true });

    list.addEventListener('touchmove', e => {
        if (!dragged) return;
        e.preventDefault();

        const y = e.touches[0].clientY;
        const dy = y - startY;
        dragged.style.transform = `translateY(${dy}px) scale(1.03)`;

        const items = [...list.querySelectorAll('.pri-item:not(.dragging)')];
        const dRect = dragged.getBoundingClientRect();
        const dMid = dRect.top + dRect.height / 2;

        for (const sib of items) {
            const sRect = sib.getBoundingClientRect();
            const sMid = sRect.top + sRect.height / 2;

            // 위로 드래그: 대상을 지남
            if (dy < 0 && dMid < sMid &&
                (dragged.compareDocumentPosition(sib) & Node.DOCUMENT_POSITION_PRECEDING)) {
                list.insertBefore(dragged, sib);
                startY = y;
                dragged.style.transform = 'scale(1.03)';
                syncPriority();
                break;
            }
            // 아래로 드래그: 대상을 지남
            if (dy > 0 && dMid > sMid &&
                (dragged.compareDocumentPosition(sib) & Node.DOCUMENT_POSITION_FOLLOWING)) {
                sib.after(dragged);
                startY = y;
                dragged.style.transform = 'scale(1.03)';
                syncPriority();
                break;
            }
        }
    }, { passive: false });

    list.addEventListener('touchend', () => {
        if (!dragged) return;
        dragged.classList.remove('dragging');
        dragged.style.transform = '';
        syncPriority();
        dragged = null;
    });
}

/* ==========================================================
   SCREEN 5: DONE (SUBMIT)
   ========================================================== */
// ===== Google Sheets 연동 =====
// Apps Script 배포 URL을 여기에 붙여넣기
const API_URL = 'https://script.google.com/macros/s/AKfycbwIMyfFbHv6cAlY8LF1-JraX1Zw9iOT5g12jfegE3iJOUd0lp0KfsQX-o6259ouAoHOdA/exec';

async function submit() {
    syncPriority();

    const payload = {
        name: state.name,
        room: state.room,
        values: state.priority.map(id => V_MAP[id].kr + '(' + V_MAP[id].en + ')')
    };

    // 완료 화면 먼저 표시 (응답 기다리지 않음)
    renderDone();
    go('done');

    // 서버 전송 (백그라운드)
    if (API_URL) {
        try {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            console.log('[BF] 전송 완료');
        } catch (err) {
            console.warn('[BF] 전송 실패:', err);
        }
    } else {
        console.log('[BF] API_URL 미설정 — 로컬 모드');
        console.log('[BF] 페이로드:', JSON.stringify(payload, null, 2));
    }
}

function renderDone() {
    const list = $('done-list');
    list.innerHTML = '';
    state.priority.forEach((id, i) => {
        const v = V_MAP[id];
        const li = document.createElement('li');
        li.innerHTML = `
            <span class="done-rk">${i + 1}</span>
            <span class="done-nm" style="color:${v.color}">${v.kr}</span>
            <span class="done-en">${v.en}</span>
            <span class="done-dot" style="background:${v.color}"></span>
            <span class="done-count" data-rank="${i}" data-value-id="${v.id}">—</span>`;
        list.appendChild(li);
    });
    refreshDoneCounts();
}

async function refreshDoneCounts() {
    if (!API_URL || !state.room) return;
    try {
        const url = API_URL + '?room=' + encodeURIComponent(state.room);
        const res = await fetch(url);
        const json = await res.json();
        if (json.status !== 'ok') return;

        // 순위별 카운트: rankCounts[rank][valueId] = 몇 명이 해당 순위에 해당 가치를 뒀는가
        const rankCounts = {};
        for (let r = 0; r < 6; r++) rankCounts[r] = {};

        (json.data || []).forEach(row => {
            (row.values || []).forEach((str, rank) => {
                if (rank >= 6 || !str) return;
                const found = VALUES.find(v =>
                    str.includes(v.kr) || str.toLowerCase().includes(v.en.toLowerCase())
                );
                if (found) {
                    rankCounts[rank][found.id] = (rankCounts[rank][found.id] || 0) + 1;
                }
            });
        });

        document.querySelectorAll('.done-count').forEach(el => {
            const rank = parseInt(el.dataset.rank);
            const vid = el.dataset.valueId;
            const n = (rankCounts[rank] && rankCounts[rank][vid]) || 0;
            el.textContent = n + '명';
        });
    } catch (e) {
        console.warn('[BF] 카운트 조회 실패:', e);
    }
}

/* ==========================================================
   EVENT BINDINGS
   ========================================================== */
document.addEventListener('DOMContentLoaded', () => {
    initSwipe();

    // Welcome
    $('btn-enter').addEventListener('click', enterGame);
    $('inp-name').addEventListener('input', e => e.target.classList.remove('shake'));
    $('inp-room').addEventListener('input', e => e.target.classList.remove('shake'));
    $('inp-name').addEventListener('keydown', e => {
        if (e.key === 'Enter') $('inp-room').focus();
    });
    $('inp-room').addEventListener('keydown', e => {
        if (e.key === 'Enter') enterGame();
    });
    // 셰이크 애니메이션 끝나면 클래스 제거
    document.querySelectorAll('.input-field').forEach(el => {
        el.addEventListener('animationend', () => el.classList.remove('shake'));
    });

    // Selection → Confirm
    $('btn-next').addEventListener('click', showConfirm);

    // Confirm
    $('btn-reselect').addEventListener('click', () => { showCard(cardIdx); go('selection'); });
    $('btn-to-pri').addEventListener('click', showPriority);

    // Priority
    $('btn-back-cfm').addEventListener('click', () => go('confirm'));
    $('btn-submit').addEventListener('click', submit);
});
