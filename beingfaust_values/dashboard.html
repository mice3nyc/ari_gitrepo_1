<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Being Faust Values — 진행자 대시보드</title>
    <link href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0D0D0D;
            --bg-card: #181818;
            --bg-elevated: #222222;
            --text: #F0EDE8;
            --text-secondary: rgba(240,237,232,0.6);
            --text-muted: rgba(240,237,232,0.28);
            --accent: #C04040;
            --font-display: 'Paperlogy', -apple-system, 'Helvetica Neue', sans-serif;
            --font-body: 'Paperlogy', -apple-system, 'Helvetica Neue', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            min-height: 100vh;
            padding: 40px;
        }

        /* ===== HEADER ===== */
        .dash-header {
            text-align: center;
            margin-bottom: 48px;
        }
        .dash-logo {
            font-family: var(--font-display);
            font-size: 20px;
            letter-spacing: 0.3em;
            text-indent: 0.3em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .dash-title {
            font-family: var(--font-display);
            font-size: 32px;
            font-weight: 400;
            letter-spacing: 0.05em;
        }
        .dash-room {
            margin-top: 12px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .dash-room code {
            color: var(--accent);
            font-size: 16px;
            letter-spacing: 0.1em;
        }

        /* ===== SETUP ===== */
        .setup {
            max-width: 400px;
            margin: 0 auto 40px;
            text-align: center;
        }
        .setup-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .setup input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 15px;
            outline: none;
        }
        .setup input:focus { border-color: rgba(255,255,255,0.25); }
        .setup input::placeholder { color: var(--text-muted); }
        .setup button {
            padding: 12px 24px;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            color: white;
            font-family: var(--font-body);
            font-size: 15px;
            cursor: pointer;
            white-space: nowrap;
        }
        .setup button:hover { background: #A33333; }
        .setup-note {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ===== STATS BAR ===== */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 48px;
        }
        .stat {
            text-align: center;
        }
        .stat-num {
            font-family: var(--font-display);
            font-size: 48px;
            font-weight: 700;
            line-height: 1;
        }
        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
            letter-spacing: 0.05em;
        }

        /* ===== MAIN GRID ===== */
        .dash-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .panel {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
        }
        .panel-title {
            font-family: var(--font-display);
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        /* ===== BAR CHART ===== */
        .bar-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .bar-label {
            min-width: 100px;
            font-size: 20px;
            font-weight: 700;
            text-align: right;
        }
        .bar-track {
            flex: 1;
            height: 28px;
            background: rgba(255,255,255,0.04);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            min-width: 2px;
        }
        .bar-count {
            min-width: 28px;
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
            font-weight: 500;
        }

        /* ===== RANK SECTIONS (3단) ===== */
        .rank-section {
            margin-bottom: 20px;
        }
        .rank-section:last-child { margin-bottom: 0; }
        .rank-section-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .rank-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
        }
        .rank-medal {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            min-width: 20px;
            text-align: center;
        }
        .rank-color-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .rank-value-name {
            flex: 1;
            font-size: 16px;
            font-weight: 700;
        }
        .rank-value-en {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.03em;
        }
        .rank-count {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
        }

        /* ===== REFRESH ===== */
        .refresh-bar {
            text-align: center;
            margin-top: 32px;
        }
        .refresh-btn {
            padding: 10px 32px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: var(--text-secondary);
            font-family: var(--font-body);
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .refresh-btn:hover { background: rgba(255,255,255,0.1); }
        .refresh-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .no-data {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            padding: 40px 0;
        }

        /* ===== NOT CONFIGURED ===== */
        .config-warning {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
            padding: 40px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .config-warning h3 {
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 12px;
        }
        .config-warning p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.8;
        }
        .config-warning code {
            background: rgba(255,255,255,0.08);
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="dash-header">
    <div class="dash-logo">MEPHISTØ &amp; co.</div>
    <div class="dash-title">가치 선택 결과</div>
    <div class="dash-room" id="room-display"></div>
</div>

<!-- API URL 미설정 시 -->
<div class="config-warning" id="config-warning" style="display:none">
    <h3>API 연결 필요</h3>
    <p>
        Google Apps Script 배포 후<br>
        이 파일의 <code>API_URL</code> 변수에 URL을 입력하세요.<br><br>
        가이드: <code>apps-script-guide.md</code> 참조
    </p>
</div>

<!-- 방 코드 입력 -->
<div class="setup" id="setup">
    <div class="setup-row">
        <input type="text" id="inp-room" placeholder="방 코드 입력">
        <button onclick="loadData()">조회</button>
    </div>
    <div class="setup-note">방 코드를 입력하고 조회를 누르세요</div>
</div>

<!-- 대시보드 본체 (초기 숨김) -->
<div id="dashboard" style="display:none">

    <div class="stats-bar">
        <div class="stat">
            <div class="stat-num" id="stat-total">0</div>
            <div class="stat-label">제출 완료</div>
        </div>
    </div>

    <div class="dash-grid">
        <!-- 왼쪽: 선택 빈도 -->
        <div class="panel">
            <div class="panel-title">가치별 선택 빈도</div>
            <div id="chart-bars"></div>
        </div>

        <!-- 오른쪽: 1~3순위 Top 가치 -->
        <div class="panel">
            <div class="panel-title">순위별 Top 가치</div>
            <div id="chart-top-ranks"></div>
        </div>
    </div>

    <div class="refresh-bar">
        <button class="refresh-btn" onclick="loadData()">새로고침</button>
        <div class="refresh-time" id="refresh-time"></div>
    </div>
</div>

<script>
/* ===== CONFIG ===== */
// Google Apps Script 배포 URL을 여기에 붙여넣기
const API_URL = 'https://script.google.com/macros/s/AKfycbwIMyfFbHv6cAlY8LF1-JraX1Zw9iOT5g12jfegE3iJOUd0lp0KfsQX-o6259ouAoHOdA/exec';

/* ===== VALUE DATA ===== */
const VALUES = [
    { id: 'love',      en: 'LOVE',      kr: '사랑',     color: '#E63946' },
    { id: 'beauty',    en: 'BEAUTY',    kr: '아름다움', color: '#9B59B6' },
    { id: 'faith',     en: 'FAITH',     kr: '믿음',     color: '#A8C256' },
    { id: 'fame',      en: 'FAME',      kr: '명예',     color: '#7A7A7A' },
    { id: 'family',    en: 'FAMILY',    kr: '가족',     color: '#E67E22' },
    { id: 'freedom',   en: 'FREEDOM',   kr: '자유',     color: '#2980B9' },
    { id: 'knowledge', en: 'KNOWLEDGE', kr: '지식',     color: '#27AE60' },
    { id: 'pleasure',  en: 'PLEASURE',  kr: '쾌락',     color: '#E84393' },
    { id: 'power',     en: 'POWER',     kr: '권력',     color: '#C5A55A' },
    { id: 'progress',  en: 'PROGRESS',  kr: '발전',     color: '#00BCD4' },
    { id: 'wealth',    en: 'WEALTH',    kr: '돈',       color: '#F1C40F' },
    { id: 'youth',     en: 'YOUTH',     kr: '젊음',     color: '#85C1E9' }
];

// 한국어 이름 → 가치 객체 매핑
const KR_MAP = {};
VALUES.forEach(v => {
    KR_MAP[v.kr] = v;
    // "사랑(LOVE)" 형식도 매핑
    KR_MAP[v.kr + '(' + v.en + ')'] = v;
});

function findValue(str) {
    if (!str) return null;
    str = str.trim();
    if (KR_MAP[str]) return KR_MAP[str];
    // 부분 매칭
    for (const v of VALUES) {
        if (str.includes(v.kr) || str.toLowerCase().includes(v.en.toLowerCase())) return v;
    }
    return null;
}

/* ===== DATA LOADING ===== */
let currentRoom = '';

async function loadData() {
    const roomInput = document.getElementById('inp-room');
    currentRoom = roomInput.value.trim().toUpperCase();

    if (!API_URL) {
        document.getElementById('config-warning').style.display = 'block';
        document.getElementById('dashboard').style.display = 'none';
        return;
    }

    try {
        const url = currentRoom
            ? API_URL + '?room=' + encodeURIComponent(currentRoom)
            : API_URL;

        const res = await fetch(url);
        const json = await res.json();

        if (json.status === 'ok') {
            render(json.data || []);
        } else {
            console.error('API error:', json.message);
        }
    } catch (err) {
        console.error('Fetch error:', err);
    }
}

/* ===== RENDERING ===== */
function render(rows) {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('config-warning').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';

    // 방 표시
    document.getElementById('room-display').innerHTML =
        currentRoom ? '방 코드: <code>' + currentRoom + '</code>' : '전체 데이터';

    // 참가자 수
    document.getElementById('stat-total').textContent = rows.length;

    if (rows.length === 0) {
        document.getElementById('chart-bars').innerHTML = '<div class="no-data">아직 데이터가 없습니다</div>';
        document.getElementById('chart-top-ranks').innerHTML = '';
        updateRefreshTime();
        return;
    }

    // === 집계 ===
    const selectCount = {};   // 가치별 선택 횟수
    const firstCount = {};    // 1순위 횟수
    const secondCount = {};   // 2순위 횟수
    const thirdCount = {};    // 3순위 횟수
    VALUES.forEach(v => {
        selectCount[v.id] = 0;
        firstCount[v.id] = 0;
        secondCount[v.id] = 0;
        thirdCount[v.id] = 0;
    });

    rows.forEach(row => {
        const vals = row.values.map(findValue).filter(Boolean);
        vals.forEach((v, i) => {
            selectCount[v.id]++;
            if (i === 0) firstCount[v.id]++;
            if (i === 1) secondCount[v.id]++;
            if (i === 2) thirdCount[v.id]++;
        });
    });

    const maxSelect = Math.max(...Object.values(selectCount), 1);

    // === 1. 선택 빈도 바 차트 ===
    const sorted = VALUES.slice().sort((a, b) => selectCount[b.id] - selectCount[a.id]);
    document.getElementById('chart-bars').innerHTML = sorted.map(v => {
        const count = selectCount[v.id];
        const pct = (count / maxSelect * 100).toFixed(1);
        return `<div class="bar-row">
            <div class="bar-label" style="color:${v.color}">${v.kr}</div>
            <div class="bar-track">
                <div class="bar-fill" style="width:${pct}%;background:${v.color}"></div>
            </div>
            <div class="bar-count">${count}</div>
        </div>`;
    }).join('');

    // === 2. 순위별 Top 3 가치 (3단) ===
    function getTop3(countObj) {
        return VALUES.slice()
            .filter(v => countObj[v.id] > 0)
            .sort((a, b) => countObj[b.id] - countObj[a.id])
            .slice(0, 3)
            .map(v => ({ value: v, count: countObj[v.id] }));
    }

    const rankSections = [
        { label: '1순위 TOP 3', items: getTop3(firstCount) },
        { label: '2순위 TOP 3', items: getTop3(secondCount) },
        { label: '3순위 TOP 3', items: getTop3(thirdCount) }
    ];

    document.getElementById('chart-top-ranks').innerHTML = rankSections
        .map(section => {
            const rows = section.items.map((item, i) => {
                const v = item.value;
                return `<div class="rank-item">
                    <div class="rank-medal">${i + 1}</div>
                    <div class="rank-color-dot" style="background:${v.color}"></div>
                    <div style="flex:1">
                        <span class="rank-value-name" style="color:${v.color}">${v.kr}</span>
                        <span class="rank-value-en">${v.en}</span>
                    </div>
                    <div class="rank-count">${item.count}명</div>
                </div>`;
            }).join('');
            return `<div class="rank-section">
                <div class="rank-section-title">${section.label}</div>
                ${rows || '<div class="no-data">데이터 없음</div>'}
            </div>`;
        }).join('');

    updateRefreshTime();
}

function updateRefreshTime() {
    const now = new Date();
    const t = now.getHours().toString().padStart(2,'0') + ':' +
              now.getMinutes().toString().padStart(2,'0') + ':' +
              now.getSeconds().toString().padStart(2,'0');
    document.getElementById('refresh-time').textContent = '마지막 업데이트: ' + t;
}

/* ===== INIT ===== */
document.addEventListener('DOMContentLoaded', () => {
    if (!API_URL) {
        document.getElementById('config-warning').style.display = 'block';
    }
    document.getElementById('inp-room').addEventListener('keydown', e => {
        if (e.key === 'Enter') loadData();
    });
});
</script>
</body>
</html>
