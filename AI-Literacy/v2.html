<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>내 그림은 어디서부터인가</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --color-bg: #ffffff;
  --color-text: #1a1a1a;
  --color-text-light: #888;
  --color-bubble-mine: #3B82F6;
  --color-bubble-mine-text: #ffffff;
  --color-bubble-other: #F1F1F1;
  --color-bubble-other-text: #1a1a1a;
  --color-narration: #666;
  --color-card-bg: #FAFAFA;
  --color-card-border: #E5E5E5;
  --color-card-earned: #F59E0B;
  --color-accent: #3B82F6;

  --chart-grid: #E5E7EB;
  --chart-fill: rgba(59, 130, 246, 0.15);
  --chart-stroke: #3B82F6;
  --chart-point: #3B82F6;

  --radius-sm: 8px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --radius-full: 9999px;

  --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
  --font-size-sm: 13px;
  --font-size-base: 15px;
  --font-size-lg: 18px;
  --font-size-xl: 24px;
  --font-size-xxl: 32px;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: var(--font-family);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  background: #F9FAFB;
  color: var(--color-text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Phone Frame ── */
.phone-frame {
  width: 375px;
  height: 720px;
  max-height: 95dvh;
  margin: 0 auto;
  border: 2px solid #E5E5E5;
  border-radius: 36px;
  overflow: hidden;
  background: var(--color-bg);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
  display: flex;
  flex-direction: column;
  position: relative;
}

.phone-statusbar {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--color-text);
  background: var(--color-bg);
  border-bottom: 1px solid #F0F0F0;
  flex-shrink: 0;
}

.phone-home-indicator {
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.phone-home-indicator::after {
  content: '';
  width: 134px;
  height: 5px;
  background: #D1D5DB;
  border-radius: 3px;
}

.phone-content {
  flex: 1;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}

/* ── Screens ── */
.screen {
  display: none;
  position: absolute;
  inset: 0;
  flex-direction: column;
  overflow: hidden;
}
.screen.active {
  display: flex;
}

.screen-enter { animation: screenFadeIn 0.4s ease forwards; }
.screen-exit { animation: screenFadeOut 0.3s ease forwards; }

@keyframes screenFadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes screenFadeOut {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-8px); }
}

/* ── Title Screen ── */
#screen-title {
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 32px 24px;
  gap: 16px;
}
.title-emoji { font-size: 56px; margin-bottom: 8px; }
.title-main {
  font-size: var(--font-size-xxl);
  font-weight: 700;
  color: var(--color-text);
  line-height: 1.3;
}
.title-sub {
  font-size: var(--font-size-base);
  color: var(--color-text-light);
  margin-bottom: 24px;
  line-height: 1.6;
}
.btn-primary {
  background: var(--color-accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-full);
  padding: 14px 40px;
  font-size: var(--font-size-lg);
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-family);
  transition: all 0.2s ease;
  min-height: 48px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.btn-primary:hover { background: #2563EB; transform: translateY(-1px); }
.btn-primary:active { transform: scale(0.97); }

.title-fade-in { animation: fadeIn 0.8s ease forwards; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Character Select Screen ── */
#screen-character {
  padding: 24px 16px;
  gap: 16px;
  overflow-y: auto;
}
.char-header {
  text-align: center;
  font-size: var(--font-size-xl);
  font-weight: 700;
}
.char-sub {
  text-align: center;
  font-size: var(--font-size-sm);
  color: var(--color-text-light);
  margin-bottom: 8px;
}
.character-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  flex: 1;
}
.character-card {
  background: var(--color-bg);
  border: 2px solid var(--color-card-border);
  border-radius: var(--radius-lg);
  padding: 20px 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  min-height: 44px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.character-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}
.character-card:active { transform: scale(0.97); }
.character-card .char-avatar { font-size: 36px; }
.character-card .char-name {
  font-size: var(--font-size-lg);
  font-weight: 700;
}
.character-card .char-tagline {
  font-size: var(--font-size-sm);
  color: var(--color-text-light);
  line-height: 1.4;
}
.character-card .char-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 4px;
}
.char-tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: var(--radius-full);
  background: #F3F4F6;
  color: var(--color-text-light);
}

/* ── Messenger Screen ── */
#screen-messenger {
  flex-direction: column;
}
.messenger-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid #F0F0F0;
  flex-shrink: 0;
  background: var(--color-bg);
}
.messenger-header .header-back {
  font-size: 20px;
  color: var(--color-text-light);
  cursor: default;
}
.messenger-header .header-avatar {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-full);
  background: #F3F4F6;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}
.messenger-header .header-name {
  font-size: var(--font-size-base);
  font-weight: 600;
}
.messenger-header .header-cards-btn {
  margin-left: auto;
  background: none;
  border: 1.5px solid var(--color-card-border);
  border-radius: var(--radius-full);
  padding: 4px 10px;
  font-size: 12px;
  cursor: pointer;
  color: var(--color-text-light);
  font-family: var(--font-family);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  min-height: 30px;
}
.messenger-header .header-cards-btn:hover { border-color: var(--color-accent); color: var(--color-accent); }

/* Chat Area */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  scroll-behavior: smooth;
}

.message-row {
  display: flex;
  gap: 8px;
  max-width: 80%;
  align-items: flex-end;
}
.message-row.left { align-self: flex-start; }
.message-row.right { align-self: flex-end; flex-direction: row-reverse; }
.message-row.center { align-self: center; max-width: 90%; }

.message-avatar {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-full);
  background: #F3F4F6;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.message-content { display: flex; flex-direction: column; }

.bubble {
  padding: 10px 14px;
  border-radius: var(--radius-lg);
  font-size: var(--font-size-base);
  line-height: 1.5;
  word-break: keep-all;
}
.bubble.left {
  background: var(--color-bubble-other);
  color: var(--color-bubble-other-text);
  border-bottom-left-radius: 4px;
}
.bubble.right {
  background: var(--color-bubble-mine);
  color: var(--color-bubble-mine-text);
  border-bottom-right-radius: 4px;
}
.bubble.center {
  background: none;
  color: var(--color-narration);
  font-size: var(--font-size-sm);
  text-align: center;
  font-style: italic;
  padding: 8px 0;
}

.sender-name {
  font-size: 12px;
  color: var(--color-text-light);
  margin-bottom: 4px;
}

.message-time {
  font-size: 11px;
  color: var(--color-text-light);
  margin-top: 2px;
}
.message-row.right .message-time { text-align: right; }

.read-receipt {
  font-size: 11px;
  color: var(--color-text-light);
  text-align: right;
}

.bubble-enter {
  animation: bubbleIn 0.3s ease-out forwards;
}
@keyframes bubbleIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Typing Indicator */
.typing-row {
  display: flex;
  gap: 8px;
  align-self: flex-start;
  align-items: flex-end;
  max-width: 80%;
}
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 12px 16px;
  background: var(--color-bubble-other);
  border-radius: var(--radius-lg);
  border-bottom-left-radius: 4px;
  width: fit-content;
}
.typing-dot {
  width: 8px;
  height: 8px;
  background: #9CA3AF;
  border-radius: 50%;
  animation: typingBounce 1.2s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-4px); }
}

/* Choices */
.choices-container {
  padding: 12px 16px;
  background: var(--color-bg);
  border-top: 1px solid #F0F0F0;
  display: none;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
  animation: slideUp 0.3s ease-out;
}

@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.choice-btn {
  background: var(--color-bg);
  border: 1.5px solid var(--color-card-border);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  font-size: var(--font-size-base);
  color: var(--color-text);
  cursor: pointer;
  text-align: left;
  min-height: 48px;
  transition: all 0.15s ease;
  font-family: var(--font-family);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.choice-btn:hover {
  border-color: var(--color-accent);
  background: rgba(59, 130, 246, 0.04);
}
.choice-btn:active { transform: scale(0.98); }
.choice-btn.selected {
  background: var(--color-bubble-mine);
  color: var(--color-bubble-mine-text);
  border-color: var(--color-bubble-mine);
}

/* Next Button (for no-choice scenes) */
.next-btn-container {
  padding: 12px 16px;
  background: var(--color-bg);
  border-top: 1px solid #F0F0F0;
  display: none;
  flex-shrink: 0;
}
.next-btn {
  width: 100%;
  background: var(--color-accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-md);
  padding: 14px;
  font-size: var(--font-size-base);
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-family);
  min-height: 48px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.next-btn:active { transform: scale(0.98); }

/* ── Transition Screen ── */
.transition-screen {
  position: absolute;
  inset: 0;
  background: var(--color-bg);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  z-index: 50;
}
.transition-screen.active {
  display: flex;
  animation: fadeInOut 2.5s ease forwards;
}
@keyframes fadeInOut {
  0% { opacity: 0; }
  20% { opacity: 1; }
  80% { opacity: 1; }
  100% { opacity: 0; }
}
.transition-icon { font-size: 40px; }
.transition-label {
  font-size: var(--font-size-lg);
  color: var(--color-text-light);
}
.transition-steps {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}
.transition-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #E5E7EB;
}
.transition-dot.active { background: var(--color-accent); }

/* ── Card Collection Screen ── */
#screen-cards {
  padding: 20px 16px;
  overflow-y: auto;
  gap: 16px;
}
.cards-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.cards-title {
  font-size: var(--font-size-xl);
  font-weight: 700;
}
.cards-back-btn {
  background: none;
  border: 1.5px solid var(--color-card-border);
  border-radius: var(--radius-full);
  padding: 6px 14px;
  font-size: var(--font-size-sm);
  cursor: pointer;
  color: var(--color-text-light);
  font-family: var(--font-family);
  min-height: 36px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.earned-card {
  background: var(--color-card-bg);
  border: 1.5px solid var(--color-card-border);
  border-radius: var(--radius-md);
  padding: 16px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.earned-card .card-icon { font-size: 28px; }
.earned-card .card-label {
  font-size: var(--font-size-sm);
  color: var(--color-text);
  line-height: 1.4;
}
.earned-card .card-step {
  font-size: 11px;
  color: var(--color-text-light);
}
.empty-card {
  background: #FAFAFA;
  border: 1.5px dashed #D1D5DB;
  border-radius: var(--radius-md);
  padding: 16px;
  text-align: center;
  color: #D1D5DB;
  font-size: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100px;
}

/* ── Card Popup ── */
.card-popup-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.15);
  z-index: 90;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card-popup {
  background: var(--color-bg);
  border: 2px solid var(--color-card-earned);
  border-radius: var(--radius-lg);
  padding: 24px 32px;
  text-align: center;
  box-shadow: 0 16px 48px rgba(0, 0, 0, 0.12);
  z-index: 100;
  animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
@keyframes popIn {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.card-popup .popup-badge {
  font-size: 12px;
  color: var(--color-card-earned);
  font-weight: 600;
  margin-bottom: 8px;
}
.card-popup .popup-icon { font-size: 40px; margin-bottom: 8px; }
.card-popup .popup-label {
  font-size: var(--font-size-lg);
  font-weight: 600;
}

/* ── Profile Result Screen ── */
#screen-profile {
  padding: 24px 16px;
  overflow-y: auto;
  gap: 16px;
  align-items: center;
}
.profile-card {
  background: var(--color-bg);
  border: 1.5px solid var(--color-card-border);
  border-radius: var(--radius-lg);
  padding: 32px 24px;
  max-width: 360px;
  width: 100%;
  text-align: center;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
}
.profile-avatar { font-size: 48px; margin-bottom: 8px; }
.profile-char-name {
  font-size: var(--font-size-sm);
  color: var(--color-text-light);
  margin-bottom: 4px;
}
.profile-type {
  font-size: var(--font-size-xl);
  font-weight: 700;
  color: var(--color-text);
  margin-bottom: 4px;
}
.profile-desc {
  font-size: var(--font-size-sm);
  color: var(--color-text-light);
  margin-bottom: 24px;
  line-height: 1.6;
}
.profile-chart {
  margin: 0 auto 24px;
  max-width: 280px;
}
.profile-chart svg { width: 100%; height: auto; }

.stat-bars {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 24px;
  text-align: left;
}
.stat-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.stat-label {
  font-size: 12px;
  color: var(--color-text-light);
  width: 70px;
  flex-shrink: 0;
}
.stat-bar-bg {
  flex: 1;
  height: 6px;
  background: #F3F4F6;
  border-radius: 3px;
  overflow: hidden;
}
.stat-bar-fill {
  height: 100%;
  background: var(--color-accent);
  border-radius: 3px;
  transition: width 0.8s ease-out;
  width: 0;
}
.stat-value {
  font-size: 12px;
  color: var(--color-text);
  width: 24px;
  text-align: right;
  flex-shrink: 0;
}

.profile-cards-section {
  margin-bottom: 24px;
}
.profile-cards-title {
  font-size: var(--font-size-sm);
  color: var(--color-text-light);
  margin-bottom: 12px;
}
.profile-cards {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}
.profile-card-badge {
  display: flex;
  align-items: center;
  gap: 4px;
  background: #F9FAFB;
  border: 1px solid #E5E7EB;
  border-radius: var(--radius-full);
  padding: 4px 12px;
  font-size: 13px;
}

.profile-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
  max-width: 360px;
}
.btn-secondary {
  background: var(--color-bg);
  color: var(--color-accent);
  border: 1.5px solid var(--color-accent);
  border-radius: var(--radius-full);
  padding: 12px 24px;
  font-size: var(--font-size-base);
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-family);
  min-height: 48px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: all 0.2s ease;
}
.btn-secondary:hover { background: rgba(59,130,246,0.05); }
.btn-secondary:active { transform: scale(0.97); }

/* ── Responsive ── */
@media (max-width: 767px) {
  body { background: var(--color-bg); }
  .phone-frame {
    width: 100%;
    max-height: none;
    height: 100dvh;
    border: none;
    border-radius: 0;
    box-shadow: none;
  }
  .phone-statusbar,
  .phone-home-indicator { display: none; }

  .character-grid { grid-template-columns: repeat(2, 1fr); }

  .choice-btn {
    min-height: 52px;
    font-size: 16px;
  }
}

button {
  min-height: 44px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

/* Scrollbar styling */
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 4px; }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="phone-statusbar">
    <span id="statusbar-time">오후 4:30</span>
  </div>

  <div class="phone-content">
    <!-- Title Screen -->
    <div class="screen" id="screen-title">
      <div class="title-emoji title-fade-in">🎨</div>
      <div class="title-main title-fade-in">내 그림은<br>어디서부터인가</div>
      <div class="title-sub title-fade-in">AI 시대, 나는 어떤 선택을 하는 사람일까?</div>
      <button class="btn-primary title-fade-in" onclick="showScreen('character')">시작하기</button>
    </div>

    <!-- Character Select Screen -->
    <div class="screen" id="screen-character">
      <div class="char-header">캐릭터를 골라봐</div>
      <div class="char-sub">누구로 플레이할까?</div>
      <div class="character-grid" id="character-grid"></div>
    </div>

    <!-- Messenger Screen -->
    <div class="screen" id="screen-messenger">
      <div class="messenger-header">
        <span class="header-back">&#8249;</span>
        <div class="header-avatar" id="messenger-avatar"></div>
        <span class="header-name" id="messenger-name"></span>
        <button class="header-cards-btn" onclick="showScreen('cards')">내 카드</button>

const PROFILES = {
  handmaker: {
    name: "직접 해보는 사람",
    desc: "결과가 완벽하지 않아도, 과정에 내가 들어가는 게 중요한 사람.",
    condition: (s) => (s.thinking + s.creativity) >= 7 && s.tech <= 5
  },
  toolmaker: {
    name: "도구와 함께 만드는 사람",
    desc: "AI를 쓰되, 내 것으로 만드는 방법을 찾는 사람.",
    condition: (s) => s.creativity >= 3 && s.tech >= 3 && s.confidence >= 3
  },
  speedrunner: {
    name: "빠르게 끝내는 사람",
    desc: "효율을 중요하게 생각하고, 도구를 적극적으로 활용하는 사람.",
    condition: (s) => (s.tech + s.adaptability) >= 7 && s.creativity <= 4
  },
  explorer: {
    name: "아직 찾는 사람",
    desc: "정해진 답 없이 여러 가능성을 탐색하고 있는 사람.",
    condition: (s) => s.curiosity >= Math.max(s.thinking, s.creativity, s.tech, s.adaptability, s.confidence)
  }
};

function determineProfile(stats) {
  for (const key of ['handmaker', 'toolmaker', 'speedrunner', 'explorer']) {
    if (PROFILES[key].condition(stats)) return PROFILES[key];
  }
  const entries = Object.entries(stats);
  entries.sort((a, b) => b[1] - a[1]);
  const topKey = entries[0][0];
  if (topKey === 'thinking' || topKey === 'creativity') return PROFILES.handmaker;
  if (topKey === 'tech' || topKey === 'adaptability') return PROFILES.speedrunner;
  if (topKey === 'curiosity') return PROFILES.explorer;
  return PROFILES.toolmaker;
}

// MESSENGER ENGINE
// ═══════════════════════════════════════

class MessengerEngine {
  constructor(chatArea, choicesContainer) {
    this.chatArea = chatArea;
    this.choicesContainer = choicesContainer;
    this.isPlaying = false;
    this.gameTime = { hour: 16, minute: 30 };
    this.lastSender = null;
  }

  async playMessages(messages) {
    this.isPlaying = true;
    for (const msg of messages) {
      if (msg.from !== 'player') {
        if (msg.from !== 'system' && msg.from !== 'narration') {
          this.showTyping(msg.from);
          await this.wait(msg.delay || 800);
          this.hideTyping();
        } else {
          await this.wait(msg.delay || 600);
        }
      }
      this.addBubble(msg);
      this.scrollToBottom();
      this.advanceTime();
    }
    this.isPlaying = false;
  }

  addBubble(msg) {
    const speaker = SPEAKERS[msg.from];
    if (!speaker) return;

    const row = document.createElement('div');
    row.className = `message-row ${speaker.side}`;

    if (speaker.side === 'left') {
      const showName = this.lastSender !== msg.from;
      row.innerHTML = `
        <div class="message-avatar">${speaker.avatar || ''}</div>
        <div class="message-content">
          ${showName ? `<div class="sender-name">${speaker.name}</div>` : ''}
          <div class="bubble left bubble-enter">${msg.text}</div>
          <div class="message-time">${this.getTime()}</div>
        </div>
      `;
    } else if (speaker.side === 'right') {
      row.innerHTML = `
        <div class="message-content">
          <div class="bubble right bubble-enter">${msg.text}</div>
          <div class="read-receipt">읽음</div>
        </div>
      `;
    } else {
      row.innerHTML = `<div class="bubble center bubble-enter">${msg.text}</div>`;
    }

    this.chatArea.appendChild(row);
    this.lastSender = msg.from;
  }

  showChoices(choices, onSelect) {
    this.choicesContainer.innerHTML = '';
    this.choicesContainer.style.display = 'flex';

    for (const choice of choices) {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = choice.text;
      btn.addEventListener('click', () => {
        // disable all buttons
        this.choicesContainer.querySelectorAll('.choice-btn').forEach(b => {
          b.disabled = true;
          b.style.pointerEvents = 'none';
        });
        btn.classList.add('selected');
        setTimeout(() => {
          this.choicesContainer.style.display = 'none';
          this.addBubble({ from: 'player', text: choice.text });
          this.scrollToBottom();
          onSelect(choice);
        }, 400);
      });
      this.choicesContainer.appendChild(btn);
    }
  }

  showTyping(from) {
    const speaker = SPEAKERS[from];
    if (!speaker) return;
    this.hideTyping();
    const row = document.createElement('div');
    row.className = 'typing-row';
    row.id = 'typing-indicator';
    row.innerHTML = `
      <div class="message-avatar">${speaker.avatar || ''}</div>
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    `;
    this.chatArea.appendChild(row);
    this.scrollToBottom();
  }

  hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  scrollToBottom() {
    requestAnimationFrame(() => {
      this.chatArea.scrollTop = this.chatArea.scrollHeight;
    });
  }

  getTime() {
    const h = this.gameTime.hour;
    const m = this.gameTime.minute;
    const period = h >= 12 ? '오후' : '오전';
    const displayH = h > 12 ? h - 12 : h;
    return `${period} ${displayH}:${m.toString().padStart(2, '0')}`;
  }

  advanceTime() {
    this.gameTime.minute += Math.floor(Math.random() * 2) + 1;
    if (this.gameTime.minute >= 60) {
      this.gameTime.minute -= 60;
      this.gameTime.hour += 1;
    }
  }

  clearChat() {
    this.chatArea.innerHTML = '';
    this.choicesContainer.style.display = 'none';
    this.choicesContainer.innerHTML = '';
    this.lastSender = null;
  }

  wait(ms) {
    return new Promise(r => setTimeout(r, ms));
  }
}


// ═══════════════════════════════════════
// RADAR CHART (SVG)
// ═══════════════════════════════════════

function renderRadarChart(stats, container) {
  const size = 280;
  const cx = size / 2;
  const cy = size / 2;
  const maxR = size / 2 - 40;
  const axes = ['thinking', 'creativity', 'tech', 'adaptability', 'confidence', 'curiosity'];
  const labels = ['사고력', '창의력', '기술친숙도', '적응력', '자신감', '호기심'];
  const maxVal = 10;
  const angleStep = 360 / 6;

  function polar(angle, r) {
    const rad = (angle - 90) * Math.PI / 180;
    return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
  }

  let svg = `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">`;

  // grid
  for (let level = 1; level <= 5; level++) {
    const r = maxR * (level / 5);
    const points = [];
    for (let i = 0; i < 6; i++) {
      const p = polar(i * angleStep, r);
      points.push(`${p.x},${p.y}`);
    }
    svg += `<polygon points="${points.join(' ')}" fill="none" stroke="${getComputedStyle(document.documentElement).getPropertyValue('--chart-grid').trim()}" stroke-width="1"/>`;
  }

  // axis lines
  for (let i = 0; i < 6; i++) {
    const p = polar(i * angleStep, maxR);
    svg += `<line x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}" stroke="${getComputedStyle(document.documentElement).getPropertyValue('--chart-grid').trim()}" stroke-width="1"/>`;
  }

  // data polygon
  const dataPoints = [];
  for (let i = 0; i < 6; i++) {
    const val = Math.max(0, Math.min(maxVal, stats[axes[i]] || 0));
    const r = maxR * (val / maxVal);
    const p = polar(i * angleStep, r);
    dataPoints.push(p);
  }
  const pointsStr = dataPoints.map(p => `${p.x},${p.y}`).join(' ');
  svg += `<polygon points="${pointsStr}" fill="rgba(59, 130, 246, 0.15)" stroke="#3B82F6" stroke-width="2"/>`;

  // data points
  for (const p of dataPoints) {
    svg += `<circle cx="${p.x}" cy="${p.y}" r="4" fill="#3B82F6"/>`;
  }

  // labels
  for (let i = 0; i < 6; i++) {
    const p = polar(i * angleStep, maxR + 22);
    svg += `<text x="${p.x}" y="${p.y}" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#1a1a1a" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif">${labels[i]}</text>`;
  }

  svg += '</svg>';
  container.innerHTML = svg;
}

// GAME CONTROLLER
// ═══════════════════════════════════════

class GameController {
  constructor() {
    this.state = {
      character: null,
      currentStep: null,
      currentBranch: null,
      cards: [],
      stats: { thinking: 0, creativity: 0, tech: 0, adaptability: 0, confidence: 0, curiosity: 0 },
      choiceHistory: []
    };
    this.messenger = null;
    this.totalSteps = 5; // step1-4 + profile
  }

  init() {
    const chatArea = document.getElementById('chat-area');
    const choicesContainer = document.getElementById('choices-container');
    this.messenger = new MessengerEngine(chatArea, choicesContainer);
    this.renderCharacterGrid();
  }

  renderCharacterGrid() {
    const grid = document.getElementById('character-grid');
    grid.innerHTML = '';
    for (const [id, char] of Object.entries(CHARACTERS)) {
      const card = document.createElement('div');
      card.className = 'character-card';
      card.style.borderColor = char.color + '40';
      card.innerHTML = `
        <div class="char-avatar">${char.avatar}</div>
        <div class="char-name">${char.name}</div>
        <div class="char-tagline">${char.tagline}</div>
        <div class="char-tags">
          ${char.tags.map(t => `<span class="char-tag">#${t}</span>`).join('')}
        </div>
      `;
      card.addEventListener('click', () => this.selectCharacter(id));
      grid.appendChild(card);
    }
  }

  selectCharacter(charId) {
    this.state.character = charId;
    const char = CHARACTERS[charId];

    // Update messenger header
    document.getElementById('messenger-avatar').textContent = char.avatar;
    document.getElementById('messenger-name').textContent = '지민';

    // Set initial game time based on step
    this.messenger.gameTime = { hour: 16, minute: 30 };

    this.messenger.clearChat();
    showScreen('messenger');
    this.startStep('step1');
  }

  async startStep(stepKey) {
    this.state.currentStep = stepKey;

    if (stepKey === 'profile') {
      this.showProfile();
      return;
    }

    const charScenario = SCENARIO[this.state.character];
    if (!charScenario) { this.showProfile(); return; }

    let stepData;

    if (stepKey === 'step1') {
      stepData = charScenario.step1;
    } else if (stepKey === 'step4') {
      // step4 is universal for suyeon (reflection scene)
      stepData = charScenario.step4;
    } else {
      // step2 and step3 branch based on previous choice
      const branchData = charScenario[stepKey];
      if (!branchData) { this.showProfile(); return; }
      stepData = branchData[this.state.currentBranch];
      if (!stepData) { this.showProfile(); return; }
    }

    // Scene transition
    if (stepData.scene) {
      const sceneInfo = SCENE_INFO[stepData.scene];
      if (sceneInfo) {
        await this.showTransition(sceneInfo.icon, sceneInfo.label, stepKey);
      }

      // Update game time for new scene
      if (stepData.scene === 'desk') {
        this.messenger.gameTime = { hour: 17, minute: 5 };
      } else if (stepData.scene === 'classroom') {
        this.messenger.gameTime = { hour: 10, minute: 30 };
        document.getElementById('messenger-name').textContent = '미술 시간';
      } else if (stepData.scene === 'reflect') {
        this.messenger.gameTime = { hour: 15, minute: 45 };
        document.getElementById('messenger-name').textContent = '혼자 생각';
      }
    }

    // Clear chat for new scene
    this.messenger.clearChat();

    // Play messages
    await this.messenger.playMessages(stepData.messages);

    // Show choices or end messages then next button
    if (stepData.choices && !stepData.noChoice) {
      this.messenger.showChoices(stepData.choices, (choice) => this.onChoice(choice));
    } else if (stepData.endMessages) {
      await this.messenger.playMessages(stepData.endMessages);
      this.showNextButton();
    } else if (stepData.noChoice) {
      this.showNextButton();
    } else {
      this.showNextButton();
    }
  }

  onChoice(choice) {
    // Accumulate stats
    this.addStats(choice.stats);

    // Earn card
    if (choice.card) {
      const card = { ...choice.card, step: this.state.currentStep };
      this.state.cards.push(card);
      this.showCardPopup(card);
    }

    // Record choice
    this.state.choiceHistory.push(choice.id);
    this.state.currentBranch = choice.id;

    // Next step after popup delay
    const nextStep = this.getNextStep();
    setTimeout(() => {
      // Play any reaction messages if applicable
      this.startStep(nextStep);
    }, 1800);
  }

  addStats(delta) {
    for (const key in delta) {
      if (this.state.stats.hasOwnProperty(key)) {
        this.state.stats[key] = Math.max(0, Math.min(10,
          (this.state.stats[key] || 0) + delta[key]
        ));
      }
    }
  }

  getNextStep() {
    const order = ['step1', 'step2', 'step3', 'step4'];
    const idx = order.indexOf(this.state.currentStep);

    // Check if next step exists in scenario
    const charScenario = SCENARIO[this.state.character];

    if (idx < order.length - 1) {
      const nextStep = order[idx + 1];

      // For non-suyeon characters with only step1, go to profile
      if (nextStep === 'step2' && !charScenario.step2) return 'profile';
      if (nextStep === 'step3' && !charScenario.step3) return 'profile';
      if (nextStep === 'step4' && !charScenario.step4) return 'profile';

      // For step2/3, check if branch exists
      if (nextStep === 'step2' || nextStep === 'step3') {
        const branchData = charScenario[nextStep];
        if (branchData && !branchData[this.state.currentBranch]) {
          // No branch for this choice, skip to next
          if (nextStep === 'step2') return charScenario.step3 ? 'step3' : (charScenario.step4 ? 'step4' : 'profile');
          if (nextStep === 'step3') return charScenario.step4 ? 'step4' : 'profile';
        }
      }

      return nextStep;
    }
    return 'profile';
  }

  showNextButton() {
    const container = document.getElementById('next-btn-container');
    const btn = document.getElementById('next-btn');
    container.style.display = 'block';

    const nextStep = this.getNextStep();
    btn.textContent = nextStep === 'profile' ? '결과 보기' : '다음';

    btn.onclick = () => {
      container.style.display = 'none';
      this.startStep(nextStep);
    };
  }

  showCardPopup(card) {
    const existing = document.querySelector('.card-popup-overlay');
    if (existing) existing.remove();

    const overlay = document.createElement('div');
    overlay.className = 'card-popup-overlay';
    overlay.innerHTML = `
      <div class="card-popup">
        <div class="popup-badge">카드 획득!</div>
        <div class="popup-icon">${card.icon}</div>
        <div class="popup-label">${card.label}</div>
      </div>
    `;
    document.querySelector('.phone-content').appendChild(overlay);

    setTimeout(() => {
      overlay.style.transition = 'opacity 0.3s ease';
      overlay.style.opacity = '0';
      setTimeout(() => overlay.remove(), 300);
    }, 1500);
  }

  showTransition(icon, label, stepKey) {
    return new Promise(resolve => {
      const screen = document.getElementById('transition-screen');
      document.getElementById('transition-icon').textContent = icon;
      document.getElementById('transition-label').textContent = label;

      // Progress dots
      const stepsContainer = document.getElementById('transition-steps');
      const stepOrder = ['step1', 'step2', 'step3', 'step4'];
      const currentIdx = stepOrder.indexOf(stepKey);
      stepsContainer.innerHTML = stepOrder.map((s, i) =>
        `<div class="transition-dot ${i <= currentIdx ? 'active' : ''}"></div>`
      ).join('');

      screen.classList.add('active');
      screen.style.animation = 'none';
      void screen.offsetHeight;
      screen.style.animation = 'fadeInOut 2.5s ease forwards';

      setTimeout(() => {
        screen.classList.remove('active');
        resolve();
      }, 2500);
    });
  }

  showProfile() {
    const char = CHARACTERS[this.state.character];
    const profile = determineProfile(this.state.stats);

    const container = document.getElementById('profile-card-content');
    const statLabels = {
      thinking: '사고력',
      creativity: '창의력',
      tech: '기술친숙도',
      adaptability: '적응력',
      confidence: '자신감',
      curiosity: '호기심'
    };

    container.innerHTML = `
      <div class="profile-avatar">${char.avatar}</div>
      <div class="profile-char-name">${char.name}(으)로 플레이</div>
      <div class="profile-type">${profile.name}</div>
      <div class="profile-desc">${profile.desc}</div>
      <div class="profile-chart" id="radar-chart"></div>
      <div class="stat-bars" id="stat-bars"></div>
      <div class="profile-cards-section">
        <div class="profile-cards-title">내가 모은 카드</div>
        <div class="profile-cards" id="profile-badges"></div>
      </div>
    `;

    // Render radar chart
    const chartContainer = document.getElementById('radar-chart');
    renderRadarChart(this.state.stats, chartContainer);

    // Render stat bars
    const barsContainer = document.getElementById('stat-bars');
    for (const [key, label] of Object.entries(statLabels)) {
      const val = this.state.stats[key] || 0;
      const pct = (val / 10) * 100;
      const row = document.createElement('div');
      row.className = 'stat-row';
      row.innerHTML = `
        <div class="stat-label">${label}</div>
        <div class="stat-bar-bg"><div class="stat-bar-fill" style="width: 0%"></div></div>
        <div class="stat-value">${val}</div>
      `;
      barsContainer.appendChild(row);
    }

    // Render card badges
    const badgesContainer = document.getElementById('profile-badges');
    for (const card of this.state.cards) {
      const badge = document.createElement('div');
      badge.className = 'profile-card-badge';
      badge.innerHTML = `<span>${card.icon}</span> ${card.label}`;
      badgesContainer.appendChild(badge);
    }

    showScreen('profile');

    // Animate stat bars after screen shows
    setTimeout(() => {
      const fills = barsContainer.querySelectorAll('.stat-bar-fill');
      const keys = Object.keys(statLabels);
      fills.forEach((fill, i) => {
        const val = this.state.stats[keys[i]] || 0;
        fill.style.width = `${(val / 10) * 100}%`;
      });
    }, 100);
  }

  renderCardCollection() {
    const grid = document.getElementById('card-grid');
    grid.innerHTML = '';

    for (const card of this.state.cards) {
      const el = document.createElement('div');
      el.className = 'earned-card';
      el.innerHTML = `
        <div class="card-icon">${card.icon}</div>
        <div class="card-label">${card.label}</div>
        <div class="card-step">${card.step.replace('step', 'STEP ')}</div>
      `;
      grid.appendChild(el);
    }

    // Empty slots for remaining
    const maxCards = 4;
    for (let i = this.state.cards.length; i < maxCards; i++) {
      const el = document.createElement('div');
      el.className = 'empty-card';
      el.textContent = '?';
      grid.appendChild(el);
    }
  }

  restart(sameCharacter = true) {
    const charId = sameCharacter ? this.state.character : null;
    this.state = {
      character: charId,
      currentStep: null,
      currentBranch: null,
      cards: [],
      stats: { thinking: 0, creativity: 0, tech: 0, adaptability: 0, confidence: 0, curiosity: 0 },
      choiceHistory: []
    };

    document.getElementById('next-btn-container').style.display = 'none';
    document.getElementById('choices-container').style.display = 'none';

    if (charId) {
      this.selectCharacter(charId);
    } else {
      showScreen('character');
    }
  }
}

// SCREEN MANAGEMENT

let currentScreen = null;

function showScreen(screenId) {
  // Hide current screen
  document.querySelectorAll('.screen.active').forEach(s => {
    s.classList.remove('active');
    s.classList.remove('screen-enter');
  });

  // Show new screen
  const screen = document.getElementById(`screen-${screenId}`);
  if (screen) {
    screen.classList.add('active', 'screen-enter');
    currentScreen = screenId;
  }

  // Update card collection when viewing
  if (screenId === 'cards') {
    game.renderCardCollection();
  }
}
