<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 그림은 어디서부터인가</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --color-text: #1a1a1a;
    --color-text-light: #555;
    --color-border: #ddd;
    --color-bg: #fff;
    --color-accent: #0066ff;
    --color-accent-light: rgba(0, 102, 255, 0.08);
    --color-accent-fill: rgba(0, 102, 255, 0.12);
    --radius: 12px;
    --max-width: 600px;
    --transition: 0.4s ease;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
    background: var(--color-bg);
    color: var(--color-text);
    line-height: 1.7;
    font-size: 17px;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    padding: 40px 20px 60px;
  }

  #app {
    width: 100%;
    max-width: var(--max-width);
    position: relative;
  }

  /* ── Screen containers ── */
  .screen {
    display: none;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .screen.active {
    display: block;
  }
  .screen.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── Step indicator ── */
  .step-indicator {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 36px;
  }
  .step-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--color-border);
    transition: background 0.3s;
  }
  .step-dot.filled {
    background: var(--color-accent);
  }
  .step-dot.current {
    background: var(--color-accent);
    box-shadow: 0 0 0 3px var(--color-accent-light);
  }

  /* ── Situation text ── */
  .situation {
    border-left: 3px solid var(--color-border);
    padding: 20px 24px;
    margin-bottom: 32px;
    background: #fafafa;
    border-radius: 0 var(--radius) var(--radius) 0;
  }
  .situation p {
    margin-bottom: 12px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .situation p.show {
    opacity: 1;
    transform: translateY(0);
  }
  .situation p:last-child { margin-bottom: 0; }
  .situation strong { color: var(--color-text); }

  /* ── Intro specific ── */
  .intro-text {
    text-align: center;
    padding: 60px 0 40px;
  }
  .intro-text p {
    margin-bottom: 16px;
    font-size: 18px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .intro-text p.show {
    opacity: 1;
    transform: translateY(0);
  }
  .intro-text strong {
    font-size: 19px;
  }

  /* ── Episode title ── */
  .episode-title {
    text-align: center;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--color-text-light);
    text-transform: uppercase;
    margin-bottom: 8px;
    font-weight: 500;
  }
  .episode-main-title {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 48px;
    color: var(--color-text);
  }

  /* ── Choices ── */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .choice-card {
    border: 1.5px solid var(--color-border);
    border-radius: var(--radius);
    padding: 20px 24px;
    cursor: pointer;
    transition: all 0.2s ease;
    background: var(--color-bg);
    text-align: left;
    font-size: 16px;
    line-height: 1.6;
    min-height: 72px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .choice-card:hover {
    border-color: var(--color-accent);
    box-shadow: 0 2px 12px rgba(0, 102, 255, 0.08);
  }
  .choice-card:active {
    transform: scale(0.98);
  }
  .choice-card.selected {
    border-color: var(--color-accent);
    background: var(--color-accent-light);
  }
  .choice-card .choice-label {
    font-weight: 600;
    margin-bottom: 4px;
    color: var(--color-text);
  }
  .choice-card .choice-desc {
    font-size: 14px;
    color: var(--color-text-light);
  }
  .choices.disabled .choice-card {
    pointer-events: none;
    opacity: 0.5;
  }
  .choices.disabled .choice-card.selected {
    opacity: 1;
  }

  /* ── Buttons ── */
  .btn {
    display: block;
    margin: 36px auto 0;
    padding: 16px 48px;
    font-size: 17px;
    font-weight: 600;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
    background: var(--color-text);
    color: var(--color-bg);
  }
  .btn:hover {
    opacity: 0.85;
    transform: translateY(-1px);
  }
  .btn:active {
    transform: translateY(0);
  }
  .btn.hidden {
    display: none;
  }
  .btn-secondary {
    background: transparent;
    color: var(--color-text-light);
    border: 1.5px solid var(--color-border);
    margin-top: 16px;
  }
  .btn-secondary:hover {
    border-color: var(--color-text-light);
    color: var(--color-text);
  }

  /* ── Profile screen ── */
  .profile-type-name {
    text-align: center;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .profile-type-quote {
    text-align: center;
    font-size: 14px;
    color: var(--color-text-light);
    margin-bottom: 32px;
  }
  .radar-container {
    display: flex;
    justify-content: center;
    margin-bottom: 32px;
  }
  .radar-container svg {
    width: 100%;
    max-width: 320px;
  }
  .profile-desc {
    font-size: 16px;
    line-height: 1.8;
    color: var(--color-text);
    margin-bottom: 40px;
    padding: 20px 24px;
    border-left: 3px solid var(--color-accent);
    background: var(--color-accent-light);
    border-radius: 0 var(--radius) var(--radius) 0;
  }
  .profile-desc strong { color: var(--color-text); }

  .closing-message {
    text-align: center;
    font-size: 16px;
    line-height: 1.8;
    color: var(--color-text-light);
    margin-bottom: 40px;
    padding: 0 12px;
  }
  .closing-message strong {
    color: var(--color-text);
  }

  /* ── Stat bars (text fallback under chart) ── */
  .stat-bars {
    margin-bottom: 32px;
  }
  .stat-bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    font-size: 14px;
  }
  .stat-bar-label {
    width: 80px;
    text-align: right;
    color: var(--color-text-light);
    flex-shrink: 0;
  }
  .stat-bar-track {
    flex: 1;
    height: 8px;
    background: #f0f0f0;
    border-radius: 4px;
    overflow: hidden;
  }
  .stat-bar-fill {
    height: 100%;
    background: var(--color-accent);
    border-radius: 4px;
    transition: width 1s ease;
    width: 0;
  }
  .stat-bar-value {
    width: 24px;
    font-weight: 600;
    font-size: 13px;
    color: var(--color-text);
  }

  /* ── Reflection ── */
  .reflection-text {
    text-align: center;
    padding: 40px 0;
  }
  .reflection-text p {
    margin-bottom: 16px;
    font-size: 18px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .reflection-text p.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    body { padding: 24px 16px 48px; font-size: 16px; }
    .intro-text p { font-size: 16px; }
    .situation { padding: 16px 18px; }
    .choice-card { padding: 16px 18px; }
    .profile-type-name { font-size: 22px; }
  }
</style>

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function addStats(delta) {
  for (const key of STAT_KEYS) {
    if (delta[key]) {
      stats[key] = clamp(stats[key] + delta[key], 0, 10);
    }
  }
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => {
    s.classList.remove("active", "visible");
  });
  const el = document.getElementById("screen-" + id);
  el.classList.add("active");
  // trigger reflow
  void el.offsetHeight;
  requestAnimationFrame(() => el.classList.add("visible"));
  currentScreen = id;
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function renderLines(container, lines, startDelay) {
  container.innerHTML = "";
  const delay = startDelay || 0;
  lines.forEach((line, i) => {
    const p = document.createElement("p");
    if (line.text === "") {
      p.innerHTML = "&nbsp;";
    } else if (line.bold) {
      p.innerHTML = "<strong>" + line.text + "</strong>";
    } else {
      p.textContent = line.text;
    }
    container.appendChild(p);
    setTimeout(() => p.classList.add("show"), delay + i * 300);
  });
  return delay + lines.length * 300;
}

function renderIndicator(containerId, currentStep) {
  const c = document.getElementById(containerId);
  c.innerHTML = "";
  for (let i = 1; i <= 5; i++) {
    const dot = document.createElement("div");
    dot.className = "step-dot";
    if (i < currentStep) dot.classList.add("filled");
    if (i === currentStep) dot.classList.add("current");
    c.appendChild(dot);
  }
}

function renderChoices(containerId, choices, onSelect) {
  const c = document.getElementById(containerId);
  c.innerHTML = "";
  c.classList.remove("disabled");
  choices.forEach(choice => {
    const card = document.createElement("button");
    card.className = "choice-card";
    card.innerHTML = `<div class="choice-label">${choice.label}</div>` +
      (choice.desc ? `<div class="choice-desc">${choice.desc}</div>` : "");
    card.addEventListener("click", () => {
      if (c.classList.contains("disabled")) return;
      c.classList.add("disabled");
      card.classList.add("selected");
      addStats(choice.stats);
      choiceHistory.push(choice.id);
      setTimeout(() => onSelect(choice.id), 800);
    });
    c.appendChild(card);
  });
}

function renderSituation(containerId, lines) {
  const c = document.getElementById(containerId);
  return renderLines(c, lines, 100);
}

function determineProfile(s) {
  const { thinking, creativity, tech, adaptability, confidence, curiosity } = s;

  // Pattern-based matching
  if (thinking + creativity >= 12 && tech <= 4) {
    return "손으로 시작하는 사람";
  }
  if (tech + adaptability >= 12 && creativity <= 4) {
    return "빠르게 끝내고 싶은 사람";
  }
  if (curiosity >= Math.max(thinking, creativity, tech, adaptability, confidence) && confidence <= 4) {
    return "아직 찾는 중인 사람";
  }
  if (creativity >= 6 && tech >= 4 && confidence >= 5) {
    return "도구를 쓰되 자기 것으로 만드는 사람";
  }

  // Fallback: dominant axis
  const vals = [thinking, creativity, tech, adaptability, confidence, curiosity];
  const maxVal = Math.max(...vals);
  if (thinking === maxVal || creativity === maxVal) {
    if (tech >= 4) return "도구를 쓰되 자기 것으로 만드는 사람";
    return "손으로 시작하는 사람";
  }
  if (curiosity === maxVal) return "아직 찾는 중인 사람";
  if (tech === maxVal || adaptability === maxVal) return "빠르게 끝내고 싶은 사람";
  return "도구를 쓰되 자기 것으로 만드는 사람";
}


// ════════════════════════════════════════
// RADAR CHART (SVG)
// ════════════════════════════════════════

function renderRadarChart(stats) {
  const container = document.getElementById("radar-container");
  const size = 300;
  const cx = size / 2;
  const cy = size / 2;
  const maxR = 110;
  const labelR = maxR + 28;

  const labels = ["사고력", "창의력", "기술친숙도", "적응력", "자신감", "호기심"];
  const values = STAT_KEYS.map(k => stats[k]);

  function polar(angle, r) {
    const rad = (angle - 90) * Math.PI / 180;
    return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
  }

  function hexPoints(r) {
    return Array.from({ length: 6 }, (_, i) => {
      const p = polar(i * 60, r);
      return `${p.x},${p.y}`;
    }).join(" ");
  }

  let svg = `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">`;

  // Grid hexagons
  for (let level = 2; level <= 10; level += 2) {
    const r = (level / 10) * maxR;
    svg += `<polygon points="${hexPoints(r)}" fill="none" stroke="#e8e8e8" stroke-width="1"/>`;
  }

  // Axis lines
  for (let i = 0; i < 6; i++) {
    const p = polar(i * 60, maxR);
    svg += `<line x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}" stroke="#e0e0e0" stroke-width="1"/>`;
  }

  // Data polygon
  const dataPoints = values.map((v, i) => {
    const r = (v / 10) * maxR;
    return polar(i * 60, r);
  });
  const dataPath = dataPoints.map(p => `${p.x},${p.y}`).join(" ");
  svg += `<polygon points="${dataPath}" fill="rgba(0, 102, 255, 0.12)" stroke="#0066ff" stroke-width="2"/>`;

  // Data dots
  dataPoints.forEach(p => {
    svg += `<circle cx="${p.x}" cy="${p.y}" r="4" fill="#0066ff"/>`;
  });

  // Labels
  labels.forEach((label, i) => {
    const p = polar(i * 60, labelR);
    let anchor = "middle";
    let dx = 0;
    if (i === 1 || i === 2) { anchor = "start"; dx = 4; }
    if (i === 4 || i === 5) { anchor = "end"; dx = -4; }
    svg += `<text x="${p.x + dx}" y="${p.y + 5}" text-anchor="${anchor}" font-size="12" fill="#666" font-family="-apple-system, sans-serif">${label}</text>`;
  });

  // Value labels on points
  values.forEach((v, i) => {
    const p = polar(i * 60, (v / 10) * maxR + 14);
    svg += `<text x="${p.x}" y="${p.y + 4}" text-anchor="middle" font-size="11" fill="#0066ff" font-weight="600" font-family="-apple-system, sans-serif">${v}</text>`;
  });

  svg += `</svg>`;
  container.innerHTML = svg;

  // Animate: start from center, expand
  const polygon = container.querySelector("polygon:last-of-type");
  const circles = container.querySelectorAll("circle");
  const centerPoints = Array.from({ length: 6 }, () => `${cx},${cy}`).join(" ");

  polygon.setAttribute("points", centerPoints);
  circles.forEach(c => { c.setAttribute("cx", cx); c.setAttribute("cy", cy); });

  requestAnimationFrame(() => {
    setTimeout(() => {
      polygon.style.transition = "all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)";
      polygon.setAttribute("points", dataPath);
      circles.forEach((c, i) => {
        c.style.transition = `all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) ${i * 0.05}s`;
        c.setAttribute("cx", dataPoints[i].x);
        c.setAttribute("cy", dataPoints[i].y);
      });
    }, 300);
  });
}


// ════════════════════════════════════════
// STAT BARS
// ════════════════════════════════════════

function renderStatBars(stats) {
  const container = document.getElementById("stat-bars");
  container.innerHTML = "";
  STAT_KEYS.forEach((key, i) => {
    const val = stats[key];
    const row = document.createElement("div");
    row.className = "stat-bar-row";
    row.innerHTML = `
      <span class="stat-bar-label">${STAT_LABELS[key]}</span>
      <div class="stat-bar-track"><div class="stat-bar-fill" id="bar-${key}"></div></div>
      <span class="stat-bar-value">${val}</span>
    `;
    container.appendChild(row);
    setTimeout(() => {
      document.getElementById("bar-" + key).style.width = (val * 10) + "%";
    }, 500 + i * 100);
  });
}
