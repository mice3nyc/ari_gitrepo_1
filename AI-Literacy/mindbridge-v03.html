<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 리터러시 — 위임 판단력</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Monaco', 'Menlo', monospace; background: #fff; color: #111; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
  .container { max-width: 480px; width: 100%; padding: 24px 20px; min-height: 100vh; display: flex; flex-direction: column; }

  /* ===== SVG 아이콘 ===== */
  .icon-svg { display: inline-block; vertical-align: middle; margin-right: 4px; }

  /* ===== 스탯 바 (v0.3.3 재설계) ===== */
  .stats-bar { display: flex; gap: 8px; margin-bottom: 20px; padding: 12px 8px; border: 2px solid #111; border-radius: 6px; background: #fff; box-shadow: 0 2px 0 #111; transition: all 0.3s; }
  .stat { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 4px; border-radius: 4px; position: relative; transition: background-color 0.3s; }

  /* 1행: 아이콘 + 숫자 */
  .stat-top { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 4px; position: relative; }
  .stat-num { font-size: 24px; font-weight: 700; transition: all 0.4s; line-height: 1; }
  .stat-num.pos { color: #1a8c1a; }
  .stat-num.neg { color: #c44; }
  .stat-num.zero { color: #bbb; }

  /* 숫자 pulse 애니메이션 */
  @keyframes numPulse { 0% { transform: scale(1); } 30% { transform: scale(1.5); } 100% { transform: scale(1); } }
  .stat-num.pulsing { animation: numPulse 0.5s ease; }

  /* 2행: 이름 */
  .stat-name { font-size: 12px; color: #888; text-align: center; margin-bottom: 6px; }

  /* 3행: 게이지 바 */
  .stat-gauge { height: 12px; width: 100%; background: #e8e8e8; border-radius: 3px; overflow: visible; position: relative; border: 1px solid #ccc; }
  .stat-gauge-center { position: absolute; left: 50%; top: -1px; width: 2px; height: 14px; background: #999; border-radius: 1px; z-index: 2; }
  .stat-gauge-fill { height: 100%; border-radius: 2px; position: absolute; top: 0; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .stat-gauge-fill.pos { background: #1a8c1a; left: 50%; }
  .stat-gauge-fill.neg { background: #c44; right: 50%; }

  /* 변동 원인 텍스트 (숫자 위에서 떠오름) */
  .stat-change-indicator { font-size: 14px; font-weight: 700; position: absolute; top: -20px; left: 50%; transform: translateX(-50%); transition: all 0.3s; opacity: 0; white-space: nowrap; pointer-events: none; }
  .stat-change-indicator.show { opacity: 1; animation: changeFloat 1.8s ease forwards; }
  .stat-change-indicator.up { color: #1a8c1a; }
  .stat-change-indicator.down { color: #c44; }
  @keyframes changeFloat { 0% { opacity: 0; transform: translateX(-50%) translateY(8px); } 15% { opacity: 1; transform: translateX(-50%) translateY(0); } 70% { opacity: 1; } 100% { opacity: 0; transform: translateX(-50%) translateY(-14px); } }

  /* 블록 배경 플래시 */
  @keyframes flashGreen { 0% { background-color: rgba(26,140,26,0.15); } 100% { background-color: transparent; } }
  @keyframes flashRed { 0% { background-color: rgba(204,68,68,0.15); } 100% { background-color: transparent; } }
  .stat.flash-up { animation: flashGreen 0.8s ease; }
  .stat.flash-down { animation: flashRed 0.8s ease; }

  /* 스탯 흔들림 */
  @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-3px); } 40% { transform: translateX(3px); } 60% { transform: translateX(-2px); } 80% { transform: translateX(2px); } }
  .stat.shaking { animation: shake 0.4s ease; }

  /* 호버 프리뷰 */
  .stat.preview-up .stat-gauge { background: rgba(26,140,26,0.15); }
  .stat.preview-up .stat-name { color: #1a8c1a; font-weight: 700; }
  .stat.preview-down .stat-gauge { background: rgba(204,68,68,0.15); }
  .stat.preview-down .stat-name { color: #c44; }

  /* Act + 라운드 인디케이터 */
  .act-indicator { text-align: center; font-size: 13px; color: #111; margin-bottom: 6px; font-weight: 700; letter-spacing: 2px; font-family: 'SF Mono', 'Monaco', 'Menlo', monospace; }
  .round-indicator { display: flex; gap: 8px; margin-bottom: 16px; justify-content: center; }
  .round-dot { width: 12px; height: 12px; border-radius: 50%; background: #e0e0e0; border: 2px solid #ccc; transition: all 0.3s; }
  .round-dot.active { background: #111; border-color: #111; transform: scale(1.2); }
  .round-dot.done { background: #888; border-color: #888; }

  /* 화면 */
  .screen { flex: 1; display: flex; flex-direction: column; }

  /* 픽셀 삽화 */
  .pixel-icon { display: flex; justify-content: center; margin-bottom: 16px; }

  /* 타이틀 카드 */
  .title-card { text-align: center; padding-top: 60px; animation: cardIn 0.5s ease; }
  .title-card h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
  .title-card p { font-size: 13px; color: #888; margin-bottom: 40px; }
  .title-card .start-btn { background: #111; color: #fff; border: 2px solid #111; border-radius: 4px; padding: 14px 40px; font-size: 14px; font-family: 'SF Mono', 'Monaco', 'Menlo', monospace; cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 0 #000; }
  .title-card .start-btn:hover { background: #444; border-color: #444; }
  .title-card .start-btn:active { box-shadow: none; transform: translateY(2px); }

  /* Act 전환 카드 */
  .act-card { text-align: center; padding-top: 60px; animation: cardIn 0.5s ease; }
  .act-card .act-label { font-size: 12px; color: #999; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; font-weight: 700; }
  .act-card h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .act-card p { font-size: 14px; color: #555; margin-bottom: 36px; line-height: 1.8; }
  .act-card .start-btn { background: #111; color: #fff; border: 2px solid #111; border-radius: 4px; padding: 12px 36px; font-size: 14px; font-family: 'SF Mono', 'Monaco', 'Menlo', monospace; cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 0 #000; }
  .act-card .start-btn:hover { background: #444; border-color: #444; }
  .act-card .start-btn:active { box-shadow: none; transform: translateY(2px); }

  /* 씬 텍스트 — 카드 느낌 (Classic Mac) */
  .scene-card { background: #fff; border: 2px solid #111; border-radius: 6px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 0 rgba(0,0,0,0.15); animation: cardIn 0.4s ease; }
  @keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .scene-card p { font-size: 16px; line-height: 1.8; margin-bottom: 10px; }
  .scene-card .highlight { font-weight: 700; }
  .scene-card .thought { color: #888; font-style: italic; font-size: 14px; margin-top: 6px; }
  .scene-card .result-good { border-left: 3px solid #111; padding-left: 12px; margin: 12px 0; }
  .scene-card .result-bad { border-left: 3px solid #c44; padding-left: 12px; margin: 12px 0; }
  .scene-card .result-neutral { border-left: 3px solid #999; padding-left: 12px; margin: 12px 0; }

  /* ===== 선택 카드 (통합 — 세로 리스트) ===== */
  .choice-area { margin-top: auto; padding-bottom: 20px; }
  .choice-cards-wrapper { display: flex; flex-direction: column; gap: 10px; }
  .choice-card { background: #fff; border: 2px solid #111; border-radius: 6px; padding: 18px 16px; cursor: pointer; user-select: none; transition: all 0.2s; box-shadow: 0 2px 0 #111; }
  .choice-card:hover { transform: translateX(4px); box-shadow: 0 2px 0 #111, 0 4px 8px rgba(0,0,0,0.1); }
  .choice-card:active { background: #111; color: #fff; box-shadow: none; transform: translateY(2px); }
  .choice-card:active .choice-text { color: #fff; }
  .choice-card .choice-text { font-size: 14px; line-height: 1.6; color: #111; transition: color 0.15s; }

  /* 카드 날아가는 애니메이션 */
  @keyframes flyUp { to { transform: translateY(-100%) scale(0.9); opacity: 0; } }
  .fly-up { animation: flyUp 0.3s ease forwards; }
  @keyframes fadeOut { to { opacity: 0; transform: scale(0.95); } }
  .fade-out { animation: fadeOut 0.25s ease forwards; }

  /* 결과/다음 버튼 */
  .next-area { margin-top: auto; padding-bottom: 20px; }
  .next-btn { background: #111; color: #fff; border: 2px solid #111; border-radius: 4px; padding: 12px; font-size: 14px; font-family: 'SF Mono', 'Monaco', 'Menlo', monospace; cursor: pointer; width: 100%; transition: all 0.2s; box-shadow: 0 2px 0 #000; }
  .next-btn:hover { background: #444; border-color: #444; }
  .next-btn:active { box-shadow: none; transform: translateY(2px); }

  /* 최종 프로필 */
  .profile { text-align: center; padding-top: 32px; animation: cardIn 0.5s ease; }
  .profile h2 { font-size: 17px; margin-bottom: 20px; }
  .profile-bars { margin-bottom: 24px; }
  .profile-bar { margin-bottom: 14px; text-align: left; }
  .profile-bar-label { font-size: 13px; color: #111; margin-bottom: 3px; display: flex; justify-content: space-between; align-items: center; font-weight: 500; }
  .profile-bar-label .label-with-icon { display: flex; align-items: center; gap: 4px; }
  .profile-bar-track { height: 20px; background: #f0f0f0; border-radius: 4px; overflow: hidden; position: relative; border: 2px solid #111; }
  .profile-bar-fill { height: 100%; border-radius: 0; transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); position: absolute; }
  .profile-bar-fill.positive { background: #1a8c1a; left: 50%; }
  .profile-bar-fill.negative { background: #c44; right: 50%; left: auto; }
  .profile-bar-center { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #999; z-index: 1; }
  .profile-comment { font-size: 14px; line-height: 1.8; text-align: left; margin-bottom: 20px; padding: 14px; background: #fff; border-radius: 6px; border: 2px solid #111; box-shadow: 0 2px 0 rgba(0,0,0,0.15); }
  .restart-btn { background: #111; color: #fff; border: 2px solid #111; border-radius: 4px; padding: 12px 28px; font-size: 14px; font-family: 'SF Mono', 'Monaco', 'Menlo', monospace; cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 0 #000; }
  .restart-btn:hover { background: #444; border-color: #444; }
  .restart-btn:active { box-shadow: none; transform: translateY(2px); }

  .hidden { display: none; }

  /* 버전 표시 */
  .version { position: fixed; bottom: 8px; right: 12px; font-size: 10px; color: #bbb; font-family: 'SF Mono', 'Monaco', 'Menlo', monospace; }
</style>
</head>

      art_present_ai: { text: `<p>선생님이 작품을 보여주면서 묻는다:</p><p class="highlight">"이 그림에서 네가 제일 좋아하는 부분이 뭐야?"</p><p>"... 음... 바다요?"</p><p class="thought">대답이 안 나온다. 내가 고른 게 하나도 없으니까.</p>`, choices: [{ text: '다음', next: 'art_after_ai', stats: [0, 0, -1], reasons: ["", "", "설명 불가"], isNext: true }] },
      art_present_self: { text: `<p>선생님이 작품을 보여주면서 묻는다:</p><p class="highlight">"이 그림에서 네가 제일 좋아하는 부분이 뭐야?"</p><p>"여기 노란 우산이요. 그날 진짜 있었거든요."</p><p>선생님: <span class="highlight">"이게 너의 기억이구나."</span></p><p>반 애들이 "어떤 날이었어?" 묻는다.</p>`, choices: [{ text: '다음', next: 'art_after_self', stats: [1, 0, 1], reasons: ["기억 공유", "", "대화 열림"], isNext: true }] },
      art_present_prompt: { text: `<p>선생님이 작품을 보여주면서 묻는다:</p><p class="highlight">"이 그림에서 네가 제일 좋아하는 부분이 뭐야?"</p><p>"회색 바다요. 흐린 날이었는데 그게 좋았어요."</p><p>선생님: <span class="highlight">"보통 행복한 순간을 밝게 그리는데, 회색을 고른 이유가 있구나."</span></p>`, choices: [{ text: '다음', next: 'art_after_prompt', stats: [0, 1, 1], reasons: ["", "도구 조율", "의도 설명"], isNext: true }] },
      art_present_mix: { text: `<p>선생님이 작품을 보여주면서 묻는다:</p><p class="highlight">"이 그림에서 네가 제일 좋아하는 부분이 뭐야?"</p><p>"이 노란 우산이요. 나머지는 참고했는데, 이건 제가 직접 넣었어요."</p><p>선생님: <span class="highlight">"그 우산이 이 그림을 네 그림으로 만들어주는구나."</span></p>`, choices: [{ text: '다음', next: 'art_after_mix', stats: [1, 1, 1], reasons: ["내 것 표현", "협업 인정", "차이 인식"], isNext: true }] },
      art_after_ai: { text: `<p>미술실을 나온다. 친구가 묻는다: "너 그거 AI로 했어?"</p>`, choices: [
        { text: '"응" (솔직)', next: 'art_end_honest', stats: [0, 0, 1], reasons: ["", "", "솔직 인정"] },
        { text: '"아니" (거짓말)', next: 'art_end_lie', stats: [-1, 0, -2], reasons: ["거짓 대응", "", "성찰 회피"] },
        { text: '"...반반?" (애매하게)', next: 'art_end_vague', stats: [0, 0, 0], reasons: ["", "", ""] }
      ]},
      art_after_self: { text: `<p>미술실을 나온다. 친구가 묻는다: "너 그림 되게 솔직하다."</p><div class="result-good"><p>서툴었다. 막대기 사람이었다.</p><p>근데 노란 우산은 내 기억이었고, 그게 대화를 열었다.</p><p class="highlight">잘 그린 그림이 좋은 그림은 아니었다.</p></div>`, choices: [], isEnd: true },
      art_after_prompt: { text: `<p>미술실을 나온다.</p><div class="result-neutral"><p>AI가 만든 건 맞다. 하지만 "회색 바다"를 고른 건 나였다.</p><p>AI는 푸른 바다를 줬고, 내가 그걸 거부하고 회색을 요청했다.</p><p class="highlight">도구가 제안하고, 내가 선택했다.</p></div>`, choices: [], isEnd: true },
      art_after_mix: { text: `<p>미술실을 나온다.</p><div class="result-good"><p>AI가 구도를 잡아줬다. 색감도 참고했다.</p><p>근데 노란 우산 하나가 "내 그림"으로 만들어줬다.</p><p class="highlight">AI의 도움 위에 내 기억 하나. 그게 차이였다.</p></div>`, choices: [], isEnd: true },
      art_end_honest: { text: `<div class="result-neutral"><p>친구: "역시. 근데 좋아하는 부분 말 못한 거 좀 웃겼어."</p><p class="highlight">AI가 그려준 그림에서 내가 좋아하는 부분은 없었다. 내가 고른 게 없으니까.</p></div>`, choices: [], isEnd: true },
      art_end_lie: { text: `<div class="result-bad"><p>친구: "그래? 되게 잘 그렸더라."</p><p class="thought">속이 불편하다.</p><p class="highlight">"잘 그렸다"는 칭찬인데, 받을수록 찝찝하다.</p></div>`, choices: [], isEnd: true },
      art_end_vague: { text: `<div class="result-neutral"><p>친구: "뭐야 반반이 뭐야 ㅋㅋ"</p><p class="thought">웃긴데... 솔직히 나도 모르겠다. 어디까지가 내 그림인지.</p><p class="highlight">그 경계가 애매한 게 바로 이 시대의 질문이다.</p></div>`, choices: [], isEnd: true }
    }
  }
};

// ===== Act 순서 및 상태 =====
const actOrder = ['homework', 'book', 'art'];
let curActIndex = 0;
let curScenario = null, curNode = null;
let stats = { c: 0, f: 0, r: 0 };
let round = 0, totalRounds = 4;

// ===== DOM 요소 =====
const screen = document.getElementById('screen');
const statsBar = document.getElementById('statsBar');
const roundInd = document.getElementById('roundIndicator');
const actInd = document.getElementById('actIndicator');
const statEls = {
  c: { wrap: 'statCenterWrap', num: 'statCenterNum', fill: 'statCenterFill', delta: 'statCenterDelta' },
  f: { wrap: 'statFusionWrap', num: 'statFusionNum', fill: 'statFusionFill', delta: 'statFusionDelta' },
  r: { wrap: 'statReflectWrap', num: 'statReflectNum', fill: 'statReflectFill', delta: 'statReflectDelta' }
};

// ===== 초기화 =====
function init() {
  statsBar.classList.add('hidden');
  roundInd.classList.add('hidden');
  actInd.classList.add('hidden');
  stats = { c: 0, f: 0, r: 0 };
  curActIndex = 0;
  curScenario = null;
  curNode = null;
  showTitleCard();
}

// ===== 타이틀 카드 =====
function showTitleCard() {
  screen.innerHTML = `
    <div class="title-card">
      <div class="pixel-icon">${PIXEL_ICONS.title}</div>
      <h1>AI 리터러시 — 위임 판단력</h1>
      <p>세 가지 상황에서 너의 선택을 따라간다</p>
      <button class="start-btn" onclick="startFirstAct()">시작하기</button>
    </div>`;
}

// ===== Act 시작 =====
function startFirstAct() {
  curActIndex = 0;
  startAct(actOrder[0]);
}

function startAct(key) {
  curScenario = scenarios[key];
  if (!curScenario) return;
  round = 0;
  totalRounds = curScenario.rounds;
  statsBar.classList.remove('hidden');
  roundInd.classList.remove('hidden');
  actInd.classList.remove('hidden');
  renderStats(0, 0, 0);
  renderActIndicator();
  renderRounds();
  showNode('start');
}

// ===== Act 전환 카드 =====
function showActTransition() {
  const key = actOrder[curActIndex];
  const sc = scenarios[key];
  if (!sc) return;

  // 각 Act에 맞는 픽셀 아이콘 선택
  let icon = '';
  if (curActIndex === 0) icon = PIXEL_ICONS.pencil;
  else if (curActIndex === 1) icon = PIXEL_ICONS.book;
  else if (curActIndex === 2) icon = PIXEL_ICONS.palette;

  screen.innerHTML = `
    <div class="act-card">
      <div class="pixel-icon">${icon}</div>
      <div class="act-label">Act ${curActIndex + 1} / ${actOrder.length}</div>
      <h2>${sc.actLabel}</h2>
      <p>${sc.actDesc.replace(/\n/g, '<br>')}</p>
      <button class="start-btn" onclick="startAct('${key}')">시작</button>
    </div>`;
}

// ===== 노드 표시 =====
function showNode(id) {
  if (!curScenario) return;
  curNode = curScenario.nodes[id];
  if (!curNode) return;

  let h = `<div class="scene-card">${curNode.text}</div>`;

  if (curNode.isEnd) {
    // Act 종료 — 마지막 Act인지 확인
    const isLastAct = curActIndex >= actOrder.length - 1;
    if (isLastAct) {
      // 최종 프로필 (3 Act 합산)
      h += `<div class="profile">
        <div class="pixel-icon">${PIXEL_ICONS.profile}</div>
        <h2>나의 프로필</h2><div class="profile-bars">
        ${profBar('center', '중심잡기', stats.c)}${profBar('fusion', '융합하기', stats.f)}${profBar('reflect', '성찰하기', stats.r)}
      </div><div class="profile-comment">${profComment()}</div>
      <button class="restart-btn" onclick="init()">처음부터 다시</button></div>`;
      screen.innerHTML = h;
    } else {
      // 중간 Act — 결과 + "다음 상황으로" 버튼
      h += `<div class="next-area"><button class="next-btn" onclick="advanceAct()">다음 상황으로</button></div>`;
      screen.innerHTML = h;
    }
  } else if (curNode.choices.length === 1 && curNode.choices[0].isNext) {
    // 결과 텍스트 + "다음" 버튼
    h += `<div class="next-area"><button class="next-btn" onclick="choose(0)">다음</button></div>`;
    screen.innerHTML = h;
  } else if (curNode.choices.length >= 2) {
    // ===== 모든 선택지: 통일된 세로 카드 리스트 =====
    h += buildChoiceCards(curNode.choices);
    screen.innerHTML = h;
    initChoiceCards();
  } else {
    screen.innerHTML = h;
  }
  window.scrollTo(0, 0);
}

// ===== Act 진행 =====
function advanceAct() {
  curActIndex++;
  if (curActIndex < actOrder.length) {
    showActTransition();
  }
}

// ===== 통합 선택 카드 빌드 (세로 카드 리스트) =====
function buildChoiceCards(choices) {
  let h = '<div class="choice-area"><div class="choice-cards-wrapper" id="choiceArea">';
  choices.forEach((ch, i) => {
    h += `<div class="choice-card" data-index="${i}">
      <div class="choice-text">${ch.text}</div>
    </div>`;
  });
  h += '</div></div>';
  return h;
}

// ===== 선택 카드 탭 처리 =====
function initChoiceCards() {
  const area = document.getElementById('choiceArea');
  if (!area) return;
  const cards = area.querySelectorAll('.choice-card');
  cards.forEach(card => {
    card.addEventListener('click', () => {
      const idx = parseInt(card.dataset.index);
      // 선택된 카드 날아가기
      card.classList.add('fly-up');
      // 나머지 카드 페이드아웃
      cards.forEach((c, i) => { if (parseInt(c.dataset.index) !== idx) c.classList.add('fade-out'); });
      setTimeout(() => choose(idx), 300);
    });
  });
}

// ===== 스탯 프리뷰 텍스트 =====
function previewText(s) {
  const names = ['중심', '융합', '성찰'];
  return s.map((v, i) => v > 0 ? `${names[i]}+` : v < 0 ? `${names[i]}-` : '').filter(Boolean).join(' ');
}

// ===== 스탯 프리뷰 하이라이트 =====
function previewStats(s) {
  const keys = ['c', 'f', 'r'];
  keys.forEach((k, i) => {
    const wrap = document.getElementById(statEls[k].wrap);
    wrap.classList.remove('preview-up', 'preview-down');
    if (s[i] > 0) wrap.classList.add('preview-up');
    else if (s[i] < 0) wrap.classList.add('preview-down');
  });
}

function clearPreview() {
  ['c', 'f', 'r'].forEach(k => {
    document.getElementById(statEls[k].wrap).classList.remove('preview-up', 'preview-down');
  });
}

// ===== 선택 처리 =====
function choose(i) {
  if (!curNode || !curNode.choices[i]) return;
  const ch = curNode.choices[i];
  clearPreview();
  const reasons = ch.reasons || ['', '', ''];
  applyStats(ch.stats[0], ch.stats[1], ch.stats[2], reasons);
  if (!ch.isNext) round++;
  renderRounds();
  setTimeout(() => showNode(ch.next), 400);
}

// ===== 스탯 적용 =====
function applyStats(dc, df, dr, reasons) {
  stats.c += dc; stats.f += df; stats.r += dr;
  renderStats(dc, df, dr, reasons);
}

// ===== 스탯 렌더링 (v0.3.3: pulse + flash + float reason) =====
function renderStats(dc, df, dr, reasons) {
  const deltas = { c: dc, f: df, r: dr };
  const reasonArr = reasons || ['', '', ''];
  const keys = ['c', 'f', 'r'];

  keys.forEach((k, idx) => {
    const el = statEls[k], v = stats[k], d = deltas[k];
    const reason = reasonArr[idx] || '';
    const numEl = document.getElementById(el.num);
    const fillEl = document.getElementById(el.fill);
    const deltaEl = document.getElementById(el.delta);
    const wrapEl = document.getElementById(el.wrap);

    numEl.textContent = (v > 0 ? '+' : '') + v;
    numEl.className = 'stat-num ' + (v > 0 ? 'pos' : v < 0 ? 'neg' : 'zero');

    // 게이지 범위: Act 합산이므로 maxV를 넓힘
    const maxV = 12, pct = Math.min(Math.abs(v) / maxV * 50, 50);
    fillEl.className = 'stat-gauge-fill ' + (v >= 0 ? 'pos' : 'neg');
    if (v >= 0) { fillEl.style.left = '50%'; fillEl.style.right = 'auto'; fillEl.style.width = pct + '%'; }
    else { fillEl.style.right = '50%'; fillEl.style.left = 'auto'; fillEl.style.width = pct + '%'; }

    if (d !== 0) {
      // 숫자 pulse
      numEl.classList.remove('pulsing');
      void numEl.offsetWidth; // reflow
      numEl.classList.add('pulsing');

      // reason 텍스트 떠오름
      const sign = d > 0 ? '+' : '';
      const reasonText = reason ? ` ${reason}` : '';
      deltaEl.textContent = `${sign}${d}${reasonText}`;
      deltaEl.className = 'stat-change-indicator show ' + (d > 0 ? 'up' : 'down');

      // 블록 배경 flash
      wrapEl.classList.remove('flash-up', 'flash-down', 'shaking');
      void wrapEl.offsetWidth; // reflow
      wrapEl.classList.add(d > 0 ? 'flash-up' : 'flash-down');
      wrapEl.classList.add('shaking');

      setTimeout(() => {
        deltaEl.className = 'stat-change-indicator';
        wrapEl.classList.remove('shaking', 'flash-up', 'flash-down');
        numEl.classList.remove('pulsing');
      }, 1800);
    }
  });
}

// ===== Act 인디케이터 =====
function renderActIndicator() {
  actInd.textContent = `Act ${curActIndex + 1} / ${actOrder.length}`;
}

// ===== 라운드 dot =====
function renderRounds() {
  let h = '';
  for (let i = 0; i < totalRounds; i++) {
    h += `<div class="round-dot ${i < round ? 'done' : i === round ? 'active' : ''}"></div>`;
  }
  roundInd.innerHTML = h;
}

// ===== 프로필 바 (SVG 아이콘 포함) =====
function profBar(iconKey, label, v) {
  const maxV = 12, pct = Math.min(Math.abs(v) / maxV * 50, 50);
  const cls = v >= 0 ? 'positive' : 'negative';
  const disp = (v > 0 ? '+' : '') + v;
  return `<div class="profile-bar"><div class="profile-bar-label"><span class="label-with-icon">${ICONS[iconKey]}${label}</span><span>${disp}</span></div>
    <div class="profile-bar-track"><div class="profile-bar-center"></div>
    <div class="profile-bar-fill ${cls}" style="width:${pct}%"></div></div></div>`;
}

// ===== 최종 프로필 코멘트 (3 Act 합산 기준, 범위 -24~+24) =====
function profComment() {
  const t = stats.c + stats.f + stats.r;
  if (t >= 18) return "세 가지 상황 모두에서, 너는 AI를 도구로 쓰되 판단은 네가 했다. 시간이 걸려도 네 것으로 만들었다.";
  if (t >= 10) return "AI의 도움을 받으면서도 자기 기준을 유지하려고 했다. 때로 흔들렸지만, 균형을 찾아가는 중이다.";
  if (t >= 2) return "편한 쪽을 고르기도 하고, 직접 하기도 했다. 일관되진 않지만 — 그 고민 자체가 시작이다.";
  if (t >= -6) return "편한 쪽을 많이 골랐다. 틀린 건 아니다. 다만 — 발표 때, 설명할 수 있었어?";
  return "대부분 AI에게 맡겼다. 빠르고 편했을 거다. 근데 세 번의 상황에서, 네가 직접 고른 건 뭐였어?";
}

// ===== DOMContentLoaded =====
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
