<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 리터러시 — 위임 판단력</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Monaco', 'Menlo', monospace; background: #fff; color: #111; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
  .container { max-width: 480px; width: 100%; padding: 24px 20px; min-height: 100vh; display: flex; flex-direction: column; }

  /* ===== SVG 아이콘 ===== */
  .icon-svg { display: inline-block; vertical-align: middle; margin-right: 4px; width: 20px; height: 20px; }

  /* ===== 스탯 바 ===== */
  .stats-bar { display: flex; gap: 12px; margin-bottom: 20px; padding: 14px 16px; border: 2px solid #111; border-radius: 6px; background: #fff; box-shadow: 0 2px 0 #111; transition: all 0.3s; }
  .stat { flex: 1; }
  .stat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .stat-label { font-size: 13px; color: #111; font-weight: 500; letter-spacing: 0.5px; display: flex; align-items: center; }
  .stat-num { font-size: 14px; font-weight: 700; transition: all 0.4s; }
  .stat-num.pos { color: #111; }
  .stat-num.neg { color: #c44; }
  .stat-num.zero { color: #bbb; }
  .stat-gauge { height: 10px; background: #e8e8e8; border-radius: 2px; overflow: visible; position: relative; border: 1px solid #ccc; }
  .stat-gauge-center { position: absolute; left: 50%; top: -1px; width: 2px; height: 12px; background: #999; border-radius: 1px; z-index: 2; }
  .stat-gauge-fill { height: 100%; border-radius: 1px; position: absolute; top: 0; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .stat-gauge-fill.pos { background: #111; left: 50%; }
  .stat-gauge-fill.neg { background: #c44; right: 50%; }
  .stat-change-indicator { font-size: 11px; font-weight: 700; position: absolute; top: -18px; transition: all 0.3s; opacity: 0; white-space: nowrap; }
  .stat-change-indicator.show { opacity: 1; animation: changePopup 1.5s ease forwards; }
  .stat-change-indicator.up { color: #111; }
  .stat-change-indicator.down { color: #c44; }
  @keyframes changePopup { 0% { opacity: 0; transform: translateY(4px); } 15% { opacity: 1; transform: translateY(0); } 75% { opacity: 1; } 100% { opacity: 0; transform: translateY(-8px); } }

  /* 스탯 흔들림 */
  @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-3px); } 40% { transform: translateX(3px); } 60% { transform: translateX(-2px); } 80% { transform: translateX(2px); } }
  .stat.shaking { animation: shake 0.4s ease; }

  /* 호버 프리뷰 */
  .stat.preview-up .stat-gauge { background: rgba(17,17,17,0.15); }
  .stat.preview-up .stat-label { color: #111; font-weight: 700; }
  .stat.preview-down .stat-gauge { background: rgba(204,68,68,0.15); }
  .stat.preview-down .stat-label { color: #c44; }

  /* Act + 라운드 인디케이터 */
  .act-indicator { text-align: center; font-size: 13px; color: #111; margin-bottom: 6px; font-weight: 700; letter-spacing: 2px; font-family: 'SF Mono', 'Monaco', 'Menlo', monospace; }
  .round-indicator { display: flex; gap: 8px; margin-bottom: 16px; justify-content: center; }
  .round-dot { width: 12px; height: 12px; border-radius: 50%; background: #e0e0e0; border: 2px solid #ccc; transition: all 0.3s; }
  .round-dot.active { background: #111; border-color: #111; transform: scale(1.2); }
  .round-dot.done { background: #888; border-color: #888; }

  /* 화면 */
  .screen { flex: 1; display: flex; flex-direction: column; }

  /* 타이틀 카드 */
  .title-card { text-align: center; padding-top: 80px; animation: cardIn 0.5s ease; }
  .title-card h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
  .title-card p { font-size: 13px; color: #888; margin-bottom: 40px; }
  .title-card .start-btn { background: #111; color: #fff; border: 2px solid #111; border-radius: 4px; padding: 14px 40px; font-size: 14px; font-family: 'SF Mono', 'Monaco', 'Menlo', monospace; cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 0 #000; }
  .title-card .start-btn:hover { background: #444; border-color: #444; }
  .title-card .start-btn:active { box-shadow: none; transform: translateY(2px); }

  /* Act 전환 카드 */
  .act-card { text-align: center; padding-top: 80px; animation: cardIn 0.5s ease; }
  .act-card .act-label { font-size: 12px; color: #999; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; font-weight: 700; }
  .act-card h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .act-card p { font-size: 14px; color: #555; margin-bottom: 36px; line-height: 1.8; }
  .act-card .start-btn { background: #111; color: #fff; border: 2px solid #111; border-radius: 4px; padding: 12px 36px; font-size: 14px; font-family: 'SF Mono', 'Monaco', 'Menlo', monospace; cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 0 #000; }
  .act-card .start-btn:hover { background: #444; border-color: #444; }
  .act-card .start-btn:active { box-shadow: none; transform: translateY(2px); }

  /* 씬 텍스트 — 카드 느낌 (Classic Mac) */
  .scene-card { background: #fff; border: 2px solid #111; border-radius: 6px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 0 rgba(0,0,0,0.15); animation: cardIn 0.4s ease; }
  @keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .scene-card p { font-size: 16px; line-height: 1.8; margin-bottom: 10px; }
  .scene-card .highlight { font-weight: 700; }
  .scene-card .thought { color: #888; font-style: italic; font-size: 14px; margin-top: 6px; }
  .scene-card .result-good { border-left: 3px solid #111; padding-left: 12px; margin: 12px 0; }
  .scene-card .result-bad { border-left: 3px solid #c44; padding-left: 12px; margin: 12px 0; }
  .scene-card .result-neutral { border-left: 3px solid #999; padding-left: 12px; margin: 12px 0; }

  /* ===== 스와이프 카드 (2지선다 — Reigns 스타일) ===== */
  .swipe-area { position: relative; display: flex; justify-content: center; align-items: center; margin-top: auto; padding-bottom: 20px; min-height: 220px; perspective: 800px; }
  .swipe-card { position: relative; width: 90%; max-width: 360px; background: #fff; border: 2px solid #111; border-radius: 12px; padding: 20px; cursor: grab; user-select: none; touch-action: none; transition: box-shadow 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.1); min-height: 180px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
  .swipe-card:active { cursor: grabbing; }

  /* 카드 위 좌/우 선택지 텍스트 (Reigns 스타일) */
  .swipe-choice-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; pointer-events: none; padding: 16px; }
  .swipe-choice-left, .swipe-choice-right { flex: 1; display: flex; align-items: center; font-size: 13px; line-height: 1.5; font-weight: 600; opacity: 0; transition: opacity 0.15s; font-family: 'SF Mono', 'Monaco', 'Menlo', monospace; }
  .swipe-choice-left { justify-content: flex-start; color: #c44; padding-right: 20px; text-align: left; }
  .swipe-choice-right { justify-content: flex-end; color: #111; padding-left: 20px; text-align: right; }

  .swipe-card .card-drag-hint { font-size: 12px; color: #bbb; text-align: center; letter-spacing: 1px; margin-top: 8px; }
  .swipe-card .card-icon { font-size: 28px; color: #ccc; margin-bottom: 8px; }

  /* 스탯 프리뷰 (스와이프 중) */
  .swipe-preview { position: absolute; bottom: -28px; font-size: 11px; color: #999; letter-spacing: 0.3px; opacity: 0; transition: opacity 0.15s; pointer-events: none; font-weight: 600; }
  .swipe-preview.left { left: 0; }
  .swipe-preview.right { right: 0; text-align: right; }

  /* ===== 카드 스택 (3지선다 — 겹쳐 쌓인 카드) ===== */
  .stack-area { margin-top: auto; padding-bottom: 20px; }
  .stack-cards-wrapper { display: flex; flex-direction: column; gap: 10px; }
  .stack-card { background: #fff; border: 2px solid #111; border-radius: 6px; padding: 18px 16px; cursor: pointer; user-select: none; transition: all 0.2s; box-shadow: 0 2px 0 #111; }
  .stack-card:hover { transform: translateX(4px); box-shadow: 0 2px 0 #111, 0 4px 8px rgba(0,0,0,0.1); }
  .stack-card:active { background: #111; color: #fff; box-shadow: none; transform: translateY(2px); }
  .stack-card:active .stack-text { color: #fff; }
  .stack-card .stack-text { font-size: 14px; line-height: 1.6; color: #111; transition: color 0.15s; }

  /* 카드 날아가는 애니메이션 */
  @keyframes flyLeft { to { transform: translateX(-120%) rotate(-20deg); opacity: 0; } }
  @keyframes flyRight { to { transform: translateX(120%) rotate(20deg); opacity: 0; } }
  @keyframes flyUp { to { transform: translateY(-100%) scale(0.9); opacity: 0; } }
  .fly-left { animation: flyLeft 0.35s ease forwards; }
  .fly-right { animation: flyRight 0.35s ease forwards; }
  .fly-up { animation: flyUp 0.3s ease forwards; }
  @keyframes fadeOut { to { opacity: 0; transform: scale(0.95); } }
  .fade-out { animation: fadeOut 0.25s ease forwards; }

  /* 결과/다음 버튼 */
  .next-area { margin-top: auto; padding-bottom: 20px; }
  .next-btn { background: #111; color: #fff; border: 2px solid #111; border-radius: 4px; padding: 12px; font-size: 14px; font-family: 'SF Mono', 'Monaco', 'Menlo', monospace; cursor: pointer; width: 100%; transition: all 0.2s; box-shadow: 0 2px 0 #000; }
  .next-btn:hover { background: #444; border-color: #444; }
  .next-btn:active { box-shadow: none; transform: translateY(2px); }

  /* 최종 프로필 */
  .profile { text-align: center; padding-top: 32px; animation: cardIn 0.5s ease; }
  .profile h2 { font-size: 17px; margin-bottom: 20px; }
  .profile-bars { margin-bottom: 24px; }
  .profile-bar { margin-bottom: 14px; text-align: left; }
  .profile-bar-label { font-size: 13px; color: #111; margin-bottom: 3px; display: flex; justify-content: space-between; align-items: center; font-weight: 500; }
  .profile-bar-label .label-with-icon { display: flex; align-items: center; gap: 4px; }
  .profile-bar-track { height: 20px; background: #f0f0f0; border-radius: 4px; overflow: hidden; position: relative; border: 2px solid #111; }
  .profile-bar-fill { height: 100%; border-radius: 0; transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); position: absolute; }
  .profile-bar-fill.positive { background: #111; left: 50%; }
  .profile-bar-fill.negative { background: #c44; right: 50%; left: auto; }
  .profile-bar-center { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #999; z-index: 1; }
  .profile-comment { font-size: 14px; line-height: 1.8; text-align: left; margin-bottom: 20px; padding: 14px; background: #fff; border-radius: 6px; border: 2px solid #111; box-shadow: 0 2px 0 rgba(0,0,0,0.15); }
  .restart-btn { background: #111; color: #fff; border: 2px solid #111; border-radius: 4px; padding: 12px 28px; font-size: 14px; font-family: 'SF Mono', 'Monaco', 'Menlo', monospace; cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 0 #000; }
  .restart-btn:hover { background: #444; border-color: #444; }
  .restart-btn:active { box-shadow: none; transform: translateY(2px); }

  .hidden { display: none; }

  /* 버전 표시 */
  .version { position: fixed; bottom: 8px; right: 12px; font-size: 10px; color: #bbb; font-family: 'SF Mono', 'Monaco', 'Menlo', monospace; }
</style>
</head>
<body>
<div class="container">
  <!-- 스탯 바 -->
  <div class="stats-bar hidden" id="statsBar">
    <div class="stat" id="statCenterWrap">
      <div class="stat-header">
        <span class="stat-label"><svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2"><circle cx="12" cy="5" r="3"/><line x1="12" y1="8" x2="12" y2="21"/><path d="M4 15c0-4.4 3.6-8 8-8s8 3.6 8 8"/><line x1="8" y1="21" x2="16" y2="21"/></svg>중심잡기</span>
        <span class="stat-num zero" id="statCenterNum">0</span>
      </div>
      <div class="stat-gauge">
        <div class="stat-gauge-center"></div>
        <div class="stat-gauge-fill" id="statCenterFill"></div>
        <div class="stat-change-indicator" id="statCenterDelta"></div>
      </div>
    </div>
    <div class="stat" id="statFusionWrap">
      <div class="stat-header">
        <span class="stat-label"><svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.5.5l2-2a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7.5-.5l-2 2a5 5 0 0 0 7 7l1-1"/></svg>융합하기</span>
        <span class="stat-num zero" id="statFusionNum">0</span>
      </div>
      <div class="stat-gauge">
        <div class="stat-gauge-center"></div>
        <div class="stat-gauge-fill" id="statFusionFill"></div>
        <div class="stat-change-indicator" id="statFusionDelta"></div>
      </div>
    </div>
    <div class="stat" id="statReflectWrap">
      <div class="stat-header">
        <span class="stat-label"><svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>성찰하기</span>
        <span class="stat-num zero" id="statReflectNum">0</span>
      </div>
      <div class="stat-gauge">
        <div class="stat-gauge-center"></div>
        <div class="stat-gauge-fill" id="statReflectFill"></div>
        <div class="stat-change-indicator" id="statReflectDelta"></div>
      </div>
    </div>
  </div>
  <!-- Act + 라운드 인디케이터 -->
  <div class="act-indicator hidden" id="actIndicator"></div>
  <div class="round-indicator hidden" id="roundIndicator"></div>
  <!-- 메인 화면 -->
  <div class="screen" id="screen"></div>
</div>
<div class="version">v0.3.2 — no stat preview</div>

<script>
// ===== SVG 아이콘 인라인 =====
const ICONS = {
  center: '<svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="3"/><line x1="12" y1="8" x2="12" y2="21"/><path d="M4 15c0-4.4 3.6-8 8-8s8 3.6 8 8"/><line x1="8" y1="21" x2="16" y2="21"/></svg>',
  fusion: '<svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.5.5l2-2a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7.5-.5l-2 2a5 5 0 0 0 7 7l1-1"/></svg>',
  reflect: '<svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
};

// ===== 시나리오 데이터 (v0.2 구조 유지 + reasons 추가) =====
const scenarios = {
  homework: {
    title: "숙제 + ChatGPT",
    desc: "내일까지 숙제. 시작도 못했다.",
    actLabel: "Act 1 — 숙제",
    actDesc: "사회 숙제가 내일까지다.\nChatGPT가 눈에 들어온다.",
    rounds: 4,
    nodes: {
      start: {
        text: `<p>사회 숙제가 <span class="highlight">내일까지</span>다.</p><p>"기후변화가 우리 생활에 미치는 영향" A4 1장.</p><p>시작도 못했다.</p>`,
        choices: [
          { text: 'ChatGPT에 "기후변화가 우리 생활에 미치는 영향 써줘"라고 친다', next: 'hw_ai_full', stats: [-1, 0, -1], reasons: ["통째 위임", "", "확인 없이"] },
          { text: '일단 내가 아는 거부터 끄적인다', next: 'hw_self', stats: [1, -1, 0], reasons: ["직접 시작", "도구 안 씀", ""] },
          { text: 'ChatGPT에 "기후변화 관련 키워드 좀 알려줘"라고 친다', next: 'hw_ai_keyword', stats: [0, 1, 0], reasons: ["", "도구 활용", ""] }
        ]
      },
      hw_ai_full: {
        text: `<p>깔끔한 글이 나왔다. 서론-본론-결론.</p><p>"해수면 상승률 연 3.2mm", "식량 생산 23% 감소 전망" 같은 수치도 들어 있다.</p><p class="thought">꽤 괜찮은데?</p>`,
        choices: [
          { text: '그대로 제출한다', next: 'hw_present_blind', stats: [-2, 0, -2], reasons: ["판단 없이", "", "확인 안 함"] },
          { text: '한번 읽어보고 이상한 데 없는지 확인한다', next: 'hw_present_check', stats: [0, 1, 1], reasons: ["", "검증 활용", "내용 확인"] },
          { text: '내 말로 고쳐서 쓴다 (시간 더 걸림)', next: 'hw_present_rewrite', stats: [1, 1, 1], reasons: ["내 말로", "도구+나", "재해석"] }
        ]
      },
      hw_self: {
        text: `<p>30분 썼는데 반 장도 안 됐다.</p><p>아는 게 별로 없다. 짜증난다.</p><p class="thought">다른 애들은 다 했을 텐데...</p>`,
        choices: [
          { text: '"에이 몰라" 하고 ChatGPT를 켠다', next: 'hw_ai_full', stats: [-1, 0, -1], reasons: ["포기 전환", "", "확인 없이"] },
          { text: '부족해도 이대로 낸다', next: 'hw_present_honest', stats: [1, -1, 1], reasons: ["솔직 제출", "도구 안 씀", "자기 인정"] },
          { text: '모르는 부분만 ChatGPT에 물어본다', next: 'hw_present_rewrite', stats: [0, 2, 1], reasons: ["", "부분 활용", "보완 판단"] }
        ]
      },
      hw_ai_keyword: {
        text: `<p>ChatGPT가 키워드 10개를 알려줬다.</p><p>"해수면 상승, 극단적 기상현상, 식량 안보, 생태계 변화..."</p><p class="thought">방향이 잡힌다.</p>`,
        choices: [
          { text: '키워드를 바탕으로 직접 쓴다', next: 'hw_present_rewrite', stats: [1, 1, 1], reasons: ["직접 작성", "방향 활용", "자기 정리"] },
          { text: '"이 키워드로 글 써줘"라고 다시 시킨다', next: 'hw_ai_full', stats: [-1, 0, -1], reasons: ["통째 위임", "", "확인 없이"] }
        ]
      },
      hw_present_blind: {
        text: `<p>수업 시간. 선생님이 발표시킨다.</p><p class="highlight">"여기 '해수면 상승 연 3.2mm'라고 썼는데, 이 수치 출처가 뭐야?"</p><p>...</p><p class="thought">모른다. AI가 쓴 거니까.</p>`,
        choices: [
          { text: '"인터넷에서 봤어요" (얼버무린다)', next: 'hw_end_fake', stats: [-1, 0, -2], reasons: ["거짓 대응", "", "성찰 회피"] },
          { text: '"솔직히 AI가 쓴 거라 모르겠어요"', next: 'hw_end_honest_late', stats: [1, 0, 2], reasons: ["솔직 인정", "", "뒤늦은 성찰"] }
        ]

      hw_present_check: { text: `<p>수업 시간. 선생님이 발표시킨다.</p><p>"해수면 상승 3.2mm" — 어제 확인해봤더니 실제 수치였다. 설명도 된다.</p><p class="thought">확인하길 잘했다.</p>`, choices: [{ text: '다음', next: 'hw_end_check', stats: [0, 0, 1], reasons: ["", "", "확인 보람"], isNext: true }] },

      art_after_self: { text: `<p>미술실을 나온다. 친구가 묻는다: "너 그림 되게 솔직하다."</p><div class="result-good"><p>서툴었다. 막대기 사람이었다.</p><p>근데 노란 우산은 내 기억이었고, 그게 대화를 열었다.</p><p class="highlight">잘 그린 그림이 좋은 그림은 아니었다.</p></div>`, choices: [], isEnd: true },
      art_after_prompt: { text: `<p>미술실을 나온다.</p><div class="result-neutral"><p>AI가 만든 건 맞다. 하지만 "회색 바다"를 고른 건 나였다.</p><p>AI는 푸른 바다를 줬고, 내가 그걸 거부하고 회색을 요청했다.</p><p class="highlight">도구가 제안하고, 내가 선택했다.</p></div>`, choices: [], isEnd: true },
      art_after_mix: { text: `<p>미술실을 나온다.</p><div class="result-good"><p>AI가 구도를 잡아줬다. 색감도 참고했다.</p><p>근데 노란 우산 하나가 "내 그림"으로 만들어줬다.</p><p class="highlight">AI의 도움 위에 내 기억 하나. 그게 차이였다.</p></div>`, choices: [], isEnd: true },
      art_end_honest: { text: `<div class="result-neutral"><p>친구: "역시. 근데 좋아하는 부분 말 못한 거 좀 웃겼어."</p><p class="highlight">AI가 그려준 그림에서 내가 좋아하는 부분은 없었다. 내가 고른 게 없으니까.</p></div>`, choices: [], isEnd: true },
      art_end_lie: { text: `<div class="result-bad"><p>친구: "그래? 되게 잘 그렸더라."</p><p class="thought">속이 불편하다.</p><p class="highlight">"잘 그렸다"는 칭찬인데, 받을수록 찝찝하다.</p></div>`, choices: [], isEnd: true },
      art_end_vague: { text: `<div class="result-neutral"><p>친구: "뭐야 반반이 뭐야 ㅋㅋ"</p><p class="thought">웃긴데... 솔직히 나도 모르겠다. 어디까지가 내 그림인지.</p><p class="highlight">그 경계가 애매한 게 바로 이 시대의 질문이다.</p></div>`, choices: [], isEnd: true }
    }
  }
};

// ===== Act 순서 및 상태 =====
const actOrder = ['homework', 'book', 'art'];
let curActIndex = 0;
let curScenario = null, curNode = null;
let stats = { c: 0, f: 0, r: 0 };
let round = 0, totalRounds = 4;

// ===== DOM 요소 =====
const screen = document.getElementById('screen');
const statsBar = document.getElementById('statsBar');
const roundInd = document.getElementById('roundIndicator');
const actInd = document.getElementById('actIndicator');
const statEls = {
  c: { wrap: 'statCenterWrap', num: 'statCenterNum', fill: 'statCenterFill', delta: 'statCenterDelta' },
  f: { wrap: 'statFusionWrap', num: 'statFusionNum', fill: 'statFusionFill', delta: 'statFusionDelta' },
  r: { wrap: 'statReflectWrap', num: 'statReflectNum', fill: 'statReflectFill', delta: 'statReflectDelta' }
};

// ===== 초기화 =====
function init() {
  statsBar.classList.add('hidden');
  roundInd.classList.add('hidden');
  actInd.classList.add('hidden');
  stats = { c: 0, f: 0, r: 0 };
  curActIndex = 0;
  showTitleCard();
}

// ===== 타이틀 카드 =====
function showTitleCard() {
  screen.innerHTML = `
    <div class="title-card">
      <h1>AI 리터러시 — 위임 판단력</h1>
      <p>세 가지 상황에서 너의 선택을 따라간다</p>
      <button class="start-btn" onclick="startFirstAct()">시작하기</button>
    </div>`;
}

// ===== Act 시작 =====
function startFirstAct() {
  curActIndex = 0;
  startAct(actOrder[0]);
}

function startAct(key) {
  curScenario = scenarios[key];
  round = 0;
  totalRounds = curScenario.rounds;
  statsBar.classList.remove('hidden');
  roundInd.classList.remove('hidden');
  actInd.classList.remove('hidden');
  renderStats(0, 0, 0);
  renderActIndicator();
  renderRounds();
  showNode('start');
}

// ===== Act 전환 카드 =====
function showActTransition() {
  const key = actOrder[curActIndex];
  const sc = scenarios[key];
  screen.innerHTML = `
    <div class="act-card">
      <div class="act-label">Act ${curActIndex + 1} / ${actOrder.length}</div>
      <h2>${sc.actLabel}</h2>
      <p>${sc.actDesc.replace(/\n/g, '<br>')}</p>
      <button class="start-btn" onclick="startAct('${key}')">시작</button>
    </div>`;
}

// ===== 노드 표시 =====
function showNode(id) {
  curNode = curScenario.nodes[id];
  if (!curNode) return;

  let h = `<div class="scene-card">${curNode.text}</div>`;

  if (curNode.isEnd) {
    // Act 종료 — 마지막 Act인지 확인
    const isLastAct = curActIndex >= actOrder.length - 1;
    if (isLastAct) {
      // 최종 프로필 (3 Act 합산)
      h += `<div class="profile"><h2>나의 프로필</h2><div class="profile-bars">
        ${profBar('center', '중심잡기', stats.c)}${profBar('fusion', '융합하기', stats.f)}${profBar('reflect', '성찰하기', stats.r)}
      </div><div class="profile-comment">${profComment()}</div>
      <button class="restart-btn" onclick="init()">처음부터 다시</button></div>`;
      screen.innerHTML = h;
    } else {
      // 중간 Act — 결과 + "다음 상황으로" 버튼
      h += `<div class="next-area"><button class="next-btn" onclick="advanceAct()">다음 상황으로</button></div>`;
      screen.innerHTML = h;
    }
  } else if (curNode.choices.length === 1 && curNode.choices[0].isNext) {
    // 결과 텍스트 + "다음" 버튼 (스와이프 불필요)
    h += `<div class="next-area"><button class="next-btn" onclick="choose(0)">다음</button></div>`;
    screen.innerHTML = h;
  } else if (curNode.choices.length === 2 && !curNode.choices[0].isNext) {
    // ===== 2지선다: Reigns 스타일 스와이프 카드 =====
    h += buildSwipeCard(curNode.choices);
    screen.innerHTML = h;
    initSwipe();
  } else if (curNode.choices.length === 3 && !curNode.choices[0].isNext) {
    // ===== 3지선다: 카드 스택 =====
    h += buildStackCards(curNode.choices);
    screen.innerHTML = h;
    initStack();
  } else {
    // fallback
    h += '<div class="stack-area"><div class="stack-cards-wrapper">';
    curNode.choices.forEach((ch, i) => {
      const preview = previewText(ch.stats);
      h += `<button class="stack-card" style="position:relative;" onclick="choose(${i})"><div class="stack-text">${ch.text}</div>${preview ? `<div class="stack-preview">${preview}</div>` : ''}</button>`;
    });
    h += '</div></div>';
    screen.innerHTML = h;
  }
  window.scrollTo(0, 0);
}

// ===== Act 진행 =====
function advanceAct() {
  curActIndex++;
  if (curActIndex < actOrder.length) {
    showActTransition();
  }
}

// ===== 2지선다 Reigns 스타일 스와이프 카드 빌드 =====
function buildSwipeCard(choices) {
  return `
    <div class="swipe-area" id="swipeArea">
      <div class="swipe-card" id="swipeCard">
        <div class="swipe-choice-overlay">
          <div class="swipe-choice-left" id="swipeChoiceL">${choices[0].text}</div>
          <div class="swipe-choice-right" id="swipeChoiceR">${choices[1].text}</div>
        </div>
        <div class="card-icon">&#x2194;</div>
        <div class="card-drag-hint">밀어서 선택</div>
      </div>
    </div>`;
}

function truncate(s, max) {
  return s.length > max ? s.slice(0, max) + '...' : s;
}

// ===== 스와이프 로직 (Reigns 스타일: 카드 기울어짐 + 텍스트 오버레이) =====
function initSwipe() {
  const card = document.getElementById('swipeCard');
  const choiceL = document.getElementById('swipeChoiceL');
  const choiceR = document.getElementById('swipeChoiceR');
  if (!card) return;

  let startX = 0, currentX = 0, isDragging = false;
  const threshold = 80;

  function onStart(x) {
    isDragging = true;
    startX = x;
    currentX = 0;
    card.style.transition = 'none';
  }

  function onMove(x) {
    if (!isDragging) return;
    currentX = x - startX;
    const rotation = Math.max(-15, Math.min(15, currentX * 0.12));
    const opacity = Math.min(Math.abs(currentX) / threshold, 1);

    requestAnimationFrame(() => {
      card.style.transform = `translateX(${currentX}px) rotate(${rotation}deg)`;

      // Reigns 스타일: 드래그 방향에 따라 선택지 텍스트 불투명도
      if (currentX < -20) {
        choiceL.style.opacity = opacity;
        choiceR.style.opacity = 0;
      } else if (currentX > 20) {
        choiceR.style.opacity = opacity;
        choiceL.style.opacity = 0;
      } else {
        choiceL.style.opacity = 0;
        choiceR.style.opacity = 0;
      }
    });
  }

  function onEnd() {
    if (!isDragging) return;
    isDragging = false;

    if (currentX < -threshold) {
      card.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
      card.style.transform = `translateX(-120%) rotate(-20deg)`;
      card.style.opacity = '0';
      setTimeout(() => choose(0), 300);
    } else if (currentX > threshold) {
      card.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
      card.style.transform = `translateX(120%) rotate(20deg)`;
      card.style.opacity = '0';
      setTimeout(() => choose(1), 300);
    } else {
      card.style.transition = 'transform 0.3s ease';
      card.style.transform = 'translateX(0) rotate(0deg)';
      choiceL.style.opacity = 0;
      choiceR.style.opacity = 0;
    }
  }

  // 터치 이벤트
  card.addEventListener('touchstart', e => { onStart(e.touches[0].clientX); }, { passive: true });
  card.addEventListener('touchmove', e => { onMove(e.touches[0].clientX); }, { passive: true });
  card.addEventListener('touchend', onEnd);

  // 마우스 이벤트
  card.addEventListener('mousedown', e => { onStart(e.clientX); e.preventDefault(); });
  document.addEventListener('mousemove', e => { if (isDragging) onMove(e.clientX); });
  document.addEventListener('mouseup', onEnd);
}

// ===== 3지선다 카드 스택 빌드 (겹쳐 쌓인 카드) =====
function buildStackCards(choices) {
  let h = '<div class="stack-area"><div class="stack-cards-wrapper" id="stackArea">';
  choices.forEach((ch, i) => {
    h += `<div class="stack-card" data-index="${i}">
      <div class="stack-text">${ch.text}</div>
    </div>`;
  });
  h += '</div></div>';
  return h;
}

// ===== 카드 스택 탭 처리 =====
function initStack() {
  const area = document.getElementById('stackArea');
  if (!area) return;
  const cards = area.querySelectorAll('.stack-card');
  cards.forEach(card => {
    card.addEventListener('click', () => {
      const idx = parseInt(card.dataset.index);
      // 선택된 카드 날아가기
      card.classList.add('fly-up');
      // 나머지 카드 페이드아웃
      cards.forEach((c, i) => { if (parseInt(c.dataset.index) !== idx) c.classList.add('fade-out'); });
      setTimeout(() => choose(idx), 300);
    });
  });
}

// ===== 스탯 프리뷰 텍스트 =====
function previewText(s) {
  const names = ['중심', '융합', '성찰'];
  return s.map((v, i) => v > 0 ? `${names[i]}↑` : v < 0 ? `${names[i]}↓` : '').filter(Boolean).join(' ');
}

// ===== 스탯 프리뷰 하이라이트 =====
function previewStats(s) {
  const keys = ['c', 'f', 'r'];
  keys.forEach((k, i) => {
    const wrap = document.getElementById(statEls[k].wrap);
    wrap.classList.remove('preview-up', 'preview-down');
    if (s[i] > 0) wrap.classList.add('preview-up');
    else if (s[i] < 0) wrap.classList.add('preview-down');
  });
}

function clearPreview() {
  ['c', 'f', 'r'].forEach(k => {
    document.getElementById(statEls[k].wrap).classList.remove('preview-up', 'preview-down');
  });
}

// ===== 선택 처리 =====
function choose(i) {
  const ch = curNode.choices[i];
  clearPreview();
  const reasons = ch.reasons || ['', '', ''];
  applyStats(ch.stats[0], ch.stats[1], ch.stats[2], reasons);
  if (!ch.isNext) round++;
  renderRounds();
  setTimeout(() => showNode(ch.next), 400);
}

// ===== 스탯 적용 =====
function applyStats(dc, df, dr, reasons) {
  stats.c += dc; stats.f += df; stats.r += dr;
  renderStats(dc, df, dr, reasons);
}

// ===== 스탯 렌더링 (+ reasons 텍스트) =====
function renderStats(dc, df, dr, reasons) {
  const deltas = { c: dc, f: df, r: dr };
  const reasonArr = reasons || ['', '', ''];
  const keys = ['c', 'f', 'r'];

  keys.forEach((k, idx) => {
    const el = statEls[k], v = stats[k], d = deltas[k];
    const reason = reasonArr[idx] || '';
    const numEl = document.getElementById(el.num);
    const fillEl = document.getElementById(el.fill);
    const deltaEl = document.getElementById(el.delta);
    const wrapEl = document.getElementById(el.wrap);

    numEl.textContent = (v > 0 ? '+' : '') + v;
    numEl.className = 'stat-num ' + (v > 0 ? 'pos' : v < 0 ? 'neg' : 'zero');

    // 게이지 범위: Act 합산이므로 maxV를 넓힘
    const maxV = 12, pct = Math.min(Math.abs(v) / maxV * 50, 50);
    fillEl.className = 'stat-gauge-fill ' + (v >= 0 ? 'pos' : 'neg');
    if (v >= 0) { fillEl.style.left = '50%'; fillEl.style.right = 'auto'; fillEl.style.width = pct + '%'; }
    else { fillEl.style.right = '50%'; fillEl.style.left = 'auto'; fillEl.style.width = pct + '%'; }

    if (d !== 0) {
      // 숫자 + reason 텍스트
      const sign = d > 0 ? '+' : '';
      const reasonText = reason ? ` ${reason}` : '';
      deltaEl.textContent = `${sign}${d}${reasonText}`;
      deltaEl.className = 'stat-change-indicator show ' + (d > 0 ? 'up' : 'down');
      deltaEl.style.left = v >= 0 ? `calc(50% + ${pct}% + 4px)` : `calc(50% - ${pct}% - 20px)`;
      wrapEl.classList.add('shaking');
      setTimeout(() => { deltaEl.className = 'stat-change-indicator'; wrapEl.classList.remove('shaking'); }, 1500);
    }
  });
}

// ===== Act 인디케이터 =====
function renderActIndicator() {
  actInd.textContent = `Act ${curActIndex + 1} / ${actOrder.length}`;
}

// ===== 라운드 dot =====
function renderRounds() {
  let h = '';
  for (let i = 0; i < totalRounds; i++) {
    h += `<div class="round-dot ${i < round ? 'done' : i === round ? 'active' : ''}"></div>`;
  }
  roundInd.innerHTML = h;
}

// ===== 프로필 바 (SVG 아이콘 포함) =====
function profBar(iconKey, label, v) {
  const maxV = 12, pct = Math.min(Math.abs(v) / maxV * 50, 50);
  const cls = v >= 0 ? 'positive' : 'negative';
  const disp = (v > 0 ? '+' : '') + v;
  return `<div class="profile-bar"><div class="profile-bar-label"><span class="label-with-icon">${ICONS[iconKey]}${label}</span><span>${disp}</span></div>
    <div class="profile-bar-track"><div class="profile-bar-center"></div>
    <div class="profile-bar-fill ${cls}" style="width:${pct}%"></div></div></div>`;
}

// ===== 최종 프로필 코멘트 (3 Act 합산 기준, 범위 -24~+24) =====
function profComment() {
  const t = stats.c + stats.f + stats.r;
  if (t >= 18) return "세 가지 상황 모두에서, 너는 AI를 도구로 쓰되 판단은 네가 했다. 시간이 걸려도 네 것으로 만들었다.";
  if (t >= 10) return "AI의 도움을 받으면서도 자기 기준을 유지하려고 했다. 때로 흔들렸지만, 균형을 찾아가는 중이다.";
  if (t >= 2) return "편한 쪽을 고르기도 하고, 직접 하기도 했다. 일관되진 않지만 — 그 고민 자체가 시작이다.";
  if (t >= -6) return "편한 쪽을 많이 골랐다. 틀린 건 아니다. 다만 — 발표 때, 설명할 수 있었어?";
  return "대부분 AI에게 맡겼다. 빠르고 편했을 거다. 근데 세 번의 상황에서, 네가 직접 고른 건 뭐였어?";
}

// ===== DOMContentLoaded =====
document.addEventListener('DOMContentLoaded', init);
</script>
