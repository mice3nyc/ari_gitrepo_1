<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 리터러시 v3.1 — 나는 어떤 선택을 하는 사람일까?</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --color-bg: #ffffff;
  --color-text: #000000;
  --color-text-light: #555;
  --color-bubble-mine: #000000;
  --color-bubble-mine-text: #ffffff;
  --color-bubble-other: #ffffff;
  --color-bubble-other-text: #000000;
  --color-narration: #000;
  --color-card-bg: #ffffff;
  --color-card-border: #000000;
  --color-card-earned: #000000;
  --color-accent: #000000;

  --chart-grid: #ccc;
  --chart-fill: rgba(0, 0, 0, 0.08);
  --chart-stroke: #000000;
  --chart-point: #000000;

  --color-core: #000000;
  --color-expansion: #000000;
  --color-meta: #000000;

  --radius-sm: 4px;
  --radius-md: 4px;
  --radius-lg: 4px;
  --radius-full: 4px;

  --font-family: "Chicago", "Geneva", "Monaco", "Courier New", monospace, "Noto Sans KR", sans-serif;
  --font-size-sm: 13px;
  --font-size-base: 15px;
  --font-size-lg: 18px;
  --font-size-xl: 24px;
  --font-size-xxl: 32px;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: var(--font-family);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  background: #fff;
  color: var(--color-text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Main Layout (PC: 2-column) ── */
.app-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  height: 100dvh;
  width: 100%;
  max-width: 800px;
  padding: 16px;
}

/* ── Macintosh Window Frame ── */
.phone-frame {
  width: 375px;
  height: 720px;
  max-height: 95dvh;
  border: 2px solid #000;
  border-radius: 4px;
  overflow: hidden;
  background: var(--color-bg);
  display: flex;
  flex-direction: column;
  position: relative;
  flex-shrink: 0;
}

.phone-statusbar {
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--color-text);
  background: #fff;
  border-bottom: 2px solid #000;
  flex-shrink: 0;
  position: relative;
}
/* Macintosh title bar dots */
.mac-titlebar {
  height: 24px;
  display: flex;
  align-items: center;
  padding: 0 8px;
  background: #fff;
  border-bottom: 2px solid #000;
  flex-shrink: 0;
  position: relative;
}
.mac-titlebar-dots {
  display: flex;
  gap: 5px;
}
.mac-titlebar-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 1.5px solid #000;
  background: #fff;
}
.mac-titlebar-title {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  font-weight: 700;
  font-family: var(--font-family);
  color: #000;
}

.phone-home-indicator {
  height: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  border-top: 2px solid #000;
}
.phone-home-indicator::after {
  display: none;
}

.phone-content {
  flex: 1;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}

/* ── Mobile Mini Bar (inside phone, top) ── */
.mobile-mini-bar {
  display: none;
  padding: 6px 16px;
  background: var(--color-bg);
  border-bottom: 1px solid #000;
  flex-shrink: 0;
  gap: 6px;
}
.mini-bar-row {
  display: flex;
  gap: 6px;
  width: 100%;
}
.mini-bar-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.mini-bar-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--color-text);
  display: flex;
  justify-content: space-between;
}
/* Mini bar delta */
.mini-bar-delta {
  font-size: 10px;
  font-weight: 700;
  animation: deltaFade 2s ease forwards;
  pointer-events: none;
}
.mini-bar-delta.up { color: #059669; }
.mini-bar-delta.down { color: #DC2626; }
.mini-bar-track {
  height: 10px;
  background: #ddd;
  border-radius: 0;
  overflow: visible;
  position: relative;
  border: 1px solid #000;
}
.mini-bar-fill {
  height: 100%;
  border-radius: 0;
  transition: width 0.6s ease-out;
  width: 0%;
}
.mini-bar-fill.core { background: #000; }
.mini-bar-fill.expansion { background: #000; }
.mini-bar-fill.meta { background: #000; }

/* ── Side Panel (PC only, Macintosh window) ── */
.side-panel {
  width: 240px;
  height: 720px;
  max-height: 95dvh;
  display: flex;
  flex-direction: column;
  gap: 0;
  flex-shrink: 0;
  border: 2px solid #000;
  border-radius: 4px;
  overflow: hidden;
  background: var(--color-bg);
}

.side-panel-section {
  padding: 20px 16px;
}
.side-panel-section:first-child {
  border-bottom: 1px solid #000;
}

.side-panel-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--color-text);
  margin-bottom: 16px;
}

/* 3-Pillar Bars */
.pillar-bars {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.pillar-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.pillar-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.pillar-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--color-text);
}
.pillar-value {
  font-size: 14px;
  font-weight: 700;
  color: var(--color-text);
  min-width: 28px;
  text-align: right;
}
.pillar-sub {
  font-size: 11px;
  color: var(--color-text-light);
  margin-bottom: 2px;
}
.pillar-track {
  height: 16px;
  background: #ddd;
  border-radius: 0;
  overflow: visible;
  position: relative;
  border: 1px solid #000;
}
.pillar-fill {
  height: 100%;
  border-radius: 0;
  transition: width 0.6s ease-out;
  width: 0%;
  position: relative;
}
.pillar-fill.core { background: #000; }
.pillar-fill.expansion { background: #000; }
.pillar-fill.meta { background: #000; }

/* Pillar delta indicator */
.pillar-delta {
  position: absolute;
  right: -36px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
  animation: deltaFade 2s ease forwards;
  pointer-events: none;
}
.pillar-delta.up { color: #059669; }
.pillar-delta.down { color: #DC2626; }
@keyframes deltaFade {
  0% { opacity: 0; transform: translateY(-50%) translateX(-4px); }
  15% { opacity: 1; transform: translateY(-50%) translateX(0); }
  70% { opacity: 1; }
  100% { opacity: 0; }
}

/* Flash animation */
.pillar-flash-up {
  animation: flashGreen 0.8s ease;
}
.pillar-flash-down {
  animation: flashRed 0.8s ease;
}
@keyframes flashGreen {
  0%, 100% { box-shadow: none; }
  30% { box-shadow: inset 0 0 0 2px rgba(16, 185, 129, 0.6); background-color: rgba(16, 185, 129, 0.15); }
}
@keyframes flashRed {
  0%, 100% { box-shadow: none; }
  30% { box-shadow: inset 0 0 0 2px rgba(239, 68, 68, 0.6); background-color: rgba(239, 68, 68, 0.15); }
}

/* Card List in Side Panel — Timeline */
.side-cards-section {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
}
.side-card-list {
  display: flex;
  flex-direction: column;
  gap: 0;
  position: relative;
}
/* Timeline vertical line */
.timeline-line {
  position: absolute;
  left: 14px;
  top: 0;
  bottom: 0;
  width: 0;
  border-left: 1px dashed #000;
}
/* Episode divider */
.timeline-ep-divider {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0 4px 0;
  font-size: 11px;
  font-weight: 700;
  color: var(--color-text);
  position: relative;
}
.timeline-ep-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #000;
  border: 2px solid #000;
  flex-shrink: 0;
  z-index: 1;
  margin-left: 9px;
}
.timeline-ep-label {
  font-family: var(--font-family);
}
/* Timeline card item */
.side-card-item {
  display: flex;
  align-items: flex-start;
  gap: 0;
  padding: 4px 0;
  animation: cardSlideIn 0.3s ease-out;
  position: relative;
}
@keyframes cardSlideIn {
  from { opacity: 0; transform: translateX(12px); }
  to { opacity: 1; transform: translateX(0); }
}
.timeline-connector {
  width: 29px;
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-shrink: 0;
  position: relative;
}
.timeline-node {
  width: 8px;
  height: 8px;
  border: 1.5px solid #000;
  border-radius: 50%;
  background: #fff;
  z-index: 1;
  margin-top: 6px;
}
.timeline-card-content {
  flex: 1;
  padding: 4px 8px;
  background: #fff;
  border: 1px dashed #000;
  border-radius: 4px;
  margin-left: 4px;
}
.timeline-card-content .card-icon { font-size: 16px; }
.timeline-card-content .card-label {
  font-size: 12px;
  color: var(--color-text);
  line-height: 1.3;
  font-weight: 600;
}
.timeline-card-content .card-label-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.timeline-card-stats {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 2px;
}
.timeline-stat-change {
  font-size: 10px;
  font-weight: 600;
}
.timeline-stat-change.up { color: #059669; }
.timeline-stat-change.down { color: #DC2626; }
.side-card-empty {
  font-size: 13px;
  color: #D1D5DB;
  text-align: center;
  padding: 24px 0;
}

/* Side Panel Episode Info */
.side-episode-info {
  padding: 12px 16px;
  border-top: 1px solid #000;
  text-align: center;
  font-size: 12px;
  color: var(--color-text-light);
  flex-shrink: 0;
}

/* ── Screens ── */
.screen {
  display: none;
  position: absolute;
  inset: 0;
  flex-direction: column;
  overflow: hidden;
}
.screen.active {
  display: flex;
}

.screen-enter { animation: screenFadeIn 0.4s ease forwards; }
.screen-exit { animation: screenFadeOut 0.3s ease forwards; }

@keyframes screenFadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes screenFadeOut {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-8px); }
}

/* ── Title Screen ── */
#screen-title {
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 32px 24px;
  gap: 16px;
}
.title-emoji { font-size: 56px; margin-bottom: 8px; }
.title-main {
  font-size: var(--font-size-xxl);
  font-weight: 700;
  color: var(--color-text);
  line-height: 1.3;
}
.title-sub {
  font-size: var(--font-size-base);
  color: var(--color-text-light);
  margin-bottom: 24px;
  line-height: 1.6;
}
.btn-primary {
  background: #fff;
  color: #000;
  border: 2px solid #000;
  border-radius: 4px;
  padding: 14px 40px;
  font-size: var(--font-size-lg);
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-family);
  transition: all 0.15s ease;
  min-height: 48px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.btn-primary:hover { background: #000; color: #fff; transform: none; }
.btn-primary:active { transform: scale(0.97); }

.title-fade-in { animation: fadeIn 0.8s ease forwards; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Character Select Screen ── */
#screen-character {
  padding: 24px 16px;
  gap: 16px;
  overflow-y: auto;
}
.char-header {
  text-align: center;
  font-size: var(--font-size-xl);
  font-weight: 700;
}
.char-sub {
  text-align: center;
  font-size: var(--font-size-sm);
  color: var(--color-text-light);
  margin-bottom: 8px;
}
.character-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  flex: 1;
}
.character-card {
  background: #fff;
  border: 2px solid #000;
  border-radius: 4px;
  padding: 20px 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  min-height: 44px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.character-card:hover {
  background: #000;
  color: #fff;
  transform: none;
}
.character-card:hover .char-tagline,
.character-card:hover .char-tag {
  color: #ccc;
}
.character-card:active { transform: scale(0.97); }
.character-card .char-avatar { font-size: 36px; }
.character-card .char-name {
  font-size: var(--font-size-lg);
  font-weight: 700;
}
.character-card .char-tagline {
  font-size: var(--font-size-sm);
  color: var(--color-text-light);
  line-height: 1.4;
}
.character-card .char-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 4px;
}
.char-tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  background: #fff;
  color: var(--color-text-light);
  border: 1px solid #000;
}

/* ── Messenger Screen ── */
#screen-messenger {
  flex-direction: column;
}
.messenger-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid #000;
  flex-shrink: 0;
  background: var(--color-bg);
}
.messenger-header .header-back {
  font-size: 20px;
  color: var(--color-text-light);
  cursor: default;
}
.messenger-header .header-avatar {
  width: 32px;
  height: 32px;
  border-radius: 4px;
  background: #fff;
  border: 1px solid #000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}
.messenger-header .header-name {
  font-size: var(--font-size-base);
  font-weight: 600;
}
.messenger-header .header-cards-btn {
  margin-left: auto;
  background: #fff;
  border: 1.5px solid #000;
  border-radius: 4px;
  padding: 4px 10px;
  font-size: 12px;
  cursor: pointer;
  color: #000;
  font-family: var(--font-family);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  min-height: 30px;
}
.messenger-header .header-cards-btn:hover { background: #000; color: #fff; }

/* Chat Area */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  scroll-behavior: smooth;
}

.message-row {
  display: flex;
  gap: 8px;
  max-width: 80%;
  align-items: flex-end;
}
.message-row.left { align-self: flex-start; }
.message-row.right { align-self: flex-end; flex-direction: row-reverse; }
.message-row.center { align-self: center; max-width: 90%; }

.message-avatar {
  width: 32px;
  height: 32px;
  border-radius: 4px;
  background: #fff;
  border: 1px solid #000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.message-content { display: flex; flex-direction: column; }

.bubble {
  padding: 10px 14px;
  border-radius: 4px;
  font-size: var(--font-size-base);
  line-height: 1.5;
  word-break: keep-all;
}
.bubble.left {
  background: #fff;
  color: #000;
  border: 1px solid #000;
  border-bottom-left-radius: 0;
}
.bubble.right {
  background: #000;
  color: #fff;
  border-bottom-right-radius: 0;
}
.bubble.center {
  background: #F5F5F5;
  color: var(--color-narration);
  font-size: 0.95em;
  text-align: center;
  font-style: italic;
  padding: 10px 16px;
  border: 1px dashed #000;
  border-radius: 4px;
  margin: 4px 8px;
}

.sender-name {
  font-size: 12px;
  color: var(--color-text-light);
  margin-bottom: 4px;
}

.message-time {
  font-size: 11px;
  color: var(--color-text-light);
  margin-top: 2px;
}
.message-row.right .message-time { text-align: right; }

.read-receipt {
  font-size: 11px;
  color: var(--color-text-light);
  text-align: right;
}

.bubble-enter {
  animation: bubbleIn 0.3s ease-out forwards;
}
@keyframes bubbleIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Typing Indicator */
.typing-row {
  display: flex;
  gap: 8px;
  align-self: flex-start;
  align-items: flex-end;
  max-width: 80%;
}
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 12px 16px;
  background: #fff;
  border: 1px solid #000;
  border-radius: 4px;
  border-bottom-left-radius: 4px;
  width: fit-content;
}
.typing-dot {
  width: 8px;
  height: 8px;
  background: #000;
  border-radius: 50%;
  animation: typingBounce 1.2s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-4px); }
}

/* Choices */
.choices-container {
  padding: 12px 16px;
  background: var(--color-bg);
  border-top: 1px solid #000;
  display: none;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
  animation: slideUp 0.3s ease-out;
}

@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.choice-btn {
  background: #fff;
  border: 2px solid #000;
  border-radius: 4px;
  padding: 14px 16px;
  font-size: var(--font-size-base);
  color: #000;
  cursor: pointer;
  text-align: left;
  min-height: 48px;
  transition: all 0.15s ease;
  font-family: var(--font-family);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.choice-btn:hover {
  background: #000;
  color: #fff;
}
.choice-btn:active { transform: scale(0.98); }
.choice-btn.selected {
  background: #000;
  color: #fff;
  border-color: #000;
}

/* Next Button */
.next-btn-container {
  padding: 12px 16px;
  background: var(--color-bg);
  border-top: 1px solid #000;
  display: none;
  flex-shrink: 0;
}
.next-btn {
  width: 100%;
  background: #fff;
  color: #000;
  border: 2px solid #000;
  border-radius: 4px;
  padding: 14px;
  font-size: var(--font-size-base);
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-family);
  min-height: 48px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: all 0.15s ease;
}
.next-btn:hover { background: #000; color: #fff; }
.next-btn:active { transform: scale(0.98); }

/* ── Transition Screen ── */
.transition-screen {
  position: absolute;
  inset: 0;
  background: var(--color-bg);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  z-index: 50;
}
.transition-screen.active {
  display: flex;
  animation: fadeInOut 2.5s ease forwards;
}
@keyframes fadeInOut {
  0% { opacity: 0; }
  20% { opacity: 1; }
  80% { opacity: 1; }
  100% { opacity: 0; }
}
.transition-icon { font-size: 40px; }
.transition-episode {
  font-size: var(--font-size-sm);
  color: #000;
  font-weight: 600;
}
.transition-label {
  font-size: var(--font-size-lg);
  color: var(--color-text-light);
}
.transition-steps {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}
.transition-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #ddd;
  border: 1px solid #000;
}
.transition-dot.active { background: #000; }

/* ── Card Collection Screen ── */
#screen-cards {
  padding: 20px 16px;
  overflow-y: auto;
  gap: 16px;
}
.cards-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.cards-title {
  font-size: var(--font-size-xl);
  font-weight: 700;
}
.cards-back-btn {
  background: #fff;
  border: 1.5px solid #000;

    condition: (s) => s.adaptability >= 4 && s.confidence >= 3 && s.thinking >= 3
  },
  explorer: {
    name: "아직 찾는 사람",
    desc: "정해진 답 없이 여러 가능성을 탐색하고 있는 사람.",
    condition: (s) => s.curiosity >= Math.max(s.thinking, s.creativity, s.tech, s.adaptability, s.confidence)
  }
};

function determineProfile(stats) {
  for (const key of ['handmaker', 'toolmaker', 'connector', 'teamplayer', 'speedrunner', 'explorer']) {
    if (PROFILES[key].condition(stats)) return PROFILES[key];
  }
  const entries = Object.entries(stats);
  entries.sort((a, b) => b[1] - a[1]);
  const topKey = entries[0][0];
  if (topKey === 'thinking' || topKey === 'creativity') return PROFILES.handmaker;
  if (topKey === 'tech' || topKey === 'adaptability') return PROFILES.speedrunner;
  if (topKey === 'curiosity') return PROFILES.explorer;
  if (topKey === 'confidence') return PROFILES.connector;
  return PROFILES.toolmaker;
}

function calcPillars(stats) {
  const core = Math.round(((stats.thinking || 0) + (stats.creativity || 0)) / 2 * 10) / 10;
  const expansion = Math.round(((stats.tech || 0) + (stats.adaptability || 0)) / 2 * 10) / 10;
  const meta = Math.round(((stats.confidence || 0) + (stats.curiosity || 0)) / 2 * 10) / 10;
  return { core, expansion, meta };
}

function updatePillarUI(stats, prevPillars) {
  const pillars = calcPillars(stats);
  const maxVal = 10;

  const coreEl = document.getElementById('pillar-core-fill');
  const expEl = document.getElementById('pillar-exp-fill');
  const metaEl = document.getElementById('pillar-meta-fill');

  if (coreEl) coreEl.style.width = `${(pillars.core / maxVal) * 100}%`;
  if (expEl) expEl.style.width = `${(pillars.expansion / maxVal) * 100}%`;
  if (metaEl) metaEl.style.width = `${(pillars.meta / maxVal) * 100}%`;

  document.getElementById('pillar-core-val').textContent = pillars.core.toFixed(1);
  document.getElementById('pillar-exp-val').textContent = pillars.expansion.toFixed(1);
  document.getElementById('pillar-meta-val').textContent = pillars.meta.toFixed(1);

  const miniCore = document.getElementById('mini-core-fill');
  const miniExp = document.getElementById('mini-exp-fill');
  const miniMeta = document.getElementById('mini-meta-fill');
  if (miniCore) miniCore.style.width = `${(pillars.core / maxVal) * 100}%`;
  if (miniExp) miniExp.style.width = `${(pillars.expansion / maxVal) * 100}%`;
  if (miniMeta) miniMeta.style.width = `${(pillars.meta / maxVal) * 100}%`;

  document.getElementById('mini-core-val').textContent = pillars.core.toFixed(1);
  document.getElementById('mini-exp-val').textContent = pillars.expansion.toFixed(1);
  document.getElementById('mini-meta-val').textContent = pillars.meta.toFixed(1);

  if (prevPillars) {
    flashPillar('pillar-core-track', pillars.core, prevPillars.core);
    flashPillar('pillar-exp-track', pillars.expansion, prevPillars.expansion);
    flashPillar('pillar-meta-track', pillars.meta, prevPillars.meta);
    // Mobile mini bar deltas
    flashMiniBar('mini-core-val', pillars.core, prevPillars.core);
    flashMiniBar('mini-exp-val', pillars.expansion, prevPillars.expansion);
    flashMiniBar('mini-meta-val', pillars.meta, prevPillars.meta);
  }

  return pillars;
}

function flashPillar(trackId, newVal, oldVal) {
  const track = document.getElementById(trackId);
  if (!track) return;
  track.classList.remove('pillar-flash-up', 'pillar-flash-down');
  // Remove old delta
  const oldDelta = track.querySelector('.pillar-delta');
  if (oldDelta) oldDelta.remove();
  if (newVal > oldVal) {
    void track.offsetHeight;
    track.classList.add('pillar-flash-up');
    setTimeout(() => track.classList.remove('pillar-flash-up'), 800);
    const delta = document.createElement('span');
    delta.className = 'pillar-delta up';
    delta.textContent = `+${(newVal - oldVal).toFixed(1)}`;
    track.appendChild(delta);
    setTimeout(() => delta.remove(), 2000);
  } else if (newVal < oldVal) {
    void track.offsetHeight;
    track.classList.add('pillar-flash-down');
    setTimeout(() => track.classList.remove('pillar-flash-down'), 800);
    const delta = document.createElement('span');
    delta.className = 'pillar-delta down';
    delta.textContent = `${(newVal - oldVal).toFixed(1)}`;
    track.appendChild(delta);
    setTimeout(() => delta.remove(), 2000);
  }
}

function flashMiniBar(valId, newVal, oldVal) {
  const valEl = document.getElementById(valId);
  if (!valEl) return;
  const parent = valEl.parentElement;
  if (!parent) return;
  // Remove old delta
  const oldDelta = parent.querySelector('.mini-bar-delta');
  if (oldDelta) oldDelta.remove();
  if (newVal !== oldVal) {
    const diff = newVal - oldVal;
    const delta = document.createElement('span');
    delta.className = `mini-bar-delta ${diff > 0 ? 'up' : 'down'}`;
    delta.textContent = diff > 0 ? `+${diff.toFixed(1)}` : diff.toFixed(1);
    parent.appendChild(delta);
    setTimeout(() => delta.remove(), 2000);
  }
}

function getPillarChanges(stats, prevStats) {
  const oldP = calcPillars(prevStats);
  const newP = calcPillars(stats);
  const changes = [];
  if (newP.core !== oldP.core) changes.push({ name: 'Core', diff: newP.core - oldP.core });
  if (newP.expansion !== oldP.expansion) changes.push({ name: 'Exp', diff: newP.expansion - oldP.expansion });
  if (newP.meta !== oldP.meta) changes.push({ name: 'Meta', diff: newP.meta - oldP.meta });
  return changes;
}

class MessengerEngine {
  constructor(chatArea, choicesContainer) {
    this.chatArea = chatArea;
    this.choicesContainer = choicesContainer;
    this.isPlaying = false;
    this.gameTime = { hour: 16, minute: 30 };
    this.lastSender = null;
  }

  async playMessages(messages) {
    this.isPlaying = true;
    for (const msg of messages) {
      if (msg.from !== 'player') {
        if (msg.from !== 'system' && msg.from !== 'narration') {
          this.showTyping(msg.from);
          await this.wait(msg.delay || 800);
          this.hideTyping();
        } else {
          await this.wait(msg.delay || 600);
        }
      }
      this.addBubble(msg);
      this.scrollToBottom();
      this.advanceTime();
    }
    this.isPlaying = false;
  }

  addBubble(msg) {
    const speaker = SPEAKERS[msg.from];
    if (!speaker) return;

    const row = document.createElement('div');
    row.className = `message-row ${speaker.side}`;

    if (speaker.side === 'left') {
      const showName = this.lastSender !== msg.from;
      row.innerHTML = `
        <div class="message-avatar">${speaker.avatar || ''}</div>
        <div class="message-content">
          ${showName ? `<div class="sender-name">${speaker.name}</div>` : ''}
          <div class="bubble left bubble-enter">${msg.text}</div>
          <div class="message-time">${this.getTime()}</div>
        </div>
      `;
    } else if (speaker.side === 'right') {
      row.innerHTML = `
        <div class="message-content">
          <div class="bubble right bubble-enter">${msg.text}</div>
          <div class="read-receipt">읽음</div>
        </div>
      `;
    } else {
      row.innerHTML = `<div class="bubble center bubble-enter">${msg.text}</div>`;
    }

    this.chatArea.appendChild(row);
    this.lastSender = msg.from;
  }

  showChoices(choices, onSelect) {
    this.choicesContainer.innerHTML = '';
    this.choicesContainer.style.display = 'flex';

    for (const choice of choices) {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = choice.text;
      btn.addEventListener('click', () => {
        this.choicesContainer.querySelectorAll('.choice-btn').forEach(b => {
          b.disabled = true;
          b.style.pointerEvents = 'none';
        });
        btn.classList.add('selected');
        setTimeout(() => {
          this.choicesContainer.style.display = 'none';
          this.addBubble({ from: 'player', text: choice.text });
          this.scrollToBottom();
          onSelect(choice);
        }, 400);
      });
      this.choicesContainer.appendChild(btn);
    }
  }

  showTyping(from) {
    const speaker = SPEAKERS[from];
    if (!speaker) return;
    this.hideTyping();
    const row = document.createElement('div');
    row.className = 'typing-row';
    row.id = 'typing-indicator';
    row.innerHTML = `
      <div class="message-avatar">${speaker.avatar || ''}</div>
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    `;
    this.chatArea.appendChild(row);
    this.scrollToBottom();
  }

  hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  scrollToBottom() {
    requestAnimationFrame(() => {
      this.chatArea.scrollTop = this.chatArea.scrollHeight;
    });
  }

  getTime() {
    const h = this.gameTime.hour;
    const m = this.gameTime.minute;
    const period = h >= 12 ? '오후' : '오전';
    const displayH = h > 12 ? h - 12 : h;
    return `${period} ${displayH}:${m.toString().padStart(2, '0')}`;
  }

  advanceTime() {
    this.gameTime.minute += Math.floor(Math.random() * 2) + 1;
    if (this.gameTime.minute >= 60) {
      this.gameTime.minute -= 60;
      this.gameTime.hour += 1;
    }
  }

  clearChat() {
    this.chatArea.innerHTML = '';
    this.choicesContainer.style.display = 'none';
    this.choicesContainer.innerHTML = '';
    this.lastSender = null;
  }

  wait(ms) {
    return new Promise(r => setTimeout(r, ms));
  }
}


// =======================================
// RADAR CHART (SVG)
// =======================================

function renderRadarChart(stats, container) {
  const size = 280;
  const cx = size / 2;
  const cy = size / 2;
  const maxR = size / 2 - 40;
  const axes = ['thinking', 'creativity', 'tech', 'adaptability', 'confidence', 'curiosity'];
  const labels = ['사고력', '창의력', '기술친숙도', '적응력', '자신감', '호기심'];
  const maxVal = 10;
  const angleStep = 360 / 6;

  function polar(angle, r) {
    const rad = (angle - 90) * Math.PI / 180;
    return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
  }

  let svg = `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">`;

  for (let level = 1; level <= 5; level++) {
    const r = maxR * (level / 5);
    const points = [];
    for (let i = 0; i < 6; i++) {
      const p = polar(i * angleStep, r);
      points.push(`${p.x},${p.y}`);
    }
    svg += `<polygon points="${points.join(' ')}" fill="none" stroke="#ccc" stroke-width="1"/>`;
  }

  for (let i = 0; i < 6; i++) {
    const p = polar(i * angleStep, maxR);
    svg += `<line x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}" stroke="#ccc" stroke-width="1"/>`;
  }

  const dataPoints = [];
  for (let i = 0; i < 6; i++) {
    const val = Math.max(0, Math.min(maxVal, stats[axes[i]] || 0));
    const r = maxR * (val / maxVal);
    const p = polar(i * angleStep, r);
    dataPoints.push(p);
  }
  const pointsStr = dataPoints.map(p => `${p.x},${p.y}`).join(' ');
  svg += `<polygon points="${pointsStr}" fill="rgba(0, 0, 0, 0.08)" stroke="#000" stroke-width="2"/>`;

  for (const p of dataPoints) {
    svg += `<circle cx="${p.x}" cy="${p.y}" r="4" fill="#000"/>`;
  }

  for (let i = 0; i < 6; i++) {
    const p = polar(i * angleStep, maxR + 22);
    svg += `<text x="${p.x}" y="${p.y}" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#000" font-family="'Chicago', 'Geneva', 'Monaco', 'Courier New', monospace, 'Noto Sans KR', sans-serif">${labels[i]}</text>`;
  }

  svg += '</svg>';
  container.innerHTML = svg;
}


// =======================================
// GAME CONTROLLER
// =======================================

class GameController {
  constructor() {
    this.state = {
      character: null,
      currentStep: null,
      currentBranch: null,
      cards: [],
      stats: { thinking: 0, creativity: 0, tech: 0, adaptability: 0, confidence: 0, curiosity: 0 },
      choiceHistory: [],
      currentEpisode: 1
    };
    this.messenger = null;
    this.prevPillars = null;
    this.totalEpisodes = 4;
  }

  init() {
    const chatArea = document.getElementById('chat-area');
    const choicesContainer = document.getElementById('choices-container');
    this.messenger = new MessengerEngine(chatArea, choicesContainer);
    this.renderCharacterGrid();
    this.updateEpisodeInfo();
  }

  getStepOrder() {
    if (this.state.character === 'suyeon') {
      return SUYEON_STEPS;
    }
    // Other characters only have ep1_s1
    return ["ep1_s1"];
  }

  renderCharacterGrid() {
    const grid = document.getElementById('character-grid');
    grid.innerHTML = '';
    for (const [id, char] of Object.entries(CHARACTERS)) {
      const card = document.createElement('div');
      card.className = 'character-card';
      card.style.borderColor = '#000';
      card.innerHTML = `
        <div class="char-avatar">${char.avatar}</div>
        <div class="char-name">${char.name}</div>
        <div class="char-tagline">${char.tagline}</div>
        <div class="char-tags">
          ${char.tags.map(t => `<span class="char-tag">#${t}</span>`).join('')}
        </div>
      `;
      card.addEventListener('click', () => this.selectCharacter(id));
      grid.appendChild(card);
    }
  }

  selectCharacter(charId) {
    this.state.character = charId;
    const char = CHARACTERS[charId];

    document.getElementById('messenger-avatar').textContent = char.avatar;
    document.getElementById('messenger-name').textContent = '\uC9C0\uBBFC';

    this.messenger.gameTime = { hour: 16, minute: 30 };
    this.messenger.clearChat();
    this.prevPillars = calcPillars(this.state.stats);
    updatePillarUI(this.state.stats, null);
    this.updateSideCards();
    this.updateEpisodeInfo();
    showScreen('messenger');
    this.startStep(this.getStepOrder()[0]);
  }

  getSceneConfig(scene) {
    const configs = {
      home: { time: { hour: 16, minute: 30 }, headerName: '\uC9C0\uBBFC' },
      desk: { time: { hour: 17, minute: 5 }, headerName: '\uC9C0\uBBFC' },
      classroom: { time: { hour: 10, minute: 30 }, headerName: '\uBBF8\uC220 \uC2DC\uAC04' },
      korean_class: { time: { hour: 14, minute: 0 }, headerName: '\uAD6D\uC5B4 \uC2DC\uAC04' },
      afterschool: { time: { hour: 15, minute: 30 }, headerName: '\uBC29\uACFC \uD6C4' },
      presentation: { time: { hour: 10, minute: 0 }, headerName: '\uBC1C\uD45C \uC2DC\uAC04' },
      home_night_study: { time: { hour: 22, minute: 0 }, headerName: '\uC9C0\uBBFC' },
      exam_day: { time: { hour: 8, minute: 30 }, headerName: '\uC2DC\uD5D8 \uB2F9\uC77C' },
      exam_result: { time: { hour: 14, minute: 0 }, headerName: '\uC2DC\uD5D8 \uACB0\uACFC' },
      home_night: { time: { hour: 23, minute: 0 }, headerName: '\uC218\uBE48' },
      next_day: { time: { hour: 8, minute: 10 }, headerName: '\uB4F1\uAD47\uAE38' },
      lunchtime: { time: { hour: 12, minute: 30 }, headerName: '\uC810\uC2EC\uC2DC\uAC04' },
      final_reflect: { time: { hour: 15, minute: 30 }, headerName: '\uB3CC\uC544\uBCF4\uAE30' }
    };
    return configs[scene] || { time: { hour: 12, minute: 0 }, headerName: scene };
  }

  async startStep(stepKey) {
    this.state.currentStep = stepKey;

    if (stepKey === 'profile') {
      this.showProfile();
      return;
    }

    const charScenario = SCENARIO[this.state.character];
    if (!charScenario) { this.showProfile(); return; }

    let stepData;

    const rawStep = charScenario[stepKey];
    if (!rawStep) { this.showProfile(); return; }

    if (rawStep.scene || rawStep._isCommon) {
      // Direct step data (not branched)
      stepData = rawStep;
    } else {
      // Branched step - look up by last choice
      stepData = rawStep[this.state.currentBranch];
      if (!stepData) { this.showProfile(); return; }
    }

    // Update episode tracking
    if (stepData.episode) {
      this.state.currentEpisode = stepData.episode;
      this.updateEpisodeInfo();
    }

    // Scene transition
    if (stepData.scene) {
      const sceneInfo = SCENE_INFO[stepData.scene];
      if (sceneInfo) {
        const epTitle = EPISODE_TITLES[stepData.episode || this.state.currentEpisode] || '';
        await this.showTransition(sceneInfo.icon, sceneInfo.label, stepKey, epTitle);
      }

      const config = this.getSceneConfig(stepData.scene);
      this.messenger.gameTime = { ...config.time };
      document.getElementById('messenger-name').textContent = config.headerName;
    }

    this.messenger.clearChat();
    await this.messenger.playMessages(stepData.messages);

    if (stepData.choices && !stepData.noChoice) {
      this.messenger.showChoices(stepData.choices, (choice) => this.onChoice(choice));
    } else if (stepData.endMessages) {
      await this.messenger.playMessages(stepData.endMessages);
      this.showNextButton();
    } else if (stepData.noChoice) {
      this.showNextButton();
    } else {
      this.showNextButton();
    }
  }

  onChoice(choice) {
    const prevStats = { ...this.state.stats };
    this.prevPillars = calcPillars(prevStats);

    this.addStats(choice.stats);

    const pillarChanges = getPillarChanges(this.state.stats, prevStats);

    updatePillarUI(this.state.stats, this.prevPillars);
    this.prevPillars = calcPillars(this.state.stats);

    if (choice.card) {
      const card = { ...choice.card, step: this.state.currentStep, episode: this.state.currentEpisode, pillarChanges: pillarChanges };
      this.state.cards.push(card);
      this.showCardPopup(card, pillarChanges);
      this.updateSideCards();
    }

    this.state.choiceHistory.push(choice.id);
    this.state.currentBranch = choice.id;

    const nextStep = this.getNextStep();
    setTimeout(() => {
      this.startStep(nextStep);
    }, 2200);
  }

  addStats(delta) {
    for (const key in delta) {
      if (this.state.stats.hasOwnProperty(key)) {
        this.state.stats[key] = Math.max(0, Math.min(10,
          (this.state.stats[key] || 0) + delta[key]
        ));
      }
    }
  }

  getNextStep() {
    const order = this.getStepOrder();
    const idx = order.indexOf(this.state.currentStep);

    if (idx < order.length - 1) {
      const nextStep = order[idx + 1];
      const charScenario = SCENARIO[this.state.character];

      if (!charScenario[nextStep]) return 'profile';

      const rawStep = charScenario[nextStep];
      // If it's a common step or direct step, always proceed
      if (rawStep.scene || rawStep._isCommon) return nextStep;

      // It's a branched step - check if our branch exists
      if (rawStep[this.state.currentBranch]) return nextStep;

      // Branch not found, skip to next valid step
      for (let i = idx + 2; i < order.length; i++) {
        const tryStep = order[i];
        if (!charScenario[tryStep]) continue;
        const tryRaw = charScenario[tryStep];
        if (tryRaw.scene || tryRaw._isCommon || tryRaw[this.state.currentBranch]) return tryStep;
      }
      return 'profile';
    }
    return 'profile';
  }

  showNextButton() {
    const container = document.getElementById('next-btn-container');
    const btn = document.getElementById('next-btn');
    container.style.display = 'block';

    const nextStep = this.getNextStep();
    btn.textContent = nextStep === 'profile' ? '\uACB0\uACFC \uBCF4\uAE30' : '\uB2E4\uC74C';

    btn.onclick = () => {
      container.style.display = 'none';
      this.startStep(nextStep);
    };
  }

  showCardPopup(card, pillarChanges) {
    const existing = document.querySelector('.card-popup-overlay');
    if (existing) existing.remove();

    let changesHtml = '';
    if (pillarChanges && pillarChanges.length > 0) {
      changesHtml = '<div class="popup-stat-changes">';
      for (const c of pillarChanges) {
        const isUp = c.diff > 0;
        const arrow = isUp ? '\u{1F53A}' : '\u{1F53B}';
        const sign = isUp ? '+' : '';
        changesHtml += `<span class="popup-stat-change ${isUp ? 'up' : 'down'}">${sign}${c.diff.toFixed(1)} ${c.name} ${arrow}</span>`;
      }
      changesHtml += '</div>';
    }

    const overlay = document.createElement('div');
    overlay.className = 'card-popup-overlay';
    overlay.innerHTML = `
      <div class="card-popup">
        <div class="popup-badge">\uCE74\uB4DC \uD68D\uB4DD!</div>
        <div class="popup-icon">${card.icon}</div>
        <div class="popup-label">${card.label}</div>
        ${changesHtml}
      </div>
    `;
    document.querySelector('.phone-content').appendChild(overlay);

    setTimeout(() => {
      overlay.style.transition = 'opacity 0.3s ease';
      overlay.style.opacity = '0';
      setTimeout(() => overlay.remove(), 300);
    }, 2000);
  }

  showTransition(icon, label, stepKey, episodeTitle) {
    return new Promise(resolve => {
      const screen = document.getElementById('transition-screen');
      document.getElementById('transition-icon').textContent = icon;
      document.getElementById('transition-label').textContent = label;
      document.getElementById('transition-episode').textContent = episodeTitle || '';

      const stepsContainer = document.getElementById('transition-steps');
      const allSteps = this.getStepOrder();
      const currentIdx = allSteps.indexOf(stepKey);
      stepsContainer.innerHTML = allSteps.map((s, i) =>
        `<div class="transition-dot ${i <= currentIdx ? 'active' : ''}"></div>`
      ).join('');

      screen.classList.add('active');
      screen.style.animation = 'none';
      void screen.offsetHeight;
      screen.style.animation = 'fadeInOut 2.5s ease forwards';

      setTimeout(() => {
        screen.classList.remove('active');
        resolve();
      }, 2500);
    });
  }

  updateSideCards() {
    const list = document.getElementById('side-card-list');
    if (!list) return;

    if (this.state.cards.length === 0) {
      list.innerHTML = '<div class="side-card-empty">\uC544\uC9C1 \uCE74\uB4DC\uAC00 \uC5C6\uC5B4\uC694</div>';
      return;
    }

    list.innerHTML = '<div class="timeline-line"></div>';
    let lastEp = 0;
    for (const card of this.state.cards) {
      const ep = card.episode || 1;
      if (ep !== lastEp) {
        const epTitle = EPISODE_TITLES[ep] || `EP${ep}`;
        const divider = document.createElement('div');
        divider.className = 'timeline-ep-divider';
        divider.innerHTML = `<div class="timeline-ep-dot"></div><span class="timeline-ep-label">${epTitle.replace(/에피소드 /, 'EP')}</span>`;
        list.appendChild(divider);
        lastEp = ep;
      }
      const item = document.createElement('div');
      item.className = 'side-card-item';
      // Build stat changes html
      let statsHtml = '';
      if (card.pillarChanges && card.pillarChanges.length > 0) {
        statsHtml = '<div class="timeline-card-stats">';
        for (const c of card.pillarChanges) {
          const isUp = c.diff > 0;
          const sign = isUp ? '+' : '';
          const arrow = isUp ? '\u25B2' : '\u25BC';
          statsHtml += `<span class="timeline-stat-change ${isUp ? 'up' : 'down'}">${sign}${c.diff.toFixed(1)} ${c.name} ${arrow}</span>`;
        }
        statsHtml += '</div>';
      }
      item.innerHTML = `
        <div class="timeline-connector"><div class="timeline-node"></div></div>
        <div class="timeline-card-content">
          <div class="card-label-row"><span class="card-icon">${card.icon}</span> <span class="card-label">${card.label}</span></div>
          ${statsHtml}
        </div>
      `;
      list.appendChild(item);
    }
  }

  updateEpisodeInfo() {
    const info = document.getElementById('side-episode-info');
    if (info) {
      const stepOrder = this.getStepOrder();
      const currentIdx = this.state.currentStep ? stepOrder.indexOf(this.state.currentStep) + 1 : 0;
      info.textContent = `\uC5D0\uD53C\uC18C\uB4DC ${this.state.currentEpisode} / ${this.totalEpisodes}  \xB7  STEP ${currentIdx} / ${stepOrder.length}`;
    }
  }

  showProfile() {
    const char = CHARACTERS[this.state.character];
    const profile = determineProfile(this.state.stats);

    const container = document.getElementById('profile-card-content');
    const statLabels = {
      thinking: '\uC0AC\uACE0\uB825',
      creativity: '\uCC3D\uC758\uB825',
      tech: '\uAE30\uC220\uCE5C\uC219\uB3C4',
      adaptability: '\uC801\uC751\uB825',
      confidence: '\uC790\uC2E0\uAC10',
      curiosity: '\uD638\uAE30\uC2EC'
    };

    const pillars = calcPillars(this.state.stats);

    container.innerHTML = `
      <div class="profile-avatar">${char.avatar}</div>
      <div class="profile-char-name">${char.name}(\uC73C)\uB85C \uD50C\uB808\uC774</div>
      <div class="profile-type">${profile.name}</div>
      <div class="profile-desc">${profile.desc}</div>
      <div class="profile-chart" id="radar-chart"></div>
      <div class="stat-bars" id="stat-bars"></div>
      <div class="profile-cards-section">
        <div class="profile-cards-title">\uB0B4\uAC00 \uBAA8\uC740 \uCE74\uB4DC</div>
        <div class="profile-cards" id="profile-badges"></div>
      </div>
    `;

    const chartContainer = document.getElementById('radar-chart');
    renderRadarChart(this.state.stats, chartContainer);

    const barsContainer = document.getElementById('stat-bars');
    for (const [key, label] of Object.entries(statLabels)) {
      const val = this.state.stats[key] || 0;
      const row = document.createElement('div');
      row.className = 'stat-row';
      row.innerHTML = `
        <div class="stat-label">${label}</div>
        <div class="stat-bar-bg"><div class="stat-bar-fill" style="width: 0%"></div></div>
        <div class="stat-value">${val}</div>
      `;
      barsContainer.appendChild(row);
    }

    const badgesContainer = document.getElementById('profile-badges');
    badgesContainer.innerHTML = '<div class="profile-timeline-line"></div>';
    let lastProfileEp = 0;
    for (const card of this.state.cards) {
      const ep = card.episode || 1;
      if (ep !== lastProfileEp) {
        const epTitle = EPISODE_TITLES[ep] || `EP${ep}`;
        const divider = document.createElement('div');
        divider.className = 'timeline-ep-divider';
        divider.innerHTML = `<div class="timeline-ep-dot"></div><span class="timeline-ep-label">${epTitle.replace(/에피소드 /, 'EP')}</span>`;
        badgesContainer.appendChild(divider);
        lastProfileEp = ep;
      }
      const item = document.createElement('div');
      item.className = 'side-card-item';
      let statsHtml = '';
      if (card.pillarChanges && card.pillarChanges.length > 0) {
        statsHtml = '<div class="timeline-card-stats">';
        for (const c of card.pillarChanges) {
          const isUp = c.diff > 0;
          const sign = isUp ? '+' : '';
          const arrow = isUp ? '\u25B2' : '\u25BC';
          statsHtml += `<span class="timeline-stat-change ${isUp ? 'up' : 'down'}">${sign}${c.diff.toFixed(1)} ${c.name} ${arrow}</span>`;
        }
        statsHtml += '</div>';
      }
      item.innerHTML = `
        <div class="timeline-connector"><div class="timeline-node"></div></div>
        <div class="timeline-card-content">
          <div class="card-label-row"><span class="card-icon">${card.icon}</span> <span class="card-label">${card.label}</span></div>
          ${statsHtml}
        </div>
      `;
      badgesContainer.appendChild(item);
    }

    showScreen('profile');

    const info = document.getElementById('side-episode-info');
    if (info) info.textContent = '\uC644\uB8CC!';

    setTimeout(() => {
      const fills = barsContainer.querySelectorAll('.stat-bar-fill');
      const keys = Object.keys(statLabels);
      fills.forEach((fill, i) => {
        const val = this.state.stats[keys[i]] || 0;
        fill.style.width = `${(val / 10) * 100}%`;
      });
    }, 100);
  }

  renderCardCollection() {
    const grid = document.getElementById('card-grid');
    grid.innerHTML = '';

    for (const card of this.state.cards) {
      const el = document.createElement('div');
      el.className = 'earned-card';
      el.innerHTML = `
        <div class="card-icon">${card.icon}</div>
        <div class="card-label">${card.label}</div>
        <div class="card-step">EP${card.episode || 1}</div>
      `;
      grid.appendChild(el);
    }

    const maxCards = 18;
    for (let i = this.state.cards.length; i < maxCards; i++) {
      const el = document.createElement('div');
      el.className = 'empty-card';
      el.textContent = '?';
      grid.appendChild(el);
    }
  }

  restart(sameCharacter = true) {
    const charId = sameCharacter ? this.state.character : null;
    this.state = {
      character: charId,
      currentStep: null,
      currentBranch: null,
      cards: [],
      stats: { thinking: 0, creativity: 0, tech: 0, adaptability: 0, confidence: 0, curiosity: 0 },
      choiceHistory: [],
      currentEpisode: 1
    };
    this.prevPillars = null;

    document.getElementById('next-btn-container').style.display = 'none';
    document.getElementById('choices-container').style.display = 'none';

    updatePillarUI(this.state.stats, null);
    this.updateSideCards();
    this.updateEpisodeInfo();

    if (charId) {
      this.selectCharacter(charId);
    } else {
      showScreen('character');
    }
  }
}


// =======================================
// SCREEN MANAGEMENT
// =======================================

let currentScreen = null;

function showScreen(screenId) {
  document.querySelectorAll('.screen.active').forEach(s => {
    s.classList.remove('active');
    s.classList.remove('screen-enter');
  });

  const screen = document.getElementById(`screen-${screenId}`);
  if (screen) {
    screen.classList.add('active', 'screen-enter');
    currentScreen = screenId;
  }

  if (screenId === 'cards') {
    game.renderCardCollection();
  }

  const miniBar = document.getElementById('mobile-mini-bar');
  if (miniBar) {
    miniBar.style.display = (screenId === 'messenger') ? '' : 'none';
  }
}

function openMobileCards() {
  const overlay = document.getElementById('mobile-cards-overlay');
  const list = document.getElementById('mobile-card-list');

  list.innerHTML = '';
  if (game.state.cards.length === 0) {
    list.innerHTML = '<div class="side-card-empty">\uC544\uC9C1 \uCE74\uB4DC\uAC00 \uC5C6\uC5B4\uC694</div>';
  } else {
    list.innerHTML = '<div class="timeline-line"></div>';
    list.style.position = 'relative';
    let lastMobileEp = 0;
    for (const card of game.state.cards) {
      const ep = card.episode || 1;
      if (ep !== lastMobileEp) {
        const epTitle = EPISODE_TITLES[ep] || `EP${ep}`;
        const divider = document.createElement('div');
        divider.className = 'timeline-ep-divider';
        divider.innerHTML = `<div class="timeline-ep-dot"></div><span class="timeline-ep-label">${epTitle.replace(/에피소드 /, 'EP')}</span>`;
        list.appendChild(divider);
        lastMobileEp = ep;
      }
      const item = document.createElement('div');
      item.className = 'side-card-item';
      let statsHtml = '';
      if (card.pillarChanges && card.pillarChanges.length > 0) {
        statsHtml = '<div class="timeline-card-stats">';
        for (const c of card.pillarChanges) {
          const isUp = c.diff > 0;
          const sign = isUp ? '+' : '';
          const arrow = isUp ? '\u25B2' : '\u25BC';
          statsHtml += `<span class="timeline-stat-change ${isUp ? 'up' : 'down'}">${sign}${c.diff.toFixed(1)} ${c.name} ${arrow}</span>`;
        }
        statsHtml += '</div>';
      }
      item.innerHTML = `
        <div class="timeline-connector"><div class="timeline-node"></div></div>
        <div class="timeline-card-content">
          <div class="card-label-row"><span class="card-icon">${card.icon}</span> <span class="card-label">${card.label}</span></div>
          ${statsHtml}
        </div>
      `;
      list.appendChild(item);
    }
  }

  overlay.classList.add('active');
}

function closeMobileCards(event) {
  if (event && event.target !== document.getElementById('mobile-cards-overlay')) return;
  document.getElementById('mobile-cards-overlay').classList.remove('active');
}


// =======================================
// INIT
// =======================================

let game;

document.addEventListener("DOMContentLoaded", () => {
  game = new GameController();
  game.init();
  showScreen('title');
});
</script>
