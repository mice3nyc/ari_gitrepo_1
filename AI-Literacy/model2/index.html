<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Agent v0.4</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #FFFFFF;
  --fg: #111111;
  --border: #111111;
  --g1: #F5F5F5;
  --g2: #CCCCCC;
  --g3: #999999;
  --g4: #666666;
  --blue: #2563EB;
  --yellow: #CA8A04;
  --red: #DC2626;
  --purple: #7C3AED;
  --green: #16A34A;
  --mono: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
  --sans: -apple-system, 'Noto Sans KR', 'Segoe UI', sans-serif;
  --radius: 4px;
}
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--fg);
  line-height: 1.5;
}

/* ===== CONTAINER ===== */
.app {
  max-width: 720px;
  margin: 0 auto;
  padding: 20px 24px;
  min-height: 100vh;
}

/* ===== HEADER ===== */
.hdr {
  border: 2px solid var(--border);
  padding: 10px 16px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--mono);
}
.hdr-title { font-size: 13px; font-weight: bold; letter-spacing: 2px; }
.hdr-info { font-size: 11px; color: var(--g3); letter-spacing: 1px; }

/* ===== PHASES ===== */
.phase { display: none; }
.phase.on { display: block; }

/* ===== PROGRESS ===== */
.progress-bar {
  display: none;
  gap: 4px;
  margin-bottom: 16px;
}
.progress-bar.on { display: flex; }
.progress-step {
  flex: 1;
  height: 3px;
  background: var(--g2);
  border-radius: 2px;
  transition: background 0.3s;
}
.progress-step.done { background: var(--fg); }
.progress-step.current { background: var(--g3); }

/* ===== INTRO ===== */
.intro-box {
  border: 2px solid var(--border);
  padding: 32px 24px;
  text-align: center;
}
.intro-box h2 {
  font-family: var(--mono);
  font-size: 20px;
  letter-spacing: 3px;
  margin-bottom: 4px;
}
.intro-role { font-size: 13px; color: var(--g3); margin-bottom: 24px; }
.intro-mission {
  border: 2px solid var(--border);
  background: var(--g1);
  padding: 20px;
  max-width: 480px;
  margin: 0 auto 24px auto;
  text-align: left;
}
.intro-mission .im-label {
  font-family: var(--mono);
  font-size: 10px; color: var(--g3);
  letter-spacing: 2px; margin-bottom: 8px;
}
.intro-mission .im-title {
  font-size: 16px; font-weight: bold;
  margin-bottom: 10px; line-height: 1.4;
}
.intro-mission .im-desc { font-size: 13px; color: var(--g4); line-height: 1.6; }
.intro-signals {
  display: flex; justify-content: center;
  gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
}
.intro-sig {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 10px; letter-spacing: 1px;
}

/* ===== COMMON ===== */
.dot {
  width: 10px; height: 10px; border-radius: 50%;
  display: inline-block; flex-shrink: 0;
}
.dot-sm { width: 8px; height: 8px; }
.btn {
  font-family: var(--mono); font-size: 12px; letter-spacing: 1px;
  padding: 10px 20px; border: 2px solid var(--border);
  background: var(--bg); cursor: pointer; border-radius: var(--radius);
  transition: all 0.15s;
}
.btn:hover { background: var(--fg); color: var(--bg); }
.btn-primary { background: var(--fg); color: var(--bg); }
.btn-primary:hover { background: var(--bg); color: var(--fg); }
.btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
.center { text-align: center; }
.mt { margin-top: 16px; }

/* ===== MAIN GAME LAYOUT ===== */
.game-layout { display: flex; gap: 16px; }
.board-col { width: 220px; flex-shrink: 0; }
.browser-col { flex: 1; min-width: 0; }

@media (max-width: 700px) {
  .game-layout { flex-direction: column; }
  .board-col { width: 100%; }
  .board-compact { display: flex !important; gap: 6px; }
  .board-compact .slot {
    flex: 1; min-height: auto; padding: 8px 6px;
  }
  .board-compact .slot .slot-question { display: none; }
  .board-compact .slot .slot-filled-text { font-size: 9px; line-height: 1.2; }
  .board-compact .slot .slot-label { font-size: 8px; margin-bottom: 2px; }
  .board-compact .dot { width: 6px; height: 6px; }
}

/* ===== BOARD SLOTS ===== */
.board-full { display: flex; flex-direction: column; gap: 8px; }
.slot {
  border: 2px dashed var(--g2);
  border-radius: var(--radius);
  padding: 12px; min-height: 64px;
  transition: all 0.25s; position: relative;
}
.slot.filled { border-style: solid; }
.slot-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 1px;
  display: flex; align-items: center; gap: 5px; margin-bottom: 4px;
}
.slot-question { font-size: 12px; color: var(--g3); line-height: 1.4; }
.slot-filled-text { font-size: 12px; font-weight: bold; line-height: 1.3; }
.slot-check {
  position: absolute; top: 8px; right: 10px;
  font-family: var(--mono); font-size: 11px; font-weight: bold;
}

@keyframes slotFlash {
  0% { background: transparent; }
  40% { background: #F0F0F0; }
  100% { background: transparent; }
}
.slot.flash { animation: slotFlash 0.5s ease; }

/* ===== CARD BROWSER ===== */
.browser {
  border: 2px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.browser-nav {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px; border-bottom: 1px solid var(--g2);
  font-family: var(--mono); font-size: 11px; letter-spacing: 1px; color: var(--g3);
}
.nav-arrow {
  cursor: pointer; font-size: 16px; color: var(--fg);
  padding: 4px 10px; border: 1px solid var(--g2); border-radius: var(--radius);
  user-select: none; transition: all 0.15s;
}
.nav-arrow:hover { background: var(--fg); color: var(--bg); }
.nav-arrow.disabled { opacity: 0.2; pointer-events: none; }
.card-body { padding: 16px; min-height: 180px; }
.card-badge {
  display: inline-block; font-family: var(--mono);
  font-size: 9px; letter-spacing: 1px;
  padding: 2px 8px; border: 1px solid var(--g2);
  border-radius: 2px; margin-bottom: 10px; color: var(--g3);
}
.card-title {
  font-size: 16px; font-weight: bold;
  margin-bottom: 12px; line-height: 1.4;
}
.card-text { font-size: 14px; line-height: 1.7; color: var(--g4); margin-bottom: 12px; }
.card-text b { color: var(--fg); }
.card-source {
  font-family: var(--mono); font-size: 10px;
  color: var(--g2); letter-spacing: 0.5px;
}
.reg-bar {
  display: flex; gap: 6px; padding: 12px 16px;
  border-top: 1px solid var(--g2); background: var(--g1);
  flex-wrap: wrap; align-items: center;
}
.reg-bar-label {
  font-family: var(--mono); font-size: 9px;
  letter-spacing: 1px; color: var(--g3); width: 100%; margin-bottom: 4px;
}
.reg-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 12px; border: 2px solid var(--border);
  border-radius: var(--radius); font-family: var(--mono);
  font-size: 10px; letter-spacing: 0.5px; cursor: pointer;
  background: var(--bg); transition: all 0.15s;
}
.reg-btn:hover { background: var(--fg); color: var(--bg); }
.reg-btn.disabled {
  opacity: 0.25; pointer-events: none; border-style: dashed;
}
.card-feedback {
  padding: 12px 16px; font-size: 13px; line-height: 1.5;
  display: none; border-top: 1px solid var(--g2);
}
.card-feedback.show { display: block; }
.card-feedback.success { border-left: 3px solid var(--green); }
.card-feedback.warn { border-left: 3px solid var(--red); }
.card-feedback.hint { border-left: 3px solid var(--yellow); }
.fb-label {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 1px; margin-bottom: 4px;
}

@keyframes slideLeft {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes slideRight {
  from { opacity: 0; transform: translateX(-30px); }
  to { opacity: 1; transform: translateX(0); }
}
.card-body.slide-left { animation: slideLeft 0.2s ease; }
.card-body.slide-right { animation: slideRight 0.2s ease; }

/* ===== CHOICE PANEL (Personal / Future) ===== */
.choice-panel {
  border: 2px solid var(--border);
  border-radius: var(--radius); padding: 20px;
}
.choice-panel h3 {
  font-family: var(--mono); font-size: 11px;
  letter-spacing: 1px; margin-bottom: 4px;
}
.cp-question {
  font-size: 15px; font-weight: bold;
  margin-bottom: 16px; line-height: 1.4;
}
.cp-context {
  border: 1px solid var(--g2); border-radius: var(--radius);
  padding: 12px; margin-bottom: 12px;
  font-size: 13px; color: var(--g4); line-height: 1.6;
}
.cp-context b { color: var(--fg); }
.cp-source {
  font-family: var(--mono); font-size: 10px;
  color: var(--g2); margin-top: 6px;
}
.choice-options { display: flex; flex-direction: column; gap: 8px; }
.choice-opt {
  border: 2px solid var(--border); border-radius: var(--radius);
  padding: 12px 16px; cursor: pointer;
  font-size: 13px; line-height: 1.5; transition: all 0.15s;
}
.choice-opt:hover { background: var(--g1); }
.choice-opt.selected { background: var(--fg); color: var(--bg); }

/* ===== FUTURE PIECES ===== */
.future-pieces { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.future-piece {
  border: 2px solid var(--border); border-radius: var(--radius);
  padding: 12px 16px; cursor: pointer;
  font-size: 13px; line-height: 1.5; transition: all 0.15s;
  position: relative;
}
.future-piece:hover { background: var(--g1); }
.future-piece.selected { border-color: var(--purple); background: #F5F0FF; }
.fp-num {
  font-family: var(--mono); font-size: 10px;
  color: var(--g3); position: absolute; top: 6px; right: 10px;
}
.future-combo {
  border: 2px solid var(--purple); border-radius: var(--radius);
  padding: 16px; font-size: 14px; font-weight: bold;
  line-height: 1.5; text-align: center; display: none;
}
.future-combo.show { display: block; }

/* ===== ASSEMBLE ===== */
.asm-section {
  border: 2px solid var(--border); border-radius: var(--radius);
  padding: 16px; margin-bottom: 12px;
}
.asm-section h4 {
  font-family: var(--mono); font-size: 11px;
  letter-spacing: 1px; margin-bottom: 10px;
}
.asm-sig {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 8px 0; border-bottom: 1px solid var(--g1); font-size: 13px;
}
.asm-sig:last-child { border-bottom: none; }
.sig-label {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.5px; flex-shrink: 0; padding-top: 2px;
}
.main-sig-opts { display: flex; flex-direction: column; gap: 8px; }
.main-sig-opt {
  border: 2px solid var(--border); border-radius: var(--radius);
  padding: 10px 14px; cursor: pointer; font-size: 13px;
  display: flex; align-items: center; gap: 8px; transition: all 0.15s;
}
.main-sig-opt:hover { background: var(--g1); }
.main-sig-opt.selected { background: var(--fg); color: var(--bg); }
.headline-opts { display: flex; flex-direction: column; gap: 8px; }
.headline-opt {
  border: 2px solid var(--border); border-radius: var(--radius);
  padding: 12px 16px; cursor: pointer;
  font-size: 14px; font-weight: bold; transition: all 0.15s;
}
.headline-opt:hover { background: var(--g1); }
.headline-opt.selected { background: var(--fg); color: var(--bg); }

/* ===== BRIEFING ===== */
.briefing-card {
  border: 3px solid var(--border); border-radius: var(--radius);
  padding: 24px; margin-bottom: 16px;
}
.b-label {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 2px; color: var(--g3); margin-bottom: 6px;
}
.b-headline {
  font-size: 18px; font-weight: bold;
  margin-bottom: 20px; line-height: 1.3;
}
.b-signals { display: flex; flex-direction: column; gap: 10px; }
.b-sig {
  border: 1px solid var(--g2); border-radius: var(--radius);
  padding: 12px; font-size: 13px; line-height: 1.4;
}
.b-sig.main { border: 2px solid var(--border); background: var(--g1); }
.bs-label {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 1px; margin-bottom: 4px;
}

/* ===== MIRROR ===== */
.mirror-card {
  border: 3px solid var(--border); border-radius: var(--radius);
  padding: 28px; text-align: center; margin-bottom: 16px;
}
.m-label {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 2px; color: var(--g3); margin-bottom: 12px;
}
.m-dot-big {
  width: 24px; height: 24px; border-radius: 50%;
  margin: 0 auto 12px;
}
.m-type { font-size: 22px; font-weight: bold; margin-bottom: 8px; }
.m-desc {
  font-size: 14px; color: var(--g4); line-height: 1.6;
  max-width: 480px; margin: 0 auto;
}
.noise-reveal {
  border: 1px solid var(--g2); border-radius: var(--radius);
  padding: 16px; margin-bottom: 16px;
}
.noise-reveal h4 {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 1px; color: var(--g3); margin-bottom: 8px;
}
.noise-item {
  font-size: 12px; color: var(--g4); margin-bottom: 6px;
  line-height: 1.4; padding-left: 16px; text-indent: -16px;
}

/* ===== TOAST ===== */
.toast-el {
  position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%);
  background: var(--fg); color: var(--bg);
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.5px;
  padding: 10px 20px; border-radius: var(--radius);
  transition: bottom 0.3s ease; z-index: 100; white-space: nowrap;
}
.toast-el.show { bottom: 24px; }
</style>
</head>

<div class="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-title">SIGNAL AGENT</div>
    <div class="hdr-info" id="hdrInfo">STANDBY</div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-bar" id="progressBar">
    <div class="progress-step" id="prog-0"></div>
    <div class="progress-step" id="prog-1"></div>
    <div class="progress-step" id="prog-2"></div>
    <div class="progress-step" id="prog-3"></div>
    <div class="progress-step" id="prog-4"></div>
  </div>

  <!-- ===== INTRO ===== -->
  <div class="phase on" id="p-intro">
    <div class="intro-box">
      <h2>SIGNAL AGENT</h2>
      <div class="intro-role">AI 시대의 신호를 읽는 사람</div>
      <div class="intro-mission">
        <div class="im-label">TODAY'S MISSION</div>
        <div class="im-title">AI가 그린 그림이 미술 대회에서 대상을 탔다</div>
        <div class="im-desc">쏟아지는 정보 속에서 신호를 찾고, 노이즈를 걸러내고, 당신만의 브리핑을 만드세요.</div>
      </div>
      <div class="intro-signals">
        <div class="intro-sig"><span class="dot" style="background:var(--blue)"></span>기술</div>
        <div class="intro-sig"><span class="dot" style="background:var(--yellow)"></span>사회</div>
        <div class="intro-sig"><span class="dot" style="background:var(--red)"></span>개인</div>
        <div class="intro-sig"><span class="dot" style="background:var(--purple)"></span>미래</div>
      </div>
      <button class="btn btn-primary" id="startBtn">미션 시작</button>
    </div>
  </div>

  <!-- ===== MAIN GAME ===== -->
  <div class="phase" id="p-game">
    <div class="game-layout">
      <div class="board-col">
        <div id="board"></div>
      </div>
      <div class="browser-col">
        <div class="browser" id="browser">
          <div class="browser-nav">
            <span class="nav-arrow" id="navLeft">&#8592;</span>
            <span id="cardCounter">1 / 12</span>
            <span class="nav-arrow" id="navRight">&#8594;</span>
          </div>
          <div class="card-body" id="cardBody"></div>
          <div class="card-feedback" id="cardFeedback"></div>
          <div class="reg-bar" id="regBar"></div>
        </div>
        <div class="center mt" id="nextPhaseWrap" style="display:none;"></div>
      </div>
    </div>
  </div>

  <!-- ===== PERSONAL ===== -->
  <div class="phase" id="p-personal">
    <div class="choice-panel" id="personalPanel"></div>
    <div class="center mt" id="personalNextWrap" style="display:none;">
      <button class="btn btn-primary" id="toFutureBtn">다음: 미래 신호 &#8594;</button>
    </div>
  </div>

  <!-- ===== FUTURE ===== -->
  <div class="phase" id="p-future">
    <div class="choice-panel" id="futurePanel"></div>
    <div class="center mt" id="futureNextWrap" style="display:none;">
      <button class="btn btn-primary" id="toAssembleBtn">브리핑 조립 &#8594;</button>
    </div>
  </div>

  <!-- ===== ASSEMBLE ===== -->
  <div class="phase" id="p-assemble">
    <div class="asm-section">
      <h4>수집한 신호 요약</h4>
      <div id="asmSummary"></div>
    </div>
    <div class="asm-section">
      <h4>이 이슈에서 가장 중요한 신호는?</h4>
      <div class="main-sig-opts" id="mainSigOpts"></div>
    </div>
    <div class="asm-section">
      <h4>내 브리핑의 헤드라인</h4>
      <div class="headline-opts" id="headlineOpts"></div>
    </div>
    <div class="center mt" id="asmNextWrap" style="display:none;">
      <button class="btn btn-primary" id="toBriefingBtn">브리핑 생성 &#8594;</button>
    </div>
  </div>

  <!-- ===== BRIEFING ===== -->
  <div class="phase" id="p-briefing">
    <div class="briefing-card" id="briefingCard"></div>
    <div class="center mt">
      <button class="btn btn-primary" id="toMirrorBtn">결과 보기 &#8594;</button>
    </div>
  </div>

  <!-- ===== MIRROR ===== -->
  <div class="phase" id="p-mirror">
    <div class="mirror-card" id="mirrorCard"></div>
    <div id="noiseReveal"></div>
    <div class="center mt">
      <button class="btn" id="restartBtn">다시 하기</button>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast-el" id="toastEl"></div>

</div>

/* ============================================================
   UTILITIES
   ============================================================ */

function show(id) {
  var phases = document.querySelectorAll('.phase');
  for (var i = 0; i < phases.length; i++) {
    phases[i].classList.remove('on');
  }
  document.getElementById(id).classList.add('on');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showToast(msg) {
  var t = document.getElementById('toastEl');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

function updateProgress(step) {
  var bar = document.getElementById('progressBar');
  bar.classList.add('on');
  for (var i = 0; i < 5; i++) {
    var el = document.getElementById('prog-' + i);
    if (i < step) { el.className = 'progress-step done'; }
    else if (i === step) { el.className = 'progress-step current'; }
    else { el.className = 'progress-step'; }
  }
}

function cardSlotsCount() {
  var c = 0;
  if (filledSlots.tech) c++;
  if (filledSlots.social) c++;
  return c;
}

function findSlotDef(id) {
  for (var i = 0; i < SLOT_DEFS.length; i++) {
    if (SLOT_DEFS[i].id === id) return SLOT_DEFS[i];
  }
  return null;
}

   INTRO -> GAME
   ============================================================ */

function startGame() {
  show('p-game');
  updateProgress(0);
  document.getElementById('hdrInfo').textContent = '0/2 신호 수집';
  renderBoard();
  renderCard();
  renderRegBar();
}

/* ============================================================
   BOARD
   ============================================================ */

function renderBoard() {
  var container = document.getElementById('board');
  var isMobile = window.innerWidth <= 700;

  container.className = isMobile ? 'board-compact' : 'board-full';
  container.innerHTML = '';

  for (var i = 0; i < SLOT_DEFS.length; i++) {
    var slot = SLOT_DEFS[i];
    var isFilled = !!filledSlots[slot.id];
    var el = document.createElement('div');
    el.className = 'slot' + (isFilled ? ' filled' : '');

    if (isFilled) {
      el.style.borderColor = '';
      el.style.cssText = 'border-style:solid;';
    }

    var inner = '<div class="slot-label">' +
      '<span class="dot" style="background:' + slot.color + '"></span>' +
      slot.label + '</div>';

    if (isFilled) {
      inner += '<div class="slot-filled-text">' + filledSlots[slot.id].snippet + '</div>';
      inner += '<div class="slot-check" style="color:' + slot.color + '">\u2713</div>';
    } else {
      inner += '<div class="slot-question">' + slot.question + '</div>';
    }

    el.innerHTML = inner;
    container.appendChild(el);
  }

  var wrap = document.getElementById('nextPhaseWrap');
  if (cardSlotsCount() >= 2) {
    wrap.style.display = 'block';
    wrap.innerHTML = '<button class="btn btn-primary" id="toPersonalBtn">다음: 개인 신호 \u2192</button>';
    document.getElementById('toPersonalBtn').addEventListener('click', goPersonal);
    document.getElementById('hdrInfo').textContent = '2/2 신호 수집 완료';
  } else {
    wrap.style.display = 'none';
    document.getElementById('hdrInfo').textContent = cardSlotsCount() + '/2 신호 수집';
  }
}

/* ============================================================
   CARD BROWSER
   ============================================================ */

function renderCard() {
  var card = CARDS[currentCardIdx];
  var body = document.getElementById('cardBody');

  body.innerHTML =
    '<div class="card-badge">' + card.badge + '</div>' +
    '<div class="card-title">' + card.title + '</div>' +
    '<div class="card-text">' + card.body + '</div>' +
    '<div class="card-source">' + card.source + '</div>';

  document.getElementById('cardCounter').textContent = (currentCardIdx + 1) + ' / ' + CARDS.length;

  var navL = document.getElementById('navLeft');
  var navR = document.getElementById('navRight');
  navL.className = 'nav-arrow' + (currentCardIdx === 0 ? ' disabled' : '');
  navR.className = 'nav-arrow' + (currentCardIdx === CARDS.length - 1 ? ' disabled' : '');

  var fb = document.getElementById('cardFeedback');
  fb.className = 'card-feedback';
  fb.innerHTML = '';

  renderRegBar();
}

function nextCard() {
  if (currentCardIdx < CARDS.length - 1) {
    currentCardIdx++;
    var body = document.getElementById('cardBody');
    body.className = 'card-body slide-left';
    renderCard();
    setTimeout(function() { body.className = 'card-body'; }, 250);
  }
}

function prevCard() {
  if (currentCardIdx > 0) {
    currentCardIdx--;
    var body = document.getElementById('cardBody');
    body.className = 'card-body slide-right';
    renderCard();
    setTimeout(function() { body.className = 'card-body'; }, 250);
  }
}

/* ============================================================
   REGISTRATION BAR
   ============================================================ */

function renderRegBar() {
  var bar = document.getElementById('regBar');
  var card = CARDS[currentCardIdx];

  var html = '<div class="reg-bar-label">이 카드를 등록할 신호:</div>';

  for (var i = 0; i < 2; i++) {
    var slot = SLOT_DEFS[i]; // tech, social only
    var isFilled = !!filledSlots[slot.id];
    html += '<div class="reg-btn' + (isFilled ? ' disabled' : '') + '" data-slot="' + slot.id + '">' +
      '<span class="dot dot-sm" style="background:' + slot.color + '"></span>' +
      slot.label + (isFilled ? ' \u2713' : '') + '</div>';
  }

  bar.innerHTML = html;

  // Attach click events
  var btns = bar.querySelectorAll('.reg-btn:not(.disabled)');
  for (var j = 0; j < btns.length; j++) {
    btns[j].addEventListener('click', (function(slotId) {
      return function() { registerCard(slotId); };
    })(btns[j].getAttribute('data-slot')));
  }
}

function registerCard(slotId) {
  var card = CARDS[currentCardIdx];

  // Noise check
  if (card.isNoise) {
    showCardFeedback('warn', '\u26A0 출처 불분명', card.noiseReason);
    return;
  }

  // Check assignability
  var canAssign = false;
  for (var i = 0; i < card.assignableTo.length; i++) {
    if (card.assignableTo[i] === slotId) { canAssign = true; break; }
  }

  if (!canAssign) {
    showCardFeedback('hint', '한번 더 생각해보세요', '이 카드는 다른 신호에 더 가까울 수 있어요. 카드의 핵심 정보를 다시 읽어보세요.');
    return;
  }

  // Register
  filledSlots[slotId] = {
    cardId: card.id,
    snippet: card.snippet
  };

  var slotDef = findSlotDef(slotId);
  showCardFeedback('success', '\u2713 SIGNAL COLLECTED', slotDef.label + ' 신호 수집 완료');
  showToast(slotDef.label + ' 신호 수집 완료');

  renderBoard();
  renderRegBar();

  // Flash animation
  var slots = document.querySelectorAll('.slot');
  for (var k = 0; k < SLOT_DEFS.length; k++) {
    if (SLOT_DEFS[k].id === slotId && slots[k]) {
      slots[k].classList.add('flash');
    }
  }
}

function showCardFeedback(type, label, msg) {
  var fb = document.getElementById('cardFeedback');
  fb.className = 'card-feedback show ' + type;
  fb.innerHTML = '<div class="fb-label">' + label + '</div>' + msg;
}

/* ============================================================
   SWIPE + KEYBOARD
   ============================================================ */

(function() {
  var startX = 0;
  var target = null;

  document.addEventListener('touchstart', function(e) {
    var browser = document.getElementById('browser');
    if (browser && browser.contains(e.target)) {
      startX = e.touches[0].clientX;
      target = browser;
    }
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    if (!target) return;
    var endX = e.changedTouches[0].clientX;
    var diff = endX - startX;
    if (Math.abs(diff) > 50) {
      if (diff < 0) nextCard();
      else prevCard();
    }
    target = null;
  }, { passive: true });
})();

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'ArrowRight') nextCard();
});

function pickPersonal(id) {
  personalChoice = id;
  var choice = null;
  for (var i = 0; i < PERSONAL_CHOICES.length; i++) {
    if (PERSONAL_CHOICES[i].id === id) { choice = PERSONAL_CHOICES[i]; break; }
  }

  var text = choice.text;
  filledSlots.personal = {
    cardId: null,
    snippet: text.length > 35 ? text.substring(0, 35) + '\u2026' : text
  };

  showToast('PERSONAL 개인 신호 수집 완료');
  renderPersonal();
}

/* ============================================================
   FUTURE SIGNAL
   ============================================================ */

function goFuture() {
  show('p-future');
  updateProgress(2);
  document.getElementById('hdrInfo').textContent = 'FUTURE 미래 신호';
  renderFuture();
}

function renderFuture() {
  var panel = document.getElementById('futurePanel');
  var html = '<h3 style="color:var(--purple)">FUTURE 미래 신호</h3>';
  html += '<div class="cp-question">이게 계속되면, 5년 후에는?</div>';

  for (var i = 0; i < FUTURE_CONTEXT.length; i++) {
    var ctx = FUTURE_CONTEXT[i];
    html += '<div class="cp-context">' + ctx.text + '<div class="cp-source">' + ctx.source + '</div></div>';
  }

  html += '<div style="font-size:12px;color:var(--g3);margin-bottom:8px;font-family:var(--mono);letter-spacing:0.5px;">시나리오 조각 2개를 골라 연결하세요</div>';
  html += '<div class="future-pieces">';
  for (var j = 0; j < FUTURE_PIECES.length; j++) {
    var p = FUTURE_PIECES[j];
    var isSelected = false;
    for (var s = 0; s < futureChoices.length; s++) {
      if (futureChoices[s] === p.id) { isSelected = true; break; }
    }
    html += '<div class="future-piece' + (isSelected ? ' selected' : '') + '" data-fid="' + p.id + '">' +
      p.text + '<span class="fp-num">' + (j + 1) + '</span></div>';
  }
  html += '</div>';

  if (futureChoices.length === 2) {
    var sorted = futureChoices.slice().sort();
    var key = sorted[0] + '+' + sorted[1];
    var combo = FUTURE_COMBOS[key] || (futureChoices[0] + ' + ' + futureChoices[1]);
    html += '<div class="future-combo show" style="border-color:var(--purple);">\u2192 ' + combo + '</div>';
  }

  panel.innerHTML = html;

  // Attach events
  var pieces = panel.querySelectorAll('.future-piece');
  for (var k = 0; k < pieces.length; k++) {
    pieces[k].addEventListener('click', (function(fid) {
      return function() { pickFuture(fid); };
    })(pieces[k].getAttribute('data-fid')));
  }

  document.getElementById('futureNextWrap').style.display = futureChoices.length === 2 ? 'block' : 'none';
}

function pickFuture(id) {
  var idx = -1;
  for (var i = 0; i < futureChoices.length; i++) {
    if (futureChoices[i] === id) { idx = i; break; }
  }

  if (idx !== -1) {
    futureChoices.splice(idx, 1);
  } else if (futureChoices.length < 2) {
    futureChoices.push(id);
  } else {
    futureChoices.shift();
    futureChoices.push(id);
  }

  if (futureChoices.length === 2) {
    var sorted = futureChoices.slice().sort();
    var key = sorted[0] + '+' + sorted[1];
    var combo = FUTURE_COMBOS[key] || '';
    filledSlots.future = {
      cardId: null,
      snippet: combo.length > 35 ? combo.substring(0, 35) + '\u2026' : combo
    };
    showToast('FUTURE 미래 신호 수집 완료');
  } else {
    delete filledSlots.future;
  }

  renderFuture();
}

/* ============================================================
   ASSEMBLE
   ============================================================ */

function goAssemble() {
  show('p-assemble');
  updateProgress(3);
  document.getElementById('hdrInfo').textContent = 'ASSEMBLE';
  renderAssemble();
}

function renderAssemble() {
  // Summary
  var summary = document.getElementById('asmSummary');
  var html = '';
  for (var i = 0; i < SLOT_DEFS.length; i++) {
    var slot = SLOT_DEFS[i];
    var data = filledSlots[slot.id];
    html += '<div class="asm-sig">' +
      '<span class="dot dot-sm" style="background:' + slot.color + ';margin-top:3px;"></span>' +
      '<div><span class="sig-label" style="color:' + slot.color + '">' + slot.label + '</span><br>' +
      (data ? data.snippet : '\u2014') + '</div></div>';
  }
  summary.innerHTML = html;

  // Main signal
  var msOpts = document.getElementById('mainSigOpts');
  msOpts.innerHTML = '';
  for (var j = 0; j < SLOT_DEFS.length; j++) {
    var s = SLOT_DEFS[j];
    var el = document.createElement('div');
    el.className = 'main-sig-opt' + (mainSignal === s.id ? ' selected' : '');
    el.innerHTML = '<span class="dot dot-sm" style="background:' + s.color + '"></span>' + s.label;
    el.setAttribute('data-sid', s.id);
    msOpts.appendChild(el);
  }
  var msItems = msOpts.querySelectorAll('.main-sig-opt');
  for (var m = 0; m < msItems.length; m++) {
    msItems[m].addEventListener('click', (function(sid) {
      return function() {
        mainSignal = sid;
        renderAssemble();
        checkAssembleReady();
      };
    })(msItems[m].getAttribute('data-sid')));
  }

  // Headlines
  var hlOpts = document.getElementById('headlineOpts');
  hlOpts.innerHTML = '';
  for (var k = 0; k < HEADLINES.length; k++) {
    var hel = document.createElement('div');
    hel.className = 'headline-opt' + (chosenHeadline === k ? ' selected' : '');
    hel.textContent = HEADLINES[k];
    hel.setAttribute('data-hidx', k);
    hlOpts.appendChild(hel);
  }
  var hlItems = hlOpts.querySelectorAll('.headline-opt');
  for (var h = 0; h < hlItems.length; h++) {
    hlItems[h].addEventListener('click', (function(idx) {
      return function() {
        chosenHeadline = idx;
        renderAssemble();
        checkAssembleReady();
      };
    })(parseInt(hlItems[h].getAttribute('data-hidx'))));
  }

  checkAssembleReady();
}

function checkAssembleReady() {
  var ready = mainSignal !== null && chosenHeadline !== null;
  document.getElementById('asmNextWrap').style.display = ready ? 'block' : 'none';
}

/* ============================================================
   BRIEFING
   ============================================================ */

function goBriefing() {
  show('p-briefing');
  updateProgress(4);
  document.getElementById('hdrInfo').textContent = 'BRIEFING';

  var card = document.getElementById('briefingCard');
  var html = '<div class="b-label">SIGNAL BRIEFING</div>';
  html += '<div class="b-headline">' + HEADLINES[chosenHeadline] + '</div>';
  html += '<div class="b-signals">';

  for (var i = 0; i < SLOT_DEFS.length; i++) {
    var slot = SLOT_DEFS[i];
    var isMain = slot.id === mainSignal;
    var data = filledSlots[slot.id];
    html += '<div class="b-sig' + (isMain ? ' main' : '') + '">' +
      '<div class="bs-label" style="color:' + slot.color + '">' +
      (isMain ? '\u2605 ' : '') + slot.label + '</div>' +
      '<div>' + (data ? data.snippet : '\u2014') + '</div></div>';
  }

  html += '</div>';
  card.innerHTML = html;
}

/* ============================================================
   MIRROR
   ============================================================ */

function goMirror() {
  show('p-mirror');
  document.getElementById('progressBar').classList.remove('on');
  document.getElementById('hdrInfo').textContent = 'YOUR PROFILE';

  var p = PROFILES[mainSignal];
  var mirror = document.getElementById('mirrorCard');
  mirror.innerHTML =
    '<div class="m-label">YOUR SIGNAL PROFILE</div>' +
    '<div class="m-dot-big" style="background:' + p.color + '"></div>' +
    '<div class="m-type">' + p.name + '</div>' +
    '<div class="m-desc">' + p.desc + '</div>';

  // Reveal noise
  var reveal = document.getElementById('noiseReveal');
  var noiseHtml = '<div class="noise-reveal"><h4>이런 노이즈도 있었습니다</h4>';
  var hasNoise = false;
  for (var i = 0; i < CARDS.length; i++) {
    if (CARDS[i].isNoise) {
      hasNoise = true;
      noiseHtml += '<div class="noise-item">\u26A0 <b>' + CARDS[i].title + '</b> \u2014 ' + CARDS[i].noiseReason + '</div>';
    }
  }
  noiseHtml += '</div>';
  reveal.innerHTML = hasNoise ? noiseHtml : '';
}

/* ============================================================
   EVENT LISTENERS (no inline onclick)
   ============================================================ */

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('navLeft').addEventListener('click', prevCard);
  document.getElementById('navRight').addEventListener('click', nextCard);
  document.getElementById('toFutureBtn').addEventListener('click', goFuture);
  document.getElementById('toAssembleBtn').addEventListener('click', goAssemble);
  document.getElementById('toBriefingBtn').addEventListener('click', goBriefing);
  document.getElementById('toMirrorBtn').addEventListener('click', goMirror);
  document.getElementById('restartBtn').addEventListener('click', function() {
    location.reload();
  });
});
</script>
</body>
</html>
