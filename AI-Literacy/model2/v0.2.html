<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Agent — AI 리터러시 모델2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #FFFFFF; --fg: #111; --border: #111;
    --g1: #F5F5F5; --g2: #CCC; --g3: #888; --g4: #666;
    --blue: #2563EB; --yellow: #CA8A04; --red: #DC2626; --purple: #7C3AED;
    --green: #16A34A;
    --mono: 'SF Mono','Menlo','Monaco','Courier New', monospace;
    --sans: -apple-system,'Noto Sans KR', sans-serif;
    --r: 4px;
  }
  body { font-family: var(--sans); background: var(--bg); color: var(--fg); line-height: 1.5; }
  .app { max-width: 640px; margin: 0 auto; padding: 16px; }

  /* HEADER */
  .hdr { border: 2px solid var(--border); padding: 10px 14px; margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: center; font-family: var(--mono); }
  .hdr-title { font-size: 13px; font-weight: bold; letter-spacing: 1px; }
  .hdr-info { font-size: 11px; color: var(--g3); }

  /* PHASE */
  .phase { display: none; }
  .phase.on { display: block; }

  /* BOARD — 항상 상단에 표시 */
  .board { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  @media (max-width: 500px) { .board { grid-template-columns: 1fr; } }

  .slot {
    border: 2px dashed var(--g2); border-radius: var(--r);
    padding: 14px; min-height: 80px; cursor: pointer;
    transition: all 0.2s; position: relative;
  }
  .slot:hover { border-color: var(--g3); background: var(--g1); }
  .slot.active-slot { border: 3px solid var(--border); border-style: solid; background: var(--g1); }
  .slot.filled { border-style: solid; opacity: 0.7; cursor: default; }
  .slot.filled:hover { background: transparent; }

  .slot-label { font-family: var(--mono); font-size: 10px; letter-spacing: 1px;
    display: flex; align-items: center; gap: 5px; margin-bottom: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .slot-prompt { font-size: 13px; color: var(--g4); }
  .slot-filled-text { font-size: 12px; font-weight: bold; }
  .slot-status { position: absolute; top: 8px; right: 10px; font-family: var(--mono); font-size: 10px; }

  /* MISSION VIEW */
  .mission { border: 2px solid var(--border); padding: 16px; margin-bottom: 12px; }
  .mission-header { font-family: var(--mono); font-size: 11px; letter-spacing: 1px;
    margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .mission-question { font-size: 15px; font-weight: bold; margin-bottom: 12px; line-height: 1.4; }
  .mission-hint { font-size: 12px; color: var(--g3); margin-bottom: 14px; }

  /* ARTICLE (정보 텍스트) */
  .article {
    border: 1px solid var(--g2); border-radius: var(--r);
    padding: 12px 14px; margin-bottom: 8px;
    font-size: 13px; line-height: 1.6; color: var(--g4);
  }
  .article .a-source { font-family: var(--mono); font-size: 10px; color: var(--g2); margin-top: 6px; }
  .article b { color: var(--fg); }

  /* ANSWER OPTIONS */
  .options { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .opt {
    border: 2px solid var(--border); border-radius: var(--r);
    padding: 10px 14px; cursor: pointer; font-size: 13px;
    transition: all 0.15s;
  }
  .opt:hover { background: var(--g1); }
  .opt.selected { background: var(--fg); color: var(--bg); }
  .opt.correct { border-color: var(--green); background: #F0FDF4; color: var(--fg); }
  .opt.wrong { border-color: var(--red); background: #FEF2F2; color: var(--fg); }

  /* FEEDBACK */
  .feedback {
    border: 2px solid var(--border); border-radius: var(--r);
    padding: 14px; margin-top: 10px; font-size: 13px; line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback .fb-label { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; margin-bottom: 4px; }

  /* BUTTONS */
  .btn {
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.5px;
    padding: 8px 16px; border: 2px solid var(--border);
    background: var(--bg); cursor: pointer; border-radius: var(--r);
    transition: all 0.15s;
  }
  .btn:hover { background: var(--fg); color: var(--bg); }
  .btn-primary { background: var(--fg); color: var(--bg); }
  .btn-primary:hover { background: var(--bg); color: var(--fg); }
  .center { text-align: center; }
  .mt { margin-top: 16px; }
  .mb { margin-bottom: 16px; }

  /* INTRO */
  .intro-box { border: 2px solid var(--border); padding: 28px; text-align: center; }
  .intro-box h2 { font-family: var(--mono); font-size: 18px; letter-spacing: 2px; margin-bottom: 6px; }
  .intro-role { font-size: 12px; color: var(--g3); margin-bottom: 20px; }
  .intro-mission { border: 2px solid var(--border); background: var(--g1);
    padding: 16px; max-width: 440px; margin: 0 auto 20px auto; text-align: left; }
  .intro-mission .im-label { font-family: var(--mono); font-size: 10px; color: var(--g3);
    letter-spacing: 1px; margin-bottom: 6px; }
  .intro-mission .im-title { font-size: 15px; font-weight: bold; margin-bottom: 8px; }
  .intro-mission .im-desc { font-size: 13px; color: var(--g4); }

  /* BRIEFING */
  .briefing { border: 3px solid var(--border); padding: 20px; margin-bottom: 14px; }
  .briefing .b-label { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--g3); margin-bottom: 4px; }
  .briefing .b-headline { font-size: 18px; font-weight: bold; margin-bottom: 14px; line-height: 1.3; }
  .b-signals { display: flex; flex-direction: column; gap: 8px; }
  .b-sig { border: 1px solid var(--g2); padding: 10px; border-radius: var(--r); font-size: 12px; }
  .b-sig.main { border: 2px solid var(--border); background: var(--g1); }
  .b-sig .bs-label { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; margin-bottom: 3px; }

  /* MIRROR */
  .mirror { border: 3px solid var(--border); padding: 24px; text-align: center; margin-bottom: 14px; }
  .mirror .m-label { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--g3); margin-bottom: 8px; }
  .mirror .m-dot { width: 20px; height: 20px; border-radius: 50%; margin: 0 auto 10px; }
  .mirror .m-type { font-size: 20px; font-weight: bold; margin-bottom: 6px; }
  .mirror .m-desc { font-size: 13px; color: var(--g4); }

  .missed { border: 1px solid var(--g2); padding: 12px; border-radius: var(--r); margin-bottom: 14px; }
  .missed h4 { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; color: var(--g3); margin-bottom: 6px; }
  .missed li { font-size: 12px; color: var(--g4); list-style: none; margin-bottom: 3px; }

  /* ASSEMBLE */
  .asm-section { border: 2px solid var(--border); padding: 14px; margin-bottom: 10px; }
  .asm-section h4 { font-family: var(--mono); font-size: 11px; letter-spacing: 1px; margin-bottom: 8px; }
  .headline-opt {
    border: 2px solid var(--border); border-radius: var(--r);
    padding: 10px 14px; cursor: pointer; font-size: 14px; font-weight: bold;
    transition: all 0.15s; margin-bottom: 6px;
  }
  .headline-opt:hover { background: var(--g1); }
  .headline-opt.selected { background: var(--fg); color: var(--bg); }
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <div class="hdr-title">SIGNAL AGENT</div>
    <div class="hdr-info" id="hdrInfo">STANDBY</div>
  </div>

  <!-- ===== INTRO ===== -->
  <div class="phase on" id="p-intro">
    <div class="intro-box">
      <h2>SIGNAL AGENT</h2>
      <div class="intro-role">AI 시대의 신호를 읽는 사람</div>
      <div class="intro-mission">
        <div class="im-label">TODAY'S MISSION</div>
        <div class="im-title">AI가 그린 그림이 미술 대회에서 대상을 탔다</div>
        <div class="im-desc">4가지 신호를 찾아 보드를 채우세요. 각 신호마다 정보를 읽고, 핵심을 찾아야 합니다.</div>
      </div>
      <button class="btn btn-primary" onclick="startGame()">미션 시작</button>
    </div>
  </div>

  <!-- ===== MAIN GAME (board + missions) ===== -->
  <div class="phase" id="p-game">
    <!-- BOARD: 항상 보임 -->
    <div class="board" id="board"></div>

    <!-- MISSION AREA: 슬롯 클릭 시 여기에 미션 표시 -->
    <div id="missionArea"></div>

    <!-- 조립 버튼 -->
    <div class="center mt" id="assembleWrap" style="display:none;">
      <button class="btn btn-primary" onclick="goAssemble()">브리핑 조립 →</button>
    </div>
  </div>

  <!-- ===== ASSEMBLE ===== -->
  <div class="phase" id="p-assemble">
    <div class="asm-section">
      <h4>가장 중요한 신호는?</h4>
      <div id="mainSigOpts"></div>
    </div>
    <div class="asm-section">
      <h4>내 브리핑의 헤드라인</h4>
      <div id="headlineOpts"></div>
    </div>
    <div class="center mt" id="briefingBtnWrap" style="display:none;">
      <button class="btn btn-primary" onclick="goBriefing()">브리핑 생성 →</button>
    </div>
  </div>

  <!-- ===== BRIEFING ===== -->
  <div class="phase" id="p-briefing">
    <div class="briefing" id="briefingCard"></div>
    <div class="center mt">
      <button class="btn btn-primary" onclick="goMirror()">결과 보기 →</button>
    </div>
  </div>

  <!-- ===== MIRROR ===== -->
  <div class="phase" id="p-mirror">
    <div class="mirror" id="mirrorCard"></div>
    <div class="missed" id="missedArea" style="display:none;"></div>
    <div class="center mt">
      <button class="btn" onclick="location.reload()">다시 하기</button>
    </div>
  </div>

</div>

<script>
// ===== DATA =====

const SLOTS = [
  { id:'tech', label:'TECH 기술 신호', color:'var(--blue)', dotClass:'dot-b',
    question:'이 사건의 기술적 배경은?',
    hint:'기사를 읽고, 기술 관련 핵심 사실을 찾으세요.',
    articles: [
      { text:'최신 이미지 생성 AI는 텍스트 한 줄만 입력하면 <b>3초 안에 고해상도 이미지</b>를 만든다. 1년 전만 해도 손가락 개수를 틀렸는데, 지금은 사진과 구별이 거의 안 된다.', source:'Tech Crunch, 2026.02' },
      { text:'AI 이미지 모델은 인터넷에서 수집한 약 <b>50억 장의 이미지</b>로 학습했다. 이 중 상당수는 원작자 동의 없이 수집된 것으로 알려졌다.', source:'네이처 논문, 2025.11' },
      { text:'콜로라도 주 미술대회에서 1등을 한 작품이 <b>AI 도구(Midjourney)로 만들어진 것</b>으로 드러나 논란이 됐다. 출품자는 "AI는 도구일 뿐"이라고 주장했다.', source:'NYT, 2023.09' },
    ],
    options: [
      { id:'t1', text:'AI 이미지 생성은 3초면 끝나고, 사진과 구별이 안 되는 수준에 도달했다', correct:true },
      { id:'t2', text:'AI가 만든 그림은 99%의 사람이 구별하지 못한다는 실험 결과가 있다', correct:false, why:'99%라는 수치는 검증된 실험에서 나온 것이 아닙니다. 기사에는 "구별이 거의 안 된다"고만 되어 있습니다.' },
      { id:'t3', text:'AI 이미지 모델은 저작권자 동의를 받은 이미지만으로 학습한다', correct:false, why:'기사에 따르면 "상당수는 원작자 동의 없이 수집"되었습니다.' },
    ]
  },
  { id:'social', label:'SOCIAL 사회 신호', color:'var(--yellow)', dotClass:'dot-y',
    question:'사회는 이 변화에 어떻게 반응하고 있나?',
    hint:'기사를 읽고, 사회적 반응의 핵심을 찾으세요.',
    articles: [
      { text:'EU는 2026년부터 AI로 생성된 이미지에 <b>반드시 표시를 붙이도록 법제화</b>했다. "사람이 만든 것과 AI가 만든 것을 구별할 권리"가 법적으로 보장된 셈이다.', source:'BBC, 2026.01' },
      { text:'전국 미술 교사 500명 대상 설문에서 <b>78%가 수행평가에서 AI 사용을 반대</b>했다. 반면 학생 설문에서는 62%가 "도구로 허용해야 한다"고 답했다.', source:'교육신문, 2026.03' },
      { text:'콜로라도 대회 이후 미국 주요 미술 공모전 <b>3곳 중 2곳이 AI 작품 출품 규정을 신설</b>했다. 대부분 "AI 사용 여부를 명시"하도록 하는 규정이다.', source:'ArtNet, 2025.08' },
    ],
    options: [
      { id:'s1', text:'법과 규정이 빠르게 바뀌고 있고, 교사와 학생의 시각이 다르다', correct:true },
      { id:'s2', text:'미국 학생의 90%가 이미 AI로 숙제를 하고 있다', correct:false, why:'이 수치는 기사에 나오지 않습니다. 출처가 확인되지 않은 정보입니다.' },
      { id:'s3', text:'대부분의 나라가 AI 이미지를 전면 금지하는 방향으로 가고 있다', correct:false, why:'기사에 따르면 "금지"가 아니라 "표시 의무화"와 "규정 신설"입니다. 허용하되 투명성을 요구하는 방향입니다.' },
    ]
  },
  { id:'personal', label:'PERSONAL 개인 신호', color:'var(--red)', dotClass:'dot-r',
    question:'이 이슈가 나에게 의미하는 건?',
    hint:'아래 중에서 가장 와닿는 것을 고르세요. 정답은 없습니다.',
    articles: [
      { text:'미술 시간에 친구가 AI로 5분 만에 포스터를 완성했다. 예쁘다. 나는 아직 스케치도 못 끝냈다. <b>손으로 직접 그리는 게 의미가 있는 걸까?</b>', source:'학생 일기' },
      { text:'수행평가 기준이 "작품의 완성도"인데, AI를 쓰면 완성도는 확실히 올라간다. <b>근데 그게 내 실력인가?</b> 선생님은 아직 기준을 정하지 못했다.', source:'교실 관찰' },
    ],
    options: [
      { id:'p1', text:'수행평가 기준이 달라질 것 같다 — AI를 쓸 수 있게 되면, "잘 그리는 것"의 의미가 바뀌니까', correct:true, isPersonal:true },
      { id:'p2', text:'나는 그림을 잘 못 그리는데, AI 덕분에 표현할 수 있는 게 늘어날 수도 있다', correct:true, isPersonal:true },
      { id:'p3', text:'솔직히 별로 상관없다 — 미술에 관심이 없으니까', correct:true, isPersonal:true },
    ]
  },
  { id:'future', label:'FUTURE 미래 신호', color:'var(--purple)', dotClass:'dot-p',
    question:'이게 계속되면, 5년 후에는?',
    hint:'두 개의 시나리오 조각을 골라 연결하세요.',
    articles: [
      { text:'갤러리들이 "AI 아트" 전용 섹션을 열기 시작했다. 일부는 <b>AI 작품만을 위한 공모전</b>도 만들었다. 새로운 장르로 받아들이는 분위기.', source:'ArtReview, 2026.01' },
      { text:'빈티지 필름 카메라가 다시 유행하듯, <b>"사람이 직접 그린 그림"에 프리미엄</b>이 붙기 시작했다. 핸드메이드 라벨처럼.', source:'디자인 매거진, 2025.12' },
      { text:'"AI로 만들되, <b>어떤 프롬프트를 쓰고 어떻게 편집하느냐</b>가 실력이 되는 시대"라고 한 디자이너는 말한다. 도구를 다루는 감각이 새로운 역량이라는 것.', source:'디자이너 인터뷰, 2026.02' },
    ],
    options: [
      { id:'f1', text:'AI 아트가 주류가 된다 + 사람 그림이 프리미엄이 된다 → 공존하되 구분된다', correct:true, isFuture:true },
      { id:'f2', text:'AI와 사람의 협업이 새 장르가 된다 + 도구를 다루는 감각이 실력이 된다', correct:true, isFuture:true },
      { id:'f3', text:'사람 그림이 프리미엄이 된다 + AI와 사람의 협업이 새 장르가 된다 → 결국 사람이 중심', correct:true, isFuture:true },
    ]
  },
];

const HEADLINES = [
  '기술은 빠르게 바뀌고 있다 — 적응이 핵심이다',
  '사회는 아직 준비가 안 됐다 — 규칙이 먼저다',
  '결국 이건 내 문제다 — 나는 어떻게 할 것인가',
  '미래는 열려 있다 — 방향은 우리가 정한다',
];

const PROFILES = {
  tech: { name:'기술 중심형', desc:'변화의 속도를 먼저 본다. 새로운 기술이 무엇을 가능하게 하는지에 주목하는 사람.', color:'var(--blue)' },
  social: { name:'사회 관찰형', desc:'사람들의 반응을 먼저 본다. 기술보다 그것이 만드는 사회적 파장에 주목하는 사람.', color:'var(--yellow)' },
  personal: { name:'개인 체감형', desc:'나에게 닿는 것을 먼저 본다. 거대한 변화 속에서 내 일상이 어떻게 달라지는지에 주목하는 사람.', color:'var(--red)' },
  future: { name:'미래 설계형', desc:'앞으로 어디로 가는지를 먼저 본다. 지금의 신호에서 내일의 방향을 읽으려는 사람.', color:'var(--purple)' },
};

// ===== STATE =====
let filled = {}; // slotId -> chosen option text
let activeSlot = null;
let mainSig = null;
let chosenHeadline = null;

// ===== RENDER =====

function show(id) {
  document.querySelectorAll('.phase').forEach(p => p.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

function startGame() {
  show('p-game');
  document.getElementById('hdrInfo').textContent = '신호를 찾으세요';
  renderBoard();
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  let filledCount = 0;
  SLOTS.forEach(slot => {
    const isFilled = !!filled[slot.id];
    if (isFilled) filledCount++;
    const isActive = activeSlot === slot.id;
    const el = document.createElement('div');
    el.className = 'slot' + (isFilled ? ' filled' : '') + (isActive ? ' active-slot' : '');
    el.innerHTML = `
      <div class="slot-label"><span class="dot" style="background:${slot.color}"></span>${slot.label}</div>
      ${isFilled
        ? `<div class="slot-filled-text">${filled[slot.id]}</div><div class="slot-status" style="color:var(--green)">✓</div>`
        : `<div class="slot-prompt">${slot.question}</div>`
      }
    `;
    if (!isFilled) el.onclick = () => openMission(slot.id);
    board.appendChild(el);
  });

  // 4개 다 채웠으면 조립 버튼
  document.getElementById('assembleWrap').style.display = filledCount === 4 ? 'block' : 'none';
  document.getElementById('hdrInfo').textContent = `${filledCount}/4 신호 수집`;
}

function openMission(slotId) {
  activeSlot = slotId;
  renderBoard();
  const slot = SLOTS.find(s => s.id === slotId);
  const area = document.getElementById('missionArea');

  area.innerHTML = `
    <div class="mission">
      <div class="mission-header"><span class="dot" style="background:${slot.color}; width:8px; height:8px;"></span>${slot.label}</div>
      <div class="mission-question">${slot.question}</div>
      <div class="mission-hint">${slot.hint}</div>

      ${slot.articles.map(a => `
        <div class="article">${a.text}<div class="a-source">${a.source}</div></div>
      `).join('')}

      <div class="options" id="opts-${slot.id}">
        ${slot.options.map(o => `
          <div class="opt" id="opt-${o.id}" onclick="pickOption('${slot.id}','${o.id}')">${o.text}</div>
        `).join('')}
      </div>

      <div class="feedback" id="fb-${slot.id}"></div>
    </div>
  `;

  area.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function pickOption(slotId, optId) {
  const slot = SLOTS.find(s => s.id === slotId);
  const opt = slot.options.find(o => o.id === optId);
  const isPersonal = slot.id === 'personal';
  const isFuture = slot.id === 'future';

  // Personal & Future: 정답 없음, 바로 채움
  if (isPersonal || isFuture) {
    // 선택 표시
    slot.options.forEach(o => {
      document.getElementById('opt-' + o.id).classList.remove('selected');
    });
    document.getElementById('opt-' + optId).classList.add('selected');

    filled[slotId] = opt.text.length > 40 ? opt.text.substring(0, 40) + '…' : opt.text;

    const fb = document.getElementById('fb-' + slotId);
    fb.className = 'feedback show';
    fb.innerHTML = `<div class="fb-label">${isPersonal ? '당신의 개인 신호' : '당신의 미래 시나리오'}</div>
      "${opt.text}"<br><br>
      <button class="btn btn-primary" onclick="closeMission()">보드로 돌아가기</button>`;
    return;
  }

  // Tech & Social: 맞는 것 찾기
  if (opt.correct) {
    document.getElementById('opt-' + optId).classList.add('correct');

    filled[slotId] = opt.text.length > 40 ? opt.text.substring(0, 40) + '…' : opt.text;

    const fb = document.getElementById('fb-' + slotId);
    fb.className = 'feedback show';
    fb.innerHTML = `<div class="fb-label">✓ SIGNAL FOUND</div>
      기사에서 확인된 핵심 사실입니다.<br><br>
      <button class="btn btn-primary" onclick="closeMission()">보드로 돌아가기</button>`;

    // 나머지 옵션 비활성화
    slot.options.forEach(o => {
      if (o.id !== optId) document.getElementById('opt-' + o.id).style.pointerEvents = 'none';
    });
  } else {
    document.getElementById('opt-' + optId).classList.add('wrong');
    const fb = document.getElementById('fb-' + slotId);
    fb.className = 'feedback show';
    fb.innerHTML = `<div class="fb-label" style="color:var(--red)">⚠ NOISE</div>${opt.why}<br><br><span style="font-size:12px; color:var(--g3);">다시 골라보세요.</span>`;

    // 틀린 건 비활성화
    document.getElementById('opt-' + optId).style.pointerEvents = 'none';
    document.getElementById('opt-' + optId).style.opacity = '0.4';
  }
}

function closeMission() {
  activeSlot = null;
  document.getElementById('missionArea').innerHTML = '';
  renderBoard();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== ASSEMBLE =====
function goAssemble() {
  show('p-assemble');
  document.getElementById('hdrInfo').textContent = 'ASSEMBLE';
  renderAssemble();
}

function renderAssemble() {
  const msOpts = document.getElementById('mainSigOpts');
  msOpts.innerHTML = '';
  SLOTS.forEach(s => {
    const el = document.createElement('div');
    el.className = 'opt' + (mainSig === s.id ? ' selected' : '');
    el.innerHTML = `<span class="dot" style="background:${s.color}; width:8px; height:8px; display:inline-block; margin-right:6px;"></span>${s.label}`;
    el.onclick = () => { mainSig = s.id; renderAssemble(); checkAssemble(); };
    msOpts.appendChild(el);
  });

  const hlOpts = document.getElementById('headlineOpts');
  hlOpts.innerHTML = '';
  HEADLINES.forEach((h, i) => {
    const el = document.createElement('div');
    el.className = 'headline-opt' + (chosenHeadline === i ? ' selected' : '');
    el.textContent = h;
    el.onclick = () => { chosenHeadline = i; renderAssemble(); checkAssemble(); };
    hlOpts.appendChild(el);
  });
}

function checkAssemble() {
  document.getElementById('briefingBtnWrap').style.display =
    (mainSig && chosenHeadline !== null) ? 'block' : 'none';
}

// ===== BRIEFING =====
function goBriefing() {
  show('p-briefing');
  document.getElementById('hdrInfo').textContent = 'BRIEFING';

  const card = document.getElementById('briefingCard');
  card.innerHTML = `
    <div class="b-label">SIGNAL BRIEFING</div>
    <div class="b-headline">${HEADLINES[chosenHeadline]}</div>
    <div class="b-signals">
      ${SLOTS.map(s => `
        <div class="b-sig ${s.id === mainSig ? 'main' : ''}">
          <div class="bs-label" style="color:${s.color}">${s.id === mainSig ? '★ ' : ''}${s.label}</div>
          <div>${filled[s.id]}</div>
        </div>
      `).join('')}
    </div>
  `;
}

// ===== MIRROR =====
function goMirror() {
  show('p-mirror');
  document.getElementById('hdrInfo').textContent = 'YOUR PROFILE';

  const p = PROFILES[mainSig];
  document.getElementById('mirrorCard').innerHTML = `
    <div class="m-label">YOUR SIGNAL PROFILE</div>
    <div class="m-dot" style="background:${p.color}"></div>
    <div class="m-type">${p.name}</div>
    <div class="m-desc">${p.desc}</div>
  `;

  // 놓친 것들 — 틀린 선택지 중 흥미로운 것
  const area = document.getElementById('missedArea');
  const missed = [];
  SLOTS.forEach(s => {
    if (s.id === 'personal' || s.id === 'future') return;
    s.options.filter(o => !o.correct).forEach(o => {
      missed.push(`"${o.text}" — ${o.why}`);
    });
  });
  if (missed.length > 0) {
    area.style.display = 'block';
    area.innerHTML = `<h4>이런 노이즈도 있었습니다</h4><ul>${missed.map(m => `<li>⚠ ${m}</li>`).join('')}</ul>`;
  }
}
</script>
