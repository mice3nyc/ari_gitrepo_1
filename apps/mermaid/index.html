<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mermaid Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Silkscreen', monospace;
    background: #fff;
    color: #000;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* --- Mac SE Window Title Bar --- */
  .win-bar {
    background: repeating-linear-gradient(180deg, transparent 0px, transparent 2px, #000 2px, #000 3px);
    padding: 4px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 24px;
  }

  .win-bar-title {
    background: #fff;
    padding: 1px 12px;
    font-family: 'Silkscreen', monospace;
    font-size: 13px;
    font-weight: 700;
    color: #000;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* --- Lock Screen --- */
  .lock-screen {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #fff;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .lock-screen.hidden {
    display: none;
  }

  .lock-box {
    text-align: center;
    max-width: 340px;
    width: 100%;
    border: 2px solid #000;
    box-shadow: 4px 4px 0 #000;
    background: #fff;
  }

  .lock-box .lock-win-bar {
    background: repeating-linear-gradient(180deg, transparent 0px, transparent 2px, #000 2px, #000 3px);
    padding: 4px 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .lock-box .lock-win-bar span {
    background: #fff;
    padding: 1px 12px;
    font-family: 'Silkscreen', monospace;
    font-size: 13px;
    font-weight: 700;
    color: #000;
    text-transform: uppercase;
  }

  .lock-box-inner {
    padding: 24px;
  }

  .lock-box h2 {
    display: none;
  }

  .lock-box p {
    font-family: 'Silkscreen', monospace;
    font-size: 12px;
    color: #000;
    margin-bottom: 20px;
  }

  .lock-box input[type="password"] {
    width: 100%;
    padding: 8px 10px;
    border: 2px solid #000;
    border-radius: 0;
    font-size: 14px;
    font-family: 'VT323', monospace;
    outline: none;
    margin-bottom: 12px;
    background: #fff;
    color: #000;
  }

  .lock-box input[type="password"]:focus {
    border-color: #000;
    box-shadow: 2px 2px 0 #000;
  }

  .lock-box .btn-unlock {
    width: 100%;
    padding: 8px;
    background: #000;
    color: #fff;
    border: 2px solid #000;
    border-radius: 0;
    font-size: 13px;
    font-family: 'Silkscreen', monospace;
    cursor: pointer;
    margin-bottom: 16px;
    box-shadow: 2px 2px 0 #000;
    text-transform: uppercase;
  }

  .lock-box .btn-unlock:hover {
    background: #fff;
    color: #000;
  }

  .lock-box .lock-error {
    color: #000;
    font-family: 'Silkscreen', monospace;
    font-size: 13px;
    margin-bottom: 12px;
    min-height: 18px;
  }

  .lock-box .btn-guest {
    background: none;
    border: none;
    color: #000;
    font-size: 12px;
    font-family: 'Silkscreen', monospace;
    cursor: pointer;
    text-decoration: underline;
  }

  .lock-box .btn-guest:hover {
    color: #000;
    text-decoration: none;
  }

  /* --- Main App --- */
  header {
    padding: 0;
    border-bottom: 2px solid #000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: repeating-linear-gradient(180deg, transparent 0px, transparent 2px, #000 2px, #000 3px);
    min-height: 28px;
    position: relative;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 0;
    position: absolute;
    left: 8px;
    z-index: 1;
  }

  .header-center {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .btn-sidebar-toggle {
    background: #fff;
    border: 2px solid #000;
    padding: 2px 6px;
    font-size: 12px;
    cursor: pointer;
    border-radius: 0;
    color: #000;
    line-height: 1;
    box-shadow: 2px 2px 0 #000;
    font-family: 'Silkscreen', monospace;
  }

  .btn-sidebar-toggle:hover {
    background: #000;
    color: #fff;
  }

  header h1 {
    background: #fff;
    padding: 1px 14px;
    font-family: 'Silkscreen', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #000;
  }

  .toolbar {
    display: flex;
    gap: 4px;
    position: absolute;
    right: 8px;
    z-index: 1;
  }

  .toolbar button {
    background: #fff;
    border: 2px solid #000;
    padding: 3px 10px;
    font-size: 12px;
    font-family: 'Silkscreen', monospace;
    cursor: pointer;
    border-radius: 0;
    color: #000;
    box-shadow: 2px 2px 0 #000;
    text-transform: uppercase;
  }

  .toolbar button:hover {
    background: #000;
    color: #fff;
  }

  .btn-toggle {
    background: #fff;
    border: 2px solid #000;
    padding: 1px 6px;
    font-size: 12px;
    font-family: 'Silkscreen', monospace;
    cursor: pointer;
    border-radius: 0;
    color: #000;
    line-height: 1;
    box-shadow: 2px 2px 0 #000;
  }

  .btn-toggle:hover {
    background: #000;
    color: #fff;
  }

  .main {
    flex: 1;
    display: flex;
    min-height: 0;
    position: relative;
  }

  /* Sidebar */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    border-right: 2px solid #000;
    background: #fff;
    display: flex;
    flex-direction: column;
    min-height: 0;
    transition: width 0.15s ease, opacity 0.15s ease;
    overflow: hidden;
  }

  .sidebar.collapsed {
    width: 0;
    border-right: none;
    opacity: 0;
    pointer-events: none;
  }

  .sidebar-header {
    padding: 8px 8px;
    border-bottom: 2px solid #000;
    flex-shrink: 0;
  }

  .btn-new {
    width: 100%;
    background: #fff;
    border: 2px solid #000;
    padding: 5px 8px;
    font-size: 12px;
    font-family: 'Silkscreen', monospace;
    cursor: pointer;
    border-radius: 0;
    color: #000;
    text-align: left;
    box-shadow: 2px 2px 0 #000;
    text-transform: uppercase;
  }

  .btn-new:hover {
    background: #000;
    color: #fff;
  }

  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 2px 0;
  }

  .sidebar-footer {
    padding: 6px 8px;
    border-top: 2px solid #000;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .sidebar-footer button {
    width: 100%;
    background: #fff;
    border: 2px solid #000;
    padding: 4px 6px;
    font-size: 13px;
    font-family: 'Silkscreen', monospace;
    cursor: pointer;
    border-radius: 0;
    color: #000;
    text-align: left;
    box-shadow: 1px 1px 0 #000;
  }

  .sidebar-footer button:hover {
    background: #000;
    color: #fff;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    padding: 6px 8px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Silkscreen', monospace;
    color: #000;
    position: relative;
    gap: 4px;
  }

  .sidebar-item:hover {
    background: #000;
    color: #fff;
  }

  .sidebar-item.active {
    background: #000;
    color: #fff;
    font-weight: 700;
  }

  .sidebar-item-fav {
    font-size: 12px;
    flex-shrink: 0;
    margin-right: 2px;
    line-height: 1;
  }

  .sidebar-item-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }

  .sidebar-item-name-input {
    flex: 1;
    border: 2px solid #000;
    border-radius: 0;
    padding: 1px 4px;
    font-size: 12px;
    font-family: 'Silkscreen', monospace;
    outline: none;
    min-width: 0;
    background: #fff;
    color: #000;
  }

  .sidebar-item-name-input:focus {
    box-shadow: 2px 2px 0 #000;
  }

  .sidebar-item-menu-btn {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    color: inherit;
    font-size: 14px;
    padding: 0 2px;
    line-height: 1;
    flex-shrink: 0;
    letter-spacing: -1px;
  }

  .sidebar-item:hover .sidebar-item-menu-btn {
    display: block;
    color: #fff;
  }

  .sidebar-item.active .sidebar-item-menu-btn {
    color: #fff;
  }

  /* Context menu */
  .context-menu {
    position: fixed;
    background: #fff;
    border: 2px solid #000;
    border-radius: 0;
    box-shadow: 2px 2px 0 #000;
    padding: 2px 0;
    z-index: 200;
    min-width: 150px;
    font-size: 12px;
    font-family: 'Silkscreen', monospace;
  }

  .context-menu-item {
    padding: 6px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    color: #000;
    white-space: nowrap;
  }

  .context-menu-item:hover {
    background: #000;
    color: #fff;
  }

  .context-menu-item.danger:hover {
    background: #000;
    color: #fff;
  }

  .context-menu-item .menu-icon {
    font-size: 12px;
    width: 16px;
    text-align: center;
    flex-shrink: 0;
  }

  .context-menu-sep {
    height: 2px;
    background: #000;
    margin: 2px 0;
  }

  /* Editor & Preview panes */
  .editor-pane, .preview-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    transition: flex 0.15s ease;
  }

  .editor-pane {
    border-right: 2px solid #000;
  }

  .editor-pane.collapsed {
    flex: 0 0 0px;
    overflow: hidden;
    border-right: none;
  }

  .editor-pane.collapsed #editor,
  .editor-pane.collapsed .pane-label {
    display: none;
  }

  .pane-label {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #000;
    padding: 4px 8px;
    border-bottom: 2px solid #000;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'Silkscreen', monospace;
    background: #fff;
  }

  /* Edge button to show editor */
  .btn-edge-show-editor {
    display: none;
    background: #fff;
    border: 2px solid #000;
    border-radius: 0;
    cursor: pointer;
    color: #000;
    font-size: 12px;
    padding: 0 6px;
    font-family: 'Silkscreen', monospace;
    box-shadow: 2px 2px 0 #000;
    margin-right: 8px;
  }

  .btn-edge-show-editor:hover {
    background: #000;
    color: #fff;
  }

  .editor-collapsed .btn-edge-show-editor {
    display: inline-block;
  }

  #editor {
    flex: 1;
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    padding: 12px;
    font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.6;
    color: #000;
    background: #fff;
    tab-size: 2;
  }

  #preview {
    flex: 1;
    overflow: auto;
    padding: 20px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  #preview svg {
    max-width: 100%;
    height: auto;
  }

  .error {
    color: #000;
    font-size: 13px;
    font-family: 'VT323', monospace;
    padding: 12px;
    white-space: pre-wrap;
    word-break: break-word;
    border: 2px solid #000;
    margin: 12px;
  }

  /* Scrollbar styling for Mac SE feel */
  ::-webkit-scrollbar {
    width: 14px;
  }

  ::-webkit-scrollbar-track {
    background: #fff;
    border-left: 2px solid #000;
  }

  ::-webkit-scrollbar-thumb {
    background: #000;
    border: 2px solid #fff;
  }

  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      z-index: 100;
      width: 260px;
      box-shadow: 4px 0 0 #000;
    }

    .sidebar.collapsed {
      width: 0;
      box-shadow: none;
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.3);
      z-index: 99;
    }

    .sidebar-overlay.visible {
      display: block;
    }

    .main {
      flex-direction: column;
    }

    .editor-pane {
      border-right: none;
      border-bottom: 2px solid #000;
      flex: 1;
    }

    .preview-pane {
      flex: 1;
    }

    .toolbar button {
      padding: 2px 6px;
      font-size: 13px;
    }

    header h1 {
      font-size: 13px;
    }
  }
</style>
</head>
<body>

<!-- Lock Screen -->
<div class="lock-screen" id="lock-screen">
  <div class="lock-box">
    <div class="lock-win-bar"><span>Mermaid Viewer</span></div>
    <div class="lock-box-inner">
      <h2>Mermaid Viewer</h2>
      <p>Enter password to unlock your diagrams.</p>
      <div class="lock-error" id="lock-error"></div>
      <input type="password" id="lock-password" placeholder="Password" autocomplete="off">
      <button class="btn-unlock" id="btn-unlock">Unlock</button>
      <button class="btn-guest" id="btn-guest-mode">Use as guest</button>
    </div>
  </div>
</div>

<header>
  <div class="header-left">
    <button class="btn-sidebar-toggle" id="btn-sidebar-toggle" title="Toggle sidebar">&#9776;</button>
  </div>
  <div class="header-center">
    <h1>Mermaid Viewer</h1>
  </div>
  <div class="toolbar">
    <button id="btn-svg">SVG</button>
    <button id="btn-png">PNG</button>
  </div>
</header>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="btn-new" id="btn-new">+ New diagram</button>
    </div>
    <div class="sidebar-list" id="sidebar-list"></div>
    <div class="sidebar-footer" id="sidebar-footer"></div>
  </div>
  <div class="editor-pane" id="editor-pane">
    <div class="pane-label">
      <span>Editor</span>
      <button class="btn-toggle" id="btn-toggle" title="Collapse editor">&#9664;</button>
    </div>
    <textarea id="editor" spellcheck="false"></textarea>
  </div>
  <div class="preview-pane" id="preview-pane">
    <div class="pane-label">
      <button class="btn-edge-show-editor" id="btn-edge-show-editor" title="Show editor">&#9654;</button>
      <span>Preview</span>
    </div>
    <div id="preview"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: false,
    theme: 'neutral',
    themeVariables: {
      primaryColor: '#fff',
      primaryTextColor: '#000',
      primaryBorderColor: '#000',
      lineColor: '#000',
      secondaryColor: '#eee',
      tertiaryColor: '#ddd',
      noteBkgColor: '#fff',
      noteTextColor: '#000',
      noteBorderColor: '#000'
    },
    securityLevel: 'loose',
    fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif'
  });

  const STORAGE_KEY = 'mermaid-viewer-diagrams';
  const GUEST_STORAGE_KEY = 'mermaid-viewer-guest';
  const ENCRYPTED_KEY = 'mermaid-viewer-encrypted';
  const DIAGRAMS_INDEX_URL = 'diagrams/index.json';
  const DEFAULT_CODE = `graph TD
    A[Start] --> B{Decision}
    B -->|Yes| C[Do something]
    B -->|No| D[Do something else]
    C --> E[End]
    D --> E`;

  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');
  const sidebarList = document.getElementById('sidebar-list');
  const sidebarFooter = document.getElementById('sidebar-footer');
  const sidebar = document.getElementById('sidebar');
  const sidebarOverlay = document.getElementById('sidebar-overlay');
  const editorPane = document.getElementById('editor-pane');
  const previewPane = document.getElementById('preview-pane');
  const toggleBtn = document.getElementById('btn-toggle');
  const edgeShowEditorBtn = document.getElementById('btn-edge-show-editor');
  const sidebarToggleBtn = document.getElementById('btn-sidebar-toggle');
  const lockScreen = document.getElementById('lock-screen');
  const lockPasswordInput = document.getElementById('lock-password');
  const lockError = document.getElementById('lock-error');

  let diagrams = [];
  let activeId = null;
  let debounceTimer = null;
  let renderCount = 0;
  let openMenu = null;

  // --- Crypto state ---
  let isLockedMode = false;   // true if encrypted data exists
  let isGuestSession = false; // true if user chose guest mode despite encrypted data
  let cryptoKey = null;       // AES-GCM key derived from password (session only)
  let currentSalt = null;     // salt used for key derivation

  // =====================
  // Crypto Utilities
  // =====================
  function arrayBufferToBase64(buf) {
    return btoa(String.fromCharCode(...new Uint8Array(buf)));
  }

  function base64ToArrayBuffer(b64) {
    const str = atob(b64);
    const buf = new Uint8Array(str.length);
    for (let i = 0; i < str.length; i++) buf[i] = str.charCodeAt(i);
    return buf.buffer;
  }

  async function deriveKey(password, salt) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
      'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
    );
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['encrypt', 'decrypt']
    );
  }

  async function encryptData(data, key) {
    const enc = new TextEncoder();
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const encrypted = await crypto.subtle.encrypt(
      { name: 'AES-GCM', iv },
      key,
      enc.encode(JSON.stringify(data))
    );
    return { iv: arrayBufferToBase64(iv), data: arrayBufferToBase64(encrypted) };
  }

  async function decryptData(encObj, key) {
    const iv = base64ToArrayBuffer(encObj.iv);
    const data = base64ToArrayBuffer(encObj.data);
    const decrypted = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: new Uint8Array(iv) },
      key,
      data
    );
    return JSON.parse(new TextDecoder().decode(decrypted));
  }

  // =====================
  // Storage Layer
  // =====================
  function hasEncryptedData() {
    return !!localStorage.getItem(ENCRYPTED_KEY);
  }

  function loadGuestDiagrams() {
    try {
      const raw = localStorage.getItem(GUEST_STORAGE_KEY) || localStorage.getItem(STORAGE_KEY);
      if (raw) {
        diagrams = JSON.parse(raw);
        diagrams.forEach(d => {
          if (typeof d.favorite === 'undefined') d.favorite = false;
        });
        if (diagrams.length > 0) return;
      }
    } catch (e) {}
    diagrams = [{
      id: generateId(),
      name: 'Untitled 1',
      code: DEFAULT_CODE,
      favorite: false,
      updatedAt: Date.now()
    }];
    saveGuestDiagrams();
  }

  function saveGuestDiagrams() {
    localStorage.setItem(GUEST_STORAGE_KEY, JSON.stringify(diagrams));
  }

  async function saveEncryptedDiagrams() {
    if (!cryptoKey || !currentSalt) return;
    const encObj = await encryptData(diagrams, cryptoKey);
    const stored = {
      encrypted: true,
      salt: arrayBufferToBase64(currentSalt),
      iv: encObj.iv,
      data: encObj.data
    };
    localStorage.setItem(ENCRYPTED_KEY, JSON.stringify(stored));
  }

  async function loadEncryptedDiagrams(password) {
    const raw = localStorage.getItem(ENCRYPTED_KEY);
    if (!raw) throw new Error('No encrypted data');
    const stored = JSON.parse(raw);
    const salt = base64ToArrayBuffer(stored.salt);
    const key = await deriveKey(password, new Uint8Array(salt));
    const data = await decryptData(stored, key);
    // Success
    cryptoKey = key;
    currentSalt = new Uint8Array(salt);
    diagrams = data;
    diagrams.forEach(d => {
      if (typeof d.favorite === 'undefined') d.favorite = false;
    });
    isLockedMode = true;
  }

  function saveDiagrams() {
    if (isLockedMode && cryptoKey && !isGuestSession) {
      saveEncryptedDiagrams();
    } else {
      saveGuestDiagrams();
    }
  }

  function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  function getNextUntitledName() {
    const nums = diagrams
      .map(d => d.name.match(/^Untitled (\d+)$/))
      .filter(Boolean)
      .map(m => parseInt(m[1], 10));
    const max = nums.length > 0 ? Math.max(...nums) : 0;
    return 'Untitled ' + (max + 1);
  }

  // =====================
  // Repo diagrams merge
  // =====================
  async function loadRepoDiagrams() {
    try {
      const resp = await fetch(DIAGRAMS_INDEX_URL);
      if (!resp.ok) return;
      const index = await resp.json();
      if (!Array.isArray(index)) return;

      for (const entry of index) {
        const existing = diagrams.find(d => d.id === entry.id);
        if (existing) {
          if (entry.updatedAt > existing.updatedAt) {
            try {
              const mmdResp = await fetch('diagrams/' + entry.file);
              if (mmdResp.ok) {
                existing.code = await mmdResp.text();
                existing.name = entry.name;
                existing.favorite = entry.favorite || false;
                existing.updatedAt = entry.updatedAt;
              }
            } catch (e) {}
          }
        } else {
          try {
            const mmdResp = await fetch('diagrams/' + entry.file);
            if (mmdResp.ok) {
              diagrams.push({
                id: entry.id,
                name: entry.name,
                code: await mmdResp.text(),
                favorite: entry.favorite || false,
                updatedAt: entry.updatedAt
              });
            }
          } catch (e) {}
        }
      }
      saveDiagrams();
    } catch (e) {}
  }

  // =====================
  // Sidebar
  // =====================
  function sortedDiagrams() {
    return [...diagrams].sort((a, b) => {
      if (a.favorite && !b.favorite) return -1;
      if (!a.favorite && b.favorite) return 1;
      return b.updatedAt - a.updatedAt;
    });
  }

  function renderSidebar() {
    sidebarList.innerHTML = '';
    const sorted = sortedDiagrams();
    sorted.forEach(d => {
      const item = document.createElement('div');
      item.className = 'sidebar-item' + (d.id === activeId ? ' active' : '');
      item.dataset.id = d.id;

      if (d.favorite) {
        const favStar = document.createElement('span');
        favStar.className = 'sidebar-item-fav';
        favStar.textContent = '\u2B50';
        item.appendChild(favStar);
      }

      const nameSpan = document.createElement('span');
      nameSpan.className = 'sidebar-item-name';
      nameSpan.textContent = d.name;

      const menuBtn = document.createElement('button');
      menuBtn.className = 'sidebar-item-menu-btn';
      menuBtn.innerHTML = '&#x22EF;';
      menuBtn.title = 'More';

      item.appendChild(nameSpan);
      item.appendChild(menuBtn);
      sidebarList.appendChild(item);

      item.addEventListener('click', (e) => {
        if (e.target === menuBtn || e.target.tagName === 'INPUT') return;
        selectDiagram(d.id);
      });

      menuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        showContextMenu(e, d, item);
      });
    });

    renderSidebarFooter();
  }

  function renderSidebarFooter() {
    sidebarFooter.innerHTML = '';

    // Export
    const exportBtn = document.createElement('button');
    exportBtn.textContent = 'Export to file';
    exportBtn.addEventListener('click', exportToFile);
    sidebarFooter.appendChild(exportBtn);

    // Import
    const importBtn = document.createElement('button');
    importBtn.textContent = 'Import from file';
    importBtn.addEventListener('click', importFromFile);
    sidebarFooter.appendChild(importBtn);
  }

  // =====================
  // Context Menu
  // =====================
  function showContextMenu(e, diagram, itemEl) {
    closeContextMenu();

    const menu = document.createElement('div');
    menu.className = 'context-menu';

    const favItem = document.createElement('div');
    favItem.className = 'context-menu-item';
    favItem.innerHTML = `<span class="menu-icon">${diagram.favorite ? '\u2B50' : '\u2606'}</span> ${diagram.favorite ? 'Unfavorite' : 'Favorite'}`;
    favItem.addEventListener('click', (ev) => {
      ev.stopPropagation();
      diagram.favorite = !diagram.favorite;
      diagram.updatedAt = Date.now();
      saveDiagrams();
      closeContextMenu();
      renderSidebar();
    });
    menu.appendChild(favItem);

    const renameItem = document.createElement('div');
    renameItem.className = 'context-menu-item';
    renameItem.innerHTML = '<span class="menu-icon">\u270F\uFE0F</span> Rename';
    renameItem.addEventListener('click', (ev) => {
      ev.stopPropagation();
      closeContextMenu();
      startRename(itemEl, diagram);
    });
    menu.appendChild(renameItem);

    const sep = document.createElement('div');
    sep.className = 'context-menu-sep';
    menu.appendChild(sep);

    const deleteItem = document.createElement('div');
    deleteItem.className = 'context-menu-item danger';
    const canDelete = diagrams.length > 1;
    if (!canDelete) {
      deleteItem.style.opacity = '0.4';
      deleteItem.style.cursor = 'default';
    }
    deleteItem.innerHTML = '<span class="menu-icon">\uD83D\uDDD1\uFE0F</span> Delete';
    deleteItem.addEventListener('click', (ev) => {
      ev.stopPropagation();
      if (!canDelete) return;
      closeContextMenu();
      deleteDiagram(diagram.id);
    });
    menu.appendChild(deleteItem);

    document.body.appendChild(menu);
    openMenu = menu;

    const rect = menu.getBoundingClientRect();
    let top = e.clientY;
    let left = e.clientX;
    if (top + rect.height > window.innerHeight) top = window.innerHeight - rect.height - 8;
    if (left + rect.width > window.innerWidth) left = window.innerWidth - rect.width - 8;
    menu.style.top = top + 'px';
    menu.style.left = left + 'px';

    setTimeout(() => {
      document.addEventListener('click', closeContextMenuHandler);
      document.addEventListener('contextmenu', closeContextMenuHandler);
    }, 0);
  }

  function closeContextMenu() {
    if (openMenu) { openMenu.remove(); openMenu = null; }
    document.removeEventListener('click', closeContextMenuHandler);
    document.removeEventListener('contextmenu', closeContextMenuHandler);
  }

  function closeContextMenuHandler(e) {
    if (openMenu && !openMenu.contains(e.target)) closeContextMenu();
  }

  function startRename(item, diagram) {
    const nameSpan = item.querySelector('.sidebar-item-name');
    if (!nameSpan) return;
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'sidebar-item-name-input';
    input.value = diagram.name;
    nameSpan.replaceWith(input);
    input.focus();
    input.select();

    function finishRename() {
      const newName = input.value.trim() || diagram.name;
      diagram.name = newName;
      diagram.updatedAt = Date.now();
      saveDiagrams();
      renderSidebar();
    }

    input.addEventListener('blur', finishRename);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') input.blur();
      if (e.key === 'Escape') { input.value = diagram.name; input.blur(); }
    });
  }

  function selectDiagram(id) {
    saveCurrentCode();
    activeId = id;
    const d = diagrams.find(x => x.id === id);
    if (d) {
      editor.value = d.code;
      renderDiagram();
    }
    renderSidebar();
    if (window.innerWidth <= 768) {
      sidebar.classList.add('collapsed');
      sidebarOverlay.classList.remove('visible');
    }
  }

  function deleteDiagram(id) {
    if (diagrams.length <= 1) return;
    diagrams = diagrams.filter(d => d.id !== id);
    saveDiagrams();
    if (activeId === id) {
      const sorted = sortedDiagrams();
      selectDiagram(sorted[0].id);
    } else {
      renderSidebar();
    }
  }

  function createNewDiagram() {
    saveCurrentCode();
    const d = {
      id: generateId(),
      name: getNextUntitledName(),
      code: DEFAULT_CODE,
      favorite: false,
      updatedAt: Date.now()
    };
    diagrams.push(d);
    saveDiagrams();
    selectDiagram(d.id);
  }

  function saveCurrentCode() {
    if (!activeId) return;
    const d = diagrams.find(x => x.id === activeId);
    if (d && d.code !== editor.value) {
      d.code = editor.value;
      d.updatedAt = Date.now();
      saveDiagrams();
    }
  }

  // =====================
  // Rendering
  // =====================
  async function renderDiagram() {
    const code = editor.value.trim();
    if (!code) { preview.innerHTML = ''; return; }

    try {
      renderCount++;
      const id = 'mermaid-' + renderCount;
      const { svg } = await mermaid.render(id, code);
      preview.innerHTML = svg;
    } catch (err) {
      const errEl = document.getElementById('d' + 'mermaid-' + renderCount);
      if (errEl) errEl.remove();
      preview.innerHTML = '<div class="error">' + escapeHtml(err.message || String(err)) + '</div>';
    }
  }

  function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }

  // =====================
  // Editor events
  // =====================
  editor.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      renderDiagram();
      saveCurrentCode();
      renderSidebar();
    }, 300);
  });

  editor.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
      editor.selectionStart = editor.selectionEnd = start + 2;
    }
  });

  // =====================
  // SVG / PNG download
  // =====================
  function getSvgContent() {
    const svg = preview.querySelector('svg');
    if (!svg) return null;
    const clone = svg.cloneNode(true);
    clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    return new XMLSerializer().serializeToString(clone);
  }

  document.getElementById('btn-svg').addEventListener('click', () => {
    const svgStr = getSvgContent();
    if (!svgStr) return;
    const blob = new Blob([svgStr], { type: 'image/svg+xml' });
    downloadBlob(blob, 'mermaid-diagram.svg');
  });

  document.getElementById('btn-png').addEventListener('click', () => {
    const svgStr = getSvgContent();
    if (!svgStr) return;
    const svg = preview.querySelector('svg');
    const w = svg.viewBox.baseVal.width || svg.getBoundingClientRect().width;
    const h = svg.viewBox.baseVal.height || svg.getBoundingClientRect().height;
    const scale = 2;
    const canvas = document.createElement('canvas');
    canvas.width = w * scale;
    canvas.height = h * scale;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    const img = new Image();
    const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    img.onload = () => {
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      canvas.toBlob((pngBlob) => {
        downloadBlob(pngBlob, 'mermaid-diagram.png');
      }, 'image/png');
    };
    img.src = url;
  });

  function downloadBlob(blob, filename) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  // =====================
  // Toggle editor
  // =====================
  function setEditorCollapsed(collapsed) {
    if (collapsed) {
      editorPane.classList.add('collapsed');
      previewPane.classList.add('editor-collapsed');
    } else {
      editorPane.classList.remove('collapsed');
      previewPane.classList.remove('editor-collapsed');
    }
    toggleBtn.innerHTML = collapsed ? '&#9654;' : '&#9664;';
    toggleBtn.title = collapsed ? 'Expand editor' : 'Collapse editor';
  }

  toggleBtn.addEventListener('click', () => {
    setEditorCollapsed(!editorPane.classList.contains('collapsed'));
  });

  edgeShowEditorBtn.addEventListener('click', () => {
    setEditorCollapsed(false);
  });

  // =====================
  // Toggle sidebar
  // =====================
  sidebarToggleBtn.addEventListener('click', () => {
    sidebar.classList.toggle('collapsed');
    if (window.innerWidth <= 768) {
      sidebarOverlay.classList.toggle('visible', !sidebar.classList.contains('collapsed'));
    }
  });

  sidebarOverlay.addEventListener('click', () => {
    sidebar.classList.add('collapsed');
    sidebarOverlay.classList.remove('visible');
  });

  // =====================
  // New diagram button
  // =====================
  document.getElementById('btn-new').addEventListener('click', createNewDiagram);

  // =====================
  // Mobile
  // =====================
  function checkMobile() {
    if (window.innerWidth <= 768) {
      sidebar.classList.add('collapsed');
      sidebarOverlay.classList.remove('visible');
    }
  }


  // =====================
  // Export / Import
  // =====================
  function exportToFile() {
    let exportData;
    if (isLockedMode && !isGuestSession) {
      // Export encrypted blob
      const raw = localStorage.getItem(ENCRYPTED_KEY);
      if (!raw) return;
      exportData = raw;
    } else {
      // Export plain diagrams
      exportData = JSON.stringify(diagrams, null, 2);
    }
    const filename = isLockedMode && !isGuestSession ? 'encrypted.json' : 'diagrams.json';
    const blob = new Blob([exportData], { type: 'application/json' });
    downloadBlob(blob, filename);
  }

  function importFromFile() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);

        if (parsed.encrypted === true) {
          // It's encrypted data - store it and show lock screen
          localStorage.setItem(ENCRYPTED_KEY, text);
          isLockedMode = true;
          cryptoKey = null;
          currentSalt = null;
          // Show lock screen to unlock
          lockScreen.classList.remove('hidden');
          lockError.textContent = 'Imported encrypted file. Enter password to unlock.';
        } else if (Array.isArray(parsed)) {
          // Plain diagrams array
          diagrams = parsed;
          diagrams.forEach(d => {
            if (typeof d.favorite === 'undefined') d.favorite = false;
          });
          saveDiagrams();
          const sorted = sortedDiagrams();
          activeId = sorted[0].id;
          editor.value = sorted[0].code;
          renderSidebar();
          renderDiagram();
        }
      } catch (err) {
        alert('Failed to import: ' + err.message);
      }
    });
    input.click();
  }

  // Try to fetch diagrams/encrypted.json from server (for GitHub Pages)
  async function tryLoadRemoteEncrypted() {
    try {
      const resp = await fetch('diagrams/encrypted.json');
      if (!resp.ok) return false;
      const text = await resp.text();
      const parsed = JSON.parse(text);
      if (parsed.encrypted === true) {
        // Only load if no local encrypted data exists
        if (!hasEncryptedData()) {
          localStorage.setItem(ENCRYPTED_KEY, text);
          return true;
        }
      }
    } catch (e) {}
    return false;
  }

  // =====================
  // Lock Screen
  // =====================
  document.getElementById('btn-unlock').addEventListener('click', async () => {
    const pw = lockPasswordInput.value;
    if (!pw) { lockError.textContent = 'Enter a password.'; return; }

    if (hasEncryptedData()) {
      // Existing encrypted data — try to decrypt
      try {
        await loadEncryptedDiagrams(pw);
        lockScreen.classList.add('hidden');
        lockPasswordInput.value = '';
        lockError.textContent = '';
        startApp();
      } catch (e) {
        lockError.textContent = 'Wrong password.';
      }
    } else {
      // First use — create encrypted store with default diagram
      try {
        currentSalt = crypto.getRandomValues(new Uint8Array(16));
        cryptoKey = await deriveKey(pw, currentSalt);
        isLockedMode = true;
        isGuestSession = false;
        diagrams = [{
          id: generateId(),
          name: 'Untitled 1',
          code: DEFAULT_CODE,
          favorite: false,
          updatedAt: Date.now()
        }];
        await saveEncryptedDiagrams();
        lockScreen.classList.add('hidden');
        lockPasswordInput.value = '';
        lockError.textContent = '';
        startApp();
      } catch (e) {
        lockError.textContent = 'Encryption failed.';
      }
    }
  });

  lockPasswordInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('btn-unlock').click();
  });

  document.getElementById('btn-guest-mode').addEventListener('click', () => {
    isGuestSession = true;
    isLockedMode = false;
    lockScreen.classList.add('hidden');
    lockPasswordInput.value = '';
    lockError.textContent = '';
    loadGuestDiagrams();
    startApp();
  });

  // =====================
  // App Start
  // =====================
  function startApp() {
    loadRepoDiagrams().then(() => {
      const sorted = sortedDiagrams();
      if (sorted.length > 0) {
        activeId = sorted[0].id;
        editor.value = sorted[0].code;
      }
      renderSidebar();
      renderDiagram();
    });

    // Immediate render with current data
    const sorted = sortedDiagrams();
    if (sorted.length > 0) {
      activeId = sorted[0].id;
      editor.value = sorted[0].code;
    }
    renderSidebar();
    renderDiagram();
    checkMobile();
  }

  // =====================
  // Init
  // =====================
  async function init() {
    // Check for remote encrypted.json first
    await tryLoadRemoteEncrypted();

    // Always show lock screen first
    lockScreen.classList.remove('hidden');
  }

  init();
</script>
