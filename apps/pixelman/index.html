<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXELMAN</title>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ink: #000;
    --paper: #fff;
    --pin: repeating-linear-gradient(180deg, transparent 0 2px, #000 2px 3px);
  }

  html, body { height: 100%; }
  body {
    font-family: 'Silkscreen', monospace;
    background: #fff; color: #000;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* ===== 맥OS 창 틀 (전체 화면) ===== */
  .app {
    flex: 1; display: flex; flex-direction: column;
    border: 2px solid var(--ink);
    margin: 10px;
    box-shadow: 4px 4px 0 var(--ink);
    background: var(--paper);
    overflow: hidden;
  }

  /* 핀스트라이프 타이틀바 */
  .titlebar {
    background: var(--pin);
    min-height: 26px;
    display: flex; align-items: center; justify-content: center;
    border-bottom: 2px solid var(--ink);
    position: relative;
  }
  .titlebar .close {
    position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
    width: 13px; height: 13px; background: var(--paper); border: 2px solid var(--ink);
  }
  .titlebar .title {
    background: var(--paper); padding: 1px 14px;
    font-size: 13px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  }

  /* ===== 본체: 좌 컨트롤 + 우 미리보기 ===== */
  .body { flex: 1; display: flex; overflow: hidden; }

  /* --- 좌측 컨트롤 패널 --- */
  .controls {
    width: 248px; flex-shrink: 0;
    border-right: 2px solid var(--ink);
    overflow-y: auto;
    padding: 14px;
    display: flex; flex-direction: column; gap: 16px;
    background: var(--paper);
  }
  .sec-title {
    font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
    border-bottom: 2px solid var(--ink); padding-bottom: 4px; margin-bottom: 8px;
  }

  /* 드롭존 / 이미지 추가 */
  #drop {
    border: 2px dashed var(--ink); padding: 22px 10px; text-align: center;
    font-family: 'VT323', monospace; font-size: 17px; line-height: 1.2;
    cursor: pointer; user-select: none;
  }
  #drop:hover, #drop.over { background: var(--ink); color: var(--paper); }

  /* 알고리즘 토글 */
  .algo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .algo-grid button {
    font-family: 'Silkscreen', monospace; font-size: 9px; letter-spacing: .04em;
    padding: 8px 4px; border: 2px solid var(--ink); background: var(--paper); color: var(--ink);
    cursor: pointer; text-transform: uppercase;
  }
  .algo-grid button:hover { background: #ddd; }
  .algo-grid button.active { background: var(--ink); color: var(--paper); }

  /* 슬라이더 */
  .slider label {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 10px; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px;
  }
  .slider label .v { font-family: 'VT323', monospace; font-size: 16px; }
  input[type=range] {
    -webkit-appearance: none; appearance: none; width: 100%; height: 16px;
    background: var(--paper); border: 2px solid var(--ink); cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px; background: var(--ink); border: 0; cursor: pointer;
  }
  input[type=range]::-moz-range-thumb { width: 12px; height: 12px; background: var(--ink); border: 0; border-radius: 0; }

  /* 스와치 그리드 */
  .swatches { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; }
  .swatch {
    aspect-ratio: 1; border: 2px solid var(--ink); cursor: pointer; position: relative; padding: 0;
  }
  .swatch.sel::after {
    content: ""; position: absolute; inset: 2px; border: 2px solid var(--paper);
    box-shadow: 0 0 0 1px var(--ink) inset;
  }
  .swatch.sel { box-shadow: 2px 2px 0 var(--ink); }

  /* 다운로드 */
  .btn-download {
    font-family: 'Silkscreen', monospace; font-size: 12px; text-transform: uppercase; letter-spacing: .05em;
    padding: 10px; border: 2px solid var(--ink); background: var(--ink); color: var(--paper);
    box-shadow: 2px 2px 0 var(--ink); cursor: pointer; margin-top: auto;
  }
  .btn-download:hover { background: var(--paper); color: var(--ink); }
  .btn-download:disabled { opacity: .3; cursor: default; box-shadow: none; }

  /* --- 우측 미리보기 (맥 데스크탑 스티플 위 도큐먼트 창) --- */
  .preview {
    flex: 1; position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center; padding: 28px;
    background-color: #e9e9e9;
    background-image: radial-gradient(#c2c2c2 1px, transparent 1px);
    background-size: 4px 4px;
  }
  .stage { position: relative; max-width: 100%; max-height: 100%; line-height: 0; }
  #out {
    display: block; max-width: 100%; max-height: calc(100vh - 120px);
    image-rendering: pixelated;
    border: 2px solid var(--ink); box-shadow: 4px 4px 0 var(--ink); background: var(--paper);
  }
  /* 코너 크롭 마크 */
  .crop { position: absolute; width: 16px; height: 16px; pointer-events: none; }
  .crop.tl { top: -10px; left: -10px; border-top: 2px solid var(--ink); border-left: 2px solid var(--ink); }
  .crop.tr { top: -10px; right: -10px; border-top: 2px solid var(--ink); border-right: 2px solid var(--ink); }
  .crop.bl { bottom: -10px; left: -10px; border-bottom: 2px solid var(--ink); border-left: 2px solid var(--ink); }
  .crop.br { bottom: -10px; right: -10px; border-bottom: 2px solid var(--ink); border-right: 2px solid var(--ink); }

  .placeholder {
    text-align: center; color: #555; font-family: 'VT323', monospace; font-size: 22px; line-height: 1.4;
    border: 2px dashed #999; padding: 60px 50px; background: rgba(255,255,255,.6);
  }
  .placeholder b { font-family: 'Silkscreen', monospace; font-size: 13px; display: block; margin-bottom: 10px; letter-spacing: .1em; }
</style>
</head>
<body>
<div class="app">
  <div class="titlebar">
    <span class="close"></span>
    <span class="title">PIXELMAN</span>
  </div>

  <div class="body">
    <!-- 좌측 컨트롤 -->
    <aside class="controls">
      <div>
        <div class="sec-title">이미지</div>
        <div id="drop">사진을 끌어다 놓거나<br>클릭해서 선택</div>
        <input type="file" id="file" accept="image/*" hidden>
      </div>

      <div>
        <div class="sec-title">알고리즘</div>
        <div class="algo-grid" id="algoGrid">
          <button data-algo="bayer">Bayer</button>
          <button data-algo="floyd">Floyd</button>
          <button data-algo="atkinson" class="active">Atkinson</button>
          <button data-algo="blue">Blue</button>
        </div>
      </div>

      <div class="slider">
        <label>밝기 <span class="v" id="brightVal">0</span></label>
        <input type="range" id="bright" min="-100" max="100" value="0">
      </div>
      <div class="slider">
        <label>대비 <span class="v" id="contrastVal">0</span></label>
        <input type="range" id="contrast" min="-100" max="100" value="0">
      </div>
      <div class="slider">
        <label>스케일 <span class="v" id="scaleVal">1</span></label>
        <input type="range" id="scale" min="1" max="8" value="1">
      </div>

      <div>
        <div class="sec-title">색상 (잉크)</div>
        <div class="swatches" id="fgSwatches"></div>
      </div>
      <div>
        <div class="sec-title">배경 (종이)</div>
        <div class="swatches" id="bgSwatches"></div>
      </div>

      <button class="btn-download" id="download" disabled>↓ PNG 다운로드</button>
    </aside>

    <!-- 우측 미리보기 -->
    <main class="preview" id="preview">
      <div class="placeholder" id="placeholder">
        <b>PIXELMAN</b>
        여기로 사진을 끌어다 놓으세요
      </div>
      <div class="stage" id="stage" hidden>
        <span class="crop tl"></span><span class="crop tr"></span>
        <span class="crop bl"></span><span class="crop br"></span>
        <canvas id="out"></canvas>
      </div>
    </main>
  </div>
</div>

<script>
"use strict";

// ===== 팔레트 (SPEC §6.1) =====
const FG_COLORS = [
  "#FF6B1A","#FF5A4D","#E5404A","#FF5BAA","#FFC93C","#00A95C",
  "#00A0A0","#0F6FCB","#1B30FF","#8B2FC9","#111111","#FFFFFF"
];
const BG_COLORS = ["#FFFFFF","#F4ECD8","#111111","#101A3A","#2A1042","#06222B"];

// 상태
let sourceImg = null;
let algo = "atkinson";
let fg = "#FF6B1A";   // 기본: 주황 on 네이비
let bg = "#101A3A";

const MAX_EDGE = 720;   // 작업 해상도 긴 변 상한

const work = document.createElement("canvas");
const workCtx = work.getContext("2d", { willReadFrequently: true });
const out = document.getElementById("out");
const outCtx = out.getContext("2d");

// ===== 스와치 생성 =====
function hex2rgb(h){ return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }

function buildSwatches(host, colors, current, onPick) {
  host.innerHTML = "";
  colors.forEach(c => {
    const b = document.createElement("button");
    b.className = "swatch" + (c === current ? " sel" : "");
    b.style.background = c;
    b.title = c;
    b.addEventListener("click", () => {
      [...host.children].forEach(ch => ch.classList.remove("sel"));
      b.classList.add("sel");
      onPick(c);
      if (sourceImg) render();
    });
    host.appendChild(b);
  });
}
buildSwatches(document.getElementById("fgSwatches"), FG_COLORS, fg, c => fg = c);
buildSwatches(document.getElementById("bgSwatches"), BG_COLORS, bg, c => bg = c);

// ===== 알고리즘 토글 =====
document.getElementById("algoGrid").addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  [...e.currentTarget.children].forEach(c => c.classList.remove("active"));
  b.classList.add("active");
  algo = b.dataset.algo;
  if (sourceImg) render();
});

// ===== 업로드 (클릭 + 드래그) =====
const fileInput = document.getElementById("file");
const drop = document.getElementById("drop");
const preview = document.getElementById("preview");
drop.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

[drop, preview].forEach(zone => {
  ["dragenter","dragover"].forEach(ev => zone.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("over"); }));
  ["dragleave","drop"].forEach(ev => zone.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("over"); }));
  zone.addEventListener("drop", e => {
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith("image/")) loadFile(f);
  });
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => { sourceImg = img; render(); };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

// ===== 슬라이더 =====
const brightEl = document.getElementById("bright");
const contrastEl = document.getElementById("contrast");
const scaleEl = document.getElementById("scale");
[brightEl, contrastEl, scaleEl].forEach(el => el.addEventListener("input", () => {
  document.getElementById("brightVal").textContent = brightEl.value;
  document.getElementById("contrastVal").textContent = contrastEl.value;
  document.getElementById("scaleVal").textContent = scaleEl.value;
  if (sourceImg) render();
}));

// ===== Blue noise threshold 타일 (void-and-cluster, 1회 생성) =====
const BLUE = generateBlueNoise(32);
function generateBlueNoise(N) {
  const M = N*N;
  const energy = new Float32Array(M);
  const sigma = 1.9, r = Math.ceil(sigma*3);
  const ker = [];
  for (let dy=-r; dy<=r; dy++) for (let dx=-r; dx<=r; dx++)
    ker.push([dx, dy, Math.exp(-(dx*dx+dy*dy)/(2*sigma*sigma))]);
  function addE(idx, s) {
    const cy=(idx/N)|0, cx=idx%N;
    for (const [dx,dy,e] of ker) {
      const x=((cx+dx)%N+N)%N, y=((cy+dy)%N+N)%N;
      energy[y*N+x] += s*e;
    }
  }
  const pat = new Uint8Array(M);
  const target = Math.round(M*0.1);
  let cnt=0;
  while (cnt<target){ const i=(Math.random()*M)|0; if(!pat[i]){pat[i]=1; addE(i,1); cnt++;} }
  // 균질화
  for (let it=0; it<M*2; it++) {
    let tc=-1,mx=-Infinity; for(let i=0;i<M;i++) if(pat[i]&&energy[i]>mx){mx=energy[i];tc=i;}
    pat[tc]=0; addE(tc,-1);
    let lv=-1,mn=Infinity; for(let i=0;i<M;i++) if(!pat[i]&&energy[i]<mn){mn=energy[i];lv=i;}
    pat[lv]=1; addE(lv,1);
    if (lv===tc) break;
  }
  const initial = pat.slice();
  const rank = new Int32Array(M);
  // Phase 1: 초기 점들을 가장 빽빽한 군집부터 제거하며 0..target-1
  let w1 = initial.slice(); energy.fill(0);
  for(let i=0;i<M;i++) if(w1[i]) addE(i,1);
  for (let rk=target-1; rk>=0; rk--) {
    let tc=-1,mx=-Infinity; for(let i=0;i<M;i++) if(w1[i]&&energy[i]>mx){mx=energy[i];tc=i;}
    w1[tc]=0; addE(tc,-1); rank[tc]=rk;
  }
  // Phase 2: 가장 큰 빈 곳부터 채우며 target..M-1
  let w2 = initial.slice(); energy.fill(0);
  for(let i=0;i<M;i++) if(w2[i]) addE(i,1);
  for (let rk=target; rk<M; rk++) {
    let lv=-1,mn=Infinity; for(let i=0;i<M;i++) if(!w2[i]&&energy[i]<mn){mn=energy[i];lv=i;}
    w2[lv]=1; addE(lv,1); rank[lv]=rk;
  }
  const tile = new Float32Array(M);
  for (let i=0;i<M;i++) tile[i] = (rank[i]+0.5)/M*255;
  return { tile, N };
}

// Bayer 4x4 (정규화된 threshold)
const BAYER4 = [0,8,2,10, 12,4,14,6, 3,11,1,9, 15,7,13,5];

// ===== 메인 파이프라인 =====
function render() {
  if (!sourceImg) return;
  const scale = parseInt(scaleEl.value, 10);

  // 1) 작업 해상도 (긴 변 MAX_EDGE 상한) → 스케일만큼 다운스케일
  let bw = sourceImg.width, bh = sourceImg.height;
  if (Math.max(bw,bh) > MAX_EDGE) { const r=MAX_EDGE/Math.max(bw,bh); bw=Math.round(bw*r); bh=Math.round(bh*r); }
  const w = Math.max(1, Math.round(bw/scale));
  const h = Math.max(1, Math.round(bh/scale));

  work.width=w; work.height=h;
  workCtx.drawImage(sourceImg, 0, 0, w, h);
  const px = workCtx.getImageData(0,0,w,h).data;

  // 2) 밝기·대비 → 그레이스케일
  const bright = +brightEl.value, contrast = +contrastEl.value;
  const cf = (259*(contrast+255))/(255*(259-contrast));
  const gray = new Float32Array(w*h);
  for (let i=0;i<w*h;i++) {
    const j=i*4;
    let lum = 0.299*px[j] + 0.587*px[j+1] + 0.114*px[j+2] + bright;
    gray[i] = cf*(lum-128)+128;
  }

  // 3) 디더링
  if (algo === "floyd") errorDiffuse(gray, w, h, FLOYD);
  else if (algo === "atkinson") errorDiffuse(gray, w, h, ATKINSON);
  else ordered(gray, w, h, algo);   // bayer / blue

  // 4) 듀오톤 매핑 (어두움→잉크 FG, 밝음→종이 BG)
  const FGc = hex2rgb(fg), BGc = hex2rgb(bg);
  const imgOut = workCtx.createImageData(w,h);
  const d = imgOut.data;
  for (let i=0;i<w*h;i++) {
    const c = gray[i] >= 128 ? BGc : FGc;
    const j=i*4; d[j]=c[0]; d[j+1]=c[1]; d[j+2]=c[2]; d[j+3]=255;
  }
  workCtx.putImageData(imgOut, 0, 0);

  // 5) 출력 캔버스에 스케일 확대 (또렷한 점)
  out.width=w*scale; out.height=h*scale;
  outCtx.imageSmoothingEnabled=false;
  outCtx.drawImage(work, 0, 0, out.width, out.height);

  document.getElementById("placeholder").hidden = true;
  document.getElementById("stage").hidden = false;
  document.getElementById("download").disabled = false;
}

// 오차 확산 (Floyd / Atkinson)
const FLOYD    = { div:16, pts:[[1,0,7],[-1,1,3],[0,1,5],[1,1,1]] };
const ATKINSON = { div:8,  pts:[[1,0,1],[2,0,1],[-1,1,1],[0,1,1],[1,1,1],[0,2,1]] };
function errorDiffuse(gray, w, h, K) {
  for (let y=0;y<h;y++) for (let x=0;x<w;x++) {
    const i=y*w+x, old=gray[i], nv=old<128?0:255;
    gray[i]=nv; const err=(old-nv)/K.div;
    for (const [dx,dy,wt] of K.pts) {
      const nx=x+dx, ny=y+dy;
      if (nx>=0 && nx<w && ny>=0 && ny<h) gray[(ny)*w+nx] += err*wt;
    }
  }
}

// 순서 디더 (Bayer / Blue noise)
function ordered(gray, w, h, kind) {
  const N = kind==="blue" ? BLUE.N : 4;
  for (let y=0;y<h;y++) for (let x=0;x<w;x++) {
    const i=y*w+x;
    let th;
    if (kind==="blue") th = BLUE.tile[(y%N)*N + (x%N)];
    else th = (BAYER4[(y%4)*4 + (x%4)] + 0.5)/16*255;
    gray[i] = gray[i] > th ? 255 : 0;
  }
}

// ===== 다운로드 =====
document.getElementById("download").addEventListener("click", () => {
  if (!sourceImg) return;
  const a = document.createElement("a");
  a.download = "pixelman.png";
  a.href = out.toDataURL("image/png");
  a.click();
});
</script>
</body>
</html>
